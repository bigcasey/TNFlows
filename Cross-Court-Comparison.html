ill' and the endorsement signed by the foreman. T.C.A. § 40-13-105.","When found and endorsed, the indictment is presented by the foreman to the Criminal Court Clerk, who files the indictment and enters it on the minutes of the court. T.C.A. § 40-13-108, § 40-13-109.","If the defendant is not already in custody, the clerk issues a capias. A single capias may specify multiple cases of the same class at the same term. T.C.A. § 40-13-301.","The district attorney general shall endorse on each indictment the names of witnesses the DA intends to summon at the term the indictment is found. T.C.A. § 40-17-106.","Entry from GS-PRE: if the defendant was bound over to the grand jury from General Sessions Court following a preliminary hearing or waiver, the records from the preliminary hearing are transmitted to the Criminal Court Clerk by the magistrate upon bind-over. Tenn. R. Crim. P. 5.1(d)."],"next_steps":["CR-FEL-002"],"decision_point":false,"notes":"[GAP: CR-FEL-GAP-001] Proceeds to CR-FEL-002 (arraignment)."},{"step_id":"CR-FEL-002","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Judge","action":"Arraign defendant in open court; defendant receives copy of indictment; defendant enters plea; court confirms bail or reset bail","citations":["Tenn. R. Crim. P. 10","T.C.A. § 40-14-101","T.C.A. § 40-14-102","T.C.A. § 40-14-103","T.C.A. § 40-11-102"],"conditions":["Arraignment procedure: (1) ensure defendant has a copy of the indictment, presentment, or information; (2) read the indictment or state the substance of the charge; (3) ask the defendant to plead. Tenn. R. Crim. P. 10(a)-(b). Arraignment is entered on the record. Arraignment applies only in circuit or criminal courts or other courts of record. Tenn. R. Crim. P. 10 Advisory Commission Comment.","Arraignment may be conducted by audio-visual device unless the defendant objects, provided the defendant may view and hear the judge simultaneously and the arraignment is accessible to the public. The court may accept only a not guilty plea at arraignment by audio-visual device. Tenn. R. Crim. P. 43(f).","Right to counsel: every person accused of any crime or misdemeanor is entitled to counsel. If unable to employ counsel, the defendant is entitled to appointed counsel. T.C.A. § 40-14-102, § 40-14-103(a). A nonrefundable $50.00 administrative fee is assessed at the time of appointment. T.C.A. § 40-14-103(b)(1).","Bail: before trial, all defendants are bailable by sufficient sureties, except for capital offenses where the proof is evident or the presumption great. T.C.A. § 40-11-102.","Time before trial: defendant is entitled to 14 full days (Sundays and legal holidays excluded) after arrest and return of the indictment or presentment before being tried. T.C.A. § 40-14-105. Capital offenses: 21 full days. T.C.A. § 40-14-106. This period may be waived. T.C.A. § 40-14-107(b)."],"next_steps":["CR-FEL-003"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CR-FEL-LRC-001] Proceeds to CR-FEL-003 (pretrial diversion assessment)."},{"step_id":"CR-FEL-003","phase":"Pleadings","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Defendant / Attorney","action":"Assess eligibility for pretrial diversion; if qualified, negotiate memorandum of understanding with DA; if not, proceed to discovery and motions","citations":["T.C.A. § 40-15-102","T.C.A. § 40-15-103","T.C.A. § 40-15-105(a)(1)"],"conditions":["Pretrial diversion: the parties may discuss the possibility of pretrial diversion. Upon stipulation of the parties, the court shall defer proceedings for a reasonable time. T.C.A. § 40-15-102, § 40-15-103.","A qualified defendant may agree by a memorandum of understanding (MOU) with the prosecution to suspend prosecution for a specified period not to exceed two years. T.C.A. § 40-15-105(a)(1).","If the MOU conditions are satisfied at the end of the deferral period, the case is dismissed and the record may be expunged. If conditions are not met, prosecution resumes.","Not all felony defendants are eligible for diversion; the DA has discretion over diversion applications and may deny based on the nature of the offense, the defendant's prior record, and other statutory factors."],"next_steps":["CR-FEL-004"],"decision_point":true,"notes":"[LOCAL RULE CHECK: CR-FEL-LRC-002] Decision point: diversion MOU executed proceeds to deferred prosecution (terminal until completion or revocation); no diversion proceeds to CR-FEL-004 (discovery and pretrial motions)."},{"step_id":"CR-FEL-004","phase":"Discovery","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Defendant / Attorney","action":"Conduct discovery under Tenn. R. Crim. P. 16; exchange reciprocal disclosures; serve Brady and Giglio demands","citations":["Tenn. R. Crim. P. 16","Tenn. R. Crim. P. 12.1","Tenn. R. Crim. P. 26.2"],"conditions":["Discovery under Tenn. R. Crim. P. 16 includes: defendant's statements; defendant's prior criminal record; documents and tangible objects; reports of examinations and tests; and expert witness summaries. Tenn. R. Crim. P. 16(a)(1).","State's reciprocal duty: the state is entitled to reciprocal discovery of items the defendant intends to introduce at trial, and of expert reports and summaries. Tenn. R. Crim. P. 16(b).","Alibi notice: if the state requests alibi notice, the defendant must disclose the alibi defense and witness names within 10 days of the request; the state must then disclose its rebuttal witnesses. Tenn. R. Crim. P. 12.1.","Jencks material: prior statements of witnesses must be produced after the witness testifies on direct examination. Tenn. R. Crim. P. 26.2."],"next_steps":["CR-FEL-005"],"decision_point":false,"notes":"Proceeds to CR-FEL-005 (pretrial motions)."},{"step_id":"CR-FEL-005","phase":"Motions Practice","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Defendant / Attorney","action":"File all required pretrial motions before the court-set deadline; court hears and rules on motions","citations":["Tenn. R. Crim. P. 12(b)","Tenn. R. Crim. P. 12(c)","Tenn. R. Crim. P. 14"],"conditions":["Motions that must be made before trial include: (A) motion alleging a defect in the institution of the prosecution; (B) motion alleging a defect in the indictment, presentment, or information; (C) motion to suppress evidence; (D) Rule 16 discovery request; and (E) Rule 14 motion to sever or consolidate. Tenn. R. Crim. P. 12(b)(2). Failure to file required pretrial motions before the court's deadline constitutes waiver absent good cause. Tenn. R. Crim. P. 12(f).","Notice of enhanced punishment: if the DA seeks enhanced punishment as a multiple, persistent, or career offender, a statement must be filed with the court and defense counsel not less than 10 days before trial or acceptance of a guilty plea. T.C.A. § 40-35-202(a).","The court shall decide each pretrial motion before trial unless it finds good cause to defer a ruling until trial or after verdict. Tenn. R. Crim. P. 12(e).","A verbatim record shall be made of all proceedings at the motion hearing, including findings of fact and conclusions of law. Tenn. R. Crim. P. 12(g).","State notice of intent to use evidence: at or after arraignment, the state may notify the defendant of its intent to use specified evidence to afford the defendant an opportunity to object. Tenn. R. Crim. P. 12(d)(1)."],"next_steps":["CR-FEL-006"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CR-FEL-LRC-003] Proceeds to CR-FEL-006 (plea or trial determination)."},{"step_id":"CR-FEL-006","phase":"Pre-Trial","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Judge","action":"Accept guilty plea or nolo contendere plea if offered, or set case for jury trial","citations":["Tenn. R. Crim. P. 11","T.C.A. § 40-35-203(b)"],"conditions":["Plea alternatives: not guilty, guilty, or nolo contendere (nolo requires court consent). Tenn. R. Crim. P. 11(a).","Before accepting a guilty or nolo plea, the court must address the defendant personally in open court and determine: (1) the defendant understands the charges and the consequences of the plea; (2) the plea is voluntary; (3) there is a factual basis for the plea; and (4) the defendant has been advised of the constitutional rights being waived. Tenn. R. Crim. P. 11(b).","Plea agreement: the DA and defendant may negotiate a plea agreement. The court shall not participate in discussions. If the agreement specifies a specific sentence (Rule 11(c)(1)(C)), the court may accept or reject it; if rejected, the defendant has the right to withdraw the plea. Tenn. R. Crim. P. 11(c).","Agreed sentence: where the sentence is agreed upon by the parties and approved by the court, the court may impose the agreed sentence without a separate sentencing hearing. T.C.A. § 40-35-203(b).","Conditional plea: defendant may enter a conditional guilty plea reserving the right to appeal an adverse ruling on a specified pretrial motion; if the appeal succeeds, the defendant may withdraw the plea. Tenn. R. Crim. P. 37(b)."],"next_steps":["CR-FEL-007","CR-FEL-008"],"decision_point":true,"notes":"Decision point: guilty plea proceeds to CR-FEL-008 (sentencing); not guilty proceeds to CR-FEL-007 (jury trial). Capital path branches at CR-FEL-007."},{"step_id":"CR-FEL-007","phase":"Trial","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Judge","action":"Conduct jury trial: voir dire, jury selection, opening statements, presentation of evidence, jury instructions, and verdict","citations":["T.C.A. § 40-18-110","T.C.A. § 40-18-118","T.C.A. § 40-14-105","T.C.A. § 40-35-201(a)","Tenn. R. Crim. P. 29","Tenn. R. Evid. 101"],"conditions":["Bifurcation: in all contested criminal cases, the issue of guilt or innocence is submitted to the trier of fact for a verdict on that issue alone. If the defendant is found guilty, sentence is set in a separate sentencing hearing. T.C.A. § 40-35-201(a).","Peremptory challenges: for offenses punishable by death, each side has 15 peremptory challenges per defendant. For offenses punishable by imprisonment for more than one year but not death, each defendant has 8 challenges and the state has 8 per defendant. T.C.A. § 40-18-118.","Defendant must be present during trial unless the defendant is voluntarily absent after the trial has commenced. Tenn. R. Crim. P. 43.","Lesser included offenses: upon written request by a party before jury instructions, the trial judge shall instruct the jury on lesser included offenses that are supported by the evidence. T.C.A. § 40-18-110(a).","Motion for judgment of acquittal: defendant may move for a judgment of acquittal at the close of the state's evidence, at the close of all evidence, or within 30 days after verdict. Tenn. R. Crim. P. 29.","CAPITAL PATH: if the offense charged is punishable by death and the jury returns a guilty verdict, the trial bifurcates into a separate capital sentencing phase. Proceed to CR-FEL-CAP-001."],"next_steps":["CR-FEL-008","CR-FEL-CAP-001"],"decision_point":true,"notes":"Decision point: capital conviction proceeds to CR-FEL-CAP-001; non-capital conviction proceeds to CR-FEL-008 (sentencing)."},{"step_id":"CR-FEL-CAP-001","phase":"Trial","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Judge","action":"CAPITAL PATH -- Conduct separate capital sentencing phase; jury weighs aggravating and mitigating circumstances and determines sentence of death or life imprisonment","citations":["T.C.A. § 39-13-204","T.C.A. § 40-35-201(a)","T.C.A. § 40-14-106","Tenn. R. App. P. 39"],"conditions":["Capital sentencing is a separate bifurcated proceeding following a guilty verdict on a capital offense. T.C.A. § 40-35-201(a).","The jury must consider all evidence from the guilt phase plus any additional evidence relevant to aggravating and mitigating circumstances. T.C.A. § 39-13-204.","The jury must unanimously find at least one statutory aggravating circumstance beyond a reasonable doubt before imposing the death penalty. T.C.A. § 39-13-204.","Defendant is entitled to 21 full days (Sundays and legal holidays excluded) after arrest and return of the indictment before trial on a capital offense. T.C.A. § 40-14-106.","Automatic review: any sentence of death is automatically reviewed by the Tennessee Supreme Court under Tenn. R. App. P. 39, which supersedes and is separate from the ordinary appeal process. See CR-FEL-011 for the appeal step noting automatic Supreme Court review.","[GAP: CR-FEL-GAP-002] -- Full text of T.C.A. § 39-13-204 (capital sentencing statutory aggravating and mitigating circumstances) must be confirmed before this step is treated as authoritative."],"next_steps":["CR-FEL-009"],"decision_point":false,"notes":"[GAP: CR-FEL-GAP-002] Capital path converges with non-capital path at CR-FEL-009 (post-trial motions and sentence appeal)."},{"step_id":"CR-FEL-008","phase":"Judgment","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Judge","action":"Order presentence investigation; conduct sentencing hearing; impose sentence within applicable range","citations":["T.C.A. § 40-35-201(a)","T.C.A. § 40-35-203(a)","T.C.A. § 40-35-205(a)","T.C.A. § 40-35-207","T.C.A. § 40-35-209(a)","T.C.A. § 40-35-210"],"conditions":["Presentence investigation: upon acceptance of a guilty plea or upon a guilty verdict in a felony case, the court shall direct the presentence service officer to make a presentence investigation and report. T.C.A. § 40-35-205(a). The presentence report must contain: offense characteristics; defendant's physical and mental history, family background, education, and occupation; enhancement and mitigating factors; prior criminal record; and validated risk and needs assessment. T.C.A. § 40-35-207.","Sentencing hearing: the court must conduct a sentencing hearing without unreasonable delay, but in no event more than 45 days after the finding of guilt, except as provided in § 40-35-203(b) (agreed sentences) and § 40-35-203(c). T.C.A. § 40-35-209(a). The agreed sentence exception permits immediate sentencing without a separate hearing upon court acceptance of the agreement.","Sentence ranges (T.C.A. § 40-35-112): Range I -- Class A 15-25 years, Class B 8-12 years, Class C 3-6 years, Class D 2-4 years, Class E 1-2 years. Range II adds approximately one-third. Range III (persistent offender) adds approximately two-thirds. Career offender receives the maximum for the offense.","Presumptive sentence: the presumptive sentence for a Range I standard offender is the minimum of the applicable range; for a Range II or III offender, the middle of the range. The court increases or decreases from the presumptive sentence based on enhancement and mitigating factors. T.C.A. § 40-35-210.","Authorized terms and fines (T.C.A. § 40-35-111): Class A felony 15-60 years, fine up to $50,000; Class B 8-30 years, fine up to $25,000; Class C 3-15 years, fine up to $10,000; Class D 2-12 years, fine up to $5,000; Class E 1-6 years, fine up to $3,000.","Consecutive vs. concurrent: when a defendant is convicted of two or more offenses, sentences run concurrently or cumulatively in the discretion of the trial judge. T.C.A. § 40-20-111.","Restitution: if the defendant is convicted of stealing, feloniously taking or receiving property, or defrauding another of property, the court shall order restitution or recovery of value. T.C.A. § 40-20-116.","Sentences in felony cases are determinate sentences. T.C.A. § 40-35-111(a)."],"next_steps":["CR-FEL-009"],"decision_point":false,"notes":"[CONFLICT: CR-FEL-CONF-001] [CONFLICT: CR-FEL-CONF-002] Proceeds to CR-FEL-009 (post-trial motions)."},{"step_id":"CR-FEL-009","phase":"Post-Judgment","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Defendant / Attorney","action":"File motion for new trial within 30 days after verdict; file any motion to correct or reduce sentence","citations":["Tenn. R. Crim. P. 33","Tenn. R. App. P. 4(b)","T.C.A. § 40-35-401(a)"],"conditions":["Motion for new trial: a defendant may move for a new trial within 30 days after verdict. Tenn. R. Crim. P. 33(b). The motion for new trial is a prerequisite to raising most issues on appeal; issues not raised in the motion for new trial are generally waived. Tenn. R. App. P. 3(e).","The trial judge must act as the thirteenth juror and independently weigh the evidence when ruling on a motion for new trial; if the judge disagrees with the verdict, the judge must grant a new trial. T.C.A. § 40-18-119.","Timely motion for new trial extends the time for filing the notice of appeal; the 30-day period for filing the notice of appeal runs from entry of the order denying the motion for new trial. Tenn. R. App. P. 4(b).","Sentence appeal: the defendant may appeal from the length, range, or manner of service of the sentence, or from the imposition of consecutive sentences. The appeal of the sentence shall be taken at the same time as the appeal of the conviction, if any. T.C.A. § 40-35-401(a).","State's right to appeal sentence: the DA may appeal from the length, range, or manner of service of the sentence, from concurrent sentences, and from the amount of fines and restitution. T.C.A. § 40-35-402(a)."],"next_steps":["CR-FEL-010"],"decision_point":false,"notes":"Proceeds to CR-FEL-010 (judgment of conviction and transfer to DOC)."},{"step_id":"CR-FEL-010","phase":"Post-Judgment","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Criminal Court Clerk","action":"Enter judgment of conviction; transfer presentence report and judgment to Department of Correction; notify victims; issue any order of restitution","citations":["T.C.A. § 40-35-209(b)","T.C.A. § 40-20-116","T.C.A. § 40-38-103"],"conditions":["After sentencing, the court must transfer to the receiving institution the presentence report, the judgment, and any other relevant documentation. T.C.A. § 40-35-209(b).","A judgment of conviction for an infamous crime (any felony) operates to remove the right of suffrage and disqualify the defendant from public office unless restored. T.C.A. § 40-20-112.","Victim notification: the clerk must notify victims of the outcome of the proceeding, including the sentence imposed. T.C.A. § 40-38-103.","DNA sample: any person convicted of a felony must provide a biological specimen for DNA analysis. T.C.A. § 40-35-321."],"next_steps":["CR-FEL-011"],"decision_point":false,"notes":"Proceeds to CR-FEL-011 (appeal to Court of Criminal Appeals)."},{"step_id":"CR-FEL-011","phase":"Appeal","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Defendant / Attorney","action":"File notice of appeal to Court of Criminal Appeals within 30 days after entry of judgment or after order denying motion for new trial","citations":["Tenn. R. App. P. 3(b)","Tenn. R. App. P. 4(a)-(b)","Tenn. R. App. P. 39","T.C.A. § 40-35-401"],"conditions":["An appeal as of right lies to the Court of Criminal Appeals from any final judgment in a criminal case. Tenn. R. App. P. 3(b).","Notice of appeal must be filed with the Criminal Court Clerk within 30 days after entry of the judgment, or within 30 days after the order denying the motion for new trial if a timely motion for new trial was filed. Tenn. R. App. P. 4(a)-(b).","Issues not raised in the motion for new trial or at trial are generally considered waived on appeal. Tenn. R. App. P. 3(e).","Sentence appeal: the defendant's appeal of the sentence is taken at the same time as the appeal of the conviction. T.C.A. § 40-35-401(a).","CAPITAL CASES: any sentence of death is subject to automatic review by the Tennessee Supreme Court under Tenn. R. App. P. 39. The Supreme Court reviews both the sentence and the proceedings independent of whether a notice of appeal is filed. This automatic review is in addition to, not in lieu of, the defendant's right to appeal."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow. Post-conviction relief proceedings (T.C.A. § 40-30-101 et seq.) may follow but are a separate flow."}],"source_file":"CR-FEL-Flowchart.html"},{"flow_id":"CR-GRJ","court_type":"Criminal Court","case_type":"Grand Jury -- Regular (Indictment Function)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"CR-GRJ-GAP-001","affected_steps":["CR-GRJ-001"],"description":"The composition, qualification, and impaneling procedures for the regular grand jury are governed by T.C.A. §§ 22-2-101 et seq. (jury selection) and the criminal procedure rules. The corpus contains T.C.A. §§ 40-12-101 and 40-12-102 and the Rules of Criminal Procedure, but the full text of the jury selection statutes in Title 22 governing qualification for grand jury service, challenges to grand jurors, and the oath of the grand jury are not confirmed from the corpus. These should be confirmed from the full corpus of Title 22 before this flow is treated as authoritative."}],"conflicts":[{"conflict_id":"CR-GRJ-CONF-001","affected_steps":["CR-GRJ-004"],"description":"Tenn. R. Crim. P. 6(d) provides that a grand jury may indict if 12 or more jurors vote that probable cause exists to charge the defendant with an offense. T.C.A. § 40-13-105 requires the concurrence of at least 12 grand jurors for a true bill. Both provisions are consistent on the 12-juror minimum. However, Tenn. R. Crim. P. 6 also governs the composition (12 grand jurors plus alternates) and procedures for the regular grand jury in greater detail than the TCA provisions. Under the source hierarchy, the Tennessee Supreme Court Rules and Rules of Criminal Procedure control procedural mechanics; T.C.A. § 40-13-105 provides the statutory basis. No genuine conflict; flagged to ensure practitioners use the Rule 6 procedures for impaneling and deliberations and the TCA section for the concurrence requirement."}],"local_rule_checks":[{"check_id":"CR-GRJ-LRC-001","affected_steps":["CR-GRJ-001"],"description":"Verify local rules for grand jury scheduling, including the number of grand jury terms per year in the local judicial district, whether a standing grand jury is impaneled or whether the grand jury is convened for each term, and any local standing orders governing grand jury operations."},{"check_id":"CR-GRJ-LRC-002","affected_steps":["CR-GRJ-003"],"description":"Verify local rules for the procedure by which private citizens may apply to testify before the grand jury under T.C.A. § 40-12-104, including whether the local district uses a panel of grand jurors to review applications as specified by statute."}],"steps":[{"step_id":"CR-GRJ-001","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Grand Jury -- Regular (Indictment Function)","actor":"Judge","action":"Impanel grand jury at commencement of each term; select foreperson; administer oath","citations":["Tenn. R. Crim. P. 6(a)","T.C.A. § 40-12-101","T.C.A. § 40-12-102"],"conditions":["A grand jury consists of 12 persons plus alternates as provided by Tenn. R. Crim. P. 6. Tenn. R. Crim. P. 6(a).","If a sufficient number of the original panel fails to attend before the grand jury is formed, the court may impanel the grand jury of those who attend plus bystanders. If none of the original panel attend, the grand jury may consist entirely of bystanders. T.C.A. § 40-12-101.","No person guilty of conspiracy to take human life, injure persons, or destroy property (T.C.A. § 39-12-103) may serve on any grand or petit jury. The court must carefully exclude such persons. T.C.A. § 40-12-102.","The clerk must post notice not less than 30 nor more than 40 days before the grand jury meets in a newspaper of general circulation in the county advising the public of the grand jury's duty to investigate known or suspected public offenses and inviting persons to submit information. T.C.A. § 40-12-105."],"next_steps":["CR-GRJ-002"],"decision_point":false,"notes":"[GAP: CR-GRJ-GAP-001] [LOCAL RULE CHECK: CR-GRJ-LRC-001]"},{"step_id":"CR-GRJ-002","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Grand Jury -- Regular (Indictment Function)","actor":"District Attorney","action":"Present evidence to the grand jury supporting indictment of named defendants; DA controls the presentation","citations":["Tenn. R. Crim. P. 6(e)","T.C.A. § 40-4-102","T.C.A. § 40-13-102"],"conditions":["The grand jury shall make an investigation as to the offense charged in a warrant to have been committed, to the end that it may return an indictment or presentment. T.C.A. § 40-4-102(a).","All felonies and all misdemeanors are indictable offenses. T.C.A. § 40-13-102.","Persons present during grand jury proceedings: Tenn. R. Crim. P. 6(e) limits those who may be present to: the DA (or assistant); witnesses while being questioned; interpreters if necessary; and a court reporter or recording device operator. No defense counsel is present. Tenn. R. Crim. P. 6(e).","Grand jury proceedings and testimony are secret. Grand jurors shall not disclose the nature or substance of deliberations, or the vote of any grand juror. Tenn. R. Crim. P. 6(f).","Only a grand juror or the DA may ask questions of a witness; members of the public may not be present during questioning or deliberations. Tenn. R. Crim. P. 6(e).","Witness immunity: the DA, with the approval of the court, may grant a witness immunity from prosecution for matters about which the witness testifies. Tenn. R. Crim. P. 6(j)(6)."],"next_steps":["CR-GRJ-003"],"decision_point":false,"notes":"Proceeds to CR-GRJ-003 (citizen application and deliberations)."},{"step_id":"CR-GRJ-003","phase":"Pleadings","court_type":"Criminal Court","case_type":"Grand Jury -- Regular (Indictment Function)","actor":"Grand Jury","action":"Receive evidence; any person with knowledge of a public offense may apply to testify; grand jury deliberates in secret","citations":["T.C.A. § 40-12-104","T.C.A. § 40-12-106","Tenn. R. Crim. P. 6(f)"],"conditions":["Any person having knowledge or proof of the commission of a public offense triable or indictable in the county may apply to testify before the grand jury. The person appears before the foreperson and may also submit sworn affidavits of others whose testimony the person wishes considered. T.C.A. § 40-12-104(a)-(b).","The person designates two grand jurors who, with the foreperson, comprise a panel to determine whether the knowledge warrants grand jury investigation. T.C.A. § 40-12-104(c).","No person applying to testify before the grand jury is immune from prosecution based on testimony subsequently given, except under an express grant of immunity by the grand jury. T.C.A. § 40-12-106.","Deliberations are secret; grand jurors shall keep secret the nature or substance of deliberations and the vote of any grand juror. Tenn. R. Crim. P. 6(f)."],"next_steps":["CR-GRJ-004"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CR-GRJ-LRC-002] Proceeds to CR-GRJ-004 (vote and return of indictment or no true bill)."},{"step_id":"CR-GRJ-004","phase":"Trial","court_type":"Criminal Court","case_type":"Grand Jury -- Regular (Indictment Function)","actor":"Grand Jury","action":"Vote on indictment; return true bill (indictment) or no bill; foreperson presents indictment to Criminal Court Clerk","citations":["T.C.A. § 40-13-105","T.C.A. § 40-13-106","T.C.A. § 40-13-108","Tenn. R. Crim. P. 6(d)"],"conditions":["An indictment cannot be found without the concurrence of at least 12 grand jurors; when found, it shall be endorsed a 'true bill' and the endorsement signed by the foreperson. T.C.A. § 40-13-105.","If the grand jury does not find a true bill, the foreperson endorses the indictment 'not a true bill' and the case is discharged. T.C.A. § 40-13-106. If no indictment or presentment is found, the defendant shall be discharged. T.C.A. § 40-4-102(c). Discharge does not bar a subsequent grand jury presentation.","The foreperson presents the indictment to the Criminal Court Clerk, who files it. T.C.A. § 40-13-108. Felony indictments are entered on the minutes of the court. T.C.A. § 40-13-109.","The grand jury may reconvene during the same term if a felony is committed in the jurisdiction after the grand jury has been discharged. T.C.A. § 40-12-103."],"next_steps":["CR-GRJ-005"],"decision_point":true,"notes":"[CONFLICT: CR-GRJ-CONF-001] Decision point: true bill returned proceeds to CR-GRJ-005 (indictment filed and case proceeds to arraignment in CR-FEL or CR-MIS); no true bill, defendant discharged, terminal."},{"step_id":"CR-GRJ-005","phase":"Judgment","court_type":"Criminal Court","case_type":"Grand Jury -- Regular (Indictment Function)","actor":"Criminal Court Clerk","action":"File indictment; issue capias if defendant not in custody; case proceeds to arraignment","citations":["T.C.A. § 40-13-108","T.C.A. § 40-13-109","T.C.A. § 40-13-301"],"conditions":["The Criminal Court Clerk files the indictment, enters it on the minutes, and issues a capias for any defendant not already in custody. T.C.A. § 40-13-108, § 40-13-109, § 40-13-301.","Case proceeds to arraignment in Criminal Court. For felony cases see CR-FEL-002; for misdemeanor cases see CR-MIS-002."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for grand jury proceedings. Case proceeds to CR-FEL-002 (felony arraignment) or CR-MIS-002 (misdemeanor arraignment) as applicable."}],"source_file":"CR-GRJ-Flowchart.html"},{"flow_id":"CR-GRJ-INV","court_type":"Criminal Court","case_type":"Grand Jury -- Investigative","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"CR-GRJ-INV-GAP-001","affected_steps":["CR-GRJ-INV-001"],"description":"T.C.A. § 40-12-201(a) lists the categories of criminal activity for which an investigative grand jury may be convened. The corpus confirms the general structure but the complete enumeration of all qualifying offense categories in § 40-12-201(a)(1) through (a)(10) should be confirmed against the full corpus text to ensure all qualifying offenses are accurately described in this flow."}],"conflicts":[{"conflict_id":"CR-GRJ-INV-CONF-001","affected_steps":["CR-GRJ-INV-003"],"description":"T.C.A. § 40-12-209 declares all written records of investigative grand jury applications, committee actions, petitions, and orders to be confidential. T.C.A. § 40-12-210 permits disclosure when directed by a court in connection with a judicial proceeding, when made by the DA to another grand jury, or when permitted by a court upon motion of the defendant showing grounds exist to dismiss the indictment because of matters occurring before the grand jury. Tenn. R. Crim. P. 6(f) provides the general grand jury secrecy rule for regular grand juries. The investigative grand jury confidentiality provisions under T.C.A. § 40-12-209 are more specific and more restrictive than the general Rule 6(f) provisions. Under the source hierarchy, T.C.A. § 40-12-209, as the specific statutory provision governing the investigative grand jury, controls over the general Rule 6(f) provisions for investigative grand jury proceedings."}],"local_rule_checks":[{"check_id":"CR-GRJ-INV-LRC-001","affected_steps":["CR-GRJ-INV-001"],"description":"Verify local rules for the committee review process under T.C.A. § 40-12-202, including the composition of the committee (composed of current district attorneys general), the procedure for submission and review of the DA's application, and any local standing orders governing the investigative grand jury petition process."}],"steps":[{"step_id":"CR-GRJ-INV-001","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Grand Jury -- Investigative","actor":"District Attorney","action":"Determine whether criminal activity falls within qualifying categories and obtain committee approval before filing investigative grand jury petition","citations":["T.C.A. § 40-12-201(a)","T.C.A. § 40-12-202"],"conditions":["An investigative grand jury may be used when the DA or Attorney General has reason to believe that criminal activity involves a violation of or a conspiracy to violate qualifying statutes, including: § 39-14-903 (money laundering); §§ 39-17-902(b), 39-17-911, 39-17-1005 (distribution of certain controlled substances); § 39-17-1322 (conspiracy relating to weapons of mass destruction); § 39-13-603 (human trafficking); and other qualifying offenses enumerated in T.C.A. § 40-12-201(a). [GAP: CR-GRJ-INV-GAP-001]","Before filing a petition, the DA must submit a written application to a committee of current district attorneys general (not including the applying DA) for review and written approval. T.C.A. § 40-12-202.","All written records of applications, committee action, petitions, and orders are confidential under T.C.A. § 40-12-209."],"next_steps":["CR-GRJ-INV-002"],"decision_point":false,"notes":"[GAP: CR-GRJ-INV-GAP-001] [LOCAL RULE CHECK: CR-GRJ-INV-LRC-001]"},{"step_id":"CR-GRJ-INV-002","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Grand Jury -- Investigative","actor":"District Attorney","action":"File petition with Criminal Court Clerk to convene investigative grand jury","citations":["T.C.A. § 40-12-203"],"conditions":["Upon receipt of written committee approval, the DA files a written petition with the Criminal Court Clerk (or Circuit Court Clerk in counties without a criminal court) for the county where the criminal activity allegedly occurred. T.C.A. § 40-12-203(a).","The petition must be made upon oath or affirmation and must allege: the specific criminal activity under investigation; the specific offenses involved; the named persons under investigation if known; and a statement that the criminal activity is ongoing or recent. T.C.A. § 40-12-203(b).","The filing is confidential. T.C.A. § 40-12-204, § 40-12-209."],"next_steps":["CR-GRJ-INV-003"],"decision_point":false,"notes":"Proceeds to CR-GRJ-INV-003 (court consideration of petition in camera)."},{"step_id":"CR-GRJ-INV-003","phase":"Pleadings","court_type":"Criminal Court","case_type":"Grand Jury -- Investigative","actor":"Judge","action":"Consider petition in camera; grant or deny petition for investigative grand jury","citations":["T.C.A. § 40-12-205"],"conditions":["The presiding judge considers the petition in camera. Any oral argument by the DA is at the sole discretion of the judge. T.C.A. § 40-12-205(a)-(b).","The judge shall grant the petition if: (1) the crimes alleged are among the qualifying offenses listed in T.C.A. § 40-12-201; and (2) there is probable cause to believe the criminal activity is occurring or has recently occurred in the county. T.C.A. § 40-12-205(c).","All proceedings at this stage are confidential. T.C.A. § 40-12-209.","No public hearing is held on the petition; it is an ex parte proceeding."],"next_steps":["CR-GRJ-INV-004"],"decision_point":true,"notes":"[CONFLICT: CR-GRJ-INV-CONF-001] Decision point: petition granted proceeds to CR-GRJ-INV-004 (impaneling); petition denied, proceedings end (no public record)."},{"step_id":"CR-GRJ-INV-004","phase":"Trial","court_type":"Criminal Court","case_type":"Grand Jury -- Investigative","actor":"Judge","action":"Impanel investigative grand jury; DA conducts investigation using subpoena power and witness examination","citations":["T.C.A. § 40-12-206","T.C.A. § 40-12-213","T.C.A. § 40-12-214","T.C.A. § 40-12-216"],"conditions":["Composition: the investigative grand jury consists of 13 members and up to 5 alternates. Alternates are present at all times but do not participate in deliberations or vote unless elevated to regular member. T.C.A. § 40-12-206(a)-(b).","Powers: the investigative grand jury has the same powers as the regular grand jury plus specific investigative powers including broad subpoena authority. T.C.A. § 40-12-206(c).","Subpoena power: the investigative grand jury may subpoena witnesses and documents. Bank records may be subpoenaed without the notice requirement otherwise applicable. T.C.A. § 40-12-213, § 40-12-214.","Persons present during proceedings: only the DA, witnesses being questioned, interpreters if necessary, and a stenographer or recording operator. T.C.A. § 40-12-207.","Witness rights: any witness before the investigative grand jury has the right to consult with counsel outside the grand jury room before responding to any question. T.C.A. § 40-12-216.","Immunity: the DA has authority to grant transactional or use immunity to a witness if necessary to compel testimony. Immunity must be in writing and signed by the DA. T.C.A. § 40-12-215. Note: immunity granted under Tenn. R. Crim. P. 6(j)(6) does not apply to a witness before the investigative grand jury. T.C.A. § 40-12-215(c)."],"next_steps":["CR-GRJ-INV-005"],"decision_point":false,"notes":"Proceeds to CR-GRJ-INV-005 (indictments and dissolution)."},{"step_id":"CR-GRJ-INV-005","phase":"Judgment","court_type":"Criminal Court","case_type":"Grand Jury -- Investigative","actor":"Grand Jury","action":"Return indictments if probable cause found; investigative grand jury dissolves upon completion or time limit","citations":["T.C.A. § 40-12-212","T.C.A. § 40-12-217"],"conditions":["Indictments: the finding and return of indictments, and the form of any indictment returned by the investigative grand jury, shall be in the same manner and form as indictments returned by the regular grand jury. T.C.A. § 40-12-212.","Dissolution: the investigative grand jury is dissolved upon completion of its investigation or upon expiration of the time period authorized by the court. The court may extend the time to complete the investigation upon motion of the DA. T.C.A. § 40-12-217.","Confidentiality of records continues after dissolution: all records of the investigative grand jury proceedings remain confidential and are subject to disclosure only under the conditions specified in T.C.A. § 40-12-210. T.C.A. § 40-12-209(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for investigative grand jury proceedings. Any indictments returned proceed to CR-FEL-002 (felony arraignment) or CR-MIS-002 (misdemeanor arraignment) as applicable."}],"source_file":"CR-GRJ-INV-Flowchart.html"},{"flow_id":"CR-MIS","court_type":"Criminal Court","case_type":"Misdemeanor","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"CR-MIS-GAP-001","affected_steps":["CR-MIS-001"],"description":"T.C.A. § 40-2-102 establishes a 12-month statute of limitations for most misdemeanor prosecutions commencing after the offense is committed. The corpus confirms this but the full enumeration of the exceptions to the 12-month period (gaming: 6 months; criminal impersonation by fraudulently obtained driver license: 1 year from license expiration or within 3 years of the offense) should be confirmed against the complete text of T.C.A. § 40-2-102."}],"conflicts":[{"conflict_id":"CR-MIS-CONF-001","affected_steps":["CR-MIS-004"],"description":"T.C.A. § 40-20-104(a) provides that when a person indicted in a court of record for a misdemeanor pleads not guilty and is tried by a jury, the jury shall, upon timely demand of the defendant, assess the punishment as part of its verdict. T.C.A. § 40-35-302(b) requires the court to fix a specific sentence in misdemeanor cases. T.C.A. § 40-20-105 provides that nothing in § 40-20-104 prevents a person from pleading guilty and submitting sentencing to the judge. These provisions are consistent: in a misdemeanor jury trial, the jury assesses punishment upon defendant's timely demand; in a bench trial or guilty plea, the court assesses punishment. Flagged for reviewer awareness because the jury sentencing right in misdemeanor jury trials in courts of record (T.C.A. § 40-20-104) differs from felony sentencing where the court imposes the sentence (T.C.A. § 40-35-203(a))."}],"local_rule_checks":[{"check_id":"CR-MIS-LRC-001","affected_steps":["CR-MIS-001"],"description":"Verify local rules for whether misdemeanor cases originating by transfer from General Sessions Court are docketed on a separate misdemeanor docket in Criminal Court or on the general criminal docket, and the local procedure for arraignment scheduling of transferred misdemeanor cases."},{"check_id":"CR-MIS-LRC-002","affected_steps":["CR-MIS-005"],"description":"Verify local rules for misdemeanor diversion and deferred prosecution under T.C.A. § 40-35-313. Several judicial districts have local deferred prosecution programs with specific eligibility criteria and conditions beyond the statutory minimum."}],"steps":[{"step_id":"CR-MIS-001","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Criminal Court Clerk","action":"Receive charging instrument (indictment, presentment, or information) and docket misdemeanor case in Criminal Court","citations":["T.C.A. § 40-1-108","T.C.A. § 40-1-109","T.C.A. § 40-3-101","T.C.A. § 40-3-103","T.C.A. § 40-2-102"],"conditions":["Circuit and criminal courts have original jurisdiction of all criminal matters not exclusively conferred by law on some other tribunal. T.C.A. § 40-1-108. Misdemeanors may be tried in Criminal Court when: (1) the defendant was indicted or presented by the grand jury; or (2) the defendant waived indictment and consented to prosecution by information with DA and court consent. T.C.A. § 40-3-101, § 40-3-103.","Information: an information is a written statement by the DA charging a person with a criminal offense, requiring the consent of the accused (represented by an attorney) and the court. T.C.A. § 40-3-103(a). Before consenting, the court must advise the accused of the right to have the charge submitted to a grand jury. T.C.A. § 40-3-103(c).","Cases transferred from General Sessions Court de novo appeal: when a defendant appeals a General Sessions Court misdemeanor conviction for a trial de novo, the case proceeds in Criminal Court under the de novo appeal; see CR-APP flow.","Statute of limitations: misdemeanor prosecutions must commence within 12 months after the offense. T.C.A. § 40-2-102(a)."],"next_steps":["CR-MIS-002"],"decision_point":false,"notes":"[GAP: CR-MIS-GAP-001] [LOCAL RULE CHECK: CR-MIS-LRC-001]"},{"step_id":"CR-MIS-002","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Judge","action":"Arraign defendant; defendant receives charging instrument; defendant enters plea; court confirms or resets bail","citations":["Tenn. R. Crim. P. 10","T.C.A. § 40-14-102","T.C.A. § 40-14-103","T.C.A. § 40-11-102"],"conditions":["Arraignment procedure is identical to CR-FEL-002: defendant receives charging instrument, charge is read or stated, defendant enters plea. Tenn. R. Crim. P. 10.","Right to counsel: every person accused of any misdemeanor is entitled to counsel; if unable to employ counsel, entitled to appointed counsel. T.C.A. § 40-14-102, § 40-14-103(a). $50.00 administrative fee assessed at time of appointment. T.C.A. § 40-14-103(b)(1).","Bail: all defendants are bailable before trial by sufficient sureties. T.C.A. § 40-11-102.","Time before trial: defendant is entitled to 14 full days (Sundays and legal holidays excluded) after arrest and return of the indictment, presentment, or information. T.C.A. § 40-14-105."],"next_steps":["CR-MIS-003"],"decision_point":false,"notes":"Proceeds to CR-MIS-003 (plea determination)."},{"step_id":"CR-MIS-003","phase":"Pleadings","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Defendant / Attorney","action":"Enter plea; conduct any necessary discovery and pretrial motions; assess diversion eligibility","citations":["Tenn. R. Crim. P. 11","Tenn. R. Crim. P. 12(b)","Tenn. R. Crim. P. 16"],"conditions":["Plea alternatives: not guilty, guilty, or nolo contendere. Guilty and nolo pleas require the same full Rule 11 colloquy as in felony cases: voluntariness, factual basis, constitutional rights advised. Tenn. R. Crim. P. 11(b).","Pretrial motions that must be made before trial include motions to suppress, defect in the indictment or information, and discovery requests. Tenn. R. Crim. P. 12(b)(2). Failure to raise required motions before the court's deadline constitutes waiver absent good cause. Tenn. R. Crim. P. 12(f).","Discovery in misdemeanor cases proceeds under Tenn. R. Crim. P. 16."],"next_steps":["CR-MIS-004","CR-MIS-005"],"decision_point":true,"notes":"Decision point: guilty plea proceeds to CR-MIS-006 (sentencing); not guilty proceeds to CR-MIS-004 (trial). Diversion eligibility assessed concurrent with this step; if diversion pursued proceed to CR-MIS-005."},{"step_id":"CR-MIS-004","phase":"Trial","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Judge","action":"Conduct misdemeanor trial (jury or bench) and enter verdict","citations":["T.C.A. § 40-20-104(a)","T.C.A. § 40-20-105","T.C.A. § 40-14-105","Tenn. R. Evid. 101"],"conditions":["Jury trial: when a defendant indicted in a court of record for a misdemeanor pleads not guilty and is tried by a jury, the jury shall, upon timely demand of the defendant, assess the punishment as part of its verdict. T.C.A. § 40-20-104(a).","Bench trial: a defendant may plead not guilty and waive the right to jury trial, submitting the case to the trial judge for decision both as to guilt and, if guilty, as to punishment. T.C.A. § 40-20-105.","Defendant must be present during trial. Tenn. R. Crim. P. 43.","Standard of proof: beyond a reasonable doubt."],"next_steps":["CR-MIS-006"],"decision_point":false,"notes":"[CONFLICT: CR-MIS-CONF-001] Proceeds to CR-MIS-006 (sentencing) upon conviction."},{"step_id":"CR-MIS-005","phase":"Pre-Trial","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Defendant / Attorney","action":"Pursue judicial diversion or deferred prosecution under T.C.A. § 40-35-313","citations":["T.C.A. § 40-35-313(a)(1)","T.C.A. § 40-35-313(a)(2)"],"conditions":["Judicial diversion: the court may defer further proceedings against a qualified defendant and place the defendant on probation upon reasonable conditions without entering a judgment of guilty. The deferral must be for not less than the period of the maximum sentence for the misdemeanor with which the defendant is charged. T.C.A. § 40-35-313(a)(1).","If the defendant violates the conditions of the deferred prosecution, the court shall enter an adjudication of guilt and proceed to sentencing. T.C.A. § 40-35-313(a)(1)(B).","If the defendant successfully completes the deferral period, the proceedings shall be dismissed. Upon petition of the defendant, the court shall discharge the defendant and dismiss the proceedings and the record may be expunged. T.C.A. § 40-35-313(a)(2).","Judicial diversion is not available for all misdemeanor defendants; the court has discretion and must consider multiple factors."],"next_steps":[],"decision_point":false,"notes":"[LOCAL RULE CHECK: CR-MIS-LRC-002] Diversion path: TERMINAL if successfully completed. Returns to CR-MIS-004 trial path if violated."},{"step_id":"CR-MIS-006","phase":"Judgment","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Judge","action":"Impose misdemeanor sentence; fix specific number of months, days, or hours; set probation and supervision conditions if applicable","citations":["T.C.A. § 40-35-302(a)-(b)","T.C.A. § 40-35-111(e)","T.C.A. § 40-35-303(a)","T.C.A. § 40-20-104"],"conditions":["Misdemeanor sentencing hearing: the court may conduct a separate sentencing hearing or, if not, shall allow the parties a reasonable opportunity to be heard on the length of sentence and manner of service. T.C.A. § 40-35-302(a).","Sentence: the court shall fix a specific number of months, days, or hours; the defendant is responsible for the entire sentence undiminished by sentence credits of any sort except those authorized by T.C.A. § 41-2-111(b). T.C.A. § 40-35-302(b).","Authorized terms (T.C.A. § 40-35-111(e)): Class A misdemeanor -- not more than 11 months and 29 days in jail or workhouse, fine not to exceed $2,500 (unless otherwise provided by statute). Class B misdemeanor -- not more than 6 months, fine not to exceed $500. Class C misdemeanor -- not more than 30 days, fine not to exceed $50.","Probation eligibility: defendant sentenced to 10 years or less is eligible for probation unless the offense is one of the specifically excluded offenses. T.C.A. § 40-35-303(a).","Jury sentencing: if tried by jury upon defendant's timely demand, the jury assesses punishment as part of its verdict within the authorized term for the offense. T.C.A. § 40-20-104(a).","Judicial diversion at sentencing: after verdict, the court may defer further proceedings and place the defendant on probation without entering a judgment of guilty. T.C.A. § 40-35-313."],"next_steps":["CR-MIS-007"],"decision_point":false,"notes":"Proceeds to CR-MIS-007 (appeal)."},{"step_id":"CR-MIS-007","phase":"Appeal","court_type":"Criminal Court","case_type":"Misdemeanor","actor":"Defendant / Attorney","action":"File notice of appeal to Court of Criminal Appeals within 30 days after entry of judgment","citations":["Tenn. R. App. P. 3(b)","Tenn. R. App. P. 4(a)","T.C.A. § 40-35-401"],"conditions":["An appeal as of right lies to the Court of Criminal Appeals from any final judgment in a criminal case. Tenn. R. App. P. 3(b).","Notice of appeal must be filed within 30 days after entry of judgment. Tenn. R. App. P. 4(a).","Motion for new trial: defendant may move for a new trial within 30 days after verdict. Filing a timely motion for new trial extends the appeal period. Tenn. R. Crim. P. 33(b); Tenn. R. App. P. 4(b).","Sentence appeal: the defendant may appeal the length, range, or manner of service of the sentence. T.C.A. § 40-35-401(a). The state may appeal the sentence under T.C.A. § 40-35-402."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CR-MIS-Flowchart.html"},{"flow_id":"CR-PRB","court_type":"Criminal Court","case_type":"Probation Violation","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"CR-PRB-GAP-001","affected_steps":["CR-PRB-004"],"description":"T.C.A. § 40-35-310 governs revocation of suspension of sentence and resentencing to community-based alternatives. The corpus confirms T.C.A. § 40-35-311 (probation revocation hearing and revocation) but the full text of T.C.A. § 40-35-310 specifying the court's authority to resentence to community-based alternatives upon revocation should be confirmed from the full corpus to ensure the complete range of post-revocation sentencing options is accurately described."}],"conflicts":[{"conflict_id":"CR-PRB-CONF-001","affected_steps":["CR-PRB-002"],"description":"T.C.A. § 40-35-311(a)(1) provides that a technical violation brought by a probation officer may result in the judge issuing a criminal summons in lieu of a warrant, subject to the judge's discretion. Tenn. R. Crim. P. 9 governs the issuance of arrest warrants and summons generally. A non-technical violation -- including a new criminal charge -- requires a warrant. The distinction between technical and non-technical violations affects whether the defendant is arrested and held or summonsed to appear, and practitioners sometimes conflate the two categories. Flagged for reviewer awareness."}],"local_rule_checks":[{"check_id":"CR-PRB-LRC-001","affected_steps":["CR-PRB-001"],"description":"Verify local rules for the probation violation warrant procedure, including whether the local Criminal Court uses a magistrate or judicial commissioner for after-hours warrants in probation violation cases, and the local procedure for holding a defendant in custody pending a probation revocation hearing."},{"check_id":"CR-PRB-LRC-002","affected_steps":["CR-PRB-003"],"description":"Verify local rules for the probation revocation hearing scheduling procedure, including whether the local Criminal Court schedules probation revocation hearings on a separate revocation docket or on the general criminal docket, and the local policy on continuances in revocation proceedings."}],"steps":[{"step_id":"CR-PRB-001","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Probation Violation","actor":"Judge","action":"Issue warrant for arrest of probationer upon probation officer's report of violation, or issue summons for technical violation at judge's discretion","citations":["T.C.A. § 40-35-311(a)(1)"],"conditions":["Whenever it comes to the attention of the trial judge that a defendant who has been released upon suspension of sentence has been guilty of a breach of the laws of this state or has violated the conditions of probation, the trial judge has the power to cause to be issued: (A) a warrant for the arrest of the defendant as in any other criminal case; or (B) for a technical violation brought by a probation officer, and subject to the discretion of the judge, a criminal summons. T.C.A. § 40-35-311(a)(1).","Regardless of whether the defendant is on probation for a misdemeanor or felony, or whether the warrant or summons is issued by a general sessions court judge or a judge of a court of record, a probation officer or a peace officer of the county in which the probationer is found may execute the warrant or serve the summons. T.C.A. § 40-35-311(a)(2)."],"next_steps":["CR-PRB-002"],"decision_point":false,"notes":"[CONFLICT: CR-PRB-CONF-001] [LOCAL RULE CHECK: CR-PRB-LRC-001]"},{"step_id":"CR-PRB-002","phase":"Service of Process","court_type":"Criminal Court","case_type":"Probation Violation","actor":"Law Enforcement","action":"Arrest defendant on probation violation warrant or serve summons; defendant brought before court","citations":["T.C.A. § 40-35-311(a)(2)","T.C.A. § 40-35-311(b)"],"conditions":["Whenever a person is arrested or summoned for the violation of probation and suspension of sentence, the person shall be brought before the court. T.C.A. § 40-35-311(b).","The defendant has the right to a hearing on the alleged violation. T.C.A. § 40-35-311(b).","The defendant may be held in custody pending the revocation hearing or may be released on bail in the court's discretion."],"next_steps":["CR-PRB-003"],"decision_point":false,"notes":"Proceeds to CR-PRB-003 (revocation hearing)."},{"step_id":"CR-PRB-003","phase":"Trial","court_type":"Criminal Court","case_type":"Probation Violation","actor":"Judge","action":"Conduct probation revocation hearing; receive evidence on alleged violation; make findings","citations":["T.C.A. § 40-35-311(b)","T.C.A. § 40-35-311(d)"],"conditions":["The defendant has the right to a hearing on the alleged violation; the hearing is less formal than a criminal trial. T.C.A. § 40-35-311(b).","Standard of proof: the state must prove a violation by a preponderance of the evidence. The court makes written findings of fact on the alleged violation.","Admissibility of laboratory report: a laboratory report may be admitted as evidence at the probation revocation hearing without the necessity of having the analyst present to testify, provided that the laboratory report is accompanied by a sworn statement of the analyst attesting to the contents of the report. T.C.A. § 40-35-311(d).","A new criminal charge constitutes a violation of probation independent of any conviction. The court need not wait for a criminal conviction before revoking probation.","The defendant does not have an absolute right to confrontation at a revocation hearing but does have the right to notice of the alleged violation and an opportunity to be heard.","Validated risk and needs assessment: the court may use a validated risk and needs assessment in deciding whether to revoke probation and what new conditions to impose. T.C.A. § 40-35-311(e)."],"next_steps":["CR-PRB-004"],"decision_point":true,"notes":"[LOCAL RULE CHECK: CR-PRB-LRC-002] Decision point: violation found proceeds to CR-PRB-004 (disposition); no violation found, defendant restored to probation, terminal."},{"step_id":"CR-PRB-004","phase":"Judgment","court_type":"Criminal Court","case_type":"Probation Violation","actor":"Judge","action":"Upon finding of violation, enter order revoking probation and impose appropriate disposition","citations":["T.C.A. § 40-35-311(b)","T.C.A. § 40-35-310","T.C.A. § 40-35-308"],"conditions":["Upon finding a violation, the court may: (1) revoke probation and order the defendant to serve all or part of the original sentence; (2) extend the probation period; (3) impose additional conditions of probation; (4) resentence the defendant to a community-based alternative; or (5) make any other disposition authorized by law. T.C.A. § 40-35-311(b).","If probation is revoked and the defendant is ordered to serve the sentence in the Department of Correction, credit must be given for time served in confinement before revocation.","Modification or removal of conditions: the court may modify, remove, or reduce conditions of probation at any time during the probation period upon application and hearing. T.C.A. § 40-35-308.","Costs of revocation proceeding are assessed against the defendant upon revocation. T.C.A. § 40-35-312."],"next_steps":["CR-PRB-005"],"decision_point":false,"notes":"[GAP: CR-PRB-GAP-001] Proceeds to CR-PRB-005 (appeal if contested)."},{"step_id":"CR-PRB-005","phase":"Appeal","court_type":"Criminal Court","case_type":"Probation Violation","actor":"Defendant / Attorney","action":"File notice of appeal to Court of Criminal Appeals from revocation order within 30 days","citations":["Tenn. R. App. P. 3(b)","Tenn. R. App. P. 4(a)"],"conditions":["An appeal as of right lies to the Court of Criminal Appeals from an order revoking probation. Tenn. R. App. P. 3(b).","Notice of appeal must be filed within 30 days after entry of the revocation order. Tenn. R. App. P. 4(a).","The standard of review is abuse of discretion; the appellate court will not disturb a revocation order absent a showing that the trial court acted arbitrarily or capriciously."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CR-PRB-Flowchart.html"},{"flow_id":"GS-CIV","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"GS-CIV-GAP-001","affected_steps":["GS-CIV-001"],"description":"The filing fee for a civil warrant in General Sessions Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount is not available in the corpus fee schedule text (which contains broken links). The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies in addition to the base filing fee."}],"conflicts":[{"conflict_id":"GS-CIV-CONF-001","affected_steps":["GS-CIV-001"],"description":"The jurisdictional limit of General Sessions Court in civil cases is $25,000. T.C.A. § 16-15-501(d)(1). Attorney fees, court costs, and discretionary costs are excluded from this calculation. T.C.A. § 16-15-501(d)(2). A party may remit any excess above the jurisdictional limit and take judgment for the residue, but may not afterwards sue for the amount remitted. T.C.A. § 16-15-726. Cases involving forcible entry and detainer have unlimited original jurisdiction regardless of monetary amount. T.C.A. § 16-15-501(d)(1). Actions to recover personal property also have unlimited original jurisdiction. T.C.A. § 16-15-502. The $25,000 jurisdictional limit is confirmed for money judgment cases; the unlimited jurisdiction carve-outs for FED and personal property recovery are flagged because practitioners sometimes incorrectly apply the monetary limit to those case types."}],"local_rule_checks":[{"check_id":"GS-CIV-LRC-001","affected_steps":["GS-CIV-001"],"description":"Verify local rules for the civil warrant form, any small claims designation process, and whether the local General Sessions Court uses a separate small claims docket for matters below a locally defined threshold (commonly $5,000 or $10,000). Some courts maintain separate small claims and civil warrant dockets with different hearing tracks."},{"check_id":"GS-CIV-LRC-002","affected_steps":["GS-CIV-005"],"description":"Verify local rules for default judgment procedure, including whether a separate written motion is required for default or whether default may be entered by the clerk upon the plaintiff's oral request at the time of the scheduled hearing."},{"check_id":"GS-CIV-LRC-003","affected_steps":["GS-CIV-007"],"description":"Verify local rules for execution and post-judgment collection in General Sessions Court, including whether the local court has a designated process for wage garnishment, bank account levy, and judgment lien registration in the office of the Register of Deeds."}],"steps":[{"step_id":"GS-CIV-001","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"Plaintiff / Attorney","action":"Prepare and file civil warrant with General Sessions Court Clerk and pay filing fee","citations":["T.C.A. § 16-15-501(d)(1)","T.C.A. § 16-15-402(3)"],"conditions":["Civil jurisdiction: General Sessions Court may hear civil cases where the amount in controversy does not exceed $25,000, excluding attorney fees, court costs, and discretionary costs. T.C.A. § 16-15-501(d)(1)-(2). Forcible entry and detainer: unlimited original jurisdiction regardless of rental value or claimed damages. Personal property recovery: unlimited original jurisdiction including jurisdiction to award an alternative money judgment. T.C.A. § 16-15-501(d)(1), § 16-15-502.","Small claims track: cases involving smaller amounts (threshold varies by district) may be placed on a separate small claims docket with less formal procedures; legal representation is permitted but not required.","Civil warrant track: cases involving larger amounts within the jurisdictional limit or cases where representation is expected proceed on the standard civil warrant docket.","The warrant must be written in full before the judge signs it. T.C.A. § 16-15-402(3).","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["GS-CIV-002"],"decision_point":false,"notes":"[GAP: GS-CIV-GAP-001] [CONFLICT: GS-CIV-CONF-001] [LOCAL RULE CHECK: GS-CIV-LRC-001]"},{"step_id":"GS-CIV-002","phase":"Service of Process","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"General Sessions Court Clerk","action":"Issue civil warrant and schedule hearing date; effect service on defendant","citations":["T.C.A. § 16-15-701","T.C.A. § 16-15-735(a)-(b)"],"conditions":["Service of a civil warrant in General Sessions Court may be made by the sheriff or a deputy, a private process server, or by certified mail with return receipt. Service must be effected before the scheduled hearing.","If defendant believes another person is at fault, defendant must notify the opposing party and the clerk in writing 48 hours prior to the scheduled hearing. If defendant fails to do so, plaintiff is entitled to a continuance. The clerk shall automatically continue the hearing 30 days following notification so the plaintiff can serve and amend the warrant to include new defendants. T.C.A. § 16-15-735."],"next_steps":["GS-CIV-003"],"decision_point":false,"notes":"Proceeds to GS-CIV-003 (defendant's response and hearing)."},{"step_id":"GS-CIV-003","phase":"Pleadings","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"Defendant / Attorney","action":"Appear at scheduled hearing and contest or admit the claim; defendant may assert counterclaims","citations":["T.C.A. § 16-15-724","T.C.A. § 16-15-726"],"conditions":["General Sessions proceedings are informal; formal pleadings are not required. A defendant may contest the claim orally at the hearing.","Counterclaim: defendant may assert a counterclaim for a sum not exceeding the jurisdiction of the court. If the counterclaim exceeds the jurisdictional limit, the court may still hear it if the defendant remits the excess; if defendant refuses to remit, the civil warrant must be dismissed and the parties directed to a court of competent jurisdiction. T.C.A. § 16-15-724.","If the sum found exceeds the jurisdiction of the court, the prevailing party may remit the excess and take judgment for the residue; the party cannot afterwards sue for the remitted amount. T.C.A. § 16-15-726."],"next_steps":["GS-CIV-004","GS-CIV-005"],"decision_point":true,"notes":"Decision point: defendant appears and contests proceeds to GS-CIV-004 (hearing on merits); defendant fails to appear proceeds to GS-CIV-005 (default judgment)."},{"step_id":"GS-CIV-004","phase":"Trial","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"Judge","action":"Conduct hearing on the merits; hear evidence from both parties and enter judgment","citations":["T.C.A. § 16-15-404","T.C.A. § 16-15-728","Tenn. R. Evid. 101"],"conditions":["General Sessions hearings are informal. The judge may hear cases at any time and at any place within the county. T.C.A. § 16-15-404. Strict rules of evidence do not apply; the judge exercises broad discretion in receiving relevant evidence.","Every intendment is in favor of the sufficiency and validity of proceedings before General Sessions Courts when it appears on the face of the proceedings that the court had jurisdiction of the subject matter and of the parties. T.C.A. § 16-15-728.","Cases are tried to the bench; there is no right to a jury trial in General Sessions Court. A jury trial right arises only upon appeal and de novo trial in Circuit Court.","The judge may hear causes and enter judgment immediately or at a future date as appropriate."],"next_steps":["GS-CIV-006"],"decision_point":false,"notes":"Proceeds to GS-CIV-006 (entry of judgment)."},{"step_id":"GS-CIV-005","phase":"Trial","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"Judge","action":"Enter default judgment if defendant fails to appear at the scheduled hearing","citations":["T.C.A. § 16-15-727(a)","Tenn. R. Civ. P. 55"],"conditions":["If defendant fails to appear after proper service, the court may enter a default judgment for the plaintiff in the amount claimed, subject to the court's assessment of the merits.","Correction of judgment: Tenn. R. Civ. P. 60.01 (clerical mistakes) applies to General Sessions Courts. Tenn. R. Civ. P. 60.02 (mistake, inadvertence, excusable neglect, fraud) also applies; a motion under 60.02 must be filed within 10 days of the date of judgment and tolls the 10-day de novo appeal period until determined. T.C.A. § 16-15-727."],"next_steps":["GS-CIV-006"],"decision_point":false,"notes":"[LOCAL RULE CHECK: GS-CIV-LRC-002] Proceeds to GS-CIV-006 (entry of judgment)."},{"step_id":"GS-CIV-006","phase":"Judgment","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"General Sessions Court Clerk","action":"Enter judgment in docket; provide parties with notice of judgment and right to appeal within 10 days","citations":["T.C.A. § 27-5-108(a)(1)","T.C.A. § 16-15-727"],"conditions":["Any party dissatisfied with the judgment may appeal to Circuit Court by giving bond and filing notice of appeal within 10 days of the judgment. The appeal is a de novo trial in Circuit Court. T.C.A. § 27-5-108(a)(1).","If a timely Tenn. R. Civ. P. 60.02 motion is filed, the 10-day appeal period is tolled until the General Sessions Court's ruling on the motion, after which the 10-day period runs from that ruling. T.C.A. § 16-15-727(b).","The General Sessions Court that renders the judgment may issue execution on the judgment. T.C.A. § 16-15-801."],"next_steps":["GS-CIV-007","GS-CIV-008"],"decision_point":true,"notes":"Decision point: no appeal filed within 10 days, judgment is final, proceeds to GS-CIV-007 (execution); appeal filed within 10 days, proceeds to GS-CIV-008 (de novo appeal to Circuit Court)."},{"step_id":"GS-CIV-007","phase":"Post-Judgment","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"General Sessions Court Clerk","action":"Issue execution on final judgment; enforce through levy, garnishment, or other authorized process","citations":["T.C.A. § 16-15-801","T.C.A. § 26-2-101"],"conditions":["The General Sessions Court may issue execution on a judgment it has rendered. T.C.A. § 16-15-801. Execution is directed to the sheriff or other authorized officer.","Execution may be satisfied by levy on personal property, wage garnishment, bank levy, or other authorized post-judgment collection methods under Title 26.","A General Sessions judgment may be registered in the office of the Register of Deeds to create a lien on real property in the county."],"next_steps":[],"decision_point":false,"notes":"[LOCAL RULE CHECK: GS-CIV-LRC-003] TERMINAL STEP. Satisfaction of judgment ends the case lifecycle for purposes of this flow."},{"step_id":"GS-CIV-008","phase":"Appeal","court_type":"General Sessions Court","case_type":"Civil (Small Claims and Civil Warrant)","actor":"Plaintiff / Attorney","action":"Perfect appeal to Circuit Court within 10 days by giving bond and filing notice of appeal with General Sessions Court Clerk","citations":["T.C.A. § 27-5-103(a)-(b)","T.C.A. § 27-5-105","T.C.A. § 27-5-108(a)(1)"],"conditions":["Before the appeal is granted, the appellant must give bond with good security for the costs of the appeal, or take the oath for poor persons. T.C.A. § 27-5-103(a). An appeal bond filed by a plaintiff or defendant is sufficient if it secures the cost of the cause on appeal. T.C.A. § 27-5-103(b).","The General Sessions Clerk must transmit all papers to the Circuit Court Clerk at least five days before the meeting of the Circuit Court; if appeal is perfected within five days before the meeting, papers must be filed by or on the first day of the term. T.C.A. § 27-5-105.","The trial on appeal is de novo, including damages; no civil case shall be dismissed for any informality, and all amendments necessary to reach the merits shall be allowed. T.C.A. § 16-15-729. See CC-APP flow for the complete Circuit Court de novo appeal procedure."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for General Sessions proceedings. Case proceeds in Circuit Court as a de novo appeal; see CC-APP flow."}],"source_file":"GS-CIV-Flowchart.html"},{"flow_id":"GS-CRM","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"GS-CRM-GAP-001","affected_steps":["GS-CRM-006"],"description":"The disposition options available to a General Sessions judge for misdemeanor convictions -- specifically the maximum fines, jail terms, and probation conditions -- are set by T.C.A. Title 40 and the individual criminal offense statutes in Title 39. The corpus contains T.C.A. § 40-35-111 (standard sentences) by reference but the full sentencing grid for misdemeanor classifications (Class A, B, C misdemeanor maximum sentences) should be confirmed against the full corpus of T.C.A. § 40-35-111(e). Generally: Class A misdemeanor -- up to 11 months 29 days; Class B -- up to 6 months; Class C -- up to 30 days."}],"conflicts":[{"conflict_id":"GS-CRM-CONF-001","affected_steps":["GS-CRM-004"],"description":"Tenn. R. Crim. P. 5(c)(1)(C)(ii) permits a misdemeanor defendant to waive both the preliminary hearing and the right to grand jury investigation and trial by jury, allowing the General Sessions judge to hear the case on a guilty plea and determine the sentence, subject to the district attorney's consent. Tenn. R. Crim. P. 5(c)(2)(C) extends this waiver to not guilty pleas with DA consent. T.C.A. § 40-1-109 requires a written guilty plea for misdemeanors. Under the source hierarchy, the TCA statute and the Criminal Procedure Rule are at the same level; T.C.A. § 40-1-109 requires the written form and the rule does not contradict this. The written plea requirement is not a conflict but is flagged because General Sessions informal practice sometimes fails to comply with the written plea requirement, which is a grounds for reversal on appeal."}],"local_rule_checks":[{"check_id":"GS-CRM-LRC-001","affected_steps":["GS-CRM-002"],"description":"Verify local rules for the initial appearance and bond setting procedure, including whether the local General Sessions Court uses a judicial commissioner for after-hours initial appearances and bond settings, and the local bond schedule if any."},{"check_id":"GS-CRM-LRC-002","affected_steps":["GS-CRM-004"],"description":"Verify local rules for misdemeanor plea procedures, including whether the local District Attorney's office has a policy regarding the waiver of jury trial and grand jury rights in General Sessions Court, and whether there is a local standing policy for the handling of first-offense misdemeanors through diversion or conditional dismissal."},{"check_id":"GS-CRM-LRC-003","affected_steps":["GS-CRM-006"],"description":"Verify local rules for misdemeanor sentencing in General Sessions Court, including whether the local court uses a standard sentence form, the local jail or workhouse to which sentenced defendants are remanded, and whether the local court offers suspended sentences or probation through a probation office or contracted provider."}],"steps":[{"step_id":"GS-CRM-001","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Law Enforcement","action":"Issue citation or arrest defendant; bring defendant before General Sessions Court magistrate without unnecessary delay","citations":["Tenn. R. Crim. P. 4","Tenn. R. Crim. P. 5(a)(1)","Tenn. R. Crim. P. 3.5"],"conditions":["Any person arrested -- except upon a capias pursuant to an indictment or presentment -- shall be taken without unnecessary delay before the nearest appropriate magistrate of the county from which the arrest warrant issued or the county in which the alleged offense occurred. Tenn. R. Crim. P. 5(a)(1).","Citation in lieu of arrest: a citation pursuant to Tenn. R. Crim. P. 3.5 may be issued by a law enforcement officer instead of a physical arrest for misdemeanors; the citation requires the defendant to appear before the court at a designated time and place.","If arrested without a warrant, an affidavit of complaint shall be filed promptly. Tenn. R. Crim. P. 5(a)(2).","Initial appearance may be conducted by audio-visual device if the judge or magistrate exercises sound discretion, the parties may view and hear each other simultaneously, and the court accepts no plea except not guilty. Tenn. R. Crim. P. 43(e)."],"next_steps":["GS-CRM-002"],"decision_point":false,"notes":"Proceeds to GS-CRM-002 (initial appearance and bond setting)."},{"step_id":"GS-CRM-002","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Judge","action":"Conduct initial appearance; advise defendant of charges and rights; set pretrial release conditions or bail","citations":["Tenn. R. Crim. P. 5(b)-(c)","Tenn. R. Crim. P. 26"],"conditions":["Small offenses (maximum fine $50, no incarceration): the magistrate advises the defendant of the charge and determines the plea. On guilty plea, may impose the fine. On not guilty plea, sets for trial. T.C.A. Tenn. R. Crim. P. 5(b).","Other misdemeanors (guilty plea): the magistrate reduces the plea to writing; advises the defendant of the right to jury trial and to prosecution only by indictment or presentment; and schedules a preliminary hearing within 14 days (in custody) or 30 days (released), unless the defendant expressly waives jury trial and grand jury rights. Tenn. R. Crim. P. 5(c)(1).","Other misdemeanors (not guilty plea): the magistrate schedules a preliminary hearing within 14 days (in custody) or 30 days (released) unless defendant expressly waives. Tenn. R. Crim. P. 5(c)(2)(A).","Pretrial release is governed by applicable bail statutes and the court's discretion. The court may release the defendant on recognizance, citation, or bond."],"next_steps":["GS-CRM-003"],"decision_point":false,"notes":"[LOCAL RULE CHECK: GS-CRM-LRC-001] Proceeds to GS-CRM-003 (charge-type determination and path selection)."},{"step_id":"GS-CRM-003","phase":"Pleadings","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Judge","action":"Determine applicable procedural path based on charge type and defendant's waiver elections","citations":["Tenn. R. Crim. P. 5(b)","Tenn. R. Crim. P. 5(c)(1)-(2)","Tenn. R. Crim. P. 5(d)"],"conditions":["Small offense path: case may be tried immediately or set for trial in General Sessions Court. No jury trial right; appeal from conviction is a trial de novo in Circuit or Criminal Court without a jury. Tenn. R. Crim. P. 5(b)(4).","Misdemeanor -- waiver of jury trial and grand jury (full waiver): if defendant waives in writing the right to grand jury investigation and jury trial, and DA does not object, the court may hear the case to disposition in General Sessions Court. The defendant may appeal a conviction but only as to the sentence on a guilty plea. Tenn. R. Crim. P. 5(c)(1)(C)(ii), (c)(2)(C).","Misdemeanor -- no waiver or partial waiver: the court schedules a preliminary hearing and the case may ultimately proceed by indictment or presentment to Circuit or Criminal Court. Proceed to GS-CRM-004.","Felony: General Sessions Court does not try felonies on the merits. Defendant is advised of rights and a preliminary hearing is scheduled or the case is bound over to the grand jury. See GS-PRE flow."],"next_steps":["GS-CRM-004","GS-CRM-005"],"decision_point":true,"notes":"Decision point: full waiver path (tries case in General Sessions) proceeds to GS-CRM-005; no/partial waiver path (schedules preliminary hearing or binds over) proceeds to GS-CRM-004."},{"step_id":"GS-CRM-004","phase":"Pleadings","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Judge","action":"Conduct preliminary hearing on the misdemeanor charge or bind case over to grand jury if preliminary hearing is waived","citations":["Tenn. R. Crim. P. 5(c)(1)(B)","Tenn. R. Crim. P. 5.1","Tenn. R. Crim. P. 5(e)"],"conditions":["Preliminary hearing must be held within 14 days (defendant in custody) or 30 days (defendant released) of the initial appearance, computed from the date of the defendant's appearance before the magistrate. Tenn. R. Crim. P. 5(c)(1)(B), 5(c)(2)(A).","Preliminary hearing may be waived: by written waiver (the magistrate then binds the defendant over to the grand jury); by failure to appear (which constitutes a waiver unless the defendant shows within 14 days by clear and convincing evidence that absence was beyond defendant's control). Tenn. R. Crim. P. 5(e)(2).","Preliminary hearings shall be conducted as expeditiously as possible, considering inconvenience to victims, witnesses, parties, and the court. Tenn. R. Crim. P. 5(e)(3).","At the preliminary hearing, the state must establish probable cause that a crime was committed and that the defendant committed it. The scope of the hearing is under the control of the magistrate; it is a probable cause hearing, not a disc
