Tenn. R. Civ. P. 37.02","Tenn. R. Civ. P. 37.03","Tenn. R. Civ. P. 37.04"],"conditions":["A party may move for a protective order to limit or prevent discovery. Tenn. R. Civ. P. 26.03.","A party may move to compel discovery responses where a party fails to answer, respond, or produce as required. Tenn. R. Civ. P. 37.01.","Sanctions for failure to comply with discovery obligations or court orders may include: dismissal of the action or claims; default judgment; striking of pleadings; preclusion of evidence; contempt; and costs and attorney's fees. Tenn. R. Civ. P. 37.02.","A party who fails to supplement or amend responses as required by Rule 26.05 without substantial justification may not use as evidence at trial any witness or information not disclosed, and may be subject to additional sanctions including informing the jury of the failure. Tenn. R. Civ. P. 37.03(1).","If a party fails to appear for deposition, fails to serve answers to interrogatories, or fails to respond to requests for inspection, the court may make appropriate orders including any authorized under Rule 37.02. Tenn. R. Civ. P. 37.04."],"next_steps":["CC-CIV-D-002"],"decision_point":true,"notes":"EVENT-DRIVEN: This step occurs only when a discovery dispute arises requiring court intervention. It is not a routine sequential step. If motion to compel is granted, the non-complying party must respond or face sanctions. If protective order is granted, discovery is limited accordingly. The case returns to active discovery at CC-CIV-D-002 after resolution."},{"step_id":"CC-CIV-D-004","phase":"Discovery","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Supplement and amend discovery responses as required (ongoing obligation)","citations":["Tenn. R. Civ. P. 26.05","Tenn. R. Civ. P. 37.03"],"conditions":["A party who has responded to a request for discovery is under a duty to supplement or amend responses if the party learns the response is in some material respect incomplete or incorrect and the additional or corrective information has not otherwise been made known to the other parties during the discovery process or in writing. Tenn. R. Civ. P. 26.05.","Failure to supplement without substantial justification results in preclusion of any witness or information not disclosed, unless the failure is harmless, plus potential additional sanctions including informing the jury of the failure. Tenn. R. Civ. P. 37.03(1)."],"next_steps":["CC-CIV-MP-001"],"decision_point":false,"notes":"ONGOING OBLIGATION: This step is not a single event. The duty to supplement discovery responses continues throughout the pendency of the action and up to trial. It runs concurrently with all other discovery and motions practice activity. This step is shown separately to make the ongoing nature of the obligation explicit to diagram users."},{"step_id":"CC-CIV-D-005","phase":"Discovery","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Conduct discovery conference and enter discovery order (if ordered or requested)","citations":["Tenn. R. Civ. P. 26.06"],"conditions":["Any party may move for a discovery conference; the court may also order one on its own initiative. Tenn. R. Civ. P. 26.06.","Following the conference, the court shall enter an order tentatively identifying issues for discovery purposes, establishing a plan and schedule for discovery, setting limitations on discovery if any, and determining such other matters including allocation of expenses as are necessary for proper management of discovery. Tenn. R. Civ. P. 26.06.","The discovery conference may be combined with a pretrial conference under Rule 16. Tenn. R. Civ. P. 26.06(7)."],"next_steps":["CC-CIV-MP-001"],"decision_point":false,"notes":"EVENT-DRIVEN AND DISCRETIONARY: This step occurs only if a discovery conference is requested or ordered. It is not required in every case. The resulting order controls discovery going forward and may not be altered or amended except where justice requires."},{"step_id":"CC-CIV-MP-001","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"File pretrial motions","citations":["Tenn. R. Civ. P. 7.02","Tenn. R. Civ. P. 6.04"],"conditions":["Motions other than those made at a hearing or trial must be in writing. Tenn. R. Civ. P. 7.02.","Motions requiring notice carry a five-day minimum notice period unless a different time is fixed by a particular rule or by the court. Tenn. R. Civ. P. 6.04."],"next_steps":["CC-CIV-MP-002","CC-CIV-MP-003"],"decision_point":true,"notes":"Motions practice encompasses multiple motion types that may occur concurrently or sequentially throughout the case. The two primary motion tracks modeled here are Rule 12 motions (CC-CIV-MP-002) and summary judgment (CC-CIV-MP-003). Other motions -- including motions in limine, motions to compel, and motions for sanctions -- are addressed within the discovery and pretrial phases."},{"step_id":"CC-CIV-MP-002","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Rule 12 motions -- hear and determine defenses and objections","citations":["Tenn. R. Civ. P. 12.03","Tenn. R. Civ. P. 12.04","Tenn. R. Civ. P. 12.05","Tenn. R. Civ. P. 12.06","T.C.A. § 20-12-119(c)"],"conditions":["Rule 12.02 defenses raised by motion shall be heard and determined before trial upon application of any party, unless the court orders their determination deferred until trial. Tenn. R. Civ. P. 12.04.","Motion for more definite statement: if granted, the pleading must be corrected within 15 days or within such other time as the court fixes; failure to comply may result in the court striking the pleading or making such order as it deems just. Tenn. R. Civ. P. 12.05.","Motion to strike: a party may move to strike insufficient defenses or redundant, immaterial, impertinent, or scandalous matter before responding to the objectionable pleading, or if no responsive pleading is permitted, within 30 days after service. Tenn. R. Civ. P. 12.06.","Motion for judgment on the pleadings: after the pleadings are closed, any party may move for judgment on the pleadings without delaying trial. If matters outside the pleadings are presented and not excluded, the motion converts to a motion for summary judgment under Rule 56. Tenn. R. Civ. P. 12.03.","When a Rule 12.02(6) motion to dismiss for failure to state a claim is granted, the court shall award the prevailing party costs and reasonable and necessary attorney's fees incurred as a consequence of the dismissed claims, subject to a $10,000 per lawsuit cap and substantial exceptions. T.C.A. § 20-12-119(c). The award is stayed until the granting of the motion to dismiss is final and not subject to appeal. T.C.A. § 20-12-119(c)(3)."],"next_steps":["CC-CIV-MP-003","CC-CIV-PT-001"],"decision_point":true,"notes":"Decision point: if a Rule 12 motion disposes of all claims (e.g., motion to dismiss granted on all claims), the case proceeds to the Judgment phase. If denied or only partially granted, the case proceeds to summary judgment consideration or the pretrial phase. A granted Rule 12.02(6) motion triggers mandatory fee-shifting under T.C.A. § 20-12-119(c) unless an exception applies."},{"step_id":"CC-CIV-MP-003","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Hear and determine motion for summary judgment","citations":["Tenn. R. Civ. P. 56.01","Tenn. R. Civ. P. 56.02","Tenn. R. Civ. P. 56.03","Tenn. R. Civ. P. 56.04","Tenn. R. Civ. P. 56.05"],"conditions":["A claimant may move for summary judgment at any time after expiration of 30 days from commencement of the action or after service of a motion for summary judgment by the adverse party. A defending party may move for summary judgment at any time. Tenn. R. Civ. P. 56.01, 56.02.","The motion must be served at least 30 days before the hearing. Tenn. R. Civ. P. 56.04.","The motion must be accompanied by a separate concise statement of material facts, numbered paragraph by paragraph, with specific citations to the record. The opposing party must file a response not later than five days before the hearing, addressing each stated fact and identifying any additional disputed facts with specific citations to the record. Tenn. R. Civ. P. 56.03.","Judgment shall be rendered if the pleadings, depositions, answers to interrogatories, admissions on file, and affidavits show no genuine issue as to any material fact and the moving party is entitled to judgment as a matter of law. Tenn. R. Civ. P. 56.04.","The trial court must state the legal grounds upon which it denies or grants the motion. Tenn. R. Civ. P. 56.04.","If summary judgment is not rendered on the whole case, the court may identify undisputed facts and narrow the issues for trial. Tenn. R. Civ. P. 56.05."],"next_steps":["CC-CIV-PT-001","CC-CIV-J-001"],"decision_point":true,"notes":"Decision point: if summary judgment is granted as to all claims, the case proceeds to the Judgment phase at CC-CIV-J-001. If denied or granted only as to some claims or issues, the case proceeds to the pretrial phase at CC-CIV-PT-001 with the scope of remaining issues potentially narrowed."},{"step_id":"CC-CIV-PT-001","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Enter scheduling order (discretionary; may be mandatory by local standing order)","citations":["Tenn. R. Civ. P. 16.01","Tenn. R. Civ. P. 16.06"],"conditions":["The court may in its discretion, or upon motion of any party, conduct a conference and thereafter enter a scheduling order limiting the time to: join other parties and amend pleadings; file and hear motions; and complete discovery. Tenn. R. Civ. P. 16.01(1).","The order may also set conference and trial dates, address electronically stored information discovery, and include privilege-protection agreements reached by the parties. Tenn. R. Civ. P. 16.01(2).","The court shall give consideration in the scheduling order to minimizing the time that jurors are not directly involved in trial or deliberations. Tenn. R. Civ. P. 16.01(3).","A schedule once ordered may not be modified except by leave of court upon a showing of good cause. Tenn. R. Civ. P. 16.01(3).","Sanctions for failure to comply with a scheduling order or failure to appear at a scheduling conference may include any orders available under Rule 37.02, plus costs and attorney's fees. Tenn. R. Civ. P. 16.06."],"next_steps":["CC-CIV-PT-002"],"decision_point":false,"notes":"LRC-004 applies: many circuit court divisions operate under standing orders that effectively mandate scheduling orders with prescribed deadlines. Verify divisional standing orders for each county."},{"step_id":"CC-CIV-PT-002","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Conduct pretrial conference (discretionary)","citations":["Tenn. R. Civ. P. 16.02","Tenn. R. Civ. P. 16.03","Tenn. R. Civ. P. 16.05","Tenn. R. Civ. P. 16.06"],"conditions":["The court may direct the parties to participate in one or more pretrial conferences for purposes including: expediting disposition; establishing early and continuing control; discouraging wasteful pretrial activities; encouraging trial preparation; facilitating settlement; and minimizing juror downtime. Tenn. R. Civ. P. 16.02.","Subjects that may be addressed: formulation and simplification of issues; necessity of amendments to pleadings; admissions of fact and documents; identification of witnesses and documents; possibility of settlement or alternative dispute resolution; disposition of pending motions; and special procedures for complex cases. Tenn. R. Civ. P. 16.03.","At least one attorney for each party must attend and must have authority to enter into stipulations and make admissions on all matters that may reasonably be discussed. Tenn. R. Civ. P. 16.03.","After the conference, an order must be entered reciting action taken; the order controls the subsequent course of the action unless modified by a subsequent order. Tenn. R. Civ. P. 16.05."],"next_steps":["CC-CIV-PT-003"],"decision_point":false,"notes":"Discretionary for the court; not required in every case. If convened, the resulting pretrial order controls the subsequent course of the action."},{"step_id":"CC-CIV-PT-003","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Conduct final pretrial conference","citations":["Tenn. R. Civ. P. 16.04","Tenn. R. Civ. P. 16.05"],"conditions":["The final pretrial conference shall be held as close to the time of trial as reasonable under the circumstances. Tenn. R. Civ. P. 16.04.","The court may order the participants to formulate a plan for trial, including a program for facilitating the admission of evidence. Tenn. R. Civ. P. 16.04.","At least one attorney who will conduct the trial for each party must attend, along with any unrepresented parties. Tenn. R. Civ. P. 16.04.","The order following the final pretrial conference may be modified only for good cause shown. Tenn. R. Civ. P. 16.05."],"next_steps":["CC-CIV-PT-004"],"decision_point":false,"notes":"Proceeds to jury demand determination."},{"step_id":"CC-CIV-PT-004","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Determine whether jury trial has been demanded or waived","citations":["Tenn. R. Civ. P. 38.02","Tenn. R. Civ. P. 38.05"],"conditions":["Any party may demand a trial by jury of any issue triable of right by jury by endorsing the demand upon a pleading when filed, or by written demand filed with the clerk with notice to all parties within 15 days after service of the last pleading raising an issue of fact. Tenn. R. Civ. P. 38.02.","Failure to timely demand constitutes a waiver of trial by jury. A demand for trial by jury may not be withdrawn without the consent of all parties as to whom issues have been joined. Tenn. R. Civ. P. 38.05."],"next_steps":["CC-CIV-TR-J-001","CC-CIV-TR-B-001"],"decision_point":true,"notes":"Decision point: jury trial demanded (proceed to CC-CIV-TR-J-001, jury trial track) or jury trial waived (proceed to CC-CIV-TR-B-001, bench trial track)."},{"step_id":"CC-CIV-TR-J-001","phase":"Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Call jury panel and conduct voir dire examination","citations":["Tenn. R. Civ. P. 47.01","Tenn. R. Civ. P. 47.02","Tenn. R. Civ. P. 47.03","T.C.A. § 22-3-101","T.C.A. § 22-3-104","T.C.A. § 20-9-201"],"conditions":["Before the jury is sworn, the clerk shall call over the names of the jury panel in the presence and hearing of the parties and their counsel. T.C.A. § 20-9-201.","Lawyers have an absolute right to examine prospective jurors. Tenn. R. Civ. P. 47.01; T.C.A. § 22-3-101. The method and scope of voir dire examination are determined by the court. Tenn. R. Civ. P. 47.01.","Counsel may make brief, non-argumentative statements at the beginning of the jury selection process. Tenn. R. Civ. P. 47.01.","Either party may challenge four jurors without assigning any cause. When more than one party plaintiff or defendant exists, four additional challenges are allowed to that side, not to exceed eight total challenges per side regardless of the number of parties. T.C.A. § 22-3-104.","Peremptory challenges are exercised simultaneously and in writing submitted to the judge; the judge does not disclose the identity of the challenging party to any juror. Tenn. R. Civ. P. 47.03.","The court may seat additional jurors using either of two alternative methods: (1) a combined pool where all jurors are treated equally and the final jury selected by lot at the close of evidence; or (2) the traditional alternate juror method. Tenn. R. Civ. P. 47.02."],"next_steps":["CC-CIV-TR-J-002"],"decision_point":false,"notes":"Jury trial track only. Proceeds to opening statements and presentation of evidence."},{"step_id":"CC-CIV-TR-J-002","phase":"Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Opening statements and presentation of evidence -- plaintiff's case in chief","citations":["T.C.A. § 20-9-301","T.C.A. § 20-9-302","T.C.A. § 20-9-303","T.C.A. § 20-9-304","Tenn. R. Civ. P. 32.01","Tenn. R. Civ. P. 51.03(1)"],"conditions":["At the beginning of trial the court must give basic instructions on procedures and applicable law. Tenn. R. Civ. P. 51.03(1).","All parties to the action shall have the right prior to the presentation of any evidence to make an opening statement to the court and jury setting forth their respective contentions, views of the facts, and theories of the lawsuit. T.C.A. § 20-9-301.","Counsel shall be permitted to read the complaint, including the amount sued for, to the jury at the beginning of the lawsuit and may refer to it in argument. T.C.A. § 20-9-302.","Deposition testimony may be used at trial as permitted by Rule 32.01, including for impeachment, as substantive evidence for party depositions, or when the witness is unavailable. Tenn. R. Civ. P. 32.01.","Counsel may use a blackboard, models, or similar devices, and any picture, plat, or exhibit introduced in evidence in connection with argument to illustrate contentions. T.C.A. § 20-9-303.","In personal injury cases, counsel may argue the worth or monetary value of pain and suffering to the jury, provided the argument conforms to the evidence. T.C.A. § 20-9-304.","A juror who becomes sick or otherwise disabled after impanelment may be discharged and replaced, or the court may order a mistrial and new jury, or the cause may proceed with remaining jurors by consent. T.C.A. § 20-9-203."],"next_steps":["CC-CIV-TR-J-003"],"decision_point":false,"notes":"Jury trial track only. Sequence within trial: opening statements, plaintiff's case in chief, defendant's case in chief, rebuttal as permitted. All parties present their evidence under the same procedural framework."},{"step_id":"CC-CIV-TR-J-003","phase":"Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Rule on motion for directed verdict at close of evidence","citations":["Tenn. R. Civ. P. 50.01"],"conditions":["A motion for directed verdict may be made at the close of evidence offered by an opposing party or at the close of the case. The court must reserve ruling until all parties alleging fault against any other party have presented their proof-in-chief. Tenn. R. Civ. P. 50.01.","A party who moves for directed verdict at close of the opponent's evidence does not waive the right to offer evidence if the motion is not granted. Tenn. R. Civ. P. 50.01.","A motion for directed verdict which is not granted is not a waiver of trial by jury even though all parties have moved for directed verdicts. Tenn. R. Civ. P. 50.01."],"next_steps":["CC-CIV-TR-J-004","CC-CIV-J-001"],"decision_point":true,"notes":"Decision point: if directed verdict is granted as to all claims, the case proceeds to Judgment at CC-CIV-J-001. If denied, the case proceeds to jury instructions and verdict at CC-CIV-TR-J-004."},{"step_id":"CC-CIV-TR-J-004","phase":"Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Charge the jury and receive verdict","citations":["Tenn. R. Civ. P. 49.01","Tenn. R. Civ. P. 49.02","Tenn. R. Civ. P. 51.01","Tenn. R. Civ. P. 51.02","Tenn. R. Civ. P. 51.03","Tenn. R. Civ. P. 51.04","T.C.A. § 20-9-501","T.C.A. § 20-9-508","T.C.A. § 20-9-509"],"conditions":["Written requests for jury instructions may be filed at the close of evidence or at such earlier time as the court directs. The court shall inform counsel of its proposed action upon each request prior to argument. Tenn. R. Civ. P. 51.01.","The court may give final instructions before or after closing argument. Tenn. R. Civ. P. 51.03(2). If instructions are given before closing argument, the court should provide additional housekeeping instructions after argument.","After instructions are given, parties must be given the opportunity to object out of the hearing of the jury; failure to object does not forfeit the right to raise the instruction as grounds for a new trial motion. Tenn. R. Civ. P. 51.02.","On request of either party, the judge must reduce every word of the charge and all subsequent instructions to writing before delivery to the jury. Tenn. R. Civ. P. 51.04; T.C.A. § 20-9-501.","Verdict forms: the court may require a special verdict (Tenn. R. Civ. P. 49.01), a general verdict with interrogatories (Tenn. R. Civ. P. 49.02), or a general verdict. When answers to interrogatories are inconsistent with each other and the verdict, the court shall not direct entry of judgment but must return the jury for further deliberation or order a new trial. Tenn. R. Civ. P. 49.02.","Parties may stipulate to a jury of fewer than the statutory number or to a majority verdict. Tenn. R. Civ. P. 48.","On application of either party, the trial judge must poll the jury. T.C.A. § 20-9-508. The jury shall not be polled otherwise than in open court; parties may waive their presence at polling except in felony cases. T.C.A. § 20-9-509."],"next_steps":["CC-CIV-J-001"],"decision_point":false,"notes":"Jury trial track only. Upon return of verdict, the case proceeds to Judgment phase at CC-CIV-J-001."},{"step_id":"CC-CIV-TR-B-001","phase":"Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Opening statements and presentation of evidence -- bench trial","citations":["T.C.A. § 20-9-301","T.C.A. § 20-9-302","Tenn. R. Civ. P. 32.01"],"conditions":["All parties to the action shall have the right prior to the presentation of any evidence to make an opening statement to the court setting forth their respective contentions, views of the facts, and theories of the lawsuit. T.C.A. § 20-9-301.","Counsel shall be permitted to read the complaint, including the amount sued for, at the beginning of the trial. T.C.A. § 20-9-302.","Deposition testimony may be used at trial as permitted by Rule 32.01. Tenn. R. Civ. P. 32.01.","The Rules of Evidence govern admissibility throughout trial. Tenn. R. Evid. 101 et seq."],"next_steps":["CC-CIV-TR-B-002"],"decision_point":false,"notes":"Bench trial track only. Proceeds to court findings and judgment."},{"step_id":"CC-CIV-TR-B-002","phase":"Trial","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Issue findings of fact and conclusions of law -- bench trial","citations":["Tenn. R. Civ. P. 52.01","T.C.A. § 20-9-506"],"conditions":["In all actions tried upon the facts without a jury, the court shall find the facts specially and shall state separately its conclusions of law and direct the entry of the appropriate judgment. If an opinion or memorandum of decision is filed, it is sufficient if the findings of fact and conclusions of law appear therein. Tenn. R. Civ. P. 52.01.","When a judge tries a case without a jury, the judge must render a decision and have judgment entered within 60 days from the completion of the trial. T.C.A. § 20-9-506."],"next_steps":["CC-CIV-J-001"],"decision_point":false,"notes":"Bench trial track only. Proceeds to Judgment phase at CC-CIV-J-001. The 60-day decision requirement of T.C.A. § 20-9-506 is mandatory."},{"step_id":"CC-CIV-J-001","phase":"Judgment","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Enter judgment","citations":["Tenn. R. Civ. P. 54.01","Tenn. R. Civ. P. 54.02","Tenn. R. Civ. P. 58"],"conditions":["Entry of judgment is effective when a judgment containing one of the following is marked on the face by the clerk as filed for entry: (1) the signatures of the judge and all parties or counsel; (2) the signatures of the judge and one party or counsel with a certificate of counsel that a copy was served on all other parties or counsel; or (3) the signature of the judge and a certificate of the clerk that a copy has been served on all other parties or counsel. Tenn. R. Civ. P. 58.","Following entry, the clerk must make appropriate docket notations and copy the judgment on the minutes; failure to do so does not affect validity. Upon request, the clerk must forthwith mail or deliver a copy of the entered judgment to all parties or counsel. Tenn. R. Civ. P. 58.","For cases with multiple claims or multiple parties, a final judgment as to fewer than all claims or parties requires an express determination that there is no just reason for delay and an express direction for entry of judgment. Absent such determination, the order is not final and is subject to revision. Tenn. R. Civ. P. 54.02(1).","Judgment as defined in these rules includes a decree and any order from which an appeal lies. Tenn. R. Civ. P. 54.01."],"next_steps":["CC-CIV-J-002"],"decision_point":false,"notes":"Entry of judgment is the convergence point for all trial tracks (jury verdict, bench trial, directed verdict, default judgment, and summary judgment). Proceeds to post-trial motions determination."},{"step_id":"CC-CIV-J-002","phase":"Judgment","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Determine whether to file post-trial motions","citations":["Tenn. R. Civ. P. 50.02","Tenn. R. Civ. P. 52.02","Tenn. R. Civ. P. 59.01","Tenn. R. Civ. P. 59.02","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 59.05","Tenn. R. Civ. P. 59.06","Tenn. R. Civ. P. 59.07","T.C.A. § 27-2-101","Tenn. R. App. P. 4(b)"],"conditions":["All post-trial motions permitted under Rule 59 must be filed and served within 30 days after judgment is entered. Tenn. R. Civ. P. 59.02. Motions to reconsider any Rule 59 motion are not authorized and do not extend the time for appellate proceedings. Tenn. R. Civ. P. 59.01.","Available post-trial motions: (1) motion for judgment in accordance with a motion for directed verdict (JNOV) under Tenn. R. Civ. P. 50.02; (2) motion to amend or make additional findings of fact under Tenn. R. Civ. P. 52.02; (3) motion for new trial for any reason for which new trials have heretofore been granted under Tenn. R. Civ. P. 59.07; (4) motion to alter or amend the judgment under Tenn. R. Civ. P. 59.04.","Not more than two new trials shall be granted to the same party in an action at law or upon trial by jury of a fact issue in equity. T.C.A. § 27-2-101.","If a new trial is granted because the verdict is contrary to the weight of the evidence, the new trial must be conducted by a different circuit judge or chancellor upon request of either party. Tenn. R. Civ. P. 59.06.","The court on its own initiative may, within 30 days after entry of judgment, alter or amend the judgment or order a new trial. Tenn. R. Civ. P. 59.05.","Timely filing of any Rule 59 motion tolls the time for filing a notice of appeal for all parties; the appeal period runs from entry of the order disposing of the last such motion. Tenn. R. App. P. 4(b)."],"next_steps":["CC-CIV-J-003","CC-CIV-PJ-001"],"decision_point":true,"notes":"Decision point: if post-trial motions are filed, proceed to CC-CIV-J-003 (court rules on post-trial motions). If no post-trial motions are filed within 30 days of judgment entry, the appeal window opens and the case proceeds to post-judgment phase at CC-CIV-PJ-001."},{"step_id":"CC-CIV-J-003","phase":"Judgment","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Rule on post-trial motions","citations":["Tenn. R. Civ. P. 50.02","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 59.05","Tenn. R. Civ. P. 59.07","Tenn. R. Civ. P. 60.01","Tenn. R. Civ. P. 60.02"],"conditions":["Clerical mistakes in judgments or orders may be corrected by the court at any time on its own initiative or on motion of any party. Tenn. R. Civ. P. 60.01.","Relief from a final judgment may be obtained on grounds of: mistake, inadvertence, surprise, or excusable neglect; newly discovered evidence; fraud, misrepresentation, or other misconduct; void judgment; satisfaction, release, or discharge; or any other reason justifying relief. Tenn. R. Civ. P. 60.02.","If a new trial is granted, the case returns to the trial phase. If JNOV is granted, the original verdict is set aside and judgment is entered for the moving party. If the motion to alter or amend is granted, the judgment is modified accordingly."],"next_steps":["CC-CIV-PJ-001","CC-CIV-TR-J-001"],"decision_point":true,"notes":"Decision point: if all post-trial motions are denied, the case proceeds to post-judgment phase at CC-CIV-PJ-001 and the appeal window opens from the order of denial. If a new trial is granted, the case loops back to the trial phase at CC-CIV-TR-J-001 (or CC-CIV-TR-B-001 for a bench trial). If JNOV is granted or the judgment is altered or amended, the case proceeds to CC-CIV-PJ-001 with the modified judgment."},{"step_id":"CC-CIV-PJ-001","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Civil","actor":"Circuit Court Clerk","action":"Tax costs","citations":["T.C.A. § 20-12-101","T.C.A. § 20-12-102","T.C.A. § 20-12-119","T.C.A. § 8-21-401"],"conditions":["The successful party in all civil actions is entitled to full costs unless otherwise directed by law or by a court of record. T.C.A. § 20-12-101.","Civil litigation privilege tax: $23.75 per original civil action in circuit court, collected from the plaintiff at commencement (except pauper's oath cases) and from the appellant upon filing a civil appeal. An additional $2.00 court clerk continuing education tax applies in all civil cases in county courts other than juvenile or municipal courts. A successful plaintiff is reimbursed by the defendant for any litigation tax incurred, in the same manner as costs. T.C.A. § 67-4-602(b), (m)(1); T.C.A. § 67-4-603(a)(1), (3); T.C.A. § 20-12-102.","In all civil cases, the presiding judge has discretion to adjudge costs and to apportion costs between the litigants as the equities of the case demand. T.C.A. § 20-12-119(a), (b).","A continuance costs $10.00 per requested continuance, of which $5.00 is deposited into the county general fund for court security. T.C.A. § 8-21-401(i)(2)."],"next_steps":["CC-CIV-PJ-002"],"decision_point":false,"notes":""},{"step_id":"CC-CIV-PJ-002","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Pursue execution on judgment if judgment not satisfied","citations":["Tenn. R. Civ. P. 69.05","Tenn. R. Civ. P. 69.06","Tenn. R. Civ. P. 69.07"],"conditions":["Execution methods available include: garnishment (Tenn. R. Civ. P. 69.05); levy and sale of personalty (Tenn. R. Civ. P. 69.06); and levy and sale of realty (Tenn. R. Civ. P. 69.07).","For garnishment: by the next business day after service the garnishee must ascertain whether it holds property of the debtor and mail a copy of the writ to the debtor's last known address; must file a written answer within 10 days; and must pay money or wages (minus statutory exemptions) into court within 30 days of service. Tenn. R. Civ. P. 69.05.","If the garnishee fails to timely answer or pay, a conditional judgment may be entered against the garnishee; if the garnishee does not show sufficient cause within 10 days of service of the order, the conditional judgment shall be made final and a writ of execution may issue against the garnishee for the entire judgment owed plus costs. Tenn. R. Civ. P. 69.05."],"next_steps":["CC-CIV-AP-001"],"decision_point":false,"notes":"Execution may be stayed pending appeal under T.C.A. § 27-1-124. See CC-CIV-AP-001 for stay of execution determination."},{"step_id":"CC-CIV-AP-001","phase":"Appeal","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Determine whether to appeal and file notice of appeal","citations":["Tenn. R. App. P. 3(a)","Tenn. R. App. P. 4(a)","Tenn. R. App. P. 4(b)","Tenn. R. App. P. 2","T.C.A. § 27-1-122"],"conditions":["Every final judgment entered by a circuit court from which an appeal lies to the Supreme Court or Court of Appeals is appealable as of right. Tenn. R. App. P. 3(a).","The notice of appeal must be filed with the clerk of the appellate court within 30 days after the date of entry of the judgment appealed from. Tenn. R. App. P. 4(a). This 30-day period may not be extended by the appellate court under any circumstances. Tenn. R. App. P. 2.","If a timely Rule 59 post-trial motion was filed, the appeal period for all parties runs from entry of the order disposing of the last such motion. Tenn. R. App. P. 4(b).","A prematurely filed notice of appeal is treated as filed after entry of the judgment or order disposed of and on the day thereof. Tenn. R. App. P. 4(d).","If the appeal is frivolous or taken solely for delay, the reviewing court may award just damages against the appellant including costs, interest on the judgment, and expenses incurred by the appellee as a result of the appeal. T.C.A. § 27-1-122."],"next_steps":["CC-CIV-AP-002","CC-CIV-AP-005"],"decision_point":true,"notes":"Decision point: if notice of appeal is filed timely, proceed to CC-CIV-AP-002. If no notice of appeal is filed within 30 days (or within 30 days of disposition of the last Rule 59 motion), the judgment becomes final and the case proceeds to terminal disposition at CC-CIV-AP-005."},{"step_id":"CC-CIV-AP-002","phase":"Appeal","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Determine whether to seek stay of execution pending appeal and post appeal bond","citations":["T.C.A. § 27-1-124","Tenn. R. App. P. 7"],"conditions":["An appellant seeking a stay of execution during the course of all appeals must post an appeal bond. The bond amount shall not exceed the lesser of $25,000,000 or 125% of the judgment amount. T.C.A. § 27-1-124(a).","Punitive or exemplary damages are excluded from the judgment amount for purposes of calculating the required bond. T.C.A. § 27-1-124(b).","If the appellant establishes by a preponderance of the evidence that the opposing party is dissipating assets outside the ordinary course of business to avoid payment, the court may enter protective orders and may include punitive damages in the bond calculation. T.C.A. § 27-1-124(c).","If the appellant establishes by clear and convincing evidence at a post-judgment hearing that the cost of the bond will render the appellant insolvent, the court shall establish a security in an amount and on terms that allow the appeal to proceed without resulting in the appellant's insolvency. This provision shall be narrowly construed. T.C.A. § 27-1-124(d).","If T.C.A. § 27-1-124 conflicts with any rule prescribed by the Supreme Court, the statute applies. T.C.A. § 27-1-124(e)."],"next_steps":["CC-CIV-AP-003"],"decision_point":false,"notes":"A stay is not automatic upon filing of notice of appeal. The appellant must affirmatively seek the stay and post the required bond. If no stay is obtained, execution may proceed while the appeal is pending."},{"step_id":"CC-CIV-AP-003","phase":"Appeal","court_type":"Circuit Court","case_type":"Civil","actor":"Circuit Court Clerk","action":"Prepare and transmit record on appeal to Court of Appeals","citations":["Tenn. R. App. P. 24","Tenn. R. App. P. 25","Tenn. R. App. P. 26"],"conditions":["The appellant must file a transcript of the evidence or a statement of the evidence, or file notice that no transcript or statement will be filed, within 60 days after filing the notice of appeal. Tenn. R. App. P. 24(b), (c), (d).","The clerk of the trial court must assemble, number, and complete the record within 45 days after filing of the transcript or statement, or after the appellant's notice that none will be filed. Tenn. R. App. P. 25(a). Extensions may not exceed 60 days from filing of the transcript or notice; only the clerk, not a party, may request an extension. Tenn. R. App. P. 25(d).","The clerk forfeits the statutory fee for preparing and transmitting the record if the record is not timely completed and transmitted. Tenn. R. App. P. 40(g).","The clerk of the appellate court files the record upon receipt and immediately serves notice of the filing date on all parties. Tenn. R. App. P. 26(a).","If the appellant fails to timely file the transcript, the appellee may move to dismiss the appeal; the appellate court may also dismiss on its own initiative. Tenn. R. App. P. 26(b)."],"next_steps":["CC-CIV-AP-004"],"decision_point":false,"notes":"Proceeds to briefing and appellate court decision."},{"step_id":"CC-CIV-AP-004","phase":"Appeal","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Court of Appeals briefing and decision","citations":["Tenn. R. App. P. 3(a)","Tenn. R. App. P. 29(a)","Tenn. R. App. P. 36","Tenn. R. App. P. 42"],"conditions":["The appellant must file a brief within 30 days after the date on which the record is filed with the appellate court clerk. Tenn. R. App. P. 29(a).","The appellee must file a brief within 30 days after the appellant's brief is filed. Reply briefs must be filed within 14 days after the preceding brief. Tenn. R. App. P. 29(a).","If the appellant fails to file a brief on time, the appellee may move to dismiss the appeal. Tenn. R. App. P. 29(c).","Civil appeals from circuit court as of right proceed to the Court of Appeals. Tenn. R. App. P. 3(a).","The Court of Appeals may affirm, reverse, or modify the judgment; remand for new trial or other proceedings; or take such other action as is appropriate. Tenn. R. App. P. 36."],"next_steps":["CC-CIV-AP-005"],"decision_point":true,"notes":"LRC-005 applies: verify Tenn. Ct. App. R. 1 et seq. for Court of Appeals-specific requirements. Decision point: affirmed (proceed to terminal disposition CC-CIV-AP-005); reversed or remanded (case returns to circuit court for further proceedings as directed by the Court of Appeals); party may seek permission to appeal to the Tennessee Supreme Court under Tenn. R. App. P. 11. Mandate issues upon final disposition. Tenn. R. App. P. 42."},{"step_id":"CC-CIV-AP-005","phase":"Appeal","court_type":"Circuit Court","case_type":"Civil","actor":"Circuit Court Clerk","action":"Appellate process exhausted -- mandate filed and judgment final","citations":["Tenn. R. App. P. 42"],"conditions":["When the appellate process is exhausted -- either because no further appeal is sought, permission to appeal to the Supreme Court is denied, or the Supreme Court issues its final ruling -- the mandate of the appellate court issues and is filed with the circuit court clerk.","The judgment is final. No further post-judgment proceedings remain."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. This is the end of the CC-CIV flow. Case lifecycle is complete. The judgment is final and appeal rights are exhausted."}],"source_file":"CC-CIV-Flowchart.html"},{"flow_id":"CC-CUS","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CC-CUS-GAP-001","description":"T.C.A. § 36-6-116 establishes automatic temporary injunctions upon service of a custody petition, mirroring the injunctions in T.C.A. § 36-4-106(d) for divorce. However, the corpus does not contain a rule or statute specifying the clerk's procedural obligation to attach injunction text to the summons in standalone custody cases as it does for divorce cases under T.C.A. § 36-4-106(d)(1). The clerk's procedure for attaching and issuing the T.C.A. § 36-6-116 injunctions should be confirmed against AOC administrative guidance and local rules.","affected_steps":["CC-CUS-003"]},{"gap_id":"CC-CUS-GAP-002","description":"T.C.A. § 24-7-112 governs admissibility of genetic test results in parentage proceedings but does not specify the court's procedural mechanism for ordering genetic testing in a standalone custody case where parentage is disputed and no prior parentage order exists. The corpus does not contain a rule specifying whether the court issues a show-cause order, a scheduling order with a testing deadline, or an ex parte order for testing. The procedural mechanism should be confirmed against local rules and AOC guidance.","affected_steps":["CC-CUS-PAT-003"]},{"gap_id":"CC-CUS-GAP-003","description":"T.C.A. § 36-6-108(a) requires notice of intent to relocate to be mailed not later than 60 days prior to the move. The statute does not address what happens procedurally if the relocating parent provides less than 60 days notice but more than 30 days notice -- specifically whether the nonrelocating parent's 30-day objection window is measured from date of actual notice or from some other date. The corpus does not resolve this procedural ambiguity. This should be flagged for reviewer determination.","affected_steps":["CC-CUS-REL-001"]},{"gap_id":"CC-CUS-GAP-004","description":"T.C.A. § 36-6-106(a) lists the best interest factors the court must consider in an initial custody determination. The statute does not specify whether the court must make written findings on each factor or only on the factors that are material to the determination. Tenn. R. Civ. P. 52.01 requires written findings of fact and conclusions of law in non-jury cases upon request. Whether Rule 52.01 findings must address each statutory factor individually or the factors collectively is not resolved in the corpus. This should be confirmed against appellate case standards; however, no TCA citation is available from the corpus.","affected_steps":["CC-CUS-015"]}],"conflicts":[{"conflict_id":"CC-CUS-CONF-001","description":"T.C.A. § 36-6-101 addresses custody jurisdiction broadly and references courts with domestic relations jurisdiction. T.C.A. § 16-10-108 grants Circuit Court concurrent jurisdiction with Chancery Court to grant divorces and related relief. In counties where both Circuit and Chancery Courts have domestic relations jurisdiction, a petitioner may file a standalone custody action in either court. This is not a conflict in the traditional sense but is a jurisdictional election that varies by county. Flagged because the flow is designated CC (Circuit Court) but in many counties the Chancery Court would also be a proper venue. Reviewers should note that this flow applies to Circuit Court filings; a parallel CH-CUS flow would apply to Chancery Court filings.","affected_steps":["CC-CUS-001"]},{"conflict_id":"CC-CUS-CONF-002","description":"T.C.A. § 36-2-303 provides that absent a custody order, custody of a child born out of wedlock is with the mother. T.C.A. § 36-2-305 provides that either parent may file a complaint to establish parentage and that the court may enter an order of parentage upon agreement of the parties. In a standalone custody action where parentage is disputed, there is a potential conflict between the mother's statutory default custody under § 36-2-303 and the father's right to seek immediate custody pending parentage establishment under § 36-2-305. Under the source hierarchy, both provisions are TCA statutes at the same level; neither controls the other. The court must resolve the tension through the best interest standard. Flagged for reviewer awareness.","affected_steps":["CC-CUS-PAT-002"]}],"local_rule_checks":[{"check_id":"CC-CUS-LRC-001","description":"Verify local rules for any cover sheet, domestic relations information sheet, or UCCJEA affidavit form required at the time of filing a standalone custody petition, in addition to the requirements of T.C.A. § 36-6-218 (UCCJEA petition requirements).","affected_steps":["CC-CUS-001"]},{"check_id":"CC-CUS-LRC-002","description":"Verify local rules for mandatory mediation requirements in standalone custody cases. T.C.A. § 36-4-130 addresses mediation confidentiality in domestic relations cases generally. Several judicial districts impose mandatory mediation before a contested custody hearing may be scheduled.","affected_steps":["CC-CUS-008"]},{"check_id":"CC-CUS-LRC-003","description":"Verify local rules for the parent educational seminar requirement under T.C.A. § 36-6-408 in standalone custody cases. The statute applies in any action where a permanent parenting plan will be entered and is not limited to divorce proceedings. Verify whether the local district requires proof of completion to be filed before a final hearing may be scheduled.","affected_steps":["CC-CUS-009"]},{"check_id":"CC-CUS-LRC-004","description":"Verify local rules for guardian ad litem appointment in contested custody cases. T.C.A. § 36-6-106(b) authorizes appointment of a guardian ad litem. Local districts vary significantly in when GAL appointment is mandatory versus discretionary and in the fee arrangements applicable.","affected_steps":["CC-CUS-014"]},{"check_id":"CC-CUS-LRC-005","description":"Verify local rules for any expedited docket or scheduling procedure for relocation objection petitions under T.C.A. § 36-6-108. Some districts have standing orders for expedited relocation hearings given the 60-day notice window.","affected_steps":["CC-CUS-REL-002"]}],"steps":[{"step_id":"CC-CUS-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"Determine basis for standalone custody action and confirm UCCJEA jurisdiction","citations":["T.C.A. § 36-6-101(a)(1)","T.C.A. § 36-6-216","T.C.A. § 36-6-209","T.C.A. § 16-10-108"],"conditions":["Standalone custody actions arise when: parties are unmarried and no prior custody order exists; a prior order exists and modification is sought; or custody is ancillary to a proceeding other than divorce.","UCCJEA jurisdiction must be confirmed before filing; the court must have home state, significant connection, or emergency jurisdiction under T.C.A. § 36-6-216. Petitioner must file a UCCJEA affidavit disclosing the child's residences for the past five years and any other pending custody proceedings.","Initial custody: best interest standard under T.C.A. § 36-6-106(a). Modification of prior custody order: material change of circumstance by a preponderance of the evidence, then best interest analysis. T.C.A. § 36-6-101(a)(2)(B). Modification of residential schedule only: material change affecting child's best interest. T.C.A. § 36-6-101(a)(2)(C)."],"next_steps":["CC-CUS-002"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-CUS-LRC-001] [CONFLICT: CC-CUS-CONF-001]"},{"step_id":"CC-CUS-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"Assess whether parentage of the child is established or must be determined","citations":["T.C.A. § 36-2-303","T.C.A. § 36-2-304","T.C.A. § 36-2-305(a)"],"conditions":["Parentage is presumed if parties were married or married at time of child's birth under T.C.A. § 36-2-304. A voluntary acknowledgment of parentage executed under T.C.A. § 68-3-203(g) or § 68-3-302 creates a rebuttable presumption of parentage.","Absent a custody order, custody of a child born out of wedlock is with the mother by operation of law. T.C.A. § 36-2-303."],"next_steps":["CC-CUS-PAT-001","CC-CUS-003"],"decision_point":true,"notes":"Decision point: parentage disputed or unestablished proceeds to CC-CUS-PAT-001; parentage established proceeds to CC-CUS-003."},{"step_id":"CC-CUS-PAT-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File complaint to establish parentage concurrent with or prior to custody petition","citations":["T.C.A. § 36-2-305(a)","T.C.A. § 36-2-305(b)","T.C.A. § 36-2-307"],"conditions":["Either parent, the child, DHS, or any other person with standing may bring a parentage action at any time during the child's minority. T.C.A. § 36-2-305(b).","Court may enter an order of parentage upon agreement of both parents without genetic testing unless the court on its own motion orders testing. T.C.A. § 36-2-305(a)."],"next_steps":["CC-CUS-PAT-002"],"decision_point":false,"notes":"Proceeds to CC-CUS-PAT-002 (agreed or disputed parentage determination)."},{"step_id":"CC-CUS-PAT-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Determine whether parentage is agreed or disputed and act accordingly","citations":["T.C.A. § 36-2-305(a)","T.C.A. § 24-7-112"],"conditions":["If agreed: court enters agreed order of parentage upon affirmative acknowledgment by both parents; proceed to CC-CUS-003.","If disputed: order genetic testing; proceed to CC-CUS-PAT-003."],"next_steps":["CC-CUS-PAT-003","CC-CUS-003"],"decision_point":true,"notes":"Decision point. [CONFLICT: CC-CUS-CONF-002]"},{"step_id":"CC-CUS-PAT-003","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Order genetic testing and enter parentage order based on results","citations":["T.C.A. § 24-7-112(b)(1)","T.C.A. § 24-7-112(b)(2)(A)","T.C.A. § 24-7-112(b)(2)(B)"],"conditions":["Written report of genetic test results is admissible without foundation testimony unless a written objection is filed at least 30 days before the hearing. T.C.A. § 24-7-112(b)(2)(A).","A rebuttable presumption of parentage is established by test results showing statistical probability of 95% or greater. T.C.A. § 24-7-112(b)(2)(B).","If initial test excludes parentage and no second test is requested, exclusion is conclusive and the action is dismissed as to that putative father. T.C.A. § 24-7-112(b)(1)(B)(i)."],"next_steps":["CC-CUS-003"],"decision_point":false,"notes":"[GAP: CC-CUS-GAP-002] Entry of parentage order is prerequisite to custody proceeding; proceed to CC-CUS-003."},{"step_id":"CC-CUS-003","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File petition for custody and visitation with Circuit Court Clerk","citations":["T.C.A. § 36-6-209(c)","T.C.A. § 36-6-218","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["Petition must set forth: facts establishing UCCJEA jurisdiction; child's name, age, and residences for the past five years and persons with whom the child lived; names and addresses of all persons claiming custody or visitation; any other pending proceedings that could affect this case; and whether petitioner has participated in any other custody proceeding concerning the child. T.C.A. § 36-6-209(c), § 36-6-218.","UCCJEA affidavit required. T.C.A. § 36-6-218."],"next_steps":["CC-CUS-004"],"decision_point":false,"notes":"Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). [LOCAL RULE CHECK: CC-CUS-LRC-001] Proceeds to CC-CUS-004 (summons and injunctions)."},{"step_id":"CC-CUS-004","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Circuit Court Clerk","action":"Issue summons with automatic temporary injunction text attached","citations":["T.C.A. § 36-6-116(c)","Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.02"],"conditions":["Text of the automatic temporary injunctions required by T.C.A. § 36-6-116 must be attached to the summons and served with the complaint. T.C.A. § 36-6-116(c)."],"next_steps":["CC-CUS-005"],"decision_point":false,"notes":"Proceeds to CC-CUS-005 (service of process)."},{"step_id":"CC-CUS-005","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"Effect service of process on respondent and confirm temporary injunctions are in effect","citations":["T.C.A. § 36-6-116(a)(1)-(4)","T.C.A. § 36-6-116(b)","Tenn. R. Civ. P. 4.04"],"conditions":["Upon personal service, the following injunctions take effect against both parties until final order, dismissal, agreed order, or court modification: (1) no cancellation or lapse of insurance covering the child; (2) no harassment, threats, or abuse of the other party or disparaging remarks in the presence of any child or to either party's employer; (3) no hiding, destroying, or spoiling of evidence relevant to the proceeding; (4) no relocation of any child outside Tennessee or more than 50 miles from the other parent without permission or court order, except in case of a well-founded fear of physical abuse. T.C.A. § 36-6-116(a)(1)-(4).","If a current valid court order or parenting plan provides equal or greater protections, that order applies instead. T.C.A. § 36-6-116(b)."],"next_steps":["CC-CUS-006"],"decision_point":false,"notes":"Injunctions are self-executing upon service; no court order is required. Proceeds to CC-CUS-006 (return of service)."},{"step_id":"CC-CUS-006","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File return of service with Circuit Court Clerk","citations":["Tenn. R. Civ. P. 4.03","Tenn. R. Civ. P. 4.04(1)"],"conditions":[],"next_steps":["CC-CUS-007"],"decision_point":false,"notes":"Proceeds to CC-CUS-007 (answer)."},{"step_id":"CC-CUS-007","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Respondent / Attorney","action":"File answer within 30 days of service and, if applicable, counter-petition for custody","citations":["Tenn. R. Civ. P. 12.01","T.C.A. § 36-6-204","T.C.A. § 36-6-219"],"conditions":["Respondent must file answer within 30 days after service. Tenn. R. Civ. P. 12.01. Respondent may file a counter-petition for custody.","Emergency custody: court may act ex parte under T.C.A. § 36-6-219 before respondent's answer is filed; if an emergency order issues, the court must immediately communicate with any court having custody jurisdiction in the child's home state. T.C.A. § 36-6-210."],"next_steps":["CC-CUS-008"],"decision_point":false,"notes":"Proceeds to CC-CUS-008 (motion for temporary parenting plan)."},{"step_id":"CC-CUS-008","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File motion for temporary parenting plan and temporary orders","citations":["T.C.A. § 36-6-403(2)","T.C.A. § 36-6-406"],"conditions":["Either or both parties may request dispute resolution to establish a temporary parenting plan; if not available, either party may request an expedited hearing. T.C.A. § 36-6-403(2).","Each party submitting a proposed plan must attach a verified statement of income and a verified statement that the plan is proposed in good faith and is in the best interest of the child. T.C.A. § 36-6-403(2).","If parties agree to a temporary parenting plan, no written plan is required to be entered. T.C.A. § 36-6-403(1).","Restrictions in T.C.A. § 36-6-406(a) apply if domestic violence findings exist; court may limit or prohibit certain provisions."],"next_steps":["CC-CUS-009"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-CUS-LRC-002] Proceeds to CC-CUS-009 (hearing on temporary orders)."},{"step_id":"CC-CUS-009","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Hear and rule on motion for temporary parenting plan and require parent seminar attendance","citations":["T.C.A. § 36-6-403","T.C.A. § 36-6-406","T.C.A. § 36-6-408"],"conditions":["If minor children exist, court enters temporary parenting plan incorporating a residential schedule. T.C.A. § 36-6-403.","No court shall dismiss or deny relief solely for failure of a party to attend the parent educational seminar; court may waive the requirement for good cause. T.C.A. § 36-6-408(c)."],"next_steps":["CC-CUS-010"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-CUS-LRC-003] Proceeds to CC-CUS-010 (scheduling order)."},{"step_id":"CC-CUS-010","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Enter scheduling order establishing discovery and hearing deadlines","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26.01"],"conditions":["Court may hold a scheduling conference under Tenn. R. Civ. P. 16 to establish discovery, expert disclosure, and hearing deadlines."],"next_steps":["CC-CUS-011"],"decision_point":false,"notes":"Proceeds to CC-CUS-011 (discovery)."},{"step_id":"CC-CUS-011","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"Conduct discovery on best interest factors and each parent's circumstances","citations":["T.C.A. § 36-6-106(a)","Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 30","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34"],"conditions":["Discovery encompasses evidence relevant to best interest factors under T.C.A. § 36-6-106(a), including each parent's relationship with the child, home environment, ability to provide for the child's needs, adjustment to home, school, and community, history of abuse or domestic violence, and child's preference if of sufficient age and maturity.","Full range of discovery tools under Tenn. R. Civ. P. 26 through 36 is available, including requests for independent psychological evaluations."],"next_steps":["CC-CUS-012"],"decision_point":false,"notes":"Proceeds to CC-CUS-012 (motions and settlement assessment)."},{"step_id":"CC-CUS-012","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Rule on discovery and pre-trial motions and assess whether agreement has been reached","citations":["T.C.A. § 36-6-404(b)","T.C.A. § 36-6-405(d)","Tenn. R. Civ. P. 26.03","Tenn. R. Civ. P. 37"],"conditions":["If parties agree to a permanent parenting plan at any point, they may submit it for court approval. If parties announce the agreement on the record, the court is not required to independently determine best interest. T.C.A. § 36-6-405(d).","Court retains authority to decline to accept an agreement it finds is not in the best interest of the child, is not freely entered, or is the product of duress. T.C.A. § 36-6-405(d)."],"next_steps":["CC-CUS-013","CC-CUS-016"],"decision_point":true,"notes":"Decision point: agreement reached proceeds to CC-CUS-016 (entry of final order); contested issues remain proceeds to CC-CUS-013 (mediation)."},{"step_id":"CC-CUS-013","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Order or encourage mediation of contested custody and visitation issues","citations":["T.C.A. § 36-4-130","T.C.A. § 36-6-302","T.C.A. § 36-6-304","Tenn. Sup. Ct. R. 38"],"conditions":["Mediation is not permitted if there is a finding or evidence of domestic abuse such that mediation would be inappropriate. T.C.A. § 36-6-406(a).","Mediation communications are confidential. T.C.A. § 36-4-130. No victim may provide monetary compensation to a nonattorney advocate for attendance at mediation. T.C.A. § 36-6-304."],"next_steps":["CC-CUS-014"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-CUS-LRC-002] Proceeds to CC-CUS-014 (pre-trial conference and GAL appointment)."},{"step_id":"CC-CUS-014","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Hold pre-trial conference and appoint guardian ad litem if appropriate","citations":["T.C.A. § 36-6-106(b)","Tenn. R. Civ. P. 16"],"conditions":["Court may appoint a guardian ad litem to represent the best interests of the child in any custody proceeding; GAL fees are assessed by the court and may be allocated between the parties. T.C.A. § 36-6-106(b).","Pre-trial conference identifies contested issues remaining for trial: initial determination or modification standard, proposed parenting plan provisions, residential schedule, decision-making authority, and any domestic violence or abuse allegations. Tenn. R. Civ. P. 16."],"next_steps":["CC-CUS-015"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-CUS-LRC-004] Proceeds to CC-CUS-015 (trial)."},{"step_id":"CC-CUS-015","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Conduct bench trial applying best interest factors or material change standard","citations":["T.C.A. § 36-6-101(a)(2)(B)","T.C.A. § 36-6-106(a)","T.C.A. § 36-6-106(a)(13)","Tenn. R. Civ. P. 52.01"],"conditions":["Custody cases are tried to the bench (non-jury). Court applies best interest factors under T.C.A. § 36-6-106(a) for initial determinations, or material change of circumstance followed by best interest analysis for modification proceedings.","Court may hear the preference of a child 12 years of age or older and may hear the preference of a younger child upon request. T.C.A. § 36-6-106(a)(13).","Court must make written findings in contested cases stating the reason and facts constituting the basis for the custody determination. T.C.A. § 36-6-101(a)(2)(B)(ii).","If parent is convicted of a Title 39, Chapter 13, Part 5 offense against a child under 18, there is a rebuttable presumption against awarding custody to that parent. T.C.A. § 36-6-101(a)(2)(A)(ii)."],"next_steps":["CC-CUS-016"],"decision_point":false,"notes":"[GAP: CC-CUS-GAP-004] Proceeds to CC-CUS-016 (final order)."},{"step_id":"CC-CUS-016","phase":"Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Enter final order incorporating permanent parenting plan and child support","citations":["T.C.A. § 36-6-404(a)(1)-(6)","T.C.A. § 36-6-410","T.C.A. § 36-5-101","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["Permanent parenting plan must: provide for the child's changing needs; establish each parent's authority and responsibilities; minimize exposure to harmful parental conflict; provide a dispute resolution process; allocate decision-making authority; and designate a primary residential parent when child resides more than 50% of the time with one parent. T.C.A. § 36-6-404(a)(1)-(6).","AOC parenting plan form must be used. T.C.A. § 36-6-404(d). Child support must be determined consistent with guidelines. T.C.A. § 36-5-101."],"next_steps":["CC-CUS-017"],"decision_point":false,"notes":"Proceeds to CC-CUS-017 (clerk entry and income assignment)."},{"step_id":"CC-CUS-017","phase":"Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Circuit Court Clerk","action":"Enter final order in minute book, notify parties, and issue income assignment","citations":["T.C.A. § 36-5-501","Tenn. R. Civ. P. 58"],"conditions":["If child support is ordered, clerk issues income assignment to employer of obligor unless the court finds assignment is unnecessary. T.C.A. § 36-5-501.","Notice of entry must be mailed or delivered to all parties or their attorneys. Tenn. R. Civ. P. 58."],"next_steps":["CC-CUS-018"],"decision_point":false,"notes":"Proceeds to CC-CUS-018 (post-judgment)."},{"step_id":"CC-CUS-018","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File post-judgment motion or petition for modification upon material change of circumstance","citations":["T.C.A. § 36-6-101(a)(2)(B)","T.C.A. § 36-6-101(a)(2)(C)","T.C.A. § 36-6-405","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Modification of residential parenting schedule prior to a final hearing is not permitted unless parties agree or the court finds the child will be subject to a likelihood of substantial harm absent temporary modification. T.C.A. § 36-6-405(b). If ex parte temporary modification is granted, respondent is entitled to an expedited hearing within 15 days. T.C.A. § 36-6-405(b).","A relocation by either parent may constitute a material change of circumstance; see CC-CUS-REL-001 through CC-CUS-REL-004."],"next_steps":["CC-CUS-REL-001","CC-CUS-019"],"decision_point":true,"notes":"Decision point: relocation issue arises proceeds to CC-CUS-REL-001; modification or enforcement proceeds to CC-CUS-019; appeal proceeds to CC-CUS-020."},{"step_id":"CC-CUS-REL-001","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"Send relocation notice by registered mail at least 60 days before proposed move","citations":["T.C.A. § 36-6-108(a)","T.C.A. § 36-6-108(a)(1)-(4)"],"conditions":["Applies when a parent spending intervals of time with a child desires to relocate outside Tennessee or more than 50 miles from the other parent, after a permanent parenting plan or final order is in effect. T.C.A. § 36-6-108(a).","Notice must contain: statement of intent to move; location of proposed new residence; reasons for relocation; and statement that absent agreement or timely objection within 30 days, relocation will be permitted by law. T.C.A. § 36-6-108(a)(1)-(4).","Notice must be mailed not later than 60 days prior to the move unless excused by the court for exigent circumstances. T.C.A. § 36-6-108(a)."],"next_steps":["CC-CUS-REL-002"],"decision_point":false,"notes":"[GAP: CC-CUS-GAP-003] [LOCAL RULE CHECK: CC-CUS-LRC-005] Proceeds to CC-CUS-REL-002."},{"step_id":"CC-CUS-REL-002","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Respondent / Attorney","action":"File response in opposition to relocation within 30 days of notice","citations":["T.C.A. § 36-6-108(a)(4)","T.C.A. § 36-6-108(b)"],"conditions":["Nonrelocating parent has 30 days from the date notice is sent to file a response in opposition. If no response in opposition is filed within 30 days, the relocating parent is permitted to relocate by operation of law. T.C.A. § 36-6-108(a)(4), (b).","If parties reach agreement on a new parenting schedule within 30 days, they submit the agreed modified plan for court approval."],"next_steps":["CC-CUS-REL-003"],"decision_point":false,"notes":"Proceeds to CC-CUS-REL-003 if objection is filed; otherwise relocation is permitted and parties submit agreed modified plan."},{"step_id":"CC-CUS-REL-003","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File petition seeking court approval of relocation","citations":["T.C.A. § 36-6-108(b)"],"conditions":["Relocating parent files petition seeking court approval. Nonrelocating parent has 30 days to file a response in opposition. If no response is filed within 30 days, the relocating parent is permitted to relocate. T.C.A. § 36-6-108(b)."],"next_steps":["CC-CUS-REL-004"],"decision_point":false,"notes":"Proceeds to CC-CUS-REL-004 (court determination)."},{"step_id":"CC-CUS-REL-004","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Determine whether relocation is in the best interest of the child and modify parenting plan","citations":["T.C.A. § 36-6-108(c)(1)","T.C.A. § 36-6-108(c)(2)(A)-(H)","T.C.A. § 36-6-108(c)(3)-(4)","T.C.A. § 36-6-108(d)","T.C.A. § 36-6-108(f)"],"conditions":["Court determines whether relocation is in the best interest of the minor child applying the eight statutory factors. T.C.A. § 36-6-108(c)(2)(A)-(H).","If relocation is in the best interest: court grants the petition and modifies the permanent parenting plan to account for the distance. T.C.A. § 36-6-108(c)(3).","If relocation is not in the best interest: court denies the petition and enters a modified permanent parenting plan that takes effect only if the parent proposing to relocate elects to proceed despite the denial. T.C.A. § 36-6-108(c)(4).","Court must assess transportation costs and determine whether a child support deviation is appropriate. T.C.A. § 36-6-108(d). Either parent may recover reasonable attorney fees in the court's discretion. T.C.A. § 36-6-108(f)."],"next_steps":["CC-CUS-016"],"decision_point":false,"notes":"After relocation determination, court enters modified permanent parenting plan; proceed to CC-CUS-016 for entry of final order."},{"step_id":"CC-CUS-019","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Judge","action":"Enforce custody and visitation order through contempt or license revocation proceedings","citations":["T.C.A. § 36-6-502(a)-(b)","T.C.A. § 36-6-503(a)","T.C.A. § 36-6-505(c)","T.C.A. § 36-5-103(a)-(c)"],"conditions":["License revocation remedy requires that before the most recent violation, the victimized parent must have notified the other parent by certified mail, return receipt requested, that subsequent violations will be subject to sanctions, and filed a copy of such notification with the court. T.C.A. § 36-6-503(a).","The offending parent has 20 days from service of notice to request a hearing to contest noncompliance; clerk must stay license revocation action if a hearing is timely requested. T.C.A. § 36-6-503(a)(2), § 36-6-505(a).","Upon finding of noncompliance, court may also allocate additional parenting time to the nonoffending parent. T.C.A. § 36-6-505(c)."],"next_steps":["CC-CUS-020"],"decision_point":false,"notes":"Proceeds to CC-CUS-020 (appeal), as applicable."},{"step_id":"CC-CUS-020","phase":"Appeal","court_type":"Circuit Court","case_type":"Domestic Relations - Child Custody and Visitation (Standalone)","actor":"Petitioner / Attorney","action":"File notice of appeal with Circuit Court Clerk within 30 days of entry of judgment","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Notice of appeal must be filed within 30 days after entry of the judgment or order. Tenn. R. App. P. 4(a). Timely post-trial motion extends the period; it runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b).","Interlocutory appeals of custody orders may be available under Tenn. R. App. P. 9 or Tenn. R. App. P. 10 in appropriate circumstances."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CC-CUS-Flowchart.html"},{"flow_id":"CC-DIV","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","version":"1.0","produced_date":"2026-05-13","status":"Draft - Pending Review","gaps":[{"gap_id":"CC-DIV-GAP-001","description":"T.C.A. § 36-6-408 requires that each parent attend a parent educational seminar in any action where a permanent parenting plan will be entered, and specifies that the seminar must not be less than four hours in the aggregate. The statute does not specify a deadline by which the seminar must be completed relative to the complaint filing date or to any hearing date. No Rule of Civil Procedure or Supreme Court Rule in the corpus establishes a deadline. The applicable local rule in each judicial district should be verified to determine whether a completion deadline is imposed and whether proof of completion is required to be filed with the clerk before the hearing is set.","affected_steps":["CC-DIV-011"]},{"gap_id":"CC-DIV-GAP-002","description":"T.C.A. § 36-4-121 requires equitable division of marital property prior to any determination of spousal support, and T.C.A. § 36-4-121(a)(1)(A)-(B) requires the court to address both property division and marital debt allocation. The statute does not specify whether a formal appraisal or valuation is required by court rule. No Supreme Court Rule or Rule of Civil Procedure in the corpus mandates a specific valuation method or requires a formal appraisal to be filed. Local rules in individual judicial districts may impose additional requirements for financial disclosure or asset valuation. This should be verified during the local rules phase.","affected_steps":["CC-DIV-027"]},{"gap_id":"CC-DIV-GAP-003","description":"T.C.A. § 36-4-103(b) requires the court to affirmatively find that the marital dissolution agreement makes adequate and sufficient provision for custody, maintenance of children, and equitable settlement of property rights before a divorce may be granted on irreconcilable differences grounds. The statute does not define a procedural mechanism for a hearing at which the court reviews the MDA when both parties are present. No Rule of Civil Procedure in the corpus establishes a specific hearing type or notice requirement for MDA approval hearings in uncontested irreconcilable differences cases. Local rules should be verified for any scheduling or docket-setting procedures specific to MDA approval.","affected_steps":["CC-DIV-030"]},{"gap_id":"CC-DIV-GAP-004","description":"The corpus does not contain a statute or rule specifying whether the income assignment order required under T.C.A. § 36-5-501 is entered simultaneously with the final decree or separately thereafter, or whether the clerk issues the income assignment to the employer or whether a separate motion is required. The procedural mechanics of income assignment issuance at entry of final decree should be confirmed against local rules and AOC administrative guidance.","affected_steps":["CC-DIV-039"]}],"conflicts":[{"conflict_id":"CC-DIV-CONF-001","description":"T.C.A. § 36-4-105 allows filing in the county where the parties resided at the time of separation, in which the defendant resides if a resident, or where the applicant resides if the defendant is a nonresident or convict. T.C.A. § 36-4-106(b) requires the complaint to include a mailing address for each party but explicitly provides that either party may designate an agent for service of process in lieu of a residential address. Tenn. R. Civ. P. 3 governs commencement of civil actions generally and requires a complaint to be filed with the clerk. No conflict exists between these provisions; they address different aspects of filing. Flagged because venue in divorce cases is governed by a separate statute rather than by Tenn. R. Civ. P. 82, and reviewers should be aware that Tenn. R. Civ. P. 82 is superseded for this case type by T.C.A. § 36-4-105.","affected_steps":["CC-DIV-002"]},{"conflict_id":"CC-DIV-CONF-002","description":"T.C.A. § 36-4-106(d)(1) provides that automatic temporary injunctions take effect upon personal service of the complaint and summons on the respondent or upon waiver and acceptance of service. Tenn. R. Civ. P. 65.03 governs restraining orders generally and requires delivery to a person authorized to serve a summons. The domestic relations automatic injunctions under T.C.A. § 36-4-106(d) are self-executing upon service and do not require a court order or judicial action, which distinguishes them from the general injunctive relief process under Tenn. R. Civ. P. 65. Under the source hierarchy, T.C.A. § 36-4-106(d) controls for the automatic temporary injunctions in divorce cases. Tenn. R. Civ. P. 65 applies to any additional injunctive relief sought by motion beyond the automatic injunctions.","affected_steps":["CC-DIV-009"]}],"local_rule_checks":[{"check_id":"CC-DIV-LRC-001","description":"Verify whether the local judicial district imposes any additional cover sheet, family court information sheet, or case designation form requirements at the time of complaint filing beyond those required by T.C.A. § 36-4-106 and Tenn. R. Civ. P. 3.","affected_steps":["CC-DIV-002"]},{"check_id":"CC-DIV-LRC-002","description":"Verify local rules for any deadline by which proof of parent educational seminar completion must be filed, and whether filing proof is a prerequisite to scheduling a final hearing. T.C.A. § 36-6-408 does not specify a deadline.","affected_steps":["CC-DIV-011"]},{"check_id":"CC-DIV-LRC-003","description":"Verify local rules for any mandatory scheduling order or case management conference requirement in contested divorce cases. Tenn. R. Civ. P. 16 authorizes but does not mandate scheduling conferences. Local practice varies significantly in domestic relations cases.","affected_steps":["CC-DIV-015"]},{"check_id":"CC-DIV-LRC-004","description":"Verify local rules for required mediation in contested divorce cases. T.C.A. § 36-4-130 addresses mediation confidentiality but does not mandate mediation. Several judicial districts impose mandatory mediation by local rule in domestic relations cases before a contested hearing may be scheduled.","affected_steps":["CC-DIV-020"]},{"check_id":"CC-DIV-LRC-005","description":"Verify local rules for any required financial disclosure statement, asset and debt schedule, or income statement that must be filed or exchanged before the pretrial conference or trial in contested divorce cases.","affected_steps":["CC-DIV-016"]},{"check_id":"CC-DIV-LRC-006","description":"Verify local rules for scheduling of MDA approval hearings in uncontested irreconcilable differences cases, including whether the matter is placed on a specific docket and whether the parties must both appear or whether one party's appearance is sufficient.","affected_steps":["CC-DIV-030"]},{"check_id":"CC-DIV-LRC-007","description":"Verify local rules for any required form or procedure for entry of the final decree of absolute divorce, including whether the circuit court uses a court-approved form under Tenn. Sup. Ct. R. 52 and whether local practice requires submission of a proposed decree a specified number of days before the hearing.","affected_steps":["CC-DIV-038"]}],"steps":[{"step_id":"CC-DIV-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Determine grounds for divorce and applicable mandatory waiting period","citations":["T.C.A. § 36-4-101","T.C.A. § 36-4-101(b)"],"conditions":["Grounds for divorce from the bonds of matrimony include irreconcilable differences (no-fault) and fault grounds enumerated in T.C.A. § 36-4-101(a)(1)-(13).","Mandatory waiting period: 60 days if no unmarried child under 18; 90 days if a minor child exists. Period runs from date of filing. T.C.A. § 36-4-101(b).","Venue: county where parties resided at separation; where defendant resides if a Tennessee resident; or where plaintiff resides if defendant is a nonresident or convict. T.C.A. § 36-4-105. Tenn. R. Civ. P. 82 does not apply to divorce venue."],"next_steps":["CC-DIV-002"],"decision_point":false,"notes":"Irreconcilable differences requires a marital dissolution agreement incorporating custody, support, and property provisions before decree may enter. Fault grounds proceed through full civil litigation with corroborative proof required."},{"step_id":"CC-DIV-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Prepare and file complaint for divorce with Circuit Court Clerk and pay filing fee","citations":["T.C.A. § 36-4-106(a)(1)","T.C.A. § 36-4-106(b)","T.C.A. § 36-4-105","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01","Tenn. R. Civ. P. 10"],"conditions":["Complaint must set forth grounds in substantially the language of T.C.A. § 36-4-101 and include Social Se
