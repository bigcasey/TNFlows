curity numbers and dates of birth of parties and minor children, or a statement of why such information could not be obtained. T.C.A. § 36-4-106(a)(1), (b).","Complaint may not be filed by facsimile transmission. Tenn. R. Civ. P. 5A.02(4)(a)."],"next_steps":["CC-DIV-003"],"decision_point":false,"notes":"Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). [LOCAL RULE CHECK: CC-DIV-LRC-001]"},{"step_id":"CC-DIV-003","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Circuit Court Clerk","action":"Issue summons with automatic temporary injunction text attached","citations":["T.C.A. § 36-4-106(d)(1)","Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.02"],"conditions":["Written notice that automatic temporary injunctions take effect upon service must be attached to the summons and served with the complaint. T.C.A. § 36-4-106(d)(1).","Injunctions are self-executing upon service; no court order is required. T.C.A. § 36-4-106(d)(1)."],"next_steps":["CC-DIV-004"],"decision_point":false,"notes":"See CC-DIV-CONF-002 regarding the distinction between automatic temporary injunctions and general injunctive relief under Tenn. R. Civ. P. 65."},{"step_id":"CC-DIV-004","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Determine whether case proceeds by MDA waiver of service or formal service of process","citations":["T.C.A. § 36-4-101(a)(14)","T.C.A. § 36-4-103(a)(2)"],"conditions":["Irreconcilable differences with MDA waiver: defendant may execute a written notarized MDA in lieu of service, referencing the pending case or stating awareness one will be filed; waiver is valid for 180 days from date last party signs. T.C.A. § 36-4-103(a)(2).","All fault grounds cases and irreconcilable differences cases where defendant will not execute MDA in lieu of service require formal service of process."],"next_steps":["CC-DIV-005A","CC-DIV-005B"],"decision_point":true,"notes":"Decision point: MDA waiver path proceeds to CC-DIV-005A; service of process path proceeds to CC-DIV-005B."},{"step_id":"CC-DIV-005A","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Execute and file notarized marital dissolution agreement in lieu of service of process","citations":["T.C.A. § 36-4-103(a)(2)"],"conditions":["Execution of the notarized MDA constitutes a general appearance, constitutes an answer, gives the court personal jurisdiction over defendant, and constitutes a default judgment for purposes of granting divorce on irreconcilable differences grounds. T.C.A. § 36-4-103(a)(2).","Waiver is valid for 180 days from date the last party signs; if expired, formal service must be obtained."],"next_steps":["CC-DIV-009"],"decision_point":false,"notes":"Proceed to CC-DIV-009; automatic temporary injunctions take effect upon filing of MDA as substitute for service."},{"step_id":"CC-DIV-005B","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Effect service of process on defendant by an authorized method","citations":["Tenn. R. Civ. P. 4.04","Tenn. R. Civ. P. 4.05","T.C.A. § 36-4-103(a)(1)","T.C.A. § 20-2-215"],"conditions":["Service may be made by personal service, mail with return receipt signed by defendant personally, or, for nonresidents in irreconcilable differences cases, upon the Secretary of State under T.C.A. § 20-2-215. Tenn. R. Civ. P. 4.04, 4.05.","Service by publication is available where defendant cannot be located after diligent effort. Tenn. R. Civ. P. 4.05."],"next_steps":["CC-DIV-006"],"decision_point":false,"notes":"Proceeds to CC-DIV-006 (return of service)."},{"step_id":"CC-DIV-006","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"File return of service or proof of service with Circuit Court Clerk","citations":["Tenn. R. Civ. P. 4.03","Tenn. R. Civ. P. 4.04(1)","Tenn. R. Civ. P. 4.05"],"conditions":["Personal service: officer completes return on the summons. Mail service: file return receipt. Publication: file affidavit of publication. Tenn. R. Civ. P. 4.03.","If service cannot be achieved, plaintiff may seek extension of time under Tenn. R. Civ. P. 4.01(3) or move for publication under Tenn. R. Civ. P. 4.05."],"next_steps":["CC-DIV-007"],"decision_point":false,"notes":"Proceeds to CC-DIV-007 (defendant's answer)."},{"step_id":"CC-DIV-007","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Defendant / Attorney","action":"File answer within 30 days of service and, if applicable, counter-complaint","citations":["Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 55"],"conditions":["Defendant must file answer within 30 days after service. Tenn. R. Civ. P. 12.01. In fault grounds cases, defendant may also file a counter-complaint.","If defendant answers and denies irreconcilable differences, that ground is eliminated; plaintiff may proceed only on fault grounds pleaded in the alternative. T.C.A. § 36-4-103(e).","If defendant fails to answer, plaintiff may seek default under Tenn. R. Civ. P. 55."],"next_steps":["CC-DIV-008"],"decision_point":false,"notes":"Proceeds to CC-DIV-008 (assess contested vs. uncontested)."},{"step_id":"CC-DIV-008","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Assess whether case is contested or uncontested after answer period expires","citations":["T.C.A. § 36-4-103(b)","T.C.A. § 36-4-103(e)","Tenn. R. Civ. P. 55"],"conditions":["Contested: defendant has filed an answer denying grounds or filing a counter-complaint; proceed to CC-DIV-010.","Uncontested (default or no contest): proceed to CC-DIV-009."],"next_steps":["CC-DIV-009","CC-DIV-010"],"decision_point":true,"notes":"Decision point."},{"step_id":"CC-DIV-009","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Circuit Court Clerk","action":"Confirm automatic temporary injunctions are in effect against both parties","citations":["T.C.A. § 36-4-106(d)(1)(A)-(E)"],"conditions":["Upon personal service of the complaint and summons, or upon filing of the notarized MDA waiving service, the following injunctions are in effect against both parties until final decree, dismissal, agreement, or court modification: (1) no transfer, concealment, or dissipation of marital property; (2) no cancellation or lapse of insurance covering either party or children; (3) no harassment, threats, or abuse of the other party; (4) no disparaging remarks about the other party to or in the presence of minor children or to either party's employer; (5) no relocation of minor children outside Tennessee or more than 50 miles from the other parent without consent or court order. T.C.A. § 36-4-106(d)(1)(A)-(E).","Injunctions are self-executing upon service; no court order is required."],"next_steps":["CC-DIV-010","CC-DIV-011"],"decision_point":false,"notes":"See CC-DIV-CONF-002 regarding the distinction between automatic temporary injunctions and general injunctive relief under Tenn. R. Civ. P. 65."},{"step_id":"CC-DIV-010","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Determine whether parties will pursue collaborative family law or standard litigation","citations":["Tenn. Sup. Ct. R. 53, Sections 1-4"],"conditions":["Participation in collaborative family law is voluntary; the court may not order a party to participate over that party's objection. Tenn. Sup. Ct. R. 53, Section 5(b).","Collaborative process is available at any point before entry of the final decree, not only at the outset."],"next_steps":["CC-DIV-COL-001","CC-DIV-011"],"decision_point":true,"notes":"Decision point: collaborative family law path proceeds to CC-DIV-COL-001; standard litigation path proceeds to CC-DIV-011."},{"step_id":"CC-DIV-COL-001","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Conduct collaborative law pre-agreement assessment with prospective party","citations":["Tenn. Sup. Ct. R. 53, Section 14"],"conditions":["Before a prospective party signs a collaborative participation agreement, the collaborative lawyer must assess whether the process is appropriate, provide information about material benefits and risks compared to litigation and mediation, and advise the party that the collaborative lawyer will be disqualified if litigation ensues. Tenn. Sup. Ct. R. 53, Section 14."],"next_steps":["CC-DIV-COL-002"],"decision_point":false,"notes":"Proceeds to CC-DIV-COL-002 (execution of participation agreement)."},{"step_id":"CC-DIV-COL-002","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Execute collaborative family law participation agreement and file notice with clerk","citations":["Tenn. Sup. Ct. R. 53, Section 4","Tenn. Sup. Ct. R. 53, Section 6(a)"],"conditions":["Agreement must be in a record, signed by both parties, state intent to resolve the matter collaboratively, describe the scope of the matter, identify each party's collaborative lawyer, include a provision forgoing court intervention during the process, include a provision for jointly engaging neutral professionals, and include a mandatory withdrawal provision -- both collaborative lawyers must withdraw if a party terminates the process and moves to litigation; this provision may not be waived. Tenn. Sup. Ct. R. 53, Section 4.","Filing the notice of the agreement with the clerk operates as an application for a stay of the court proceeding. Tenn. Sup. Ct. R. 53, Section 6(a)."],"next_steps":["CC-DIV-COL-003"],"decision_point":false,"notes":"Proceeds to CC-DIV-COL-003 (court stay)."},{"step_id":"CC-DIV-COL-003","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Stay court proceedings upon filing of collaborative law participation notice","citations":["Tenn. Sup. Ct. R. 53, Section 6(a)-(e)"],"conditions":["Court may require status reports from parties and collaborative lawyers; reports may contain only information on whether the process is ongoing or concluded. Tenn. Sup. Ct. R. 53, Section 6(c).","Court shall provide notice and opportunity to be heard before dismissing a stayed proceeding for delay or failure to prosecute. Tenn. Sup. Ct. R. 53, Section 6(e).","Emergency orders protecting health, safety, welfare, or interest of a party or family are available during the stay. Tenn. Sup. Ct. R. 53, Section 7."],"next_steps":["CC-DIV-COL-004"],"decision_point":false,"notes":"Proceeds to CC-DIV-COL-004 (collaborative negotiations)."},{"step_id":"CC-DIV-COL-004","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Conduct collaborative negotiations with full informal disclosure of financial information","citations":["Tenn. Sup. Ct. R. 53, Section 12"],"conditions":["Each party must make timely, full, candid, and informal disclosure of information related to the matter without formal discovery and must update any previously disclosed information that has materially changed. Tenn. Sup. Ct. R. 53, Section 12(a)-(b).","Parties must each sign, under oath, a joint sworn complete statement of assets and liabilities verifying full disclosure of all marital and separate property and liabilities. Tenn. Sup. Ct. R. 53, Section 12(c).","Other forms of ADR, including mediation, are permitted within the collaborative process by mutual agreement. Tenn. Sup. Ct. R. 53, Section 21."],"next_steps":["CC-DIV-COL-005"],"decision_point":false,"notes":"Proceeds to CC-DIV-COL-005 (outcome assessment)."},{"step_id":"CC-DIV-COL-005","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Assess whether collaborative process has succeeded or terminated","citations":["Tenn. Sup. Ct. R. 53, Section 5(c)-(d)","Tenn. Sup. Ct. R. 53, Section 5(g)"],"conditions":["Process terminates when a party gives written notice of termination, a party initiates court action without agreement, or a collaborative lawyer is discharged or withdraws and a successor is not engaged within 30 days. Tenn. Sup. Ct. R. 53, Section 5(d).","Process may continue after discharge or withdrawal if within 30 days the unrepresented party engages a successor collaborative lawyer and the parties reaffirm the participation agreement in a signed record. Tenn. Sup. Ct. R. 53, Section 5(g)."],"next_steps":["CC-DIV-COL-006","CC-DIV-COL-007"],"decision_point":true,"notes":"Decision point: successful process proceeds to CC-DIV-COL-006; terminated process proceeds to CC-DIV-COL-007."},{"step_id":"CC-DIV-COL-006","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Execute settlement agreement and file notice of concluded collaborative process","citations":["Tenn. Sup. Ct. R. 53, Section 5(c)(1)","Tenn. Sup. Ct. R. 53, Section 6(b)","Tenn. Sup. Ct. R. 53, Section 8","Tenn. Sup. Ct. R. 53, Section 9(c)(1)"],"conditions":["Collaborative lawyer may appear before the court for the limited purpose of requesting approval of the settlement agreement. Tenn. Sup. Ct. R. 53, Section 9(c)(1).","Filing of notice that the collaborative process has concluded lifts the stay. Tenn. Sup. Ct. R. 53, Section 6(b)."],"next_steps":["CC-DIV-030"],"decision_point":false,"notes":"Proceed to CC-DIV-030 for court approval of MDA and entry of final decree."},{"step_id":"CC-DIV-COL-007","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"File notice of terminated collaborative process and return case to contested litigation","citations":["Tenn. Sup. Ct. R. 53, Section 5(d)","Tenn. Sup. Ct. R. 53, Section 6(b)","Tenn. Sup. Ct. R. 53, Section 9(a)-(b)"],"conditions":["Both collaborative lawyers are disqualified from representing either party in subsequent litigation. Tenn. Sup. Ct. R. 53, Section 9(a)-(b). Exception: a collaborative lawyer may appear on an emergency basis to protect a party's health, safety, or welfare until a successor is engaged. Tenn. Sup. Ct. R. 53, Section 9(c)(2)-(d).","Collaborative law communications remain privileged and are not admissible in subsequent litigation, subject to enumerated exceptions. Tenn. Sup. Ct. R. 53, Section 19(a).","Filing of notice that the collaborative process has concluded lifts the stay. Tenn. Sup. Ct. R. 53, Section 6(b)."],"next_steps":["CC-DIV-015"],"decision_point":false,"notes":"Parties must retain new litigation counsel. Proceed to CC-DIV-015 to re-enter the contested litigation path at the scheduling and discovery phase."},{"step_id":"CC-DIV-011","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Attend parent educational seminar as soon as possible after filing","citations":["T.C.A. § 36-6-408"],"conditions":["Applies only when a permanent parenting plan will be entered -- i.e., when minor children of the parties exist. If no minor children, this step does not apply.","Seminar must be not less than four hours in the aggregate; minor children must be excluded. Seminar must include at least one 30-minute video on adverse childhood experiences and discussion of ADR, the judicial process, and domestic violence. T.C.A. § 36-6-408.","No court shall deny a divorce solely for failure to attend the seminar; court may waive the requirement for good cause on motion by either party. T.C.A. § 36-6-408(c)."],"next_steps":["CC-DIV-012"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-DIV-LRC-002]"},{"step_id":"CC-DIV-012","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"File motion for temporary orders including temporary support and parenting plan","citations":["T.C.A. § 36-5-121(b)","T.C.A. § 36-6-403","Tenn. R. Civ. P. 6.04"],"conditions":["Temporary relief available includes temporary support, temporary alimony, temporary custody and parenting plan, temporary use and possession of the marital residence, and temporary attorney fee awards. T.C.A. § 36-5-121(b).","If minor children exist and parties cannot agree to a temporary parenting plan, each party must submit a proposed plan and a verified statement of income and of good faith. T.C.A. § 36-6-403(2)."],"next_steps":["CC-DIV-013"],"decision_point":false,"notes":"Step is triggered only if plaintiff seeks temporary relief; not required in every case."},{"step_id":"CC-DIV-013","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Hear and rule on motion for temporary orders","citations":["T.C.A. § 36-4-106(a)(1)","T.C.A. § 36-5-121(b)","T.C.A. § 36-6-403","Tenn. R. Civ. P. 65.04"],"conditions":["Court may enter temporary support, alimony, use of marital residence, and attorney fee awards. T.C.A. § 36-5-121(b).","If minor children exist, court enters a temporary parenting plan incorporating a residential schedule. T.C.A. § 36-6-403.","Court may require complainant to file a bill of particulars setting forth grounds with reasonable certainty as to time and place on motion of defendant. T.C.A. § 36-4-106(a)(1)."],"next_steps":["CC-DIV-014"],"decision_point":false,"notes":"Proceeds to CC-DIV-014 (contested vs. uncontested determination)."},{"step_id":"CC-DIV-014","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Assess whether case is uncontested irreconcilable differences or contested","citations":["T.C.A. § 36-4-103(b)-(d)"],"conditions":["Uncontested irreconcilable differences with MDA executed and filed: proceed to CC-DIV-029 (waiting period confirmation).","Contested (fault grounds or irreconcilable differences in dispute): proceed to CC-DIV-015 (scheduling order)."],"next_steps":["CC-DIV-015","CC-DIV-029"],"decision_point":true,"notes":"Decision point."},{"step_id":"CC-DIV-015","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Enter scheduling order establishing discovery and trial deadlines","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26.01"],"conditions":["Court may hold a scheduling conference under Tenn. R. Civ. P. 16 to establish deadlines for discovery, financial information exchange, expert disclosures, motions, and trial."],"next_steps":["CC-DIV-016"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-DIV-LRC-003]"},{"step_id":"CC-DIV-016","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Conduct discovery on financial, fault, and custody-related issues","citations":["Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 27","Tenn. R. Civ. P. 28","Tenn. R. Civ. P. 29","Tenn. R. Civ. P. 30","Tenn. R. Civ. P. 31","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34","Tenn. R. Civ. P. 36"],"conditions":["Discovery encompasses financial disclosure, asset identification and valuation, income verification, fault grounds evidence, and custody-relevant information. Full range of discovery tools under Tenn. R. Civ. P. 26 through 36 is available."],"next_steps":["CC-DIV-017"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-DIV-LRC-005]"},{"step_id":"CC-DIV-017","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Rule on discovery motions including motions to compel and for protective orders","citations":["Tenn. R. Civ. P. 26.03","Tenn. R. Civ. P. 37"],"conditions":["Court may impose sanctions for discovery violations including preclusion of evidence, adverse inference instructions, and dismissal or default. Tenn. R. Civ. P. 37."],"next_steps":["CC-DIV-018"],"decision_point":false,"notes":"Proceeds to CC-DIV-018 (pre-trial motions)."},{"step_id":"CC-DIV-018","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"File pre-trial motions including motions in limine and for summary judgment","citations":["Tenn. R. Civ. P. 6.04","Tenn. R. Civ. P. 56"],"conditions":["All written motions must be filed and served not later than five days before the hearing unless a different period is fixed by the court. Tenn. R. Civ. P. 6.04."],"next_steps":["CC-DIV-019"],"decision_point":false,"notes":"Proceeds to CC-DIV-019 (ruling on pre-trial motions)."},{"step_id":"CC-DIV-019","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Rule on pre-trial motions and assess whether settlement has resolved all issues","citations":["T.C.A. § 36-4-103(b)","Tenn. R. Civ. P. 56"],"conditions":["If all issues are resolved by settlement at any point in the contested phase, parties may execute an MDA and proceed to CC-DIV-029."],"next_steps":["CC-DIV-020","CC-DIV-029"],"decision_point":true,"notes":"Decision point: settlement achieved proceeds to CC-DIV-029; contested issues remain proceeds to CC-DIV-020."},{"step_id":"CC-DIV-020","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Order or encourage mediation of contested issues","citations":["T.C.A. § 36-4-130","T.C.A. § 36-6-413","Tenn. Sup. Ct. R. 38"],"conditions":["Mediation communications are confidential; mediator shall not divulge information disclosed during the process. T.C.A. § 36-4-130.","Mediation may not be ordered if domestic violence restrictions under T.C.A. § 36-6-406(a) apply.","Mediation costs may be funded through the Divorcing Parent Education and Mediation Fund for indigent parents. T.C.A. § 36-6-413."],"next_steps":["CC-DIV-021"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-DIV-LRC-004]"},{"step_id":"CC-DIV-021","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Determine mediation outcome and whether contested issues remain for trial","citations":["T.C.A. § 36-4-103(b)","T.C.A. § 36-4-130"],"conditions":["If all issues resolved in mediation: parties execute MDA and proceed to CC-DIV-029.","If issues remain unresolved: proceed to CC-DIV-022."],"next_steps":["CC-DIV-022","CC-DIV-029"],"decision_point":true,"notes":"Decision point."},{"step_id":"CC-DIV-022","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Suspend proceedings by written stipulation to permit reconciliation attempt","citations":["T.C.A. § 36-4-126"],"conditions":["Suspension requires written stipulation of both parties; parties may resume cohabitation without prejudice to their respective rights; either party may revoke the suspension by motion. T.C.A. § 36-4-126.","If reconciliation is successful and the action is dismissed, either party may petition for expunction of divorce records upon filing an agreed sworn petition signed by both parties and notarized. T.C.A. § 36-4-127."],"next_steps":["CC-DIV-023"],"decision_point":false,"notes":"Proceeds to CC-DIV-023 (pre-trial conference)."},{"step_id":"CC-DIV-023","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Hold pre-trial conference and identify contested issues remaining for trial","citations":["Tenn. R. Civ. P. 16"],"conditions":["Court identifies contested issues remaining for trial including grounds, property division, alimony, parenting plan, and child support; marks trial exhibits; rules on remaining motions in limine; and establishes trial schedule. Tenn. R. Civ. P. 16."],"next_steps":["CC-DIV-024"],"decision_point":false,"notes":"Proceeds to CC-DIV-024 (trial)."},{"step_id":"CC-DIV-024","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Conduct bench trial on contested grounds, property, support, and custody issues","citations":["T.C.A. § 36-4-107","T.C.A. § 36-4-114","Tenn. R. Civ. P. 6.03(2)","Tenn. R. Evid. 101"],"conditions":["Contested divorce cases are tried to the bench (non-jury). Hearing must be conducted in open court unless both parties consent to chambers. Tenn. R. Civ. P. 6.03(2).","Fault grounds require corroborative proof. T.C.A. § 36-4-107, § 36-4-114. Parties may stipulate as to grounds and defenses. T.C.A. § 36-4-129(a).","Irreconcilable differences: no corroborative proof required if MDA executed. T.C.A. § 36-4-103(b)."],"next_steps":["CC-DIV-025"],"decision_point":false,"notes":"Proceeds to CC-DIV-025 (adjudication of grounds)."},{"step_id":"CC-DIV-025","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Adjudicate grounds for divorce and declare parties divorced","citations":["T.C.A. § 36-4-101","T.C.A. § 36-4-129(b)"],"conditions":["Court may grant the divorce to the party who was less at fault, or if either or both parties are entitled to a divorce, declare the parties to be divorced rather than awarding the divorce to one party alone. T.C.A. § 36-4-129(b)."],"next_steps":["CC-DIV-026"],"decision_point":false,"notes":"Proceeds to CC-DIV-026 (property division)."},{"step_id":"CC-DIV-026","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Determine equitable division of marital property and allocation of marital debt","citations":["T.C.A. § 36-4-121(a)(1)","T.C.A. § 36-4-121(b)-(c)","T.C.A. § 36-4-121(i)"],"conditions":["Property division must precede any determination of spousal support. T.C.A. § 36-4-121(a)(1). Marital property is divided equitably without regard to marital fault based on statutory factors. T.C.A. § 36-4-121(b)-(c).","All marital property is valued as of a date as near as possible to the date of entry of the order finally dividing the marital property. T.C.A. § 36-4-121(i).","Marital debt includes debt incurred to pay attorney fees through the date of the final hearing and any Rule 59 proceedings. T.C.A. § 36-4-121(b)(1)(B)."],"next_steps":["CC-DIV-027"],"decision_point":false,"notes":"[GAP: CC-DIV-GAP-002] Proceeds to CC-DIV-027 (alimony determination)."},{"step_id":"CC-DIV-027","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Determine whether alimony is appropriate and, if so, the type and amount","citations":["T.C.A. § 36-5-121(a)-(i)"],"conditions":["Types of alimony available: rehabilitative, alimony in futuro (periodic), transitional, and alimony in solido (lump sum), or a combination. T.C.A. § 36-5-121(a)-(i).","Rehabilitative and alimony in futuro are modifiable upon a showing of substantial and material change; transitional alimony is nonmodifiable unless otherwise ordered; alimony in solido is not modifiable. T.C.A. § 36-5-121(e)-(h)."],"next_steps":["CC-DIV-028"],"decision_point":false,"notes":"Proceeds to CC-DIV-028 (child support and permanent parenting plan) if minor children exist; otherwise proceeds to CC-DIV-038 (final decree)."},{"step_id":"CC-DIV-028","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Determine child support and enter permanent parenting plan for minor children","citations":["T.C.A. § 36-6-404(a)","T.C.A. § 36-6-404(a)(1)-(6)","T.C.A. § 36-6-410"],"conditions":["Applies only when minor children of the parties exist.","Permanent parenting plan must: provide for the child's changing needs; establish each parent's authority and responsibilities; minimize exposure to harmful parental conflict; provide a dispute resolution process; and allocate decision-making authority for education, health care, extracurricular activities, and religious upbringing. T.C.A. § 36-6-404(a)(1)-(6).","Designation of primary residential parent required when child resides more than 50% of the time with one parent; parents may agree to joint designation or waive designation when parenting time is equal. T.C.A. § 36-6-410(b).","Child support must be determined consistent with the child support guidelines. T.C.A. § 36-5-101."],"next_steps":["CC-DIV-038"],"decision_point":false,"notes":"Proceeds to CC-DIV-038 (final decree)."},{"step_id":"CC-DIV-029","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Confirm mandatory waiting period has elapsed before scheduling MDA approval hearing","citations":["T.C.A. § 36-4-103(c)(1)"],"conditions":["For irreconcilable differences: complaint must have been on file for at least 60 days (no minor child) or at least 90 days (minor child present) before the hearing. T.C.A. § 36-4-103(c)(1).","For fault grounds: same 60-day / 90-day waiting periods apply. T.C.A. § 36-4-101(b).","Waiting period commences on the date the original complaint was filed, not the date any amendment adding irreconcilable differences was filed."],"next_steps":["CC-DIV-030"],"decision_point":false,"notes":"Proceeds to CC-DIV-030 (MDA approval hearing)."},{"step_id":"CC-DIV-030","phase":"Pre-Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Hold MDA approval hearing and make statutory findings regarding adequacy of agreement","citations":["T.C.A. § 36-4-103(b)","T.C.A. § 36-4-103(d)"],"conditions":["Court must affirmatively find that the MDA makes adequate and sufficient provision for custody and maintenance of any children and for equitable settlement of property rights between the parties. T.C.A. § 36-4-103(b).","If court does not find the agreement sufficient, the cause is continued for further disposition. If both parties are present, they may ratify any amendments the court requires; the amended agreement becomes part of the decree.","An irreconcilable differences divorce taken as confessed does not require corroborative proof. T.C.A. § 36-4-103(d)(1). Approval of the MDA satisfies Tenn. R. Civ. P. 52.01; separate written findings are not required. T.C.A. § 36-4-103(b).","If defendant contested at any point, irreconcilable differences as a ground is eliminated. T.C.A. § 36-4-103(e)."],"next_steps":["CC-DIV-038"],"decision_point":false,"notes":"[GAP: CC-DIV-GAP-003] [LOCAL RULE CHECK: CC-DIV-LRC-006] Proceeds to CC-DIV-038 (final decree)."},{"step_id":"CC-DIV-038","phase":"Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Enter final decree of absolute divorce addressing all required elements","citations":["T.C.A. § 36-4-121(a)","T.C.A. § 36-4-122","T.C.A. § 36-4-124","T.C.A. § 36-5-121","T.C.A. § 36-6-404(a)","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["Final decree must address: dissolution of the marriage; equitable division of marital property and allocation of marital debt; alimony, if awarded; permanent parenting plan and child support if minor children exist; and costs under T.C.A. § 36-4-122.","If divorce granted on irreconcilable differences grounds, MDA is incorporated in or by reference into the decree. T.C.A. § 36-4-103(b).","Parties are at liberty to remarry upon entry of the final decree. T.C.A. § 36-4-124. Legitimacy of children of the marriage is not affected by the dissolution. T.C.A. § 36-4-125.","Judgment is effective upon entry of the order per Tenn. R. Civ. P. 58."],"next_steps":["CC-DIV-039"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-DIV-LRC-007] Proceeds to CC-DIV-039 (clerk entry and income assignment)."},{"step_id":"CC-DIV-039","phase":"Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Circuit Court Clerk","action":"Enter decree in minute book, notify parties, assess costs, and issue income assignment","citations":["T.C.A. § 36-4-122","T.C.A. § 36-5-501","Tenn. R. Civ. P. 58"],"conditions":["If child support is ordered, clerk issues income assignment to employer of obligor unless the court finds that the payment record, availability of other remedies, and other relevant factors make assignment unnecessary. T.C.A. § 36-5-501.","Notice of entry must be mailed or delivered to all parties or their attorneys. Tenn. R. Civ. P. 58."],"next_steps":["CC-DIV-040"],"decision_point":false,"notes":"[GAP: CC-DIV-GAP-004] Proceeds to CC-DIV-040 (post-judgment motions)."},{"step_id":"CC-DIV-040","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"File post-judgment motion to alter, amend, or seek new trial within 30 days of entry","citations":["T.C.A. § 36-4-121(b)(1)(A)","Tenn. R. Civ. P. 59.01","Tenn. R. Civ. P. 59.02","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Marital debt includes debt incurred through any Rule 59 proceedings. T.C.A. § 36-4-121(b)(1)(A).","Stay of execution is available pending a post-trial motion. Tenn. R. Civ. P. 62.02. Court may suspend or modify relief for alimony or child support pending appeal. Tenn. R. Civ. P. 62.03."],"next_steps":["CC-DIV-041","CC-DIV-042"],"decision_point":false,"notes":"Proceeds to CC-DIV-041 (enforcement) or CC-DIV-042 (modification), as applicable."},{"step_id":"CC-DIV-041","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Judge","action":"Enforce final decree through authorized enforcement mechanisms","citations":["T.C.A. § 36-5-103(a)-(c)"],"conditions":["Enforcement mechanisms include: requiring bond or personal surety; sequestering rents and profits of obligor's real estate; appointing a receiver; and imposing a lien against real and personal property. T.C.A. § 36-5-103(a)-(c).","Court may award attorney fees to the prevailing party in any proceeding to enforce, alter, change, or modify a decree of alimony, child support, or permanent parenting plan. T.C.A. § 36-5-103(c)."],"next_steps":["CC-DIV-042"],"decision_point":false,"notes":"Proceeds to CC-DIV-042 (modification) or CC-DIV-043 (appeal), as applicable."},{"step_id":"CC-DIV-042","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"Petition for modification of alimony, child support, or permanent parenting plan","citations":["T.C.A. § 36-5-121(a)","T.C.A. § 36-6-101(a)(2)(B)","T.C.A. § 36-6-101(a)(2)(C)"],"conditions":["Modification of alimony requires proof of a substantial and material change of circumstances; alimony in solido is not modifiable; transitional alimony is nonmodifiable unless otherwise ordered. T.C.A. § 36-5-121(a).","Modification of custody requires proof of a material change of circumstance by a preponderance of the evidence. T.C.A. § 36-6-101(a)(2)(B).","Modification of residential parenting schedule requires proof of a material change of circumstance affecting the child's best interest. T.C.A. § 36-6-101(a)(2)(C)."],"next_steps":["CC-DIV-043"],"decision_point":false,"notes":"Proceeds to CC-DIV-043 (appeal), as applicable."},{"step_id":"CC-DIV-043","phase":"Appeal","court_type":"Circuit Court","case_type":"Domestic Relations - Divorce","actor":"Plaintiff / Attorney","action":"File notice of appeal with Circuit Court Clerk within 30 days of entry of judgment","citations":["T.C.A. § 36-4-123","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Notice of appeal must be filed within 30 days after entry of the judgment. Tenn. R. App. P. 4(a). Timely post-trial motion extends the period; it runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b).","Voluntary appellate mediation is available in the Court of Appeals. Tenn. R. App. P. 34."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CC-DIV-Flowchart.html"},{"flow_id":"CC-SUP","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CC-SUP-GAP-001","description":"The corpus contains T.C.A. §§ 36-5-801 through 36-5-803 addressing DHS administrative orders for parentage testing and income assignment redirection, and T.C.A. § 36-5-103(f) addressing DHS administrative review and adjustment of support orders. However, the corpus does not contain the full text of the DHS administrative hearing procedures referenced in T.C.A. § 36-5-103(f)(1)(C) and T.C.A. § 36-5-501, which are governed by DHS administrative rules promulgated under the Uniform Administrative Procedures Act (T.C.A. Title 4, Chapter 5). The administrative hearing steps for the IV-D branch are cited to the available TCA provisions but the DHS rule citations are flagged as unverified. The DHS child support administrative rules should be retrieved from a full corpus source before finalizing the IV-D branch.","affected_steps":["CC-SUP-IVD-002"]},{"gap_id":"CC-SUP-GAP-002","description":"T.C.A. § 36-5-101(e) establishes the child support guidelines as a rebuttable presumption and requires written findings if a court deviates from the guidelines. The guidelines themselves are promulgated by DHS by rule rather than by statute. The corpus does not contain the current DHS child support guidelines. The specific income shares formula, self-support reserve, and deviation criteria referenced in T.C.A. § 36-5-101(e) are administrative rules not available in this corpus. The current guidelines should be confirmed from the DHS rules before finalizing any step that references the guidelines amount.","affected_steps":["CC-SUP-010"]},{"gap_id":"CC-SUP-GAP-003","description":"T.C.A. § 36-5-103(g)(1) requires the court to decree an increase or decrease in support when there is a significant variance between the guidelines and the current order, unless the variance resulted from a previously court-ordered deviation and the circumstances causing the deviation have not changed. The definition of significant variance is in the DHS child support guidelines rather than in the statute. The corpus does not contain the guidelines definition of significant variance (historically 15% or more). This should be confirmed from the current DHS rules before the modification step is treated as authoritative.","affected_steps":["CC-SUP-014"]}],"conflicts":[{"conflict_id":"CC-SUP-CONF-001","description":"T.C.A. § 36-5-103(f)(1)(C) provides that review and adjustment of child support orders in Title IV-D cases may be conducted by the court or by the department by issuance of an administrative order. T.C.A. § 36-5-103(f)(3) provides that methods for adjustment by administrative order shall be promulgated in the department's rules. The result is that in Title IV-D cases, the department may modify a support order by administrative order without court involvement, subject to the obligor's right to request an administrative hearing. This is in structural tension with Tenn. R. Civ. P. 60.02 under which modification of a court order ordinarily requires court action. Under the source hierarchy, the TCA statute at T.C.A. § 36-5-103(f) is a specific legislative grant of administrative authority that supersedes the general civil procedure rule for this limited purpose in Title IV-D cases. The conflict is resolved in favor of the TCA provision. Flagged because the administrative modification path bypasses the court and practitioners need to be aware that a court order may be modified without a court hearing in IV-D cases.","affected_steps":["CC-SUP-IVD-002"]},{"conflict_id":"CC-SUP-CONF-002","description":"T.C.A. § 36-5-101(e)(1)(A) establishes the child support guidelines as a rebuttable presumption applicable in all cases. T.C.A. § 36-6-405(c) provides that Title IV-D child support cases involving DHS or its contractors shall be bifurcated from the remaining parental responsibility issues, and that separate orders shall be issued concerning IV-D issues, which shall not be contained in or be part of temporary, permanent, or modified parenting plans. This creates a structural separation between parenting plan proceedings and IV-D child support proceedings. Under the source hierarchy, both are TCA provisions at the same level; the bifurcation requirement of § 36-6-405(c) is the specific provision applicable to IV-D cases and controls the procedural structure when DHS is a party. Non-IV-D support orders may be incorporated in a parenting plan; IV-D support orders may not.","affected_steps":["CC-SUP-010"]}],"local_rule_checks":[{"check_id":"CC-SUP-LRC-001","description":"Verify local rules for any domestic relations cover sheet or case designation form required at the time of filing a standalone child support petition, beyond the requirements of T.C.A. § 36-5-101 and Tenn. R. Civ. P. 3.","affected_steps":["CC-SUP-001"]},{"check_id":"CC-SUP-LRC-002","description":"Verify local rules for the use of a magistrate under T.C.A. § 36-5-401 et seq. in child support cases. Several judicial districts route initial child support hearings through a magistrate rather than directly to the circuit judge. The magistrate's recommended order is subject to de novo review by the circuit judge on timely objection.","affected_steps":["CC-SUP-005"]},{"check_id":"CC-SUP-LRC-003","description":"Verify local rules for any required financial disclosure statement or income verification form that must be filed or exchanged by the parties before the child support hearing. Several judicial districts require both parties to file a sworn income and expense statement on a court-approved form before the initial support hearing.","affected_steps":["CC-SUP-010"]},{"check_id":"CC-SUP-LRC-004","description":"Verify local rules for the handling of child support modification petitions, including whether modifications are heard on the regular civil docket or a specialized domestic relations docket, and whether any local standing order governs the exchange of updated income information before a modification hearing.","affected_steps":["CC-SUP-014"]},{"check_id":"CC-SUP-LRC-005","description":"Verify local rules and court practice for civil contempt proceedings for non-payment of child support, including whether the court uses a show-cause order or a motion for contempt, and whether the county has a designated process for enforcement of income assignment orders through the clerk's office.","affected_steps":["CC-SUP-015"]}],"steps":[{"step_id":"CC-SUP-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"Determine basis for standalone child support action and assess whether case is Title IV-D","citations":["T.C.A. § 36-5-101(a)","T.C.A. § 36-5-101(c)(1)","T.C.A. § 71-3-124"],"conditions":["A case becomes Title IV-D when DHS provides child support services pursuant to an assignment of support rights or an application for services under T.C.A. § 71-3-124; this occurs when the child or custodial parent receives TANF, TennCare-Medicaid, or foster care services, or when a party applies to DHS for child support services.","In Title IV-D cases, DHS or its contractors must be a party. T.C.A. § 36-5-103(f). Title IV-D filing fees are waived. T.C.A. § 36-5-2313(a)."],"next_steps":["CC-SUP-IVD-001","CC-SUP-002"],"decision_point":true,"notes":"[LOCAL RULE CHECK: CC-SUP-LRC-001] Decision point: Title IV-D cases proceed to CC-SUP-IVD-001; non-IV-D cases proceed to CC-SUP-002."},{"step_id":"CC-SUP-IVD-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Department of Children's Services","action":"Determine whether to pursue support establishment or modification by administrative order or court filing","citations":["T.C.A. § 36-5-802","T.C.A. § 36-5-803","T.C.A. § 36-5-101(c)(1)"],"conditions":["DHS may issue administrative orders for genetic testing to establish parentage without filing a court action; DHS pays costs and may recoup from the putative father upon establishment of parentage. T.C.A. § 36-5-802(1)(A)-(B).","If a court order is required, DHS files a petition in Circuit Court."],"next_steps":["CC-SUP-IVD-002","CC-SUP-002"],"decision_point":true,"notes":"Decision point: administrative modification proceeds to CC-SUP-IVD-002; court filing required proceeds to CC-SUP-002."},{"step_id":"CC-SUP-IVD-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Department of Children's Services","action":"Conduct administrative review and issue administrative support modification order","citations":["T.C.A. § 36-5-103(f)(1)(A)-(C)","T.C.A. § 36-5-103(f)(4)-(5)","T.C.A. § 36-5-501(b)(1)(A)-(C)","T.C.A. § 36-5-803(b)"],"conditions":["Three-year automatic review: DHS shall review and, if a significant variance exists, seek adjustment of IV-D orders at least every three years without any showing of changed circumstances. T.C.A. § 36-5-103(f)(1)(A).","Between three-year cycles: requesting party must demonstrate a substantial change of circumstances (significant variance under guidelines) for DHS to seek adjustment. T.C.A. § 36-5-103(f)(1)(B).","DHS may conduct the review and issue an administrative modification order without court action. Review and adjustment methods must be promulgated in DHS rules. T.C.A. § 36-5-103(f)(1)(C), (f)(3).","Obligor or obligee may request an administrative hearing to contest within 15 days of service. Administrative orders are filed with the clerk and entered in the court record. T.C.A. § 36-5-803(b). Either party may appeal the administrative decision to the court having jurisdiction. T.C.A. § 36-5-501(c)(2)."],"next_steps":["CC-SUP-011"],"decision_point":false,"notes":"[CONFLICT: CC-SUP-CONF-001] If a hearing is requested, the matter proceeds to CC-SUP-011 for judicial review of the administrative decision. If no hearing is requested, administrative order is final; proceed to CC-SUP-011."},{"step_id":"CC-SUP-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"File petition for child support with Circuit Court Clerk","citations":["T.C.A. § 36-5-101(a)","T.C.A. § 36-5-2311(a)-(b)","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["Petition must include: names, residential addresses, and Social Security numbers of obligor and obligee; names, sex, residential addresses, Social Security numbers, and dates of birth of each child; a copy of any existing support order from another tribunal; and the relief sought. T.C.A. § 36-5-2311(a)-(b).","DHS is not required to pay a filing fee in Title IV-D cases. T.C.A. § 36-5-2313(a). UIFSA procedures apply to interstate support orders. T.C.A. §§ 36-5-2101 et seq."],"next_steps":["CC-SUP-003"],"decision_point":false,"notes":"Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). [LOCAL RULE CHECK: CC-SUP-LRC-001] Proceeds to CC-SUP-003 (summons)."},{"step_id":"CC-SUP-003","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Circuit Court Clerk","action":"Issue summons and deliver to petitioner for service on respondent","citations":["Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.02"],"conditions":[],"next_steps":["CC-SUP-004"],"decision_point":false,"notes":"Proceeds to CC-SUP-004 (service of process)."},{"step_id":"CC-SUP-004","phase":"Service of Process","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"Effect service of process on respondent and file return of service","citations":["Tenn. R. Civ. P. 4.03","Tenn. R. Civ. P. 4.04"],"conditions":[],"next_steps":["CC-SUP-005"],"decision_point":false,"notes":"Proceeds to CC-SUP-005 (answer)."},{"step_id":"CC-SUP-005","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Respondent / Attorney","action":"File answer within 30 days of service and contest parentage if applicable","citations":["Tenn. R. Civ. P. 12.01","T.C.A. § 36-2-305(a)"],"conditions":["Respondent must file answer within 30 days after service. Tenn. R. Civ. P. 12.01. If parentage is contested, court must resolve parentage before establishing support; see CC-CUS-PAT-001 through CC-CUS-PAT-003.","In IV-D cases where DHS has established parentage by administrative order, parentage is presumed established and the hearing proceeds on the support amount only."],"next_steps":["CC-SUP-006"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-SUP-LRC-002] Proceeds to CC-SUP-006 (motion for temporary support)."},{"step_id":"CC-SUP-006","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"File motion for temporary child support order pending final hearing","citations":["T.C.A. § 36-5-101(a)","T.C.A. § 36-5-121(b)","Tenn. R. Civ. P. 6.04"],"conditions":["Court may enter a temporary support order based on verified income information from both parties. T.C.A. § 36-5-101(a), § 36-5-121(b)."],"next_steps":["CC-SUP-007"],"decision_point":false,"notes":"Step is triggered only if petitioner seeks immediate relief; not required in every case. Proceeds to CC-SUP-007."},{"step_id":"CC-SUP-007","phase":"Pleadings","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Judge","action":"Hear and rule on motion for temporary child support applying guidelines as rebuttable presumption","citations":["T.C.A. § 36-5-101(e)(1)(A)"],"conditions":["Court must apply child support guidelines as a rebuttable presumption. If the court finds evidence sufficient to rebut the presumption, it must make written findings that the guidelines amount would be unjust or inappropriate and state the justification for deviation. T.C.A. § 36-5-101(e)(1)(A)."],"next_steps":["CC-SUP-008"],"decision_point":false,"notes":"Proceeds to CC-SUP-008 (scheduling order)."},{"step_id":"CC-SUP-008","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Judge","action":"Enter scheduling order establishing deadlines for financial disclosure and final hearing","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26.01"],"conditions":[],"next_steps":["CC-SUP-009"],"decision_point":false,"notes":"Proceeds to CC-SUP-009 (discovery)."},{"step_id":"CC-SUP-009","phase":"Discovery","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"Conduct discovery on income, assets, and child-related expenses of both parties","citations":["T.C.A. § 36-5-101(e)","Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34"],"conditions":["Each party must disclose income, assets, and expenses relevant to the guidelines calculation. Discovery tools include interrogatories, requests for production of tax returns, pay stubs, bank statements, and business records. Tenn. R. Civ. P. 26, 33, 34."],"next_steps":["CC-SUP-010"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-SUP-LRC-003] Proceeds to CC-SUP-010 (support hearing)."},{"step_id":"CC-SUP-010","phase":"Trial","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Judge","action":"Conduct support hearing and determine amount under child support guidelines","citations":["T.C.A. § 36-5-101(e)(1)(A)","T.C.A. § 36-5-101(e)(1)(B)","T.C.A. § 36-5-101(h)","T.C.A. § 36-6-405(c)","Tenn. R. Civ. P. 52.01"],"conditions":["Court applies child support guidelines as a rebuttable presumption and determines the amount of support considering: gross income of both parties; parenting time allocation; work-related childcare costs; health insurance costs; extraordinary medical expenses; and other deviation factors. T.C.A. § 36-5-101(e).","If obligor's net income exceeds $10,000 per month, the custodial parent must prove by a preponderance that support in excess of the guidelines amount is reasonably necessary. T.C.A. § 36-5-101(e)(1)(B).","Court must order health insurance coverage for the child if accessible and available at a reasonable cost to either parent. T.C.A. § 36-5-101(h).","If the court deviates from the guidelines, it must make written findings stating the guidelines amount and the justification. T.C.A. § 36-5-101(e)(1)(A).","In IV-D cases, child support orders must be bifurcated from any parenting plan and issued as separate orders; DHS is not required to participate in mediation or dispute resolution as to child support issues. T.C.A. § 36-6-405(c)."],"next_steps":["CC-SUP-011"],"decision_point":false,"notes":"[GAP: CC-SUP-GAP-002] [CONFLICT: CC-SUP-CONF-002] [LOCAL RULE CHECK: CC-SUP-LRC-003] Proceeds to CC-SUP-011 (entry of final order)."},{"step_id":"CC-SUP-011","phase":"Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Judge","action":"Enter final child support order with income assignment and health insurance provisions","citations":["T.C.A. § 36-5-101(c)(1)-(2)","T.C.A. § 36-5-101(c)(2)(A)(i)-(ii)","T.C.A. § 36-5-116","T.C.A. § 36-5-501(a)(1)","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["Order must state the amount of monthly support; specify that all payments based upon income assignment be paid to the clerk of court for routing to the central collection and disbursement unit; include an income assignment order; include health insurance provisions; and state the current address of the parties unless disclosure would jeopardize a party's health, safety, or liberty. T.C.A. § 36-5-101(c)(1)-(2), § 36-5-116, § 36-5-501(a)(1).","Provisions requiring payment directly to an obligee in contravention of the central collection and disbursement unit requirements are void. T.C.A. § 36-5-501(a)(1)."],"next_steps":["CC-SUP-012"],"decision_point":false,"notes":"Proceeds to CC-SUP-012 (clerk entry and income assignment)."},{"step_id":"CC-SUP-012","phase":"Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Circuit Court Clerk","action":"Enter order in minute book, issue income assignment to employer, and route payments through central disbursement unit","citations":["T.C.A. § 36-5-116","T.C.A. § 36-5-501(a)(1)","T.C.A. § 36-5-501(b)(1)(A)","Tenn. R. Civ. P. 58"],"conditions":["Income assignment is mandatory upon entry of a support order; no additional court order is required. T.C.A. § 36-5-501(b)(1)(A).","Clerk must send notice to the obligor within two business days of issuing the income assignment to the employer. T.C.A. § 36-5-501(b)(2). Notice must include: amount owed; withholding amounts for current support and arrears; and the right to a hearing before the court within 15 days. T.C.A. § 36-5-501(b)(3)(D)."],"next_steps":["CC-SUP-013"],"decision_point":false,"notes":"Proceeds to CC-SUP-013 (post-judgment)."},{"step_id":"CC-SUP-013","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"File post-judgment motion or modification petition upon showing of significant variance","citations":["T.C.A. § 36-5-103(g)(1)","T.C.A. § 36-5-103(g)(3)-(4)","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Modification petition: court shall decree an increase or decrease when a significant variance is found between the guidelines and the current order, unless the variance resulted from a previously court-ordered deviation whose circumstances have not changed. T.C.A. § 36-5-103(g)(1).","Court shall not refuse to consider a modification petition because the party is in arrears unless the arrearage resulted from intentional action. T.C.A. § 36-5-103(g)(3). Birth or adoption of another child the obligor is legally responsible to support constitutes a substantial and material change of circumstances. T.C.A. § 36-5-103(g)(4)(A)."],"next_steps":["CC-SUP-014","CC-SUP-015"],"decision_point":false,"notes":"Proceeds to CC-SUP-014 (modification hearing) or CC-SUP-015 (enforcement), as applicable."},{"step_id":"CC-SUP-014","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Judge","action":"Hear and rule on modification petition applying current guidelines as rebuttable presumption","citations":["T.C.A. § 36-5-101(e)(1)(A)","T.C.A. § 36-5-103(g)(1)","Tenn. R. Civ. P. 52.01"],"conditions":["Court must apply current guidelines as a rebuttable presumption and determine whether a significant variance exists. If a significant variance exists and was not caused by a previously court-ordered deviation whose circumstances remain unchanged, the court must modify the order. T.C.A. § 36-5-103(g)(1).","If parties agree and announce the agreement on the record, the court is not required to make an independent determination; written findings satisfy Tenn. R. Civ. P. 52.01 if the court deviates."],"next_steps":["CC-SUP-011"],"decision_point":false,"notes":"[GAP: CC-SUP-GAP-003] [LOCAL RULE CHECK: CC-SUP-LRC-004] After modification hearing, a modified order is entered; proceed to CC-SUP-011."},{"step_id":"CC-SUP-015","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Judge","action":"Enforce child support order through income assignment, contempt, or license suspension","citations":["T.C.A. § 36-5-103(a)-(c)","T.C.A. § 36-5-104","T.C.A. § 36-5-501","T.C.A. § 36-5-701"],"conditions":["Enforcement mechanisms include: income assignment (mandatory and self-executing); civil contempt, which may include incarceration until compliance; license suspension under T.C.A. §§ 36-5-701 et seq.; posting of bond or personal surety; sequestration of rents and profits of obligor's real estate; appointment of a receiver; and imposition of a lien against real and personal property.","Court may award reasonable attorney fees to the prevailing party in any enforcement proceeding. T.C.A. § 36-5-103(c).","Judgments for child support are enforceable without limitation as to time. T.C.A. § 36-5-103(g) final sentence.","Workhouse or jail: any person ordered to provide support who fails to comply may, in the court's discretion, be imprisoned in the county workhouse or county jail for a period not to exceed six months. No arrest warrant shall issue for violation of a support order during a period of incarceration in which the obligor was otherwise unable to comply. T.C.A. § 36-5-104(a)-(b)."],"next_steps":["CC-SUP-016"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-SUP-LRC-005] Proceeds to CC-SUP-016 (termination) or CC-SUP-017 (appeal), as applicable."},{"step_id":"CC-SUP-016","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Circuit Court Clerk","action":"Terminate income assignment and support order upon child's emancipation","citations":["T.C.A. § 36-5-101(k)","T.C.A. § 36-5-103(g)(6)(A)-(C)","T.C.A. § 36-5-501(a)(3)(D)","T.C.A. § 36-5-503"],"conditions":["In non-IV-D cases: obligor may seek termination when child reaches age 18 and graduates from high school (or the class of which the child was a member when the child reached 18 has graduated), provided no arrearages are owed and court costs have been paid.","In IV-D cases: DHS must provide notice 90 days prior to the child's 18th birthday and, if conditions of T.C.A. § 36-5-103(g)(6)(B) are met, shall administratively terminate or modify the income assignment.","Support obligation may continue beyond age 18 for a disabled child. T.C.A. § 36-5-101(k)."],"next_steps":["CC-SUP-017"],"decision_point":false,"notes":"Proceeds to CC-SUP-017 (appeal), as applicable."},{"step_id":"CC-SUP-017","phase":"Appeal","court_type":"Circuit Court","case_type":"Domestic Relations - Child Support (Standalone)","actor":"Petitioner / Attorney","action":"File notice of appeal with Circuit Court Clerk within 30 days of entry of judgment","citations":["T.C.A. § 36-5-1003","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Notice of appeal must be filed within 30 days after entry of the judgment or order. Tenn. R. App. P. 4(a). Timely post-trial motion extends the period; it runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b).","In IV-D cases involving administrative orders, appeal from an administrative decision is to the court having jurisdiction of the support order under T.C.A. § 36-5-1003."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CC-SUP-Flowchart.html"},{"flow_id":"CH-CGD","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CH-CGD-GAP-001","affected_steps":["CH-CGD-001"],"description":"T.C.A. § 34-3-101(a) provides that actions for the appointment of a conservator may be brought in a court exercising probate jurisdiction or any other court of record of any county in which there is venue. T.C.A. § 16-11-108 grants Chancery Court concurrent jurisdiction with the county court over persons adjudicated incompetent and their estates. The allocation of conservatorship and guardianship cases between Chancery Court, probate court, and other courts of record varies significantly by county and is not determinable from statewide statutes alone. Verify the applicable court in each county during the local rules phase."},{"gap_id":"CH-CGD-GAP-002","affected_steps":["CH-CGD-002"],"description":"The filing fee for a conservatorship or guardianship petition in Chancery Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount is not available in the corpus fee schedule text. The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies in addition to the base filing fee. T.C.A. § 34-1-114(c) provides that the petitioner is responsible for the court costs necessary for initiating proceedings including filing fees."},{"gap_id":"CH-CGD-GAP-003","affected_steps":["CH-CGD-005"],"description":"T.C.A. § 34-3-104(7) requires the petition to include either a sworn examination report from the respondent's physician, psychologist, or senior psychological examiner, or a statement that the report has not yet been received but will be filed before the hearing, or a statement that the respondent refuses to be examined voluntarily. The corpus does not contain a rule or statute specifying the form or content of the examination report beyond T.C.A. § 34-3-105(c). The AOC should be consulted for any approved examination report form."},{"gap_id":"CH-CGD-GAP-004","affected_steps":["CH-CGD-012"],"description":"T.C.A. § 34-1-111 requires the conservator or guardian to file an annual accounting with the court but does not specify the deadline within the year by which the accounting must be filed relative to the anniversary of the appointment. T.C.A. § 34-1-131 requires the Clerk and Master to examine the annual accounting and make a report to the judge. The corpus does not contain a rule specifying the timing of the Clerk and Master's examination and report. Local rules should be verified for any specific accounting deadlines."}],"conflicts":[{"conflict_id":"CH-CGD-CONF-001","affected_steps":["CH-CGD-001"],"description":"T.C.A. § 34-3-101(a) allows conservatorship actions to be filed in a court exercising probate jurisdiction or any other court of record. T.C.A. § 16-11-108 grants Chancery Court concurrent jurisdiction with the county court over persons adjudicated incompetent and their estates. T.C.A. § 16-11-109 grants Chancery Court concurrent jurisdiction with the county court over the persons and estates of infants and the appointment and removal of guardians. The result is that conservatorship and guardianship petitions may properly be filed in Chancery Court, the probate court (where one exists and has jurisdiction), or another court of record. Under the source hierarchy, all three provisions are TCA statutes at the same level; no provision controls the others. The choice of court is a local practice determination. This flow applies to the Chancery Court path only."},{"conflict_id":"CH-CGD-CONF-002","affected_steps":["CH-CGD-003"],"description":"Conservatorship (T.C.A. § 34-3-101 et seq.) applies to adults with a disability -- defined as a person eighteen years of age or older who, due to a physical or mental condition, is substantially unable to provide for their own food, clothing, shelter, or care and treatment, or to manage their financial resources. T.C.A. § 34-1-101(7). Adult guardianship (T.C.A. § 34-2-101 et seq.) applies to a different legal standard -- a person who lacks sufficient capacity to make or communicate significant responsible decisions concerning their person. T.C.A. § 34-1-101(3). Both proceedings are structurally identical; the legal standard applied and the scope of authority granted differ. This flow treats both as a unified procedural track with the applicable standard flagged at each decision point where the distinction matters. Reviewers should confirm that the applicable chapter (Title 34, Chapter 2 for guardianship; Title 34, Chapter 3 for conservatorship) is correctly identified in each petition."}],"local_rule_checks":[{"check_id":"CH-CGD-LRC-001","affected_steps":["CH-CGD-001"],"description":"Verify by judicial district which court -- Chancery Court, probate court, or other court of record -- exercises primary jurisdiction over conservatorship and adult guardianship proceedings in that county. This flow applies only in counties where Chancery Court exercises this jurisdiction."},{"check_id":"CH-CGD-LRC-002","affected_steps":["CH-CGD-002"],"description":"Verify local rules for any required AOC-approved petition form for conservatorship or guardianship, any cover sheet requirements, and whether a proposed order of appointment must be filed with the petition."},{"check_id":"CH-CGD-LRC-003","affected_steps":["CH-CGD-007"],"description":"Verify local rules for the timing and procedure of guardian ad litem and attorney ad litem appointments in conservatorship and guardianship proceedings. T.C.A. § 34-3-106(a)(4) requires appointment of a guardian ad litem immediately upon filing. Some local districts have a standing list of GALs and attorney ad litems for these proceedings."},{"check_id":"CH-CGD-LRC-004","affected_steps":["CH-CGD-010"],"description":"Verify local rules for the conservator's or guardian's oath requirement and the form of the letters of conservatorship or guardianship issued by the Clerk and Master. T.C.A. § 34-1-108 requires a specific form of oath; T.C.A. § 34-1-129 governs the letters. Some local districts require letters to be renewed annually."},{"check_id":"CH-CGD-LRC-005","affected_steps":["CH-CGD-012"],"description":"Verify local rules for the annual accounting deadline, the format of the accounting required by the Clerk and Master, and the procedure for exceptions to the Clerk and Master's report on the accounting. T.C.A. § 34-1-131 requires the Clerk and Master to examine the annual accounting and make a report to the judge."}],"steps":[{"step_id":"CH-CGD-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"Determine applicable proceeding type and confirm Chancery Court jurisdiction","citations":["T.C.A. § 34-3-101(a)-(b)","T.C.A. § 34-1-101(3)","T.C.A. § 34-1-101(7)","T.C.A. § 16-11-108","T.C.A. § 16-11-109"],"conditions":["Conservatorship (T.C.A. Title 34, Chapter 3): applies to a person with a disability -- an adult who, due to a physical or mental condition, is substantially unable to provide for their own food, clothing, shelter, or care, or to manage their financial resources. T.C.A. § 34-1-101(7).","Adult guardianship (T.C.A. Title 34, Chapter 2): applies to a person who lacks sufficient capacity to make or communicate significant responsible decisions concerning their person. T.C.A. § 34-1-101(3).","The court may appoint a conservator, a guardian, or both in the same proceeding, with the authority of each limited to what is necessary and appropriate for the respondent's needs.","Venue: county of residence of the alleged person with a disability or person lacking capacity. For a person incarcerated in a Department of Correction facility, the county where the facility is located. T.C.A. § 34-3-101(b).","Chancery Court has concurrent jurisdiction with the county court over persons adjudicated incompetent and their estates, and over the persons and estates of persons requiring a guardian. T.C.A. § 16-11-108, § 16-11-109."],"next_steps":["CH-CGD-002"],"decision_point":false,"notes":"[GAP: CH-CGD-GAP-001] [CONFLICT: CH-CGD-CONF-001] [CONFLICT: CH-CGD-CONF-002] [LOCAL RULE CHECK: CH-CGD-LRC-001]"},{"step_id":"CH-CGD-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"File sworn petition for appointment of conservator or guardian with Clerk and Master and pay filing fee","citations":["T.C.A. § 34-3-102","T.C.A. § 34-3-104","T.C.A. § 34-1-114(c)","Tenn. R. Civ. P. 3"],"conditions":["Any person having knowledge of the circumstances necessitating the appointment may file the petition. T.C.A. § 34-3-102.","Petition must be sworn and must contain: name, date of birth, residence and mailing address of respondent; description of the nature of the alleged disability or incapacity; petitioner's name, age, residence, relationship to respondent, and any felony or misdemeanor convictions; proposed fiduciary's name, age, address, relationship, convictions, willingness to serve, and current background check results from the department of health's abuse registry and the national sex offender registry; names and addresses of closest relatives; summary of facts supporting appointment; name of respondent's physician or psychologist and either the sworn examination report, a statement the report has not been received but will be filed before the hearing, or a statement that respondent refuses examination voluntarily; and the rights proposed to be removed from respondent and transferred to fiduciary. T.C.A. § 34-3-104.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). Petitioner is responsible for court costs necessary for initiating proceedings. T.C.A. § 34-1-114(c)."],"next_steps":["CH-CGD-003"],"decision_point":false,"notes":"[GAP: CH-CGD-GAP-002] [LOCAL RULE CHECK: CH-CGD-LRC-002] Proceeds to CH-CGD-003 (emergency assessment)."},{"step_id":"CH-CGD-003","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Judge","action":"Assess whether emergency appointment is required before full hearing can be held","citations":["T.C.A. § 34-1-132(a)-(e)"],"conditions":["Emergency conservator or guardian may be appointed without full notice if the court finds compliance with standard procedures will likely result in substantial harm to the respondent's health, safety, or welfare, and no other person with authority and willingness to act is doing so in the respondent's best interest. T.C.A. § 34-1-132(a).","Emergency appointment without notice to respondent requires a sworn petition finding that respondent will be substantially harmed before a hearing can be held. T.C.A. § 34-1-132(b). If appointed without notice, respondent must be given notice within 48 hours. T.C.A. § 34-1-132(b). Court must hold a hearing within 5 days. T.C.A. § 34-1-132(b). These time periods are mandatory and not directory. T.C.A. § 34-1-132(e).","An attorney ad litem must be appointed immediately upon receipt of a petition for emergency guardianship or conservatorship. T.C.A. § 34-1-132(a).","Emergency appointment authority may not exceed 60 days. T.C.A. § 34-1-132(a). Emergency appointment is not a determination of incapacity. T.C.A. § 34-1-132(c)."],"next_steps":["CH-CGD-004"],"decision_point":false,"notes":"Decision point: if emergency appointment is granted, the standard proceeding continues on the full petition in parallel. Proceeds to CH-CGD-004 (notice and service)."},{"step_id":"CH-CGD-004","phase":"Service of Process","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Clerk and Master","action":"Issue notice to all required persons and effect service of process on respondent and required parties","citations":["T.C.A. § 34-3-105(a)(1)-(8)","T.C.A. § 34-1-128","Tenn. R. Civ. P. 4.04"],"conditions":["Notice of hearing must be served on: (1) the respondent personally; (2) the respondent's spouse and adult children, or if none, respondent's parents and adult siblings; (3) any person having care and custody of the respondent or with whom respondent is living; (4) any person serving as respondent's health care surrogate, attorney-in-fact under a durable power of attorney, or trustee; and (5) such other persons as the court directs. T.C.A. § 34-3-105(a).","Notice must contain: date, time, and place of hearing; nature of the proceeding and the rights that may be removed; the respondent's right to be present, to be represented by counsel, to present evidence, to cross-examine witnesses, and to appeal; and a statement that the court may appoint a guardian ad litem. T.C.A. § 34-3-105(a).","Clerk maintains docket books, minute books, and files for all guardianship and conservatorship cases and maintains an index or tickler for reporting deadlines. T.C.A. § 34-1-128."],"next_steps":["CH-CGD-005"],"decision_point":false,"notes":"Proceeds to CH-CGD-005 (medical examination)."},{"step_id":"CH-CGD-005","phase":"Pleadings","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Judge","action":"Order medical or psychological examination of respondent if not already submitted with petition","citations":["T.C.A. § 34-3-104(7)(C)","T.C.A. § 34-3-105(c)"],"conditions":["If respondent refuses voluntary examination, court may direct respondent to submit to a medical or psychological examination. T.C.A. § 34-3-104(7)(C).","Sworn examination report from respondent's physician, psychologist, or senior psychological examiner must be filed before the hearing. The report must contain the examiner's opinion as to the respondent's mental and physical condition and the basis for the opinion. T.C.A. § 34-3-105(c)."],"next_steps":["CH-CGD-006"],"decision_point":false,"notes":"[GAP: CH-CGD-GAP-003] Proceeds to CH-CGD-006 (priority of proposed fiduciary)."},{"step_id":"CH-CGD-006","phase":"Pleadings","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"Identify proposed conservator or guardian consistent with statutory priority order","citations":["T.C.A. § 34-3-103"],"conditions":["Subject to the court's determination of best interest, the court shall consider the following persons in order: (1) person designated in a writing signed by the respondent; (2) spouse of the person with a disability; (3) any child of the person with a disability; (4) closest relative or relatives; (5) a district public guardian; (6) other person or persons. T.C.A. § 34-3-103.","A corporate fiduciary such as a bank or trust company may be appointed as conservator of the estate; the court may appoint a separate individual as conservator of the person. T.C.A. § 34-3-103.","The court must conduct background checks on the proposed fiduciary including the department of health's abuse, neglect, and misappropriation registry and the national sex offender registry. T.C.A. § 34-3-104(4)(A)-(B)."],"next_steps":["CH-CGD-007"],"decision_point":false,"notes":"Proceeds to CH-CGD-007 (guardian ad litem and attorney ad litem appointment)."},{"step_id":"CH-CGD-007","phase":"Pleadings","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Judge","action":"Appoint guardian ad litem and, if not already represented, attorney ad litem for respondent","citations":["T.C.A. § 34-3-106(a)(4)","T.C.A. § 34-3-106(b)"],"conditions":["Respondent has the right at the hearing to: be present; be represented by counsel of respondent's choice, or if unable to obtain counsel, to have an attorney ad litem appointed by the court at no cost; present evidence and cross-examine witnesses; and appeal any final order. T.C.A. § 34-3-106(a)(1)-(4).","Guardian ad litem must be appointed immediately upon receipt of the petition; the GAL investigates the circumstances of the respondent and reports to the court. T.C.A. § 34-3-106(b).","Costs of proceedings, including GAL fees, attorney ad litem fees, and medical examination costs, may in the court's discretion be charged against the respondent's property to the extent it exceeds the supplemental security income eligibility limit, or against the petitioner or any other party. T.C.A. § 34-1-114(a)."],"next_steps":["CH-CGD-008"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-CGD-LRC-003] Proceeds to CH-CGD-008 (hearing on petition)."},{"step_id":"CH-CGD-008","phase":"Trial","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Judge","action":"Conduct hearing on petition for appointment of conservator or guardian","citations":["T.C.A. § 34-3-106","T.C.A. § 34-3-107(a)","Tenn. R. Civ. P. 52.01"],"conditions":["The hearing shall be held in a convenient location that minimizes trauma to the respondent; may be held at the respondent's residence, a hospital, or other care facility if in the respondent's best interest. T.C.A. § 34-3-106(c).","Respondent must be present unless the court, upon examination, determines that the respondent's presence would be contrary to respondent's health or safety. T.C.A. § 34-3-106(a).","For conservatorship: court must find by clear and convincing evidence that the respondent is a person with a disability as defined in T.C.A. § 34-1-101(7) and that the respondent's needs cannot be met by less restrictive alternatives. T.C.A. § 34-3-107(a).","For adult guardianship: court must find by clear and convincing evidence that the respondent lacks sufficient capacity to make or communicate significant responsible decisions concerning their person. T.C.A. § 34-1-101(3).","The court shall impose only the least restrictive form of intervention consistent with the respondent's needs and shall limit the authority of the fiduciary to that which is necessary and appropriate. T.C.A. § 34-3-107(a)(2)(A).","Court must make written findings of fact and conclusions of law. Tenn. R. Civ. P. 52.01."],"next
