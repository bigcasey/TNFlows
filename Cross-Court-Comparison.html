overy proceeding. Tenn. R. Crim. P. 5.1 Advisory Commission Comment.","Hearsay generally not admissible except: documentary proof of ownership and written reports of expert witnesses. Tenn. R. Crim. P. 5.1(a)(1)."],"next_steps":["GS-CRM-006"],"decision_point":false,"notes":"If probable cause is found, magistrate binds defendant over to the grand jury and either releases defendant or commits to jail; case exits this flow and proceeds through indictment to Circuit or Criminal Court. If probable cause is not found, defendant is discharged; discharge does not preclude a subsequent prosecution. Tenn. R. Crim. P. 5.1(b)-(c). Proceed to GS-CRM-006 only if case is resolved in General Sessions under full waiver. See GS-PRE flow for the preliminary hearing process on felonies."},{"step_id":"GS-CRM-005","phase":"Trial","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Judge","action":"Conduct trial on misdemeanor charge in General Sessions Court (full waiver path); hear evidence and enter verdict","citations":["Tenn. R. Crim. P. 5(c)(1)(C)(ii)","Tenn. R. Crim. P. 5(c)(2)(C)","T.C.A. § 40-1-109"],"conditions":["The full waiver trial proceeds to the bench only; there is no jury. The standard of proof is beyond a reasonable doubt.","Guilty plea: must be reduced to writing and signed by the defendant. T.C.A. § 40-1-109.","Not guilty plea trial: if defendant waives in writing the right to grand jury investigation and jury trial with DA's consent, the court may hear the not guilty plea case on the merits. The state may not appeal from a judgment of acquittal. The defendant may appeal a guilty judgment or the sentence, or both, to Circuit or Criminal Court for a trial de novo. Tenn. R. Crim. P. 5(c)(2)(C).","Statements made by the defendant at the General Sessions level are generally admissible in subsequent proceedings unless constitutional objections apply."],"next_steps":["GS-CRM-006"],"decision_point":false,"notes":"[CONFLICT: GS-CRM-CONF-001] Proceeds to GS-CRM-006 (sentencing and disposition)."},{"step_id":"GS-CRM-006","phase":"Judgment","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Judge","action":"Impose sentence on misdemeanor conviction; enter judgment in docket","citations":["Tenn. R. Crim. P. 5(c)(1)(C)(ii)","T.C.A. § 40-35-111(e)"],"conditions":["Sentence options for misdemeanors tried in General Sessions Court include: fine within the statutory maximum; jail term within the statutory maximum; suspended sentence with probation; or a combination.","Class A misdemeanor: maximum 11 months 29 days confinement, maximum fine $2,500 (or greater if otherwise provided by statute). Class B misdemeanor: maximum 6 months confinement, maximum fine $500. Class C misdemeanor: maximum 30 days confinement, maximum fine $50. T.C.A. § 40-35-111(e) (confirm against full corpus).","On a guilty plea to a misdemeanor after waiver of grand jury investigation and jury trial, the defendant may appeal but only as to the sentence imposed. Tenn. R. Crim. P. 5(c)(1)(C)(ii).","On a conviction after a not guilty plea trial with full waiver, the defendant may appeal the guilty judgment or the sentence, or both, to Circuit or Criminal Court for a trial de novo. Tenn. R. Crim. P. 5(c)(2)(C)."],"next_steps":["GS-CRM-007"],"decision_point":false,"notes":"[GAP: GS-CRM-GAP-001] [LOCAL RULE CHECK: GS-CRM-LRC-003] Proceeds to GS-CRM-007 (appeal or end)."},{"step_id":"GS-CRM-007","phase":"Appeal","court_type":"General Sessions Court","case_type":"Criminal (Misdemeanor Warrant Through Disposition)","actor":"Defendant / Attorney","action":"File notice of appeal to Circuit or Criminal Court within 10 days of judgment","citations":["T.C.A. § 27-5-108(a)(1)","T.C.A. § 27-3-131"],"conditions":["Any party dissatisfied with the judgment may appeal to Circuit or Criminal Court within 10 days of the judgment. T.C.A. § 27-5-108(a)(1). The appeal is a de novo trial in Circuit or Criminal Court.","Criminal misdemeanor appeals: the demand for a jury trial must be made at the time of filing the appeal in criminal misdemeanor cases. T.C.A. § 27-3-131. If not demanded at the time of filing, the right to a jury trial is waived.","Appellant must give bond with good security for the costs of the appeal, or take the oath for poor persons. T.C.A. § 27-5-103(a).","See CC-APP for the Circuit Court de novo appeal procedure for civil cases; criminal misdemeanor appeals follow a parallel de novo structure in Criminal Court."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for General Sessions proceedings. Case proceeds in Circuit or Criminal Court as a de novo trial on appeal."}],"source_file":"GS-CRM-Flowchart.html"},{"flow_id":"GS-ENV","court_type":"General Sessions Court","case_type":"Environmental Court (Where Applicable -- Jurisdictionally Limited)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"GS-ENV-GAP-001","affected_steps":["GS-ENV-001"],"description":"Environmental Court jurisdiction in Tennessee is not conferred by general statewide statute. It exists by local private act, ordinance, and metropolitan government charter in specific jurisdictions -- principally Davidson County (Nashville) and potentially others. The specific private acts and metropolitan government provisions establishing Environmental Court jurisdiction, the types of cases over which it has subject matter jurisdiction (code violations, housing standards, environmental ordinance violations), the penalty authority of the Environmental Court judge, and the appellate path from Environmental Court are not confirmed from the corpus. Title 4 and Title 7 (metropolitan government) provisions governing Environmental Court must be obtained and reviewed before this flow can be substantively developed. This entire flow is a SKELETON pending completion of the local rules phase and loading of the applicable private acts and metropolitan government provisions."},{"gap_id":"GS-ENV-GAP-002","affected_steps":["GS-ENV-002"],"description":"The substantive environmental, housing, and code enforcement ordinances over which the Environmental Court exercises jurisdiction are municipal ordinances of the applicable metropolitan governments, not statewide statutes. The corpus does not contain municipal ordinance text. These ordinances must be obtained from the applicable municipalities during the local rules phase."},{"gap_id":"GS-ENV-GAP-003","affected_steps":["GS-ENV-004"],"description":"The appellate path from Environmental Court -- specifically whether appeals go to Circuit Court under the general General Sessions appeal statute (T.C.A. § 27-5-108) or by a different mechanism specified in the applicable private act or charter -- is not confirmed from the corpus. The appeal mechanism must be confirmed from the private act and local rules."}],"conflicts":[],"local_rule_checks":[{"check_id":"GS-ENV-LRC-001","affected_steps":["GS-ENV-001"],"description":"ENTIRE FLOW IS A LOCAL RULES PHASE ITEM. Verify: (1) the specific private act or metropolitan government charter provision establishing Environmental Court jurisdiction; (2) the types of cases subject to Environmental Court jurisdiction; (3) whether the Environmental Court operates as a division of General Sessions Court or as a separate entity; (4) the applicable ordinance penalty authority; and (5) the appellate mechanism."}],"steps":[{"step_id":"GS-ENV-001","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Environmental Court (Where Applicable -- Jurisdictionally Limited)","actor":"Law Enforcement","action":"SKELETON -- Issue citation or complaint for environmental, housing, or code violation within the Environmental Court's jurisdiction","citations":[],"conditions":["JURISDICTIONAL NOTICE: Environmental Court is NOT a statewide court type. It exists only in specific jurisdictions by private act, ordinance, or metropolitan government charter -- principally Davidson County (Nashville). This flow skeleton applies only to those jurisdictions. The entire flow must be substantively developed during the local rules phase.","The types of violations over which Environmental Court has jurisdiction, the penalty authority of the Environmental Court, and the applicable substantive law are all locally determined. No statewide citation is available."],"next_steps":["GS-ENV-002"],"decision_point":false,"notes":"[GAP: GS-ENV-GAP-001] [GAP: GS-ENV-GAP-002] [LOCAL RULE CHECK: GS-ENV-LRC-001]"},{"step_id":"GS-ENV-002","phase":"Pleadings","court_type":"General Sessions Court","case_type":"Environmental Court (Where Applicable -- Jurisdictionally Limited)","actor":"Defendant / Attorney","action":"SKELETON -- Respondent appears at scheduled hearing and responds to citation or complaint","citations":[],"conditions":["SKELETON -- Substantive content to be developed during local rules phase. Confirm: whether the respondent is the property owner, occupant, or both; the procedure for continuances; and whether the court may order remediation in addition to or in lieu of a fine."],"next_steps":["GS-ENV-003"],"decision_point":false,"notes":"[GAP: GS-ENV-GAP-001] [LOCAL RULE CHECK: GS-ENV-LRC-001]"},{"step_id":"GS-ENV-003","phase":"Trial","court_type":"General Sessions Court","case_type":"Environmental Court (Where Applicable -- Jurisdictionally Limited)","actor":"Judge","action":"SKELETON -- Conduct hearing on the citation or complaint and enter order","citations":[],"conditions":["SKELETON -- Substantive content to be developed during local rules phase. Confirm: the standard of proof applicable to code violation proceedings; the remediation order authority of the court; the penalty schedule; and any special hearing procedures (e.g., in rem proceedings against the property itself)."],"next_steps":["GS-ENV-004"],"decision_point":false,"notes":"[GAP: GS-ENV-GAP-001] [LOCAL RULE CHECK: GS-ENV-LRC-001]"},{"step_id":"GS-ENV-004","phase":"Appeal","court_type":"General Sessions Court","case_type":"Environmental Court (Where Applicable -- Jurisdictionally Limited)","actor":"Petitioner / Attorney","action":"SKELETON -- File appeal from Environmental Court order to the applicable appellate court","citations":["T.C.A. § 27-5-108(a)(1)"],"conditions":["SKELETON -- The appellate mechanism must be confirmed from the applicable private act and local rules. If appeals follow the general General Sessions appeal statute, the appeal period is 10 days and the trial on appeal is de novo in Circuit Court. T.C.A. § 27-5-108(a)(1). However, the applicable private act or charter may specify a different appeal mechanism."],"next_steps":[],"decision_point":false,"notes":"[GAP: GS-ENV-GAP-003] [LOCAL RULE CHECK: GS-ENV-LRC-001] TERMINAL STEP SKELETON. Appellate mechanism to be confirmed during local rules phase."}],"source_file":"GS-ENV-Flowchart.html"},{"flow_id":"GS-OOP","court_type":"General Sessions Court","case_type":"Order of Protection","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"GS-OOP-GAP-001","affected_steps":["GS-OOP-001"],"description":"T.C.A. § 36-3-601 defines 'domestic abuse victim,' 'stalking,' 'sexual assault,' and other covered categories for order of protection jurisdiction. The corpus contains the current definitions by reference in § 36-3-602 but the full definitional text of § 36-3-601 including all qualifying relationships and offense types was updated in 2025 (Acts 2025, ch. 62 and ch. 265). The current definitional text should be confirmed from the most recent corpus version to ensure all covered relationships and offense types are accurately reflected in this flow."}],"conflicts":[{"conflict_id":"GS-OOP-CONF-001","affected_steps":["GS-OOP-001"],"description":"General Sessions Court has concurrent jurisdiction with Circuit Court over orders of protection. T.C.A. § 36-3-602 provides that any domestic abuse victim, stalking victim, sexual assault victim, observation without consent victim, or unlawful photography victim may file a petition 'under this part' without specifying which court exclusively. T.C.A. § 16-15-501(d)(1) notes that general sessions judges have jurisdiction to issue restraining orders and enforce the penalty provisions for violation of those orders. In practice, the General Sessions Court is the primary venue for order of protection petitions because it is accessible at all hours and has jurisdiction to issue ex parte orders; Circuit Court petitions are also available. Under the source hierarchy, both provisions are at the same TCA level; no conflict exists as to authority, but the choice of court is a local practice determination."}],"local_rule_checks":[{"check_id":"GS-OOP-LRC-001","affected_steps":["GS-OOP-001"],"description":"Verify local procedures for after-hours order of protection filings, including whether the county has a designated judicial commissioner or duty judge available to issue ex parte orders outside normal court hours, and the local law enforcement agency's role in facilitating after-hours filings under T.C.A. § 36-3-601(h)."},{"check_id":"GS-OOP-LRC-002","affected_steps":["GS-OOP-006"],"description":"Verify local procedures for enforcement of orders of protection, including the local law enforcement agency's protocol for entry of orders of protection into the statewide registry, the local process for reporting violations, and the availability of a contempt docket in the General Sessions Court."}],"steps":[{"step_id":"GS-OOP-001","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"Petitioner / Attorney","action":"File sworn petition for order of protection with General Sessions Court Clerk","citations":["T.C.A. § 36-3-602","T.C.A. § 36-3-604","T.C.A. § 36-3-617"],"conditions":["Eligible petitioners: any domestic abuse victim, stalking victim, sexual assault victim, observation without consent victim, unlawful photography victim, or victim of a human trafficking offense who has been subjected to, threatened with, or placed in fear of the specified conduct. T.C.A. § 36-3-602(a).","Petition for a minor: must be signed by a parent or guardian unless signed by a caseworker at a qualifying not-for-profit organization (not against the minor's parent or guardian). A copy must be served on the minor's parents unless service would create a threat of serious harm to the minor. T.C.A. § 36-3-602(b).","Venue: county where the respondent resides or where the conduct occurred. If the respondent is not a Tennessee resident, the petition may be filed in the county where the petitioner resides. T.C.A. § 36-3-602(c).","Filing fees: no domestic abuse victim, stalking victim, sexual assault victim, observation without consent victim, unlawful photography victim, or victim of a qualifying felony offense shall be required to bear any costs associated with the filing, issuance, registration, service, or enforcement of an order of protection petition or ex parte order. If an order of protection is issued or extended, all costs shall be assessed against the respondent. T.C.A. § 36-3-617(a)(1).","Clerk must provide AOC-approved petition forms and assist unrepresented petitioners in completing the form; all pro se petitions shall be liberally construed procedurally. T.C.A. § 36-3-604(a).","Law enforcement officer filing: an officer responding to a domestic abuse incident may file a petition on behalf of the victim with the victim's written consent; the ex parte order may be sought regardless of time of day. T.C.A. § 36-3-601(h)."],"next_steps":["GS-OOP-002"],"decision_point":false,"notes":"[GAP: GS-OOP-GAP-001] [CONFLICT: GS-OOP-CONF-001] [LOCAL RULE CHECK: GS-OOP-LRC-001]"},{"step_id":"GS-OOP-002","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"Judge","action":"Review petition; determine whether to issue ex parte order of protection immediately","citations":["T.C.A. § 36-3-605(a)"],"conditions":["Upon filing of the petition, the court may immediately, for good cause shown, issue an ex parte order of protection. An immediate and present danger of abuse to the petitioner constitutes good cause. T.C.A. § 36-3-605(a).","Ex parte order: may be issued without notice to the respondent based on the petitioner's sworn allegations alone.","General Sessions judge who is not a licensed attorney must appoint an attorney referee to hear charges of criminal contempt. T.C.A. § 36-3-606 (lifetime order context; applies to contempt proceedings generally).","If an ex parte order is issued outside normal court hours, the petition and order must be filed with the court no later than two business days after issuance. T.C.A. § 36-3-601(h)(3)(A)."],"next_steps":["GS-OOP-003"],"decision_point":false,"notes":"Decision point within this step: if ex parte order issued, it remains in effect until the hearing. If no ex parte order issued, the matter is set for hearing. Proceeds to GS-OOP-003 (service on respondent)."},{"step_id":"GS-OOP-003","phase":"Service of Process","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"General Sessions Court Clerk","action":"Effect personal service of ex parte order, petition, and notice of hearing date on respondent","citations":["T.C.A. § 36-3-605(b)-(c)","T.C.A. § 36-3-609"],"conditions":["The court must cause a copy of the petition and notice of the hearing date, as well as any ex parte order, to be served on the respondent at least five days prior to the hearing. T.C.A. § 36-3-605(c).","An ex parte order must be personally served on the respondent; if the respondent is not a Tennessee resident, service is by the procedures of T.C.A. §§ 20-2-215 and 20-2-216. T.C.A. § 36-3-605(c).","Notice must advise the respondent that the respondent may be represented by counsel.","The order of protection must be entered into the statewide registry of orders of protection upon issuance. T.C.A. § 36-3-609.","If an officer-filed petition: the court must serve the petition, notice of hearing date, and ex parte order on the respondent per § 36-3-605(c); a hearing must be held within 15 days of service. T.C.A. § 36-3-601(h)(4)."],"next_steps":["GS-OOP-004"],"decision_point":false,"notes":"Proceeds to GS-OOP-004 (full hearing within 15 days of service)."},{"step_id":"GS-OOP-004","phase":"Trial","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"Judge","action":"Conduct full hearing on petition within 15 days of service of ex parte order on respondent","citations":["T.C.A. § 36-3-605(b)"],"conditions":["The full hearing must be held within 15 days of service of the ex parte order on the respondent. T.C.A. § 36-3-605(b).","If no ex parte order was issued, the full hearing is set promptly and the ex parte order remains in effect until the time of the hearing even if the hearing is held within 15 days.","Standard of proof: preponderance of the evidence that the petitioner is a victim of domestic abuse, stalking, sexual exploitation of a minor, sexual assault, a human trafficking offense, observation without consent, or unlawful photography. T.C.A. § 36-3-605(b).","Both parties may be represented by counsel; the respondent has the right to present evidence and cross-examine witnesses.","If the petitioner has proved the allegation by a preponderance of the evidence, the court shall extend the order of protection for a definite period not to exceed one year; the order may be continued for further one-year periods upon proper showing and after further hearings. T.C.A. § 36-3-605(b).","Firearm prohibition: if the order fully complies with 18 U.S.C. § 922(g)(8), the respondent must transfer possession of all firearms within 48 hours of the granting of the order. T.C.A. § 36-3-604(c)(1). It is a federal criminal offense to possess a firearm while subject to such an order. T.C.A. § 36-3-604(c)(2).","Lifetime order: if petitioner proves respondent was convicted of a qualifying offense and that petitioner was the victim, the court must issue a lifetime order of protection. T.C.A. § 36-3-606(e)."],"next_steps":["GS-OOP-005","GS-OOP-006"],"decision_point":true,"notes":"Decision point: petitioner proves allegations by preponderance, order of protection issued or extended, proceeds to GS-OOP-005 (registration and enforcement); petitioner does not prove allegations, ex parte order dissolved, proceeds to GS-OOP-007 (dismissal)."},{"step_id":"GS-OOP-005","phase":"Judgment","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"General Sessions Court Clerk","action":"Enter order of protection in statewide registry; serve copies on respondent and local law enforcement","citations":["T.C.A. § 36-3-609","T.C.A. § 36-3-617(a)(1)"],"conditions":["Order must be entered into the statewide registry of orders of protection and transmitted to local law enforcement having jurisdiction where the petitioner resides. T.C.A. § 36-3-609.","All court costs, filing fees, and litigation taxes are assessed against the respondent when an order of protection is issued or extended. T.C.A. § 36-3-617(a)(1).","The order is valid and enforceable in every county of the state. T.C.A. § 36-3-609.","Full faith and credit: Tennessee orders of protection must be given full faith and credit by all other states. Federal law, 18 U.S.C. § 2265."],"next_steps":["GS-OOP-006"],"decision_point":false,"notes":"Proceeds to GS-OOP-006 (enforcement and contempt if violated; modification and renewal proceedings)."},{"step_id":"GS-OOP-006","phase":"Post-Judgment","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"Judge","action":"Enforce order of protection through contempt proceedings upon violation; renew order upon petition before expiration","citations":["T.C.A. § 36-3-610","T.C.A. § 36-3-612","T.C.A. § 36-3-605(b)"],"conditions":["Violation of an order of protection is a criminal offense; the violating party shall be arrested by a law enforcement officer and brought before the court without unnecessary delay. T.C.A. § 36-3-610.","Contempt hearing: upon violation, the court sets a hearing within 10 working days after arrest (unless extended by the court on the defendant's motion). T.C.A. § 36-3-612(a)(1).","A General Sessions judge has the same power as a court of record to punish violations of orders of protection for contempt. A nonlawyer judge must appoint an attorney referee to hear charges of criminal contempt. T.C.A. § 36-3-606(h)(1).","Renewal: upon proper showing of cause, an order of protection may be continued for further definite one-year periods after a further hearing requested by either party. T.C.A. § 36-3-605(b).","If an order of protection is in effect when a divorce is filed, the order remains in effect until the divorce court modifies or dissolves it, or makes it part of the divorce decree. T.C.A. § 36-3-603."],"next_steps":["GS-OOP-008"],"decision_point":false,"notes":"[LOCAL RULE CHECK: GS-OOP-LRC-002] Proceeds to GS-OOP-008 (appeal) if contested."},{"step_id":"GS-OOP-007","phase":"Judgment","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"Judge","action":"Dissolve ex parte order and dismiss petition if petitioner fails to prove allegations by preponderance","citations":["T.C.A. § 36-3-617(a)(2)"],"conditions":["If the court does not issue or extend an order of protection, the court may assess costs against the petitioner only if the court finds by clear and convincing evidence that the petitioner is not a qualifying victim AND that the petitioner knew the allegation was false at the time the petition was filed. T.C.A. § 36-3-617(a)(2)."],"next_steps":["GS-OOP-008"],"decision_point":false,"notes":"TERMINAL STEP unless appealed. Proceeds to GS-OOP-008 (appeal) if either party appeals."},{"step_id":"GS-OOP-008","phase":"Appeal","court_type":"General Sessions Court","case_type":"Order of Protection","actor":"Petitioner / Attorney","action":"File notice of appeal to Circuit Court within 10 days of judgment on the order of protection petition","citations":["T.C.A. § 27-5-108(a)(1)"],"conditions":["Either party may appeal the General Sessions Court's ruling on the order of protection petition to Circuit Court within 10 days. The trial on appeal is de novo. T.C.A. § 27-5-108(a)(1).","Appellant must give bond or take the pauper's oath before appeal is granted. T.C.A. § 27-5-103(a). No costs may be assessed against a qualifying victim for the appeal of an order of protection. T.C.A. § 36-3-617(a)(1).","During the pendency of the appeal, any existing order of protection remains in effect."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for General Sessions proceedings. Case proceeds in Circuit Court as a de novo hearing on appeal."}],"source_file":"GS-OOP-Flowchart.html"},{"flow_id":"GS-PRE","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"GS-PRE-GAP-001","affected_steps":["GS-PRE-002"],"description":"Pretrial release in General Sessions Court following arrest on a felony charge is governed by T.C.A. §§ 40-11-101 et seq. (bail and recognizance statutes). The corpus contains references to pretrial release but the full text of the bail statutes -- including the factors the court must consider in setting bail for felony defendants, the schedule of bailable and non-bailable offenses, and the specific procedures for preventive detention hearings -- are not confirmed from the corpus. The pretrial release step should be confirmed against the full corpus of T.C.A. Title 40, Chapter 11 before this flow is treated as authoritative for bail-related content."}],"conflicts":[{"conflict_id":"GS-PRE-CONF-001","affected_steps":["GS-PRE-005"],"description":"Tenn. R. Crim. P. 5(e)(4) provides that if an indictment or presentment is returned against a defendant who has not waived the right to a preliminary hearing, the circuit or criminal court shall dismiss the indictment or presentment on motion of the defendant filed not more than 30 days from arraignment, and the case shall be remanded to the general sessions court for a preliminary hearing. This creates a direct tension between the state's ability to seek an indictment before the preliminary hearing and the defendant's right to a preliminary hearing. The rule resolves this in favor of the defendant's right by requiring dismissal and remand -- but the dismissal is without prejudice to a subsequent indictment or presentment. Flagged because this is a common procedural pitfall where early indictments are used to bypass the preliminary hearing, and the remedy (dismissal and remand) must be actively pursued by the defendant."}],"local_rule_checks":[{"check_id":"GS-PRE-LRC-001","affected_steps":["GS-PRE-002"],"description":"Verify local rules for bail setting in felony cases in General Sessions Court, including whether the local court uses a standard bail schedule, the local policy for preventive detention in serious felony cases, and the procedure for bail review hearings."},{"check_id":"GS-PRE-LRC-002","affected_steps":["GS-PRE-004"],"description":"Verify local rules for the preliminary hearing docket in the local judicial district, including whether preliminary hearings are routinely continued, the local DA's office policy on engaging in plea discussions before the preliminary hearing, and whether the local court has a standard protocol for waiver of preliminary hearing in exchange for a plea agreement."}],"steps":[{"step_id":"GS-PRE-001","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Law Enforcement","action":"Arrest defendant on felony charge and bring before General Sessions Court magistrate without unnecessary delay","citations":["Tenn. R. Crim. P. 5(a)(1)","Tenn. R. Crim. P. 4"],"conditions":["Any person arrested -- except upon a capias pursuant to an indictment or presentment -- shall be taken without unnecessary delay before the nearest appropriate magistrate. Tenn. R. Crim. P. 5(a)(1).","General Sessions Court does not try felonies on the merits. The General Sessions Court's role in felony cases is limited to: the initial appearance, pretrial release determination, preliminary hearing, and, if probable cause is found, binding the defendant over to the grand jury.","If arrested without a warrant, an affidavit of complaint shall be filed promptly. Tenn. R. Crim. P. 5(a)(2)."],"next_steps":["GS-PRE-002"],"decision_point":false,"notes":"Proceeds to GS-PRE-002 (initial appearance and rights advisement)."},{"step_id":"GS-PRE-002","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Judge","action":"Conduct initial appearance; advise defendant of felony charge and rights; determine pretrial release","citations":["Tenn. R. Crim. P. 5(d)(1)","Tenn. R. Crim. P. 26"],"conditions":["For felonies, the defendant shall not be called on to plead at the initial appearance. The magistrate must advise the defendant of: (A) the charge and the contents of the affidavit of complaint; (B) the right to counsel; (C) the right to appointed counsel if indigent; (D) the right to remain silent and give no statement; (E) that any voluntary statement may be used against the defendant; (F) the general circumstances for pretrial release; and (G) the right to a preliminary hearing. Tenn. R. Crim. P. 5(d)(1).","Right to counsel: the magistrate must inform the defendant of the right to appointed counsel if indigent. Counsel must be appointed as early as practicable before any critical stage of the proceedings. Tenn. R. Crim. P. 44.","Pretrial release: the court sets bail or conditions of release based on applicable statutory factors. [GAP: GS-PRE-GAP-001]"],"next_steps":["GS-PRE-003"],"decision_point":false,"notes":"[GAP: GS-PRE-GAP-001] [LOCAL RULE CHECK: GS-PRE-LRC-001] Proceeds to GS-PRE-003 (preliminary hearing waiver determination)."},{"step_id":"GS-PRE-003","phase":"Pleadings","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Defendant / Attorney","action":"Determine whether defendant waives preliminary hearing or demands it; schedule preliminary hearing if demanded","citations":["Tenn. R. Crim. P. 5(d)(2)-(3)","Tenn. R. Crim. P. 5(e)(1)-(2)"],"conditions":["Waiver of preliminary hearing: the defendant may waive the preliminary hearing in writing, in which case the magistrate promptly binds the defendant over to the grand jury. Tenn. R. Crim. P. 5(d)(2).","Demand for preliminary hearing: if the defendant does not waive, the magistrate schedules a preliminary hearing within 14 days if the defendant remains in custody and within 30 days if released, computed from the date of the defendant's appearance before the magistrate. Tenn. R. Crim. P. 5(d)(3).","Waiver by failure to appear: a defendant waives the right to a preliminary hearing by failing to appear for a scheduled preliminary hearing, unless the defendant presents within 14 days clear and convincing evidence that the absence was beyond the defendant's control. Tenn. R. Crim. P. 5(e)(2).","Extension of time: with the defendant's consent and upon showing of good cause, the magistrate may extend the hearing schedule one or more times. Without the defendant's consent, extension requires extraordinary circumstances and that justice requires the delay. Tenn. R. Crim. P. 5(e).","ANY DEFENDANT ARRESTED ON A WARRANT OR CRIMINAL SUMMONS PRIOR TO INDICTMENT OR PRESENTMENT IS ENTITLED TO A PRELIMINARY HEARING. This right cannot be defeated by an early indictment or presentment obtained before the hearing. Tenn. R. Crim. P. 5(e)(1)."],"next_steps":["GS-PRE-004"],"decision_point":true,"notes":"[LOCAL RULE CHECK: GS-PRE-LRC-002] Decision point: defendant waives preliminary hearing, magistrate binds over to grand jury, proceed to GS-PRE-006; defendant demands preliminary hearing, proceed to GS-PRE-004."},{"step_id":"GS-PRE-004","phase":"Trial","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Judge","action":"Conduct preliminary hearing to determine whether probable cause exists that a crime was committed and that the defendant committed it","citations":["Tenn. R. Crim. P. 5.1(a)","Tenn. R. Crim. P. 5(e)(3)"],"conditions":["Purpose: the preliminary hearing is a probable cause determination -- it is not a discovery proceeding, a mini-trial, or a fishing expedition. The magistrate controls the scope of the hearing. Tenn. R. Crim. P. 5.1 Advisory Commission Comment.","The magistrate need not hear more of the state's proof than is necessary to establish probable cause; the magistrate may terminate the hearing at any time that probable cause has been established and the defendant has had the opportunity to cross-examine witnesses and present defense proof tending to rebut probable cause.","Standard: the state must establish that an offense has been committed and there is probable cause to believe the defendant committed it.","Evidence: hearsay is generally not admissible except for documentary proof of ownership and written reports of expert witnesses. Tenn. R. Crim. P. 5.1(a)(1).","The proceedings must be preserved by electronic recording or its equivalent. If the defendant is subsequently indicted, the recording must be made available to the defendant or defense counsel. Tenn. R. Crim. P. 5.1(a)(3).","Preliminary hearings shall be conducted as expeditiously as possible. Tenn. R. Crim. P. 5(e)(3).","No plea shall be accepted at the preliminary hearing.","The defendant may call defense witnesses, cross-examine state witnesses, and present evidence tending to rebut probable cause. Tenn. R. Crim. P. 5.1(a)(2)."],"next_steps":["GS-PRE-005","GS-PRE-006"],"decision_point":true,"notes":"Decision point: probable cause found proceeds to GS-PRE-005 (bind over); probable cause not found proceeds to GS-PRE-007 (discharge)."},{"step_id":"GS-PRE-005","phase":"Judgment","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Judge","action":"Enter written order binding defendant over to the grand jury; release defendant or commit to jail","citations":["Tenn. R. Crim. P. 5.1(b)","Tenn. R. Crim. P. 5.1(d)"],"conditions":["When the magistrate determines probable cause exists, the magistrate shall bind the defendant over to the grand jury and either release the defendant pursuant to applicable law or commit the defendant to jail by a written order. Tenn. R. Crim. P. 5.1(b).","The magistrate shall promptly transmit to the criminal court clerk all papers and records in the proceedings. Tenn. R. Crim. P. 5.1(d).","HANDOFF TO CRIMINAL COURT: Upon bind-over, the case exits General Sessions Court and enters the criminal court system for grand jury presentation. If the grand jury returns an indictment or presentment, the defendant proceeds to arraignment in Criminal Court. NOTE: The abbreviation for the receiving flow will be confirmed when the Criminal Court felony flow is built; reference that flow as CR-FEL pending confirmation."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for General Sessions proceedings. Case proceeds to grand jury and, upon indictment or presentment, to Criminal Court (CR-FEL -- abbreviation to be confirmed when Criminal Court flows are built)."},{"step_id":"GS-PRE-006","phase":"Judgment","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Judge","action":"Bind defendant over to grand jury upon waiver of preliminary hearing; transmit papers to criminal court clerk","citations":["Tenn. R. Crim. P. 5(d)(2)","Tenn. R. Crim. P. 5.1(d)"],"conditions":["Upon written waiver of the preliminary hearing by the defendant, the magistrate promptly binds the defendant over to the grand jury and transmits all papers and records to the criminal court clerk. Tenn. R. Crim. P. 5(d)(2), 5.1(d).","The defendant's right to a preliminary hearing is preserved and cannot be defeated by the state obtaining an early indictment. Tenn. R. Crim. P. 5(e)(4). See GS-PRE-CONF-001."],"next_steps":[],"decision_point":false,"notes":"[CONFLICT: GS-PRE-CONF-001] TERMINAL STEP for General Sessions proceedings. Case proceeds to grand jury and, upon indictment or presentment, to Criminal Court (CR-FEL -- abbreviation to be confirmed when Criminal Court flows are built)."},{"step_id":"GS-PRE-007","phase":"Judgment","court_type":"General Sessions Court","case_type":"Preliminary Hearing (Felony -- Bound Over to Grand Jury)","actor":"Judge","action":"Discharge defendant when probable cause is not found at the preliminary hearing","citations":["Tenn. R. Crim. P. 5.1(c)"],"conditions":["When the magistrate determines there is not sufficient proof to establish that an offense was committed or probable cause that the defendant committed it, the magistrate shall discharge the defendant. Tenn. R. Crim. P. 5.1(c).","Discharge does not preclude the state from instituting a subsequent prosecution for the same offense. The recording of the preliminary hearing must be made available to the defendant in the event the defendant is subsequently prosecuted by indictment or presentment. Tenn. R. Crim. P. 5.1(c).","When probable cause is not found, the magistrate returns the records and papers to the General Sessions Court clerk. Tenn. R. Crim. P. 5.1(d)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Discharge ends the General Sessions Court proceedings for purposes of this flow. State may subsequently seek indictment or presentment."}],"source_file":"GS-PRE-Flowchart.html"},{"flow_id":"GS-TRF","court_type":"General Sessions Court","case_type":"Traffic","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"GS-TRF-GAP-001","affected_steps":["GS-TRF-004"],"description":"The points system and license suspension procedures administered by the Department of Safety upon conviction of certain traffic offenses (T.C.A. §§ 55-50-501 et seq.) are referenced in this flow by general citation. The corpus does not contain the full text of Title 55, Chapter 50 (Uniform Operator's and Chauffeur's License Act), including the specific point values assigned to each offense and the thresholds triggering suspension. These should be confirmed from the full corpus or from the Department of Safety administrative rules before the Department of Safety reporting step is treated as authoritative."}],"conflicts":[],"local_rule_checks":[{"check_id":"GS-TRF-LRC-001","affected_steps":["GS-TRF-001"],"description":"Verify whether the local General Sessions Court maintains a separate traffic docket and whether traffic matters are heard by a dedicated traffic magistrate or on the general criminal docket. Several large counties use dedicated traffic courts."},{"check_id":"GS-TRF-LRC-002","affected_steps":["GS-TRF-003"],"description":"Verify local rules for the handling of traffic citations, including whether the local court accepts pleas by mail, online, or by payment of a fine without personal appearance for non-criminal traffic infractions."}],"steps":[{"step_id":"GS-TRF-001","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Traffic","actor":"Law Enforcement","action":"Issue traffic citation (uniform citation) or arrest defendant for criminal traffic offense","citations":["T.C.A. § 55-10-207","Tenn. R. Crim. P. 3.5"],"conditions":["Non-criminal traffic infractions (most traffic violations): law enforcement officer issues a uniform citation requiring the defendant to appear before the court at a designated time or to pay the stated fine.","Criminal traffic offenses (DUI, vehicular assault, reckless driving, driving on a revoked license): the officer may arrest the defendant or issue a citation pursuant to Tenn. R. Crim. P. 3.5. Criminal traffic offenses are prosecuted in General Sessions Court as misdemeanors; see GS-CRM for the parallel criminal misdemeanor procedure.","The General Sessions Court has jurisdiction over all traffic matters not expressly reserved to another court by statute."],"next_steps":["GS-TRF-002"],"decision_point":false,"notes":"[LOCAL RULE CHECK: GS-TRF-LRC-001] Proceeds to GS-TRF-002 (docketing and notice)."},{"step_id":"GS-TRF-002","phase":"Case Initiation","court_type":"General Sessions Court","case_type":"Traffic","actor":"General Sessions Court Clerk","action":"Docket the traffic citation; schedule hearing date","citations":["T.C.A. § 16-15-402"],"conditions":[],"next_steps":["GS-TRF-003"],"decision_point":false,"notes":"[LOCAL RULE CHECK: GS-TRF-LRC-002] Proceeds to GS-TRF-003 (defendant's response)."},{"step_id":"GS-TRF-003","phase":"Pleadings","court_type":"General Sessions Court","case_type":"Traffic","actor":"Defendant / Attorney","action":"Appear at scheduled hearing and enter plea; or pay fine in lieu of appearance if local practice permits","citations":["Tenn. R. Crim. P. 5(b)","T.C.A. § 55-10-207"],"conditions":["Guilty plea / payment: defendant may pay the stated fine (and applicable court costs) without appearing if local practice permits for non-criminal infractions; this constitutes a guilty plea and conviction.","Not guilty plea: defendant appears and contests the citation; the court schedules a hearing on the merits.","Failure to appear: the court may enter a conviction by default, issue a capias for the defendant's arrest, or report the failure to appear to the Department of Safety for license suspension."],"next_steps":["GS-TRF-004"],"decision_point":false,"notes":"Proceeds to GS-TRF-004 (hearing and disposition)."},{"step_id":"GS-TRF-004","phase":"Trial","court_type":"General Sessions Court","case_type":"Traffic","actor":"Judge","action":"Conduct traffic hearing and enter judgment; report conviction to Department of Safety","citations":["T.C.A. § 55-10-311","T.C.A. § 55-50-501"],"conditions":["Upon conviction of certain traffic offenses, the court must report the conviction to the Department of Safety within specified periods. The Department of Safety assesses points against the defendant's driving record; accumulation of sufficient points triggers administrative suspension of the driver's license. T.C.A. § 55-50-501 et seq. [GAP: GS-TRF-GAP-001]","DUI and other criminal traffic offenses: tried as misdemeanors with all the rights applicable to criminal cases under GS-CRM, including the right to counsel, proof beyond a reasonable doubt, and the right to appeal for a de novo trial.","Non-criminal infractions: tried informally; the state need only establish the violation by a preponderance of the evidence.","Sentence options include: fine, court costs, license suspension or restriction, traffic school, and for criminal offenses, jail or probation within the applicable misdemeanor maximums."],"next_steps":["GS-TRF-005"],"decision_point":false,"notes":"[GAP: GS-TRF-GAP-001] Proceeds to GS-TRF-005 (appeal)."},{"step_id":"GS-TRF-005","phase":"Appeal","court_type":"General Sessions Court","case_type":"Traffic","actor":"Defendant / Attorney","action":"File notice of appeal to Circuit or Criminal Court within 10 days of judgment","citations":["T.C.A. § 27-5-108(a)(1)","T.C.A. § 27-3-131"],"conditions":["Any party dissatisfied with the traffic judgment may appeal to Circuit or Criminal Court within 10 days. T.C.A. § 27-5-108(a)(1). The appeal is a de novo trial.","For criminal traffic offenses, the demand for a jury trial must be made at the time of filing the appeal. T.C.A. § 27-3-131.","Appellant must give bond or take the pauper's oath before appeal is granted. T.C.A. § 27-5-103(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP for General Sessions proceedings. Case proceeds in Circuit or Criminal Court as a de novo trial on appeal."}],"source_file":"GS-TRF-Flowchart.html"},{"flow_id":"JV-ADO","court_type":"Juvenile Court","case_type":"Adoption (Juvenile Court Jurisdiction)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-ADO-GAP-001","affected_steps":["JV-ADO-001"],"description":"Juvenile Court adoption jurisdiction is not universal in Tennessee. T.C.A. § 36-1-113(g)(8)(A) states that the chancery, circuit, and juvenile courts have jurisdiction in a separate, independent termination proceeding conducted prior to an adoption. T.C.A. § 36-1-116 governs jurisdiction over adoption proceedings but the full text of § 36-1-116 establishing which courts have adoption jurisdiction and the circumstances under which Juvenile Court may hear an adoption (as opposed to only a pre-adoption TPR) is not fully confirmed from the corpus. The scope of Juvenile Court adoption jurisdiction should be confirmed against the full corpus of T.C.A. § 36-1-116 before this flow is treated as authoritative."},{"gap_id":"JV-ADO-GAP-002","affected_steps":["JV-ADO-003"],"description":"The home study, social investigation, and report requirements for Juvenile Court adoptions under T.C.A. § 36-1-111 and related sections are referenced in the corpus but the full text of the social investigation requirements and the waiting periods applicable to Juvenile Court adoptions are not confirmed. These should be confirmed against the full corpus of T.C.A. §§ 36-1-111 through 36-1-119."}],"conflicts":[{"conflict_id":"JV-ADO-CONF-001","affected_steps":["JV-ADO-001"],"description":"Adoption jurisdiction in Tennessee is primarily vested in Chancery and Circuit Courts. Juvenile Court adoption jurisdiction is narrower and typically arises where the Juvenile Court has exercised prior jurisdiction over the child in a dependency, TPR, or wardship proceeding and it is administratively appropriate for the same court to finalize the adoption. T.C.A. § 36-1-113(g)(8)(A) confirms Juvenile Court TPR jurisdiction prior to adoption proceedings; whether Juvenile Court may also finalize the adoption (as opposed to only the TPR) depends on T.C.A. § 36-1-116 and local practice. Flagged for reviewer confirmation in each judicial district."}],"local_rule_checks":[{"check_id":"JV-ADO-LRC-001","affected_steps":["JV-ADO-001"],"description":"Verify by judicial district whether the local Juvenile Court exercises adoption jurisdiction and under what circumstances. In many districts, adoptions are finalized in Chancery or Circuit Court even where the Juvenile Court conducted the dependency proceeding and the TPR."}],"steps":[{"step_id":"JV-ADO-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Adoption (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"Confirm Juvenile Court has adoption jurisdiction in the applicable district and that parental rights are terminated or surrendered","citations":["T.C.A. § 36-1-113(g)(8)(A)","T.C.A. § 36-1-116","T.C.A. § 36-1-111"],"conditions":["JURISDICTIONAL NOTICE: Juvenile Court adoption jurisdiction is not universal. This flow applies only in judicial districts where Juvenile Court exercises adoption jurisdiction by local practice or administrative assignment. In all other districts, see the Chancery or Circuit Court adoption flow.","A prerequisite to finalization of adoption is that: all parental rights have been terminated by court order or validly surrendered; any required waiting period has elapsed; and the adoptive placement has been approved.","A termination of parental rights and a finalization of adoption may be heard and decided in the same hearing if the court determines it is in the best interest of the child. T.C.A. § 36-1-113(k)."],"next_steps":["JV-ADO-002"],"decision_point":false,"notes":"[GAP: JV-ADO-GAP-001] [CONFLICT: JV-ADO-CONF-001] [LOCAL RULE CHECK: JV-ADO-LRC-001] Proceeds to JV-ADO-002 (filing of adoption petition)."},{"step_id":"JV-ADO-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Adoption (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"File adoption petition with Juvenile Court Clerk","citations":["T.C.A. § 36-1-111","T.C.A. § 36-1-117(d)(2)"],"conditions":["Petition must include: child's birth name, age, current residence or county; any existing termination order or surrender; putative father registry certification; and medical and social history of the child. T.C.A. § 36-1-113(d)(2), § 36-1-117.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["JV-ADO-003"],"decision_point":false,"notes":"Proceeds to JV-ADO-003 (social investigation and home study)."},{"step_id":"JV-ADO-003","phase":"Discovery","court_type":"Juvenile Court","case_type":"Adoption (Juvenile Court Jurisdiction)","actor":"Judge","action":"Order social investigation and home study; receive report from DCS or licensed child-placing agency","citations":["T.C.A. § 36-1-111","T.C.A. § 36-1-113"],"conditions":["A social investigation and written report are required in most adoptions. The report addresses the suitability of the adoptive home, the child's background and needs, and a recommendation on whether the adoption is in the child's best interest.","DCS or a licensed child-placing agency may prepare the social investigation report."],"next_steps":["JV-ADO-004"],"decision_point":false,"notes":"[GAP: JV-ADO-GAP-002] Proceeds to JV-ADO-004 (adoption hearing)."},{"step_id":"JV-ADO-004","phase":"Trial","court_type":"Juvenile Court","case_type":"Adoption (Juvenile Court Jurisdiction)","actor":"Judge","action":"Conduct adoption hearing and determine whether adoption is in the best interest of the child","citations":["T.C.A. § 36-1-113(i)","T.C.A. § 36-1-120"],"conditions":["The court must find by a preponderance of the evidence that the adoption is in the best interest of the child.","If the child is 14 years of age or older, the child's consent to the adoption is required unless the court finds the child lacks capacity to consent."],"next_steps":["JV-ADO-005"],"decision_point":false,"notes":"Proceeds to JV-ADO-005 (entry of adoption decree)."},{"step_id":"JV-ADO-005","phase":"Judgment","court_type":"Juvenile Court","case_type":"Adoption (Juvenile Court Jurisdiction)","actor":"Judge","action":"Enter final order of adoption establishing the legal relationship between the adoptive parent and the child","citations":["T.C.A. § 36-1-121","T.C.A. § 36-1-122","Tenn. R. Civ. P. 58"],"conditions":["The adoption order establishes a legal relationship between the adoptive parent and the child as if the child were born to the adoptive parent.","The clerk must transmit the adoption order to the Office of Vital Records for the issuance of a new birth certificate in the adoptive name."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Entry of the final adoption order ends the case lifecycle for purposes of this flow. Adoption orders are not generally appealable after the time for direct appeal has passed."}],"source_file":"JV-ADO-Flowchart.html"},{"flow_id":"JV-CUS","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-CUS-GAP-001","affected_steps":["JV-CUS-001"],"description":"Juvenile Court jurisdiction over standalone custody and visitation matters is concurrent with Circuit and Chancery Courts under T.C.A. § 37-1-103(a). However, the specific circumstances under which Juvenile Court may exercise original jurisdiction over a standalone custody petition -- as opposed to custody arising as an ancillary matter in a pending delinquency, unruly, or dependency proceeding -- are not clearly delineated in the corpus. The outer limits of Juvenile Court's standalone custody jurisdiction should be confirmed against the full text of T.C.A. § 37-1-103(a) and local rules."},{"gap_id":"JV-CUS-GAP-002","affected_steps":["JV-CUS-002"],"description":"The filing fee for a standalone custody petition filed in Juvenile Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies."}],"conflicts":[{"conflict_id":"JV-CUS-CONF-001","affected_steps":["JV-CUS-001"],"description":"T.C.A. § 36-6-411(a) expressly states that nothing in the permanent parenting plan statutory framework shall be construed to alter, modify, or restrict the exclusive jurisdiction of the Juvenile Court pursuant to T.C.A. § 37-1-103. However, T.C.A. § 37-1-103(a) grants Juvenile Court exclusive original jurisdiction over dependent and neglected children and children in need of supervision, but does not expressly grant exclusive jurisdiction over all custody matters. For custody matters not arising from a pending juvenile proceeding, Circuit and Chancery Courts have concurrent jurisdiction. The practical result is that Juvenile Court custody jurisdiction is often exercised when a dependency or delinquency proceeding has already established the court's jurisdiction over the child, and Circuit or Chancery Court is the primary forum for standalone custody disputes. Under the source hierarchy, both are TCA provisions at the same level; no genuine conflict exists, but the scope of Juvenile Court's standalone custody jurisdiction requires a local practice determination."}],"local_rule_checks":[{"check_id":"JV-CUS-LRC-001","affected_steps":["JV-CUS-001"],"description":"Verify by judicial district whether the local Juvenile Court accepts standalone custody and visitation petitions not arising from a pending delinquency, unruly, or dependency proceeding. Some judicial districts route all standalone custody matters to Circuit or Chancery Court."},{"check_id":"JV-CUS-LRC-002","affected_steps":["JV-CUS-005"],"description":"Verify local rules for the parent educational seminar requirement in Juvenile Court custody proceedings. T.C.A. § 36-6-408 applies in any action where a permanent parenting plan will be entered. Whether Juvenile Court administers the seminar requirement in the same manner as Circuit Court should be confirmed against local practice."}],"steps":[{"step_id":"JV-CUS-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"Determine basis for Juvenile Court custody jurisdiction and confirm the court will accept the petition","citations":["T.C.A. § 37-1-103(a)","T.C.A. § 36-6-411(a)","T.C.A. § 36-6-101(a)(1)"],"conditions":["Juvenile Court custody jurisdiction is most commonly exercised as ancillary to a pending dependency, delinquency, or unruly proceeding in which the court has already acquired jurisdiction over the child. A standalone custody petition in Juvenile Court is appropriate where the court has or has had prior jurisdiction over the child or where local practice accepts such filings.","UCCJEA jurisdiction must be confirmed before filing: the court must have home state, significant connection, or emergency jurisdiction under T.C.A. § 36-6-216.","Best interest standard: initial custody is determined under T.C.A. § 36-6-106(a). Modification of a prior order requires material change of circumstance by a preponderance of the evidence. T.C.A. § 36-6-101(a)(2)(B).","Nothing in the permanent parenting plan statutory framework alters or restricts the exclusive jurisdiction of Juvenile Court over matters within its jurisdiction under T.C.A. § 37-1-103. T.C.A. § 36-6-411(a)."],"next_steps":["JV-CUS-002"],"decision_point":false,"notes":"[GAP: JV-CUS-GAP-001] [CONFLICT: JV-CUS-CONF-001] [LOCAL RULE CHECK: JV-CUS-LRC-001] Proceeds to JV-CUS-002 (filing)."},{"step_id":"JV-CUS-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"File petition for custody and visitation with Juvenile Court Clerk and pay filing fee","citations":["T.C.A. § 36-6-209(c)","T.C.A. § 36-6-218","Tenn. R. Civ. P. 3"],"conditions":["Petition must comply with UCCJEA requirements including disclosure of the child's residences for the past five years and any other pending custody proceedings. T.C.A. § 36-6-218.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["JV-CUS-003"],"decision_point":false,"notes":"[GAP: JV-CUS-GAP-002] Proceeds to JV-CUS-003 (service of process)."},{"step_id":"JV-CUS-003","phase":"Service of Process","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Juvenile Court Clerk","action":"Issue summons with automatic temporary injunction text attached and effect service on respondent","citations":["T.C.A. § 36-6-116(c)","Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.04"],"conditions":["Upon personal service, automatic temporary injunctions under T.C.A. § 36-6-116 take effect against both parties: (1) no cancellation or lapse of insurance covering the child; (2) no harassment or disparaging remarks; (3) no hiding or spoiling of evidence; (4) no relocation of the child outside Tennessee or more than 50 miles from the other parent without permission or court order. T.C.A. § 36-6-116(a)(1)-(4).","Injunctions are self-executing upon service; no court order is required. T.C.A. § 36-6-116(b)."],"next_steps":["JV-CUS-004"],"decision_point":false,"notes":"Proceeds to JV-CUS-004 (answer and temporary orders)."},{"step_id":"JV-CUS-004","phase":"Pleadings","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Respondent / Attorney","action":"File answer within 30 days after service; court hears motion for temporary parenting plan if filed","citations":["Tenn. R. Civ. P. 12.01","T.C.A. § 36-6-403"],"conditions":["Either party may request a temporary parenting plan; if parties cannot agree, each submits a proposed plan with a verified statement of income and good faith. T.C.A. § 36-6-403(2).","Emergency custody: the court may act ex parte under T.C.A. § 36-6-219 before respondent's answer is filed if immediate UCCJEA emergency jurisdiction grounds exist."],"next_steps":["JV-CUS-005"],"decision_point":false,"notes":"Proceeds to JV-CUS-005 (parent educational seminar and scheduling)."},{"step_id":"JV-CUS-005","phase":"Discovery","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Judge","action":"Require parent educational seminar attendance; enter scheduling order; conduct discovery","citations":["T.C.A. § 36-6-408","T.C.A. § 36-6-106(a)","Tenn. R. Civ. P. 26"],"conditions":["Parent educational seminar required in any action where a permanent parenting plan will be entered. T.C.A. § 36-6-408. No court shall dismiss or deny relief solely for failure to attend; court may waive for good cause.","Discovery encompasses evidence relevant to the best interest factors under T.C.A. § 36-6-106(a)."],"next_steps":["JV-CUS-006"],"decision_point":false,"notes":"[LOCAL RULE CHECK: JV-CUS-LRC-002] Proceeds to JV-CUS-006 (hearing)."},{"step_id":"JV-CUS-006","phase":"Trial","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Judge","action":"Conduct custody hearing applying best interest factors or material change of circumstance standard","citations":["T.C.A. § 36-6-106(a)","T.C.A. § 36-6-101(a)(2)(B)-(C)","Tenn. R. Civ. P. 52.01"],"conditions":["Initial custody: best interest standard under T.C.A. § 36-6-106(a); no presumption favoring either parent.","Modification of custody: material change of circumstance by preponderance of the evidence, then best interest analysis. T.C.A. § 36-6-101(a)(2)(B). Modification of residential schedule only: material change affecting child's best interest. T.C.A. § 36-6-101(a)(2)(C).","Written findings required in contested cases. T.C.A. § 36-6-101(a)(2)(B)(ii). Court may hear preference of child 12 or older. T.C.A. § 36-6-106(a)(13)."],"next_steps":["JV-CUS-007"],"decision_point":false,"notes":"Proceeds to JV-CUS-007 (entry of final order)."},{"step_id":"JV-CUS-007","phase":"Judgment","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Judge","action":"Enter final order incorporating permanent parenting plan; issue income assignment if child support is ordered","citations":["T.C.A. § 36-6-404(a)","T.C.A. § 36-5-501","Tenn. R. Civ. P. 58"],"conditions":["Permanent parenting plan must be in the AOC-prescribed form. T.C.A. § 36-6-404(d). Child support must be ordered consistent with guidelines. T.C.A. § 36-5-101.","Income assignment is mandatory upon entry of child support order; no additional court order is required. T.C.A. § 36-5-501(b)(1)(A)."],"next_steps":["JV-CUS-008"],"decision_point":false,"notes":"Proceeds to JV-CUS-008 (appeal)."},{"step_id":"JV-CUS-008","phase":"Appeal","court_type":"Juvenile Court","case_type":"Custody and Visitation (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"File notice of appeal to Circuit or Criminal Court within 30 days after entry of order","citations":["T.C.A. § 37-1-159","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from Juvenile Court custody orders go to the circuit or criminal court with jurisdiction. T.C.A. § 37-1-159(a).","Timely post-trial motion extends the period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-CUS-Flowchart.html"},{"flow_id":"JV-DEL","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-DEL-GAP-001","affected_steps":["JV-DEL-002"],"description":"The filing fee for a delinquency or unruly petition is governed by T.C.A. § 8-21-401 and the AOC fee schedule. Juvenile court petitions in public interest matters (delinquency, unruly) may be filed without a fee or at a reduced fee. The applicable fee, if any, should be confirmed against Standard Fees (AOC) and local rules."},{"gap_id":"JV-DEL-GAP-002","affected_steps":["JV-DEL-010"],"description":"The disposition options available under T.C.A. § 37-1-131 for delinquent children and T.C.A. § 37-1-132 for unruly children are enumerated in the statute. The corpus confirms the general structure but the full enumeration of all available dispositions, including the specific conditions under which commitment to DCS custody is authorized for delinquency versus unruly cases, should be confirmed against the complete text of T.C.A. §§ 37-1-131 and 37-1-132."}],"conflicts":[{"conflict_id":"JV-DEL-CONF-001","affected_steps":["JV-DEL-007"],"description":"The standard of proof for adjudication differs between delinquency and unruly cases. For delinquency: proof beyond a reasonable doubt (constitutional requirement; In re Winship, 397 U.S. 358 (1970); Tenn. R. Juv. P. 202(c)(1)). For unruly: clear and convincing evidence (Tenn. R. Juv. P. 202(d)(1)). Both are applied within the same combined flow and within a single adjudicatory hearing framework. The distinction is flagged here because the applicable standard governs the burden of proof placed on the state and is not a trivial procedural difference -- it is a constitutionally significant distinction that must be applied correctly based on the charge type."},{"conflict_id":"JV-DEL-CONF-002","affected_steps":["JV-DEL-003"],"description":"Children alleged to be unruly shall not be detained for more than 24 hours, excluding nonjudicial days, unless there has been a detention hearing and a judicial determination that there is probable cause to believe the child has violated a valid court order; in no event shall an unruly child be detained for more than 72 hours exclusive of nonjudicial days prior to an adjudicatory hearing. T.C.A. § 37-1-114(b). Children alleged to be delinquent must have a detention hearing within 72 hours of placement in detention (84 hours maximum including nonjudicial days). T.C.A. § 37-1-117(a)(1)-(2). These different detention limits apply within the same combined flow and must be applied based on the charge type."}],"local_rule_checks":[{"check_id":"JV-DEL-LRC-001","affected_steps":["JV-DEL-001"],"description":"Verify local rules for intake officer procedures, including any local screening tools, diversion programs, or informal adjustment protocols available prior to petition filing. T.C.A. § 37-1-110 authorizes informal adjustment by intake or other authorized court officer for a period not to exceed six months."},{"check_id":"JV-DEL-LRC-002","affected_steps":["JV-DEL-003"],"description":"Verify local rules for detention facility designation and the procedure for the detention hearing. Several judicial districts use a magistrate or referee for initial detention hearings under T.C.A. § 37-1-107."},{"check_id":"JV-DEL-LRC-003","affected_steps":["JV-DEL-010"],"description":"Verify local rules and local DCS service availability for disposition options, including community-based alternatives to commitment, probation supervision protocols, and any local diversion or restorative justice programs available at disposition."}],"steps":[{"step_id":"JV-DEL-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Law Enforcement","action":"Take child into custody and deliver to intake officer or detention facility, or refer directly to intake without detention","citations":["T.C.A. § 37-1-113","T.C.A. § 37-1-114","T.C.A. § 37-1-115"],"conditions":["Taking a child into custody is not an arrest for constitutional purposes except for determining its validity under the Tennessee or U.S. Constitution. T.C.A. § 37-1-113(b).","Child may be taken into custody pursuant to a court order, the laws of arrest, by a law enforcement officer or authorized officer if there are reasonable grounds to believe conditions requiring detention exist, or by a law enforcement officer if there are reasonable grounds to believe the child has run away from the child's parents or custodian. T.C.A. § 37-1-113(a).","Grounds for detention or shelter care: probable cause to believe the child committed the delinquent or unruly act charged AND that detention or shelter care is required because (a) the child is subject to an immediate threat to health or safety and delay for a hearing would likely result in severe or irreparable harm, or (b) the child may abscond or be removed from the court's jurisdiction, AND no less drastic alternative is available. T.C.A. § 37-1-114(a)."],"next_steps":["JV-DEL-002"],"decision_point":false,"notes":"[LOCAL RULE CHECK: JV-DEL-LRC-001] Proceeds to JV-DEL-002 (intake investigation and petition determination)."},{"step_id":"JV-DEL-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Juvenile Court Clerk","action":"Intake officer investigates and determines whether to release child, pursue informal adjustment, or file petition","citations":["T.C.A. § 37-1-110","T.C.A. § 37-1-117(a)(1)","T.C.A. § 37-1-120"],"conditions":["Informal adjustment: intake or other authorized officer may, without a petition being filed, informally adjust a case if the facts bring the case within the court's jurisdiction, the child and the parents or custodian are informed of their rights and consent to the adjustment, and the public interest does not require formal proceedings. Informal adjustment may not continue for more than six months without court approval and may not include detention. T.C.A. § 37-1-110.","If the child is not released and informal adjustment is not appropriate, a petition must be promptly filed. T.C.A. § 37-1-117(a)(1).","Petition must be verified and must set forth in ordinary and concise language the facts establishing the child's delinquency or unruliness and the child's name, age, and address. T.C.A. § 37-1-120.","Filing fee: confirm against Standard Fees (AOC). [GAP: JV-DEL-GAP-001]"],"next_steps":["JV-DEL-003"],"decision_point":false,"notes":"[GAP: JV-DEL-GAP-001] Proceeds to JV-DEL-003 (detention hearing if child is detained)."},{"step_id":"JV-DEL-003","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Conduct detention hearing if child is held in detention; determine whether continued detention is required","citations":["T.C.A. § 37-1-114","T.C.A. § 37-1-117(a)(2)","Tenn. R. Juv. P. 106"],"conditions":["Delinquency: detention hearing must be held no later than 72 hours after the child is placed in detention, excluding nonjudicial days; in no event later than 84 hours after detention including nonjudicial days. T.C.A. § 37-1-117(a)(2).","Unruly: child shall not be detained for more than 24 hours excluding nonjudicial days unless there has been a detention hearing and a judicial finding of probable cause to believe the child has violated a valid court order; in no event detained more than 72 hours exclusive of nonjudicial days prior to adjudicatory hearing. T.C.A. § 37-1-114(b).","No child under ten years of age shall be placed in a secure detention facility. T.C.A. § 37-1-116(a).","Children shall not be detained in a jail or lockup for adults unless the facility has a division used only for juveniles with sight and sound separation from adults. T.C.A. § 37-1-116(a)."],"next_steps":["JV-DEL-004"],"decision_point":false,"notes":"[CONFLICT: JV-DEL-CONF-002] [LOCAL RULE CHECK: JV-DEL-LRC-002] If child is not detained, skip to JV-DEL-004. Proceeds to JV-DEL-004 (notice and appointment of counsel)."},{"step_id":"JV-DEL-004","phase":"Service of Process","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Juvenile Court Clerk","action":"Issue summons to child, parents, guardian, or custodian and appoint counsel for child if unrepresented","citations":["T.C.A. § 37-1-121","T.C.A. § 37-1-126","Tenn. R. Juv. P. 109"],"conditions":["Summons must be issued as soon as possible, requiring the party to appear before the court at a time and place stated. Summons may be served by personal service or by first class mail, postage prepaid. T.C.A. § 37-1-121.","Right to counsel: the child and the child's parents, guardian, or custodian have the right to be represented by counsel at all stages of the proceedings. If unable to afford counsel, counsel must be appointed. T.C.A. § 37-1-126(a). The right to counsel may not be waived unless the court finds the waiver is voluntary and intelligent. T.C.A. § 37-1-126(d).","Guardians ad litem may be appointed in appropriate cases to protect the child's interests. T.C.A. § 37-1-149."],"next_steps":["JV-DEL-005"],"decision_point":false,"notes":"Proceeds to JV-DEL-005 (transfer determination)."},{"step_id":"JV-DEL-005","phase":"Pleadings","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Assess whether case should be transferred to adult criminal court; if so, conduct transfer hearing before any hearing on the merits","citations":["T.C.A. § 37-1-134(a)","T.C.A. § 37-1-191","Tenn. R. Juv. P. 200"],"conditions":["Discretionary transfer (T.C.A. § 37-1-134): court may transfer a child to criminal court before hearing the petition on the merits if the child is over 14 years of age, the alleged act would be a crime if committed by an adult, the child has not been excluded from transfer under statute, reasonable grounds exist to believe the child committed the act, the child is not committable to an institution for the mentally ill or intellectually disabled, and the interests of the community require that the child be put under legal restraint or discipline. Transfer notice must be filed by the state at least 14 days prior to the transfer hearing. Tenn. R. Juv. P. 200(a).","Mandatory transfer (T.C.A. § 37-1-191): a child who is 16 or older and charged with first or second degree murder, or attempted first or second degree murder, must be transferred upon a finding of probable cause that the child committed the act and is not committable.","At the transfer hearing, the child must be represented by counsel; no plea shall be accepted. Tenn. R. Juv. P. 200(b)(1)(B)-(C). Statements made at the transfer hearing are not admissible against the child in subsequent criminal proceedings. T.C.A. § 37-1-134(f)(1).","If the case is not transferred, the judge who conducted the transfer hearing shall not preside at the adjudicatory hearing on the petition over the objection of an interested party. T.C.A. § 37-1-134(g)."],"next_steps":["JV-DEL-006"],"decision_point":true,"notes":"Decision point: if transfer is ordered, the case exits this flow and proceeds in adult criminal court. If not transferred, proceed to JV-DEL-006 (adjudicatory hearing scheduling)."},{"step_id":"JV-DEL-006","phase":"Pleadings","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Schedule adjudicatory hearing; child may admit, deny, or enter no contest to the petition allegations","citations":["Tenn. R. Juv. P. 202(a)","T.C.A. § 37-1-129(a)","T.C.A. § 37-1-127"],"conditions":["Adjudicatory hearing for child in detention: must be heard within 30 days of the filing of the petition or within 30 days of return of service, whichever is later. Tenn. R. Juv. P. 202(a)(1).","Adjudicatory hearing for child not in detention: must be heard within 90 days of the filing of the petition or within 90 days of return of service, whichever is later. Tenn. R. Juv. P. 202(a)(2).","The parties have the right to introduce evidence, to be heard in their own behalf, and to cross-examine adverse witnesses. T.C.A. § 37-1-127(a).","Evidence illegally seized or obtained shall not be received over objection to establish the allegations in the petition. No statement made by a child to the youth services officer or designated intake officer shall be admissible against the child prior to the dispositional hearing. Tenn. R. Juv. P. 202(b)."],"next_steps":["JV-DEL-007"],"decision_point":false,"notes":"Proceeds to JV-DEL-007 (adjudicatory hearing)."},{"step_id":"JV-DEL-007","phase":"Trial","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Conduct adjudicatory hearing and make two-stage determination: (1) whether the act was committed; and (2) whether the child is in need of treatment or rehabilitation","citations":["T.C.A. § 37-1-129(a)-(b)","Tenn. R. Juv. P. 202(c)-(d)"],"conditions":["Delinquency standard: the delinquent offense must be proved beyond a reasonable doubt. Tenn. R. Juv. P. 202(c)(1); In re Winship, 397 U.S. 358 (1970).","Unruly standard: the unruly offense must be proved by clear and convincing evidence. Tenn. R. Juv. P. 202(d)(1).","If the act is not proved to the required standard, the petition shall be dismissed and the child discharged from any detention or restriction. Tenn. R. Juv. P. 202(c)(1), (d)(1).","If the act is proved, the court proceeds immediately or at a continued hearing to determine whether the child is in need of treatment or rehabilitation. T.C.A. § 37-1-129(b). Evidence of commission of acts that constitute a felony or that reflect recidivistic delinquency is sufficient in the absence of contrary evidence to sustain a finding of need for treatment or rehabilitation. T.C.A. § 37-1-129(b).","If the court finds the child is NOT in need of treatment or rehabilitation: no adjudication of delinquency or unruliness shall be entered; the petition is dismissed and the child is discharged. Tenn. R. Juv. P. 202(c)(2)(A), (d)(2)(A).","If the court finds the child IS in need of treatment or rehabilitation: enter an order of adjudication and proceed to or schedule a dispositional hearing. Tenn. R. Juv. P. 202(c)(2)(B), (d)(2)(B).","An order of adjudication in a juvenile proceeding is not a conviction of crime and does not impose civil disability. T.C.A. § 37-1-133(a)."],"next_steps":["JV-DEL-008"],"decision_point":false,"notes":"[CONFLICT: JV-DEL-CONF-001] Proceeds to JV-DEL-008 (dispositional hearing)."},{"step_id":"JV-DEL-008","phase":"Pre-Trial","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Conduct dispositional hearing and receive evidence on appropriate disposition","citations":["Tenn. R. Juv. P. 203(a)-(e)","T.C.A. § 37-1-131","T.C.A. § 37-1-132"],"conditions":["Dispositional hearing must be held within 15 days of the adjudicatory hearing if the child is in detention or placed out of the home; within 90 days in all other cases. Tenn. R. Juv. P. 203(a).","Standard of proof at the dispositional hearing is preponderance of the evidence. Tenn. R. Juv. P. 203(e).","Reliable hearsay, including psychiatric or psychological screenings or evaluations and probation or DCS reports, is admissible at the dispositional hearing provided the opposing party has a fair opportunity to rebut the hearsay. Tenn. R. Juv. P. 203(e).","In choosing among permissible dispositions, the court shall select the least restrictive disposition appropriate to the seriousness of the offense, the degree of culpability, and the age and prior record of the child. Tenn. R. Juv. P. 203 Advisory Commission Comments.","Prior to committing or retaining a child in DCS custody, the court must find that reasonable efforts have been made to prevent removal or to make return home possible. T.C.A. § 37-1-166."],"next_steps":["JV-DEL-009"],"decision_point":false,"notes":"[LOCAL RULE CHECK: JV-DEL-LRC-003] Proceeds to JV-DEL-009 (entry of disposition order)."},{"step_id":"JV-DEL-009","phase":"Judgment","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Enter disposition order; advise child of right to appeal; if child is committed to DCS custody, proceed to post-dispositional permanency process","citations":["T.C.A. § 37-1-131","T.C.A. § 37-1-132","Tenn. R. Juv. P. 203(c)"],"conditions":["At conclusion of dispositional hearing, the court must advise the child of the right to appeal the dispositional order. Tenn. R. Juv. P. 203(c).","Delinquency dispositions (T.C.A. § 37-1-131): available options include probation or other non-custodial supervision; placement in care of a relative or other suitable person; transfer to another agency or institution authorized to care for the child; fine, costs, or restitution; community service; commitment to DCS custody; commitment to a correctional facility for children; and other authorized dispositions.","Unruly dispositions (T.C.A. § 37-1-132): available options are more limited and generally preclude secure confinement except where the child has violated a valid court order.","If child is committed to DCS custody, the court must find that reasonable efforts have been made to prevent removal. T.C.A. § 37-1-166."],"next_steps":["JV-DEL-010"],"decision_point":false,"notes":"[GAP: JV-DEL-GAP-002] Proceeds to JV-DEL-010 (post-dispositional review or appeal)."},{"step_id":"JV-DEL-010","phase":"Post-Judgment","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Judge","action":"Conduct post-dispositional reviews, probation violation hearings, or modification proceedings as warranted","citations":["T.C.A. § 37-
