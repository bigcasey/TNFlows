 § 34-1-110"],"conditions":["Guardianship of the estate of a minor terminates automatically when the minor reaches age 18, unless the court continues it beyond age 18 upon petition. T.C.A. § 34-2-106(a)(1).","Continuation beyond age 18: the court may continue the guardianship if, after a hearing at which the burden is on the person seeking continuation, the court finds continuation is in the best interest of the person and the person is unable to wisely manage and control the property. Continuation may not extend beyond the person's 25th birthday. T.C.A. § 34-2-106(a)(2)-(3).","If the minor for whom a guardian is serving is determined to be a disabled person, upon reaching age 18 the guardian automatically continues as conservator. T.C.A. § 34-2-106(c).","Preliminary final accounting: within 60 days after the guardianship of the estate terminates, the guardian must file a preliminary final accounting with the court. Receipts and cancelled checks evidencing the final distribution must be filed. T.C.A. § 34-2-106(a)(4).","A final accounting may not be waived by the minor regardless of the minor's age. T.C.A. § 34-2-106(a)(4) final sentence."],"next_steps":["PR-GRD-009"],"decision_point":false,"notes":"Proceeds to PR-GRD-009 (appeal if contested)."},{"step_id":"PR-GRD-009","phase":"Appeal","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Petitioner / Attorney","action":"File appeal from probate court guardianship order to appropriate appellate court","citations":["T.C.A. § 30-2-609","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from probate court orders in guardianship matters go to the Court of Appeals in counties where chancery court exercises probate jurisdiction. T.C.A. § 16-16-201(c). In counties with a separate probate court, confirm the appeal path from the applicable private act.","Notice of appeal must be filed within 30 days after entry of the order. Tenn. R. App. P. 4(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"PR-GRD-Flowchart.html"},{"flow_id":"PR-TES","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"PR-TES-GAP-001","affected_steps":["PR-TES-001"],"description":"Probate court jurisdiction in Tennessee is allocated by statute and by private act across multiple court types: probate court (where established by private act), county court, chancery court (in counties where probate jurisdiction has been transferred to chancery under T.C.A. § 16-16-201), and circuit court in certain counties. T.C.A. § 16-16-201 is confirmed in the corpus. The specific allocation of probate jurisdiction in each county cannot be determined from statewide statutes alone. The court having probate jurisdiction must be confirmed from the applicable private act or from the local rules phase for each county."},{"gap_id":"PR-TES-GAP-002","affected_steps":["PR-TES-002"],"description":"The filing fee for a probate petition is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount, including any percentage-of-estate fee applicable in some probate jurisdictions, is not available in the corpus fee schedule text (which contains broken links). The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies."},{"gap_id":"PR-TES-GAP-003","affected_steps":["PR-TES-008"],"description":"T.C.A. § 30-2-306 governs the notice to creditors requirement. The corpus confirms the general structure of the creditors' notice requirement and the 12-month claims period for known and reasonably ascertainable creditors. The full text of T.C.A. § 30-2-306(d) specifying the form, manner, and timing of the notice required to be mailed or delivered to known creditors should be confirmed from the full corpus to ensure all mandatory notice requirements are accurately reflected."}],"conflicts":[{"conflict_id":"PR-TES-CONF-001","affected_steps":["PR-TES-001"],"description":"T.C.A. § 16-16-201(a) provides that in all counties where not otherwise specifically provided by public, private, special, or local acts, all probate jurisdiction previously vested in the county court is vested in chancery court. This means that the 'Probate Court' as a distinct court type exists only in counties that have established one by private act. In all other counties, probate jurisdiction is exercised by chancery court or, in specific population-bracket counties, by other courts. This flow is designated Probate Court for organizational purposes but reviewers must confirm the correct court type in each county. The actor label 'Probate Court Clerk' in this flow may be substituted by 'Clerk and Master' (chancery court) or other clerk title as applicable in the specific county."},{"conflict_id":"PR-TES-CONF-002","affected_steps":["PR-TES-004"],"description":"T.C.A. § 30-1-106 establishes the priority order for appointment of administrator in an intestate estate: spouse first; next of kin second; creditor third. T.C.A. § 30-1-117(a)(10) requires the petition to disclose any felony or misdemeanor convictions of the proposed personal representative. A person is disqualified from serving as personal representative if convicted of a felony. The interplay between the statutory priority order and the disqualification for felony conviction means that the court may need to pass over a higher-priority person to appoint a qualified next-of-kin or creditor. Under the source hierarchy, both are TCA provisions at the same level; the disqualification provision operates as a limit on the priority order. Flagged for reviewer awareness."}],"local_rule_checks":[{"check_id":"PR-TES-LRC-001","affected_steps":["PR-TES-001"],"description":"Verify by county which court exercises probate jurisdiction (probate court established by private act, chancery court under T.C.A. § 16-16-201, county court, or other). Verify the title and role of the clerk in probate matters (Probate Court Clerk, Clerk and Master, County Clerk, or other)."},{"check_id":"PR-TES-LRC-002","affected_steps":["PR-TES-008"],"description":"Verify local rules for the notice to creditors requirement, including whether the local probate court requires publication in a specific newspaper, the local procedure for posting notice at the courthouse, and any local form used for the notice."},{"check_id":"PR-TES-LRC-003","affected_steps":["PR-TES-013"],"description":"Verify local rules for the accounting and closing procedures, including whether the local court requires a final settlement hearing, whether the clerk examines accountings before presenting them to the judge, and the local procedure for the statement in lieu of accounting under T.C.A. § 30-2-601(b)."}],"steps":[{"step_id":"PR-TES-001","phase":"Case Initiation","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"Determine applicable court having probate jurisdiction and assess whether estate is testate or intestate","citations":["T.C.A. § 30-1-102","T.C.A. § 30-1-103","T.C.A. § 16-16-201"],"conditions":["JURISDICTIONAL NOTICE: The court exercising probate jurisdiction varies by county. In many counties, probate jurisdiction is vested in chancery court under T.C.A. § 16-16-201(a). In counties where a probate court has been established by private act, the probate court has jurisdiction. The actor label 'Probate Court Clerk' in this flow should be substituted with the correct clerk title for the applicable court in each county. [GAP: PR-TES-GAP-001]","Testate path: decedent left a valid will. The executor named in the will (or another qualified person if the named executor is unable or unwilling to serve) petitions for letters testamentary and probate of the will.","Intestate path: decedent left no valid will. An administrator is appointed by the court in the priority order established by T.C.A. § 30-1-106: spouse first; next of kin second; creditor third.","Small estate: if the gross value of the probate estate does not exceed $50,000 (or such other amount as specified by statute), a simplified small estate administration procedure is available under T.C.A. § 30-4-103, including limited letters of administration or limited letters testamentary after 45 days from the date of death.","Venue: county of the decedent's usual residence at the time of death. If the decedent had residences in more than one county, either county's probate court may grant letters. T.C.A. § 30-1-102.","No person may presume to enter upon administration of a deceased person's estate until letters of administration or letters testamentary have been obtained. T.C.A. § 30-1-101."],"next_steps":["PR-TES-002"],"decision_point":false,"notes":"[GAP: PR-TES-GAP-001] [CONFLICT: PR-TES-CONF-001] [LOCAL RULE CHECK: PR-TES-LRC-001]"},{"step_id":"PR-TES-002","phase":"Case Initiation","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"File verified petition for letters testamentary (testate) or letters of administration (intestate) with Probate Court Clerk","citations":["T.C.A. § 30-1-117(a)","T.C.A. § 32-2-101"],"conditions":["Petition must be verified and must contain: identity of petitioner; decedent's name, age, date and place of death, and residence at time of death; names, ages, addresses, and relationships of heirs at law or devisees and legatees; a statement of intestacy or the date of execution and attesting witnesses of the will; the original will or a copy as an exhibit; an estimate of the fair market value of the estate unless bond is waived; whether the will waives inventory and accounting; a statement that the petitioner is not aware of any instrument revoking the will offered for probate; the proposed personal representative's name, age, address, relationship, and any felony or misdemeanor convictions; and identification of any ongoing business or economic enterprise that is or may be part of the estate. T.C.A. § 30-1-117(a).","Testate: the original will must be filed. The will may be filed in either common form or solemn form. T.C.A. § 32-2-101.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["PR-TES-003"],"decision_point":false,"notes":"[GAP: PR-TES-GAP-002]"},{"step_id":"PR-TES-003","phase":"Case Initiation","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Judge","action":"Probate the will (testate path) or admit petition for administration (intestate path)","citations":["T.C.A. § 32-2-101","T.C.A. § 32-2-104","T.C.A. § 32-2-110","T.C.A. § 30-1-117(b)"],"conditions":["TESTATE -- Common form probate: the will is proved without notice to interested parties by the affidavit of at least one subscribing witness, or by the self-proving affidavit if the will is self-proved. T.C.A. § 32-2-104(a), § 32-2-110. Common form probate does not require a hearing; it is an ex parte proceeding.","TESTATE -- Solemn form probate: due notice is required to all persons interested (heirs at law and devisees and legatees named in the will). A hearing is held. Solemn form probate is conclusive on all persons given proper notice. T.C.A. § 30-1-117(b).","TESTATE -- Holographic will: all material provisions and the signature must be in the handwriting of the testator; proved by two witnesses to the handwriting. T.C.A. § 32-1-105.","INTESTATE -- No will is offered for probate. The court confirms the decedent died intestate and determines the priority order for appointment of the administrator under T.C.A. § 30-1-106.","No notice of the probate proceeding is required except for solemn form probate. T.C.A. § 30-1-117(b).","A will admitted to probate in common form may later be contested within 2 years; a will admitted in solemn form is conclusive on all parties given proper notice. T.C.A. § 32-4-108."],"next_steps":["PR-TES-004"],"decision_point":false,"notes":"Testate branch: will is admitted to probate and personal representative is appointed. Intestate branch: administration is ordered and administrator is appointed. Both branches converge at PR-TES-004."},{"step_id":"PR-TES-004","phase":"Case Initiation","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"Qualify as personal representative by taking oath, posting bond if required, and receiving letters testamentary or letters of administration","citations":["T.C.A. § 30-1-101","T.C.A. § 30-1-105","T.C.A. § 30-1-106","T.C.A. § 30-1-116"],"conditions":["TESTATE priority: the executor named in the will has priority; if the named executor is unable or unwilling to serve, the probate court appoints a qualified person. A nonresident may not be appointed as personal representative except as provided in T.C.A. § 35-50-107. T.C.A. § 30-1-116.","INTESTATE priority: spouse first; next of kin second (if more than one next of kin, the probate court may decide which kin shall be entitled); creditor third. T.C.A. § 30-1-106.","Bond: required unless waived by the will (testate) or by statute. The bond amount is set by the court. T.C.A. § 30-1-117(a)(7).","Letters testamentary or of administration are recorded in the court and a certified copy is of the same validity as the original. T.C.A. § 30-1-105.","Personal representative qualifies by taking the required oath before the clerk or another authorized person and posting bond."],"next_steps":["PR-TES-005"],"decision_point":false,"notes":"[CONFLICT: PR-TES-CONF-002]"},{"step_id":"PR-TES-005","phase":"Discovery","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"File inventory of probate estate within 60 days after qualification; notify beneficiaries or distributees","citations":["T.C.A. § 30-2-301(a)-(b)","T.C.A. § 30-2-302"],"conditions":["Inventory: the personal representative must make a complete and accurate inventory of the probate estate and return it to the clerk within 60 days after entering on the administration, verified by oath. T.C.A. § 30-2-301(a). The inventory may be excused if the will waives it, or if all residuary distributees or legatees file waivers, unless a residuary distributee or legatee demands it.","Notice to beneficiaries (testate): within 60 days, the personal representative must send a complete copy of the will to beneficiaries sharing in the residue, and a copy of the relevant paragraphs to specific legatees. A copy of the will must be sent to any trustee of a trust receiving the residue or a portion thereof. T.C.A. § 30-2-301(b)(1)-(2).","Notice to distributees (intestate): within 60 days, send a copy of the letters of administration to each residuary distributee. T.C.A. § 30-2-301(b)(1)(B).","Affidavit of compliance: within 60 days, file an affidavit with the clerk that required copies have been mailed or delivered and an explanation of any efforts to locate beneficiaries not yet notified. T.C.A. § 30-2-301(b)(3).","TennCare notice: within 60 days, file an affidavit that the Bureau of TennCare has been notified of the decedent's death. T.C.A. § 30-2-301(b)(5).","The clerk presents the inventory to the court; if regular, the court orders it recorded in the book of inventories. T.C.A. § 30-2-302."],"next_steps":["PR-TES-006"],"decision_point":false,"notes":"Proceeds to PR-TES-006 (notice to creditors)."},{"step_id":"PR-TES-006","phase":"Discovery","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Probate Court Clerk","action":"Publish and post notice to creditors; personal representative mails or delivers notice to known creditors","citations":["T.C.A. § 30-2-306","T.C.A. § 30-2-321"],"conditions":["Notice to creditors must be published in a newspaper of general circulation in the county and posted at the courthouse. T.C.A. § 30-2-306.","The claims period is computed from the date of the first publication of the notice, in case of published notices, or from the date of posting, in case of posted notices. T.C.A. § 30-2-321.","Known and reasonably ascertainable creditors must receive actual mailed or delivered notice. The final accounting must state that such notice was given. T.C.A. § 30-2-601(a)(3).","Claims against the estate that are not filed within the statutory period are barred, subject to the rights of creditors who did not receive actual notice. T.C.A. § 30-2-307."],"next_steps":["PR-TES-007"],"decision_point":false,"notes":"[GAP: PR-TES-GAP-003] [LOCAL RULE CHECK: PR-TES-LRC-002] Proceeds to PR-TES-007 (claims period and creditor payment)."},{"step_id":"PR-TES-007","phase":"Motions Practice","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"Receive, allow, or contest creditor claims during the claims period; pay allowed claims in statutory priority order","citations":["T.C.A. § 30-2-307","T.C.A. § 30-2-310","T.C.A. § 30-2-317"],"conditions":["Creditors must file claims within the period specified in T.C.A. § 30-2-307. Claims filed after the period are barred unless the creditor did not receive actual notice. T.C.A. § 30-2-307(a).","Pending actions against the decedent are considered legally filed demands against the estate upon filing of a copy of the order of revivor with the probate clerk within the applicable period. T.C.A. § 30-2-320.","Priority of payment (T.C.A. § 30-2-317): (1) costs of administration; (2) funeral expenses; (3) expenses of last illness; (4) federal taxes; (5) state taxes; (6) judgments of record and other liens; (7) other debts and demands.","Insolvent estate: if the estate cannot pay all creditors, the personal representative must file a notice of insolvency after the claims period expires, containing a proposed plan of distribution consistent with T.C.A. § 30-2-317. T.C.A. § 30-5-102, § 30-5-103."],"next_steps":["PR-TES-008"],"decision_point":false,"notes":"Proceeds to PR-TES-008 (accounting and distribution)."},{"step_id":"PR-TES-008","phase":"Judgment","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"File first accounting within 15 months of qualification; make annual accountings thereafter until estate is fully administered","citations":["T.C.A. § 30-2-601(a)"],"conditions":["Within 15 months from the date of qualification, the personal representative must file an accounting with the clerk of the court. After the first accounting and until the estate is fully administered, further accountings are made annually from the date of the first accounting. T.C.A. § 30-2-601(a)(1)-(2).","Accounting waiver: if the will waives court accountings, or if all residuary distributees file sworn waivers, detailed accountings are not required. The personal representative must still file a status report detailing any remaining estate issues within 15 months and each year thereafter the estate remains open. T.C.A. § 30-2-601(a).","Final accounting: must state that the personal representative has mailed or delivered notice of the requirement to file claims to all known and reasonably ascertainable creditors. T.C.A. § 30-2-601(a)(3).","Good cause: the court may extend the time for filing accountings for good cause shown. T.C.A. § 30-2-601(a)(4)."],"next_steps":["PR-TES-009"],"decision_point":false,"notes":"Proceeds to PR-TES-009 (distribution)."},{"step_id":"PR-TES-009","phase":"Judgment","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"Distribute the residue of the estate to beneficiaries (testate) or distributees (intestate) after all claims and expenses are paid","citations":["T.C.A. § 30-2-701","T.C.A. § 30-2-607","T.C.A. § 31-2-101"],"conditions":["TESTATE distribution: distribute according to the terms of the will. Obtain and file receipts for specific bequests as required by T.C.A. § 30-2-707.","INTESTATE distribution: distribute according to the laws of intestate succession in T.C.A. § 31-2-101 et seq. The spouse, children, and other heirs take in the shares specified by statute.","No distribution shall be made until the claims period has expired and all known claims have been paid or otherwise disposed of, unless the personal representative retains sufficient assets or obtains a bond to cover pending claims.","If a testamentary trust is created by the will, the residue or relevant share is distributed to the trustee for administration under the trust terms; see PR-TRU flow for the continuing testamentary trust administration."],"next_steps":["PR-TES-010"],"decision_point":false,"notes":"If the will creates a testamentary trust, the distributed trust assets proceed to PR-TRU flow for testamentary trust administration. Proceeds to PR-TES-010 (closing the estate)."},{"step_id":"PR-TES-010","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"Close the estate by filing final accounting and statement in lieu of accounting, or by court order upon final settlement","citations":["T.C.A. § 30-2-601(b)","T.C.A. § 30-2-607"],"conditions":["Statement in lieu of accounting (simplified closing): if all court accountings are waived and all claims have been paid, the personal representative and distributees may file separate statements with the clerk after the claims period expires. The personal representative's statement confirms proper administration, payment of claims, and distribution; each distributee's statement acknowledges receipt. T.C.A. § 30-2-601(b)(1).","If a distributee fails to file an acknowledgment after diligent efforts, the personal representative may move the court for closure and give notice to the noncompliant distributee; failure to appear or participate results in a final order closing the estate. T.C.A. § 30-2-601(b)(2).","Filing of the statement relieves the personal representative and distributees of any further requirement to file a detailed accounting, receipt, or statement. T.C.A. § 30-2-601(c).","Court settlement: where accountings are required, a final settlement hearing may be held. The court approves the final account and enters an order of distribution and closure."],"next_steps":["PR-TES-011"],"decision_point":false,"notes":"[LOCAL RULE CHECK: PR-TES-LRC-003] Proceeds to PR-TES-011 (appeal if contested)."},{"step_id":"PR-TES-011","phase":"Appeal","court_type":"Probate Court","case_type":"Estate Administration (Testate and Intestate Combined Flow)","actor":"Petitioner / Attorney","action":"File appeal from probate court order or final settlement in accordance with applicable appellate procedure","citations":["T.C.A. § 30-1-107","T.C.A. § 30-2-609","Tenn. R. App. P. 3"],"conditions":["Any person who claims a right to execute a will or to administer on the estate and believes they are injured by an order awarding letters testamentary or of administration may appeal to the appropriate court in accordance with T.C.A. § 30-2-609, on giving bond as in other cases of appeal. T.C.A. § 30-1-107.","Appeals from probate court orders go to the Court of Appeals in counties where chancery court exercises probate jurisdiction. T.C.A. § 16-16-201(c). In counties where a separate probate court exists, the appeal path may differ and must be confirmed from the applicable private act.","Notice of appeal must be filed within 30 days after entry of the order. Tenn. R. App. P. 4(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"PR-TES-Flowchart.html"},{"flow_id":"PR-TRU","court_type":"Probate Court","case_type":"Testamentary Trust Administration","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"PR-TRU-GAP-001","affected_steps":["PR-TRU-001"],"description":"The specific provisions of the Tennessee Uniform Trust Code (T.C.A. §§ 35-15-101 et seq.) governing the role of the probate court in testamentary trust administration -- as distinct from the role of chancery court -- are not confirmed from the corpus to specify when the probate court retains jurisdiction over a testamentary trust versus when the matter must be transferred to chancery court. T.C.A. § 35-15-203 confirms that chancery courts and other courts of record having probate jurisdiction have exclusive concurrent jurisdiction over trust proceedings. Whether the court that admitted the will to probate retains ongoing jurisdiction over a testamentary trust created by the will, or whether a separate proceeding must be opened in chancery court, should be confirmed from the full corpus of Title 35, Chapter 15 and from local rules."},{"gap_id":"PR-TRU-GAP-002","affected_steps":["PR-TRU-003"],"description":"The filing fee for a testamentary trust administration petition in Probate Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies."}],"conflicts":[{"conflict_id":"PR-TRU-CONF-001","affected_steps":["PR-TRU-001"],"description":"T.C.A. § 35-15-203 grants chancery courts and other courts of record having probate jurisdiction exclusive concurrent jurisdiction over trust proceedings brought by a trustee or beneficiary. Testamentary trusts are created by will, and the probate court that admitted the will to probate may retain jurisdiction over the testamentary trust as an incident of the administration of the decedent's estate. After the estate is closed, however, jurisdiction over the ongoing testamentary trust may pass to chancery court or may remain in the court that closed the estate, depending on local practice and the specific provisions of the will. This conflict is inherent in the concurrent jurisdiction structure and must be resolved by local practice determination. Flagged for reviewer confirmation in each county."}],"local_rule_checks":[{"check_id":"PR-TRU-LRC-001","affected_steps":["PR-TRU-001"],"description":"Verify by county whether the probate court (or the court exercising probate jurisdiction) retains jurisdiction over testamentary trusts after the decedent's estate is closed, or whether a separate proceeding must be opened in chancery court. Verify whether the local court uses a unified probate-and-trust file number for testamentary trusts or opens a separate trust file."},{"check_id":"PR-TRU-LRC-002","affected_steps":["PR-TRU-006"],"description":"Verify local rules for trustee accounting in the probate court context, including whether the probate clerk (or Clerk and Master if chancery court exercises probate jurisdiction) reviews and reports on trust accountings and the timing of required accountings."}],"steps":[{"step_id":"PR-TRU-001","phase":"Case Initiation","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Petitioner / Attorney","action":"Confirm Probate Court has jurisdiction over the testamentary trust and determine the applicable procedure for opening or continuing trust administration","citations":["T.C.A. § 35-15-201","T.C.A. § 35-15-203","T.C.A. § 35-15-204","T.C.A. § 30-1-404(b)"],"conditions":["JURISDICTIONAL NOTICE: A testamentary trust is created by will. The probate court that admitted the will to probate often retains jurisdiction over the testamentary trust as an incident of estate administration. After the estate is closed, jurisdiction over the testamentary trust may remain in the probate court or transfer to chancery court, depending on local practice. Confirm the jurisdictional allocation in the applicable county. [LOCAL RULE CHECK: PR-TRU-LRC-001]","If the probate court has jurisdiction: trust administration proceeds as a continuation or ancillary proceeding to the decedent's estate. The trustee qualifies by filing the will and accepting the trusteeship.","If the court determines the matter must be heard in chancery court: the trustee or beneficiary files a new petition in chancery court; see CH-TRU for the chancery court trust administration flow.","Trustee vacancy: if the named trustee under the will is unable or unwilling to serve and no successor is designated, the court may appoint a successor under T.C.A. § 35-15-704(c) or, if all UTC mechanisms are exhausted, may appoint the public trustee. T.C.A. § 30-1-404(b). The public trustee files accountings with the court each 12 months. T.C.A. § 30-1-404(b)."],"next_steps":["PR-TRU-002"],"decision_point":false,"notes":"[GAP: PR-TRU-GAP-001] [CONFLICT: PR-TRU-CONF-001] [LOCAL RULE CHECK: PR-TRU-LRC-001]"},{"step_id":"PR-TRU-002","phase":"Case Initiation","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Petitioner / Attorney","action":"Trustee accepts trusteeship; qualifies by oath and, if required, by posting bond","citations":["T.C.A. § 35-15-701","T.C.A. § 35-15-702"],"conditions":["A trustee accepts the trusteeship by substantially complying with the will's requirements for acceptance, or, if none, by performing acts consistent with the function of trustee. T.C.A. § 35-15-701(a).","Bond: a trustee who is an individual may be required by the court to give bond, payable to the state, in an amount and with conditions the court determines appropriate. T.C.A. § 35-15-702(a).","A corporate trustee authorized to do business in Tennessee is not required to give bond unless the court directs otherwise. T.C.A. § 35-15-702(b)."],"next_steps":["PR-TRU-003"],"decision_point":false,"notes":"Proceeds to PR-TRU-003 (registration and notice to qualified beneficiaries)."},{"step_id":"PR-TRU-003","phase":"Case Initiation","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Probate Court Clerk","action":"Register the testamentary trust with the court; give notice to all qualified beneficiaries","citations":["T.C.A. § 35-15-113","T.C.A. § 35-15-109","T.C.A. § 35-15-813"],"conditions":["Registration of trust: the trustee may register the trust with the court by filing a statement with the clerk containing the name of the settlor (decedent), the date of the will, and the name and address of the trustee. T.C.A. § 35-15-113.","Notice to qualified beneficiaries: the trustee must give notice to all qualified beneficiaries as defined by T.C.A. § 35-15-103. T.C.A. § 35-15-813.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). [GAP: PR-TRU-GAP-002]"],"next_steps":["PR-TRU-004"],"decision_point":false,"notes":"[GAP: PR-TRU-GAP-002] Proceeds to PR-TRU-004 (ongoing trust administration and trustee duties)."},{"step_id":"PR-TRU-004","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Petitioner / Attorney","action":"Administer the testamentary trust in accordance with its terms, the UTC, and the court's continuing jurisdiction","citations":["T.C.A. § 35-15-801","T.C.A. § 35-15-802","T.C.A. § 35-15-804","T.C.A. § 35-15-813"],"conditions":["Trustee must administer the trust in good faith, in accordance with its terms and purposes and the interests of the beneficiaries, and in accordance with Title 35, Chapter 15. T.C.A. § 35-15-801.","Duty of loyalty: trustee must administer the trust solely in the interests of the beneficiaries. T.C.A. § 35-15-802.","Duty to inform and report: trustee must keep qualified beneficiaries informed about the trust and its administration; must provide an annual report of the trust property, liabilities, receipts, and disbursements. T.C.A. § 35-15-813.","The court may intervene in the administration of a trust to the extent its jurisdiction is invoked by an interested person. A trust is not subject to continuing judicial supervision unless ordered by the court. T.C.A. § 35-15-201."],"next_steps":["PR-TRU-005"],"decision_point":false,"notes":"Proceeds to PR-TRU-005 (petitions for instruction, modification, or trustee-related proceedings)."},{"step_id":"PR-TRU-005","phase":"Motions Practice","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Petitioner / Attorney","action":"Petition the court for instructions, approval of trustee actions, modification or termination of trust, trustee removal, or other judicial relief as needed","citations":["T.C.A. § 35-15-201(c)","T.C.A. § 35-15-410","T.C.A. § 35-15-412","T.C.A. § 35-15-414","T.C.A. § 35-15-706","T.C.A. § 35-15-1001"],"conditions":["A judicial proceeding involving a trust may relate to any matter involving the trust's administration, including a request for instructions and an action to declare rights. T.C.A. § 35-15-201(c).","Modification or termination: the court may modify the administrative or dispositive terms of a trust or terminate the trust if, because of unanticipated circumstances, modification or termination will further the purposes of the trust. T.C.A. § 35-15-412. The court may terminate or modify an uneconomic trust. T.C.A. § 35-15-414.","Trustee removal: the court may remove a trustee upon grounds including serious breach of trust, lack of cotrustee cooperation, or persistent failure to administer effectively. T.C.A. § 35-15-706.","Breach of trust remedies: the court may compel performance, enjoin breach, compel redress, order an accounting, appoint a special fiduciary, suspend or remove the trustee, or impose any other appropriate equitable remedy. T.C.A. § 35-15-1001.","Attorney fees and costs: the court may award costs and expenses including reasonable attorney fees to any party, to be paid by another party or from the trust. T.C.A. § 35-15-1004.","Nonjudicial settlement agreements: the trustee and qualified beneficiaries may resolve trust matters by nonjudicial settlement agreement without court involvement to the extent authorized by T.C.A. § 35-15-111."],"next_steps":["PR-TRU-006"],"decision_point":false,"notes":"For full detail on the contested trust dispute procedure, cross-reference CH-TRU steps CH-TRU-005 through CH-TRU-008 which apply the same UTC provisions in the chancery court context."},{"step_id":"PR-TRU-006","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Petitioner / Attorney","action":"File trustee accountings with the court on a schedule approved by the court or required by the will; petition for final accounting and termination when the trust purpose is achieved","citations":["T.C.A. § 35-15-813","T.C.A. § 35-15-205","T.C.A. § 35-15-410(a)","T.C.A. § 30-1-404(b)"],"conditions":["Trustee must provide an annual report to qualified beneficiaries of trust property, liabilities, receipts, and disbursements. T.C.A. § 35-15-813(b).","The court may review trustee accountings if petitioned by a beneficiary or on the court's own motion. T.C.A. § 35-15-201(a).","Final accounting: upon resignation or removal of trustee or upon full or partial termination of the trust, a qualified beneficiary or successor trustee may petition the court to require the trustee to appear for a final accounting. T.C.A. § 35-15-205.","Trust termination: a trust terminates when the trust expires pursuant to its terms, no purpose of the trust remains to be achieved, or the purposes of the trust have become unlawful or impossible. T.C.A. § 35-15-410(a).","Public trustee filings: if the public trustee has been appointed, accountings are filed with the court every 12 months after qualification. T.C.A. § 30-1-404(b)."],"next_steps":["PR-TRU-007"],"decision_point":false,"notes":"[LOCAL RULE CHECK: PR-TRU-LRC-002] Annual accounting is an ongoing obligation for the life of the trust. Proceeds to PR-TRU-007 (appeal if contested)."},{"step_id":"PR-TRU-007","phase":"Appeal","court_type":"Probate Court","case_type":"Testamentary Trust Administration","actor":"Petitioner / Attorney","action":"File appeal from probate court trust order to appropriate appellate court","citations":["T.C.A. § 30-2-609","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from probate court orders in trust matters go to the Court of Appeals in counties where chancery court exercises probate jurisdiction. T.C.A. § 16-16-201(c). In counties with a separate probate court, confirm the appeal path from the applicable private act.","Notice of appeal must be filed within 30 days after entry of the order. Tenn. R. App. P. 4(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"PR-TRU-Flowchart.html"},{"flow_id":"PR-WIL","court_type":"Probate Court","case_type":"Will Contest","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"PR-WIL-GAP-001","affected_steps":["PR-WIL-003"],"description":"T.C.A. § 32-4-109 addresses the jurisdiction of courts to try the issue devisavit vel non. The corpus contains the section heading but the full text of § 32-4-109 specifying which court or courts have jurisdiction to try the will contest issue on the merits -- and whether it must be tried in the circuit or chancery court or may be tried in the probate court itself -- is not confirmed. T.C.A. § 32-4-101(b) defines 'the appropriate court for trial' as the court elected by the contestant in the notice of contest. This confirms the contestant's election right but the universe of courts available for that election should be confirmed from the full text of T.C.A. § 32-4-109."}],"conflicts":[{"conflict_id":"PR-WIL-CONF-001","affected_steps":["PR-WIL-001"],"description":"T.C.A. § 32-4-108 establishes a two-year statute of limitations for actions to set aside the probate of any will, running from the entry of the order admitting the will to probate. However, for persons under 18 years of age or adjudicated incompetent at the time the cause of action accrues, the savings provision of T.C.A. § 28-1-106 applies -- such persons have one year after removal of the disability to file the contest. Under the source hierarchy, both provisions are at the same TCA level; § 32-4-108 is the specific provision and the § 28-1-106 savings clause is expressly incorporated by reference. No genuine conflict; flagged for reviewer awareness because the two-year period runs from probate, not from death, and practitioners sometimes miscalculate the deadline."},{"conflict_id":"PR-WIL-CONF-002","affected_steps":["PR-WIL-004"],"description":"Upon the filing of a will contest, the probate court must appoint an administrator pendente lite if administration of the estate is necessary during the pending contest. T.C.A. § 30-1-108. However, the legatees or devisees who are adults are required to post a bond conditioned for the faithful prosecution of the suit. T.C.A. § 32-4-102. If all adult legatees or devisees refuse or fail to enter into a bond, the will shall not be admitted to probate but shall be held for naught and the property distributed as an intestate estate. T.C.A. § 32-4-102(b). This creates a procedural consequence -- if the legatees do not bond, the proponent of the will loses the right to have it probated during the contest, which effectively requires the legatees to either post bond or accept intestate distribution. Flagged for reviewer awareness as a procedural trap for will proponents."}],"local_rule_checks":[{"check_id":"PR-WIL-LRC-001","affected_steps":["PR-WIL-003"],"description":"Verify local practice for the court to which the will contest is transferred for trial. T.C.A. § 32-4-101(b) permits the contestant to elect the appropriate court for trial. Verify whether the local practice directs will contests to the circuit court, chancery court, or another court, and whether there is a local standing order governing the transfer procedure."}],"steps":[{"step_id":"PR-WIL-001","phase":"Case Initiation","court_type":"Probate Court","case_type":"Will Contest","actor":"Petitioner / Attorney","action":"File notice of will contest within two years of the order admitting the will to probate","citations":["T.C.A. § 32-4-101(a)","T.C.A. § 32-4-108"],"conditions":["Grounds for will contest include: lack of testamentary capacity; undue influence; fraud or duress in the execution of the will; improper execution (failure to comply with the formal requirements of T.C.A. § 32-1-104); and revocation of the will prior to the testator's death.","Statute of limitations: all actions or proceedings to set aside the probate of any will must be brought within two years from entry of the order admitting the will to probate, or are forever barred. T.C.A. § 32-4-108. Persons under 18 or adjudicated incompetent when the cause of action accrues have one year after removal of the disability. T.C.A. § 28-1-106.","Presumption: upon contest of a holographic will written within 30 days prior to the testator's death where the testator died by suicide, there is a presumption of suspicious circumstances; the proponent bears the burden of presenting evidence of testamentary capacity. T.C.A. § 32-4-105(b).","The contestant files the notice of contest in the probate court that admitted the will to probate."],"next_steps":["PR-WIL-002"],"decision_point":false,"notes":"[CONFLICT: PR-WIL-CONF-001]"},{"step_id":"PR-WIL-002","phase":"Case Initiation","court_type":"Probate Court","case_type":"Will Contest","actor":"Judge","action":"Enter order sustaining or denying the contestant's right to contest the will; require contestant's bond if right is sustained","citations":["T.C.A. § 32-4-101(a)","T.C.A. § 32-4-102(a)-(b)","T.C.A. § 30-1-108"],"conditions":["The probate court must enter an order sustaining or denying the contestant's right to contest. If the right to contest is sustained, the court must: (1) require the contestant to post a bond of $500 payable to the executor, conditioned for faithful prosecution and payment of costs if the contest fails; and (2) cause a certificate of the contest and the original will to be filed with the appropriate court for trial elected by the contestant. T.C.A. § 32-4-101(a).","Bond of legatees and devisees: adult legatees and devisees with notice that probate is contested must also enter into a $500 bond conditioned for faithful prosecution. If all adult legatees or devisees refuse or fail to bond, the will shall not be admitted to probate but shall be held for naught and the estate distributed as intestate. A legatee or devisee who records in writing that the legatee claims nothing under the will and is willing that it be set aside is not required to bond. T.C.A. § 32-4-102.","Administrator pendente lite: the probate court may appoint an administrator pendente lite to administer the estate during the contest. T.C.A. § 30-1-108.","Contest in forma pauperis: persons may contest a will as plaintiffs or defendants in the form prescribed for paupers. T.C.A. § 32-4-103."],"next_steps":["PR-WIL-003"],"decision_point":false,"notes":"[CONFLICT: PR-WIL-CONF-002] Proceeds to PR-WIL-003 (transfer to trial court)."},{"step_id":"PR-WIL-003","phase":"Service of Process","court_type":"Probate Court","case_type":"Will Contest","actor":"Probate Court Clerk","action":"File certificate of contest and original will with the court elected by the contestant for trial of the issue devisavit vel non","citations":["T.C.A. § 32-4-101(a)(2)","T.C.A. § 32-4-104"],"conditions":["The probate court clerk files the certificate of the contest and the original will with the court elected by the contestant (circuit court, chancery court, or another appropriate court for trial) as the court in which the issue devisavit vel non will be tried. T.C.A. § 32-4-101(a)(2).","After filing, an issue or issues shall be made up under the direction of the trial court to try the validity of the will. T.C.A. § 32-4-104.","If the original will is lost or mislaid so that it cannot be produced on the trial of the issue, but the paper has been copied into the pleadings or spread upon the minutes of the court, the court may proceed with the trial in the same manner as if the original were before it. T.C.A. § 32-4-106."],"next_steps":["PR-WIL-004"],"decision_point":false,"notes":"[GAP: PR-WIL-GAP-001] [LOCAL RULE CHECK: PR-WIL-LRC-001] Proceeds to PR-WIL-004 (trial of the issue devisavit vel non in the trial court)."},{"step_id":"PR-WIL-004","phase":"Trial","court_type":"Probate Court","case_type":"Will Contest","actor":"Judge","action":"Conduct trial of the issue devisavit vel non in the elected trial court; jury may be demanded by either party","citations":["T.C.A. § 32-4-105(a)","T.C.A. § 32-4-107(a)","Tenn. R. Civ. P. 38"],"conditions":["Either party may demand a jury trial on the issues submitted. T.C.A. § 32-4-107(a). The issue may be tried by a jury.","Burden of proof: upon the trial of the issue with a written will with witnesses, it shall be proved by all the living witnesses if to be found, and by such other persons as may be produced to support it. T.C.A. § 32-4-105(a).","The contestant bears the burden of proof on the grounds for invalidity (lack of capacity, undue influence, fraud, etc.) by a preponderance of the evidence.","No statements about testamentary capacity will in and of themselves rebut the presumption of capacity in the execution of an instrument; the presumption is that a person is of sound mind when they executed the will."],"next_steps":["PR-WIL-005"],"decision_point":false,"notes":"Proceeds to PR-WIL-005 (certification to probate court)."},{"step_id":"PR-WIL-005","phase":"Judgment","court_type":"Probate Court","case_type":"Will Contest","actor":"Judge","action":"Certify the verdict and judgment on the validity of the will to the probate court; probate court records the will if established or dismisses proceedings if the will fails","citations":["T.C.A. § 32-4-107(a)-(b)"],"conditions":["The verdict and judgment of the trial court on the validity of the will shall be certified to the court having probate jurisdiction to be recorded together with the original will, if the will is established. T.C.A. § 32-4-107(a).","If the issue was tried upon a copy of the original will, the copy shall be sent to the probate court to be recorded; the certificate, copy, verdict, and judgment shall have the same effect as if the original were in existence and certified to the court having probate jurisdiction. T.C.A. § 32-4-107(b).","If the will is established: the probate court records the will and the estate proceeds through administration under the will. See PR-TES flow.","If the will fails: the will is set aside and the estate is administered as intestate, unless there is a prior valid will that may be offered for probate. See PR-TES flow -- intestate branch."],"next_steps":["PR-WIL-006"],"decision_point":false,"notes":"Proceeds to PR-WIL-006 (appeal)."},{"step_id":"PR-WIL-006","phase":"Appeal","court_type":"Probate Court","case_type":"Will Contest","actor":"Petitioner / Attorney","action":"File notice of appeal from the trial court's judgment on the will contest to the appropriate appellate court","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from the trial court's judgment on the will contest issue proceed under the Tennessee Rules of Appellate Procedure applicable to the trial court from which the appeal is taken (Circuit Court appeals go to the Court of Appeals).","Notice of appeal must be filed within 30 days after entry of the judgment. Tenn. R. App. P. 4(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow. If the will is ultimately admitted to probate, the PR-TES flow governs the ensuing administration."}],"source_file":"PR-WIL-Flowchart.html"}]</script>
