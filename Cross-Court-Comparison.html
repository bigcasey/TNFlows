CH-FOR-010 (confirmation of sale)."},{"step_id":"CH-FOR-010","phase":"Judgment","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Judge","action":"Enter order confirming the foreclosure sale; upon confirmation, purchaser's title is absolute and no right of redemption exists","citations":["T.C.A. § 21-1-803"],"conditions":["Upon the sale being made, reported, and confirmed, no right of redemption or repurchase shall exist in the debtor or the debtor's creditors. The purchaser's title shall be absolute. T.C.A. § 21-1-803.","Grounds for non-confirmation of sale include: sale price grossly inadequate; irregularity in the conduct of the sale; defective notice; or fraud or collusion in the bidding.","If the court declines to confirm the sale, it may order a new sale under the same or different terms."],"next_steps":["CH-FOR-011"],"decision_point":false,"notes":"[CONFLICT: CH-FOR-CONF-002] [LOCAL RULE CHECK: CH-FOR-LRC-003] Proceeds to CH-FOR-011 (Clerk and Master's deed and deficiency judgment)."},{"step_id":"CH-FOR-011","phase":"Judgment","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Clerk and Master","action":"Execute and deliver Clerk and Master's deed to purchaser; record deed in county register of deeds office","citations":["T.C.A. § 16-1-108","T.C.A. § 16-1-109"],"conditions":["The Clerk and Master's deed has the same force and effect as a conveyance by the parties and shall be registered in the register of deeds office of the county where the land lies. T.C.A. § 16-1-108, § 16-1-109.","Deficiency judgment: if the sale proceeds are insufficient to satisfy the plaintiff's debt, the court may enter a deficiency judgment against the borrower and any guarantors for the remaining amount. The deficiency judgment is enforceable as any other civil judgment."],"next_steps":["CH-FOR-012"],"decision_point":false,"notes":"[GAP: CH-FOR-GAP-003] [LOCAL RULE CHECK: CH-FOR-LRC-004] Proceeds to CH-FOR-012 (post-judgment)."},{"step_id":"CH-FOR-012","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Plaintiff / Attorney","action":"File post-judgment motions within 30 days or enforce deficiency judgment through available execution remedies","citations":["Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02","Tenn. R. Civ. P. 69","T.C.A. § 21-1-804"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","A deficiency judgment is enforced through the standard execution procedures of Tenn. R. Civ. P. 69, including levy on personal property, garnishment, and execution on real property.","Chancery courts may enforce decrees by process against the person in default or against that person's property. T.C.A. § 21-1-804."],"next_steps":["CH-FOR-013"],"decision_point":false,"notes":"Proceeds to CH-FOR-013 (appeal)."},{"step_id":"CH-FOR-013","phase":"Appeal","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Plaintiff / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of final decree","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court judicial foreclosure decrees go to the Court of Appeals.","An order confirming a judicial foreclosure sale is a final judgment for purposes of appeal.","Timely post-trial motion extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-FOR-Flowchart.html"},{"flow_id":"CH-MNH","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[],"conflicts":[{"conflict_id":"CH-MNH-CONF-001","affected_steps":["CH-MNH-001"],"description":"T.C.A. § 33-3-603(b) specifies the courts with jurisdiction over commitment complaints: (1) Chancery Court; (2) Circuit Court; (3) Juvenile courts in proceedings presided over by attorney judges or referees; (4) Probate courts in counties over 400,000 population; and (5) General Sessions Courts in metropolitan governments over 400,000 population, but only for mandatory outpatient treatment petitions. Chancery Court and Circuit Court have statewide jurisdiction over all judicial commitment proceedings. The allocation of commitment cases between Chancery and Circuit Courts in a given county is a local practice determination not resolvable from statewide statutes. This flow applies to the Chancery Court path only."},{"conflict_id":"CH-MNH-CONF-002","affected_steps":["CH-MNH-006"],"description":"T.C.A. § 24-1-207(a)(3) provides that psychiatrist-patient communications are not privileged in proceedings to involuntarily hospitalize the patient under T.C.A. § 33-6-103 or § 33-6-104, but limits the exception to disclosures necessary to establish that the patient poses a substantial likelihood of serious harm. The scope of this exception is narrower than the general medical records exception and is specific to the commitment context. Under the source hierarchy, T.C.A. § 24-1-207(a)(3) is the specific statutory provision applicable to commitment proceedings and controls over the general evidentiary rules. Flagged for reviewer awareness that the psychiatrist-patient privilege exception in commitment proceedings is limited to the necessity standard."}],"local_rule_checks":[{"check_id":"CH-MNH-LRC-001","affected_steps":["CH-MNH-001"],"description":"Verify by judicial district whether judicial commitment proceedings are heard in Chancery Court or General Sessions Court, or both. In counties where General Sessions Court has concurrent jurisdiction, verify whether there is a local administrative order allocating commitment cases between courts."},{"check_id":"CH-MNH-LRC-002","affected_steps":["CH-MNH-003"],"description":"Verify local rules for the emergency admission and initial detention procedures, including whether a duty judge or duty chancellor is available for ex parte emergency orders and the local procedure for holding a person for evaluation pending the probable cause hearing."},{"check_id":"CH-MNH-LRC-003","affected_steps":["CH-MNH-006"],"description":"Verify local rules for scheduling of the probable cause hearing under T.C.A. § 33-6-422, including whether a magistrate or referee conducts the probable cause hearing in the local district and whether a separate final commitment hearing is scheduled on a different date."},{"check_id":"CH-MNH-LRC-004","affected_steps":["CH-MNH-010"],"description":"Verify local rules and the content of the standing and continuing order required by T.C.A. § 16-15-302(b) in each Chancery Court that hears commitment proceedings. Verify the local clerk's procedure for reporting commitment information to the FBI-NICS index and the Tennessee Department of Safety within three business days of entry of a commitment order."}],"steps":[{"step_id":"CH-MNH-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Petitioner / Attorney","action":"Determine the type of commitment proceeding and confirm Chancery Court jurisdiction and venue","citations":["T.C.A. § 33-3-603(a)-(b)","T.C.A. § 33-6-401","T.C.A. § 33-6-502"],"conditions":["Chancery Court has jurisdiction over judicial commitment proceedings under T.C.A. Title 33. T.C.A. § 33-3-603(b)(1). Circuit Court, juvenile courts (when presided over by attorney judges or referees), and probate courts in counties over 400,000 population also have jurisdiction. T.C.A. § 33-3-603(b)(2)-(4).","Venue: county in which the defendant resides or may be found. If the defendant is in a hospital or treatment resource, the complaint shall be filed where the person is; jurisdiction may be transferred for good cause to the court of the county of residence. T.C.A. § 33-3-603(a).","Two distinct paths exist: (1) emergency detention followed by probable cause hearing under T.C.A. § 33-6-401 et seq. (Part 4); and (2) complaint for judicial commitment filed directly under T.C.A. § 33-6-501 et seq. (Part 5). Both paths lead to the same judicial commitment standard under T.C.A. § 33-6-502.","Judicial commitment standard (T.C.A. § 33-6-502): all four elements must be established -- (1) person has a mental illness or serious emotional disturbance; (2) person poses a substantial likelihood of serious harm as defined in T.C.A. § 33-6-501; (3) person needs care, training, or treatment; and (4) all available less drastic alternatives are unsuitable.","Substantial likelihood of serious harm (T.C.A. § 33-6-501): requires both (a) a qualifying threatening or harmful act or inability to avoid severe impairment from specific risks, AND (b) a substantial likelihood the harm will occur unless the person is placed under involuntary treatment.","Rebuttable presumption: a person found incompetent to stand trial due to mental illness for a felony or Class A misdemeanor is presumed to meet the T.C.A. § 33-6-502 standard; this presumption may be rebutted only by clear and convincing evidence. T.C.A. § 33-6-502(b)."],"next_steps":["CH-MNH-002"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-MNH-LRC-001]"},{"step_id":"CH-MNH-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Petitioner / Attorney","action":"File sworn complaint for commitment with Clerk and Master identifying the defendant and the grounds","citations":["T.C.A. § 33-3-602","T.C.A. § 33-6-504","Tenn. R. Civ. P. 3"],"conditions":["Persons who may file a complaint for commitment: parent, legal guardian, legal custodian, conservator, spouse, or responsible relative; licensed physician; licensed psychologist meeting the requirements of T.C.A. § 33-6-427(a); health or public welfare officer; officer authorized to make arrests; or chief officer of a facility in which the defendant is located. T.C.A. § 33-6-504.","Complaint must be sworn and must show the defendant is subject to involuntary care and treatment, accompanied by certificates of need from two licensed physicians (or one physician and one qualified psychologist, or one physician and one qualified advanced practice provider) certifying that the defendant satisfies T.C.A. § 33-6-502(1)-(4), or by a sworn statement that defendant has refused examination. T.C.A. § 33-3-602.","Two certificates required unless a board-certified psychiatrist executes the first certificate, in which case the defendant may be admitted without a second certificate. T.C.A. § 33-6-426(b).","Filing fee: confirm against Standard Fees (AOC); commitment proceedings may qualify for a reduced or waived fee."],"next_steps":["CH-MNH-003"],"decision_point":false,"notes":"Proceeds to CH-MNH-003 (emergency detention assessment)."},{"step_id":"CH-MNH-003","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Law Enforcement","action":"Assess whether defendant is currently detained on emergency basis or whether emergency detention order is required","citations":["T.C.A. § 33-6-401","T.C.A. § 33-6-402","T.C.A. § 33-6-403","T.C.A. § 33-6-404"],"conditions":["Emergency detention: an officer authorized to make arrests, a licensed physician, a licensed psychologist under T.C.A. § 33-6-427(a), or a commissioner-designated professional may take a person into custody without a civil order or warrant if there is reason to believe the person is subject to detention under T.C.A. § 33-6-401 -- i.e., has a mental illness or serious emotional disturbance and poses an imminent substantial likelihood of serious harm. T.C.A. § 33-6-402.","Certificate of need: the physician, psychologist, or designated professional shall immediately examine the person and, if subject to admission under T.C.A. § 33-6-403, issue a certificate of need for emergency treatment. The certificate authorizes transportation to and admission at a hospital or treatment resource. T.C.A. § 33-6-404.","Detention may not be in a jail or other criminal custodial facility. T.C.A. § 33-6-425.","No treatment shall be given pending the probable cause hearing that will make the defendant unable to consult with counsel or prepare a defense. No psychosurgery, convulsive treatments, or insulin treatment may be given until after a commitment order is entered following the probable cause hearing. T.C.A. § 33-6-415."],"next_steps":["CH-MNH-004"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-MNH-LRC-002] Proceeds to CH-MNH-004 (notice and appointment of counsel)."},{"step_id":"CH-MNH-004","phase":"Pleadings","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Clerk issues notice of hearing to defendant, family members, and attorney; court appoints counsel if defendant is unrepresented","citations":["T.C.A. § 33-3-605","T.C.A. § 33-3-608","T.C.A. § 33-6-416","T.C.A. § 33-6-419"],"conditions":["Clerk must serve on the defendant a copy of the complaint with notice of the time and place of hearing, the defendant's right to counsel, and the applicable commitment standards. Notice is by personal service if the defendant is at liberty, by mail if the defendant is not at liberty. Clerk also sends copies to the defendant's attorney, the chief officer of any facility holding the defendant, and the defendant's legal guardian, conservator, spouse, parent, or adult next of kin. T.C.A. § 33-3-605.","Chief officer of the admitting facility must notify the general sessions court of the county where the facility is located upon admission and provide information from the certificates of need. T.C.A. § 33-6-413(a). If the court orders admission for emergency diagnosis, evaluation, and treatment, the chief officer gives notice of the order to the defendant and to the defendant's next of kin by mail or telephone. T.C.A. § 33-6-416.","Appointment of counsel: if defendant does not employ an attorney, the court shall appoint one not less than five days in advance of the hearing under Part 5 (T.C.A. § 33-3-608) or not later than two days after original detention or three days before the hearing under Part 4 (T.C.A. § 33-6-419), whichever is earlier.","An attorney representing the defendant shall not serve as guardian ad litem. If defendant cannot understand the nature of the proceedings or communicate with counsel, the court may appoint a separate person as guardian ad litem. T.C.A. § 33-3-608."],"next_steps":["CH-MNH-005"],"decision_point":false,"notes":"Proceeds to CH-MNH-005 (examination)."},{"step_id":"CH-MNH-005","phase":"Pleadings","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Hospital or treatment resource examines defendant to determine need for hospitalization; defendant may request independent examination","citations":["T.C.A. § 33-6-407","T.C.A. § 33-6-421","T.C.A. § 24-1-207(a)(3)"],"conditions":["The hospital or treatment resource that receives the defendant must conduct an examination to determine whether the defendant is subject to admission under T.C.A. § 33-6-403. The examination is conducted by a licensed physician, qualified advanced practice provider, or other authorized professional. T.C.A. § 33-6-407.","Before the probable cause hearing, the chief officer must file with the court certificates of need from two licensed physicians, or one physician and one qualified psychologist, or one physician and one qualified advanced practice provider (not in a collaborating agreement with the other certifying physician). T.C.A. § 33-6-421.","Psychiatrist-patient privilege exception: communications between a patient and a psychiatrist are not privileged in proceedings to involuntarily hospitalize the patient, but the exception is limited to disclosures necessary to establish that the patient poses a substantial likelihood of serious harm. T.C.A. § 24-1-207(a)(3).","Certifying professional testimony may be given by deposition or affidavit only with the consent of defendant's counsel. If consent is not given, a similarly qualified professional who has examined the defendant may testify in lieu of the certifying professional. T.C.A. § 33-3-615."],"next_steps":["CH-MNH-006"],"decision_point":false,"notes":"[CONFLICT: CH-MNH-CONF-002] Proceeds to CH-MNH-006 (probable cause hearing)."},{"step_id":"CH-MNH-006","phase":"Trial","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Conduct probable cause hearing; if probable cause found, defendant may be held up to 15 days for further judicial commitment proceedings","citations":["T.C.A. § 33-6-418","T.C.A. § 33-6-422","T.C.A. § 33-6-423","T.C.A. § 33-3-610","T.C.A. § 33-3-612","T.C.A. § 16-15-302(a)(2)"],"conditions":["Probable cause proceedings are conducted in conformity with T.C.A. §§ 33-3-610 through 33-3-615. T.C.A. § 33-6-418. Hearing shall be in a place where the court is usually held or in a physical setting not likely to harm the defendant's mental condition; not in a jail or criminal custodial facility. T.C.A. § 33-3-610.","If probable cause is found that the defendant is subject to care and treatment under T.C.A. § 33-6-502 and that if involuntary treatment is not continued the defendant's condition is likely to deteriorate rapidly to the point of re-admissibility, the court may order the defendant held for care and treatment pending a full commitment hearing; this period may not exceed 15 days. T.C.A. § 33-6-422.","If probable cause is not found, the court shall order the release of the defendant and terminate the proceedings. T.C.A. § 33-6-423.","Defendant has the right to be present, to testify, to present and cross-examine witnesses; defendant may waive presence only in writing. T.C.A. § 33-3-612.","If probable cause is found, the Chancery Court must report the finding to the FBI-NICS index and the Department of Safety within three business days. T.C.A. § 16-15-302(a)(2)."],"next_steps":["CH-MNH-007","CH-MNH-011"],"decision_point":true,"notes":"[LOCAL RULE CHECK: CH-MNH-LRC-003] Decision point: probable cause found proceeds to CH-MNH-007 (full commitment hearing); probable cause not found, defendant released, proceed to CH-MNH-011 (dismissal)."},{"step_id":"CH-MNH-007","phase":"Trial","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Schedule and conduct full judicial commitment hearing within 20 days of filing of complaint","citations":["T.C.A. § 33-3-606","T.C.A. § 33-3-608","T.C.A. § 33-3-609","T.C.A. § 33-3-612","T.C.A. § 33-3-615"],"conditions":["Full commitment hearing must be held as soon as possible, but not more than 20 days after the complaint was filed. The court may continue the hearing up to 10 days for good cause, or as long as necessary to impanel a jury if the defendant demands a jury trial. T.C.A. § 33-3-606.","Either party may demand a jury trial on the issues. T.C.A. § 33-3-609.","The defendant must be present unless the defendant waives the right in writing; if the defendant's physical health would be endangered by attendance, the court may continue the hearing. T.C.A. § 33-3-612(b).","Certifying professional testimony may be by deposition or affidavit only with the consent of defendant's counsel; absent consent, a qualified professional who has examined the defendant may testify instead, preserving the right of cross-examination. T.C.A. § 33-3-615.","The court shall give the defendant, the plaintiff, and all notified persons an opportunity to appear, testify, and present and cross-examine witnesses. T.C.A. § 33-3-612(a).","Hearing shall be conducted informally as consistent with orderly procedure. T.C.A. § 33-3-613."],"next_steps":["CH-MNH-008"],"decision_point":false,"notes":"Proceeds to CH-MNH-008 (findings and disposition)."},{"step_id":"CH-MNH-008","phase":"Trial","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Make findings and determine whether to enter a commitment order, outpatient treatment order, or dismissal","citations":["T.C.A. § 33-6-502(a)","T.C.A. § 33-6-505","T.C.A. § 33-6-506","T.C.A. § 33-6-507","T.C.A. § 33-6-508","T.C.A. § 33-6-602"],"conditions":["Court must find all four elements of T.C.A. § 33-6-502(a): (1) mental illness or serious emotional disturbance; (2) substantial likelihood of serious harm; (3) need for care, training, or treatment; and (4) all less drastic alternatives are unsuitable.","If commitment criteria are met, court may commit to: state hospital or treatment resource if available suitable accommodations exist (T.C.A. § 33-6-505); licensed public hospital or treatment resource with available suitable accommodations (T.C.A. § 33-6-506); licensed private or local public facility that has contracted with the department (T.C.A. § 33-6-507); or a non-state facility where third-party payment has been arranged (T.C.A. § 33-6-508).","Alternative to inpatient commitment -- outpatient treatment: if the defendant meets the criteria for release subject to mandatory outpatient treatment under T.C.A. § 33-6-602, the court may order outpatient treatment rather than inpatient commitment.","Person eligible for VA care: if the defendant is eligible for VA hospital care, the court may commit the defendant to the VA upon receipt of a certificate of availability and eligibility. T.C.A. § 33-6-510.","If commitment criteria are not met, the court must dismiss the petition and order release."],"next_steps":["CH-MNH-009","CH-MNH-011"],"decision_point":true,"notes":"Decision point: commitment criteria met proceed to CH-MNH-009; criteria not met proceed to CH-MNH-011."},{"step_id":"CH-MNH-009","phase":"Judgment","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Enter final order of judicial commitment specifying facility, duration, and conditions for discharge or review","citations":["T.C.A. § 33-6-502(a)","T.C.A. § 33-6-505","T.C.A. § 33-6-509","T.C.A. § 33-3-101","T.C.A. § 33-3-102","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["Order must identify the specific hospital or treatment resource; the facility may not admit the defendant until it has available suitable accommodations. T.C.A. § 33-6-509.","A person committed under this title has the same rights as all other persons except to the extent expressly limited by this title; commitment does not by itself deprive the defendant of the right to dispose of property, execute instruments, make purchases, enter contracts, give informed consent to treatment, or vote. T.C.A. § 33-3-101, § 33-3-102.","All applications, certificates, records, and pleadings in commitment proceedings are confidential. T.C.A. § 33-3-103.","Written findings of fact and conclusions of law are required. Tenn. R. Civ. P. 52.01."],"next_steps":["CH-MNH-010"],"decision_point":false,"notes":"Proceeds to CH-MNH-010 (NICS reporting)."},{"step_id":"CH-MNH-010","phase":"Judgment","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Clerk and Master","action":"Report commitment to FBI-NICS index and Tennessee Department of Safety within three business days of entry of commitment order","citations":["T.C.A. § 16-15-302(b)-(d)"],"conditions":["Chancery Courts where commitments are ordered under T.C.A. Title 33, Chapters 6 or 7 must enter a standing and continuing order directing the clerk to collect and report commitment information to the FBI-NICS index and the Tennessee Department of Safety no later than the third business day following entry of the order. T.C.A. § 16-15-302(b).","Required report contents: complete name and all aliases; case or docket number; date of commitment; name of the hospital or treatment resource; date of birth; race and sex; and Social Security number if available. T.C.A. § 16-15-302(c).","Reported information protected by other statutes or regulations remains confidential and is not subject to public inspection except as necessary in specified proceedings. T.C.A. § 16-15-302(d)."],"next_steps":["CH-MNH-012"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-MNH-LRC-004] Proceeds to CH-MNH-012 (periodic review and discharge)."},{"step_id":"CH-MNH-011","phase":"Judgment","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Judge","action":"Enter order dismissing petition and releasing respondent from any emergency detention","citations":["T.C.A. § 33-6-416","Tenn. R. Civ. P. 58"],"conditions":["If the court finds at the probable cause hearing or at the final hearing that the criteria for commitment are not established by the applicable standard, the petition is dismissed and any emergency detention order is dissolved.","Dismissal of the petition does not prevent a subsequent petition if the respondent's condition changes or new evidence of the criteria is obtained."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Dismissal ends the case lifecycle for purposes of this flow."},{"step_id":"CH-MNH-012","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Petitioner / Attorney","action":"Hospital conducts periodic review of committed person; defendant may petition for examination and discharge after 90 days","citations":["T.C.A. § 33-6-701","T.C.A. § 33-6-702","T.C.A. § 33-6-703","T.C.A. § 33-6-704","T.C.A. § 33-6-705","T.C.A. § 33-6-706"],"conditions":["Hospital must examine each committed person as often as practicable but not less than every six months. If eligible for discharge and not subject to judicial review, the chief officer shall order immediate release and notify the committing court. T.C.A. § 33-6-701.","Defendant or defendant's attorney, parent, legal guardian, conservator, spouse, or adult next of kin may request in writing, after expiration of 90 days following the commitment order and not more frequently than every six months thereafter, that the chief officer have a current examination conducted by one or more physicians. T.C.A. § 33-6-702.","If one or more physicians reports the defendant no longer meets the admission standards, the defendant may petition the committing court for an order directing release. The court considers testimony and reports of the physicians and either rejects the petition and orders continued hospitalization, or orders immediate release. T.C.A. § 33-6-703, § 33-6-704.","Discharge is required when: defendant does not have a mental illness; defendant has a mental illness but does not pose a likelihood of serious harm; or voluntary outpatient treatment is a suitable less drastic alternative. T.C.A. § 33-6-706.","Release subject to outpatient treatment: if the hospital determines the defendant meets the criteria under T.C.A. § 33-6-602 for mandatory outpatient treatment, the hospital shall develop an outpatient treatment plan in consultation with the defendant and notify the committing court. T.C.A. § 33-6-602, § 33-6-603, § 33-6-605."],"next_steps":["CH-MNH-013"],"decision_point":false,"notes":"Periodic review is an ongoing obligation for the duration of commitment. Proceeds to CH-MNH-013 (appeal)."},{"step_id":"CH-MNH-013","phase":"Appeal","court_type":"Chancery Court","case_type":"Mental Health Commitment (Judicial Commitment Proceedings)","actor":"Petitioner / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of commitment order","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court commitment orders go to the Court of Appeals.","An appeal from a commitment order is not moot if the defendant remains committed; the commitment may be challenged on appeal even if the initial commitment period has expired if the commitment has collateral consequences, including the NICS reporting and firearms disability under T.C.A. § 33-6-501.","Timely post-trial motion extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-MNH-Flowchart.html"},{"flow_id":"CH-PRO","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CH-PRO-GAP-001","affected_steps":["CH-PRO-002"],"description":"The filing fee for a quiet title or partition petition in Chancery Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount is not available in the corpus fee schedule text. The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies. A lis pendens must also be filed with the county register of deeds; the register's fee for recording a lis pendens should be confirmed."},{"gap_id":"CH-PRO-GAP-002","affected_steps":["CH-PRO-009"],"description":"T.C.A. § 29-27-106 authorizes a petition for partition; T.C.A. §§ 29-27-201 through 29-27-203 govern the appointment of commissioners to make partition in kind. The corpus contains references to these provisions but the full text of T.C.A. §§ 29-27-201 through 29-27-203 is not confirmed to be available. The specific number of commissioners, the qualifications, the oath, and the report requirements for partition in kind should be confirmed from the full corpus of Title 29, Chapter 27."},{"gap_id":"CH-PRO-GAP-003","affected_steps":["CH-PRO-011"],"description":"T.C.A. § 21-1-803 governs credit terms for judicial sales in foreclosure cases. The corpus does not confirm whether the same credit terms (not less than six months nor more than two years) apply to partition sales ordered by Chancery Court or whether a different standard applies. The applicable credit terms for partition sales should be confirmed from the full corpus of Title 29, Chapter 27."}],"conflicts":[{"conflict_id":"CH-PRO-CONF-001","affected_steps":["CH-PRO-001"],"description":"T.C.A. § 16-11-111 grants Chancery Court concurrent jurisdiction with Circuit Court and county courts over proceedings for partition or sale of estates by personal representatives, guardians, heirs, or tenants in common. T.C.A. § 16-10-109 grants Circuit Court concurrent jurisdiction with Chancery and county courts to make partition and distribution and to sell property. T.C.A. § 29-16-104 provides for a 'bill or petition' for partition without specifying whether it must be filed in Chancery Court specifically. All three provisions are TCA statutes at the same level; no provision controls the others. The choice of court for partition is a local practice determination. This flow applies to the Chancery Court path only."},{"conflict_id":"CH-PRO-CONF-002","affected_steps":["CH-PRO-003"],"description":"Quiet title actions are equitable in nature and properly belong in Chancery Court. However, T.C.A. § 16-11-102(a) grants Chancery Court concurrent jurisdiction over all civil causes triable in Circuit Court, and Circuit Court may hear quiet title actions where the equitable issues are incidental to a legal dispute. In practice, quiet title actions are routinely filed in either court in Tennessee. The Chancery Court path is appropriate for cases requiring equitable relief beyond a declaration of title. Flagged for reviewer awareness that a Circuit Court quiet title filing is also available."}],"local_rule_checks":[{"check_id":"CH-PRO-LRC-001","affected_steps":["CH-PRO-002"],"description":"Verify local rules for any required lis pendens form and whether the court clerk or the party files the lis pendens abstract with the county register of deeds. T.C.A. § 25-5-107 requires a lis pendens abstract to be filed in the register's office of the county where the land lies to affect the rights of bona fide purchasers. Some local Chancery Courts require proof of lis pendens registration to be filed with the court."},{"check_id":"CH-PRO-LRC-002","affected_steps":["CH-PRO-009"],"description":"Verify local rules for the appointment and procedure of partition commissioners in the local judicial district. Local chancery courts vary significantly in the number of commissioners appointed for partition in kind, the form of the commissioners' oath, the report format, and the timeline for submission of the commissioners' report."},{"check_id":"CH-PRO-LRC-003","affected_steps":["CH-PRO-011"],"description":"Verify local rules for judicial sales in partition proceedings conducted by the Clerk and Master, including publication requirements, the upset bid period, and the confirmation hearing schedule. Several local chancery courts have standing orders governing the conduct of partition sales."}],"steps":[{"step_id":"CH-PRO-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Plaintiff / Attorney","action":"Determine the type of property dispute and confirm Chancery Court jurisdiction and venue","citations":["T.C.A. § 16-11-103","T.C.A. § 16-11-111","T.C.A. § 29-27-106"],"conditions":["Quiet title: Chancery Court has exclusive original jurisdiction over cases of an equitable nature. T.C.A. § 16-11-103. Quiet title is an equitable action to determine adverse claims to real property and extinguish all other claims. Venue is in the county where the land or any part of it lies.","Partition: Chancery Court has concurrent jurisdiction over proceedings for partition or sale of estates by personal representatives, guardians, heirs, or tenants in common. T.C.A. § 16-11-111. A court of record may decree a sale of lands lying in any part of the state. T.C.A. § 16-1-107. Venue is in the county where the land or any part of it lies.","Partition in kind vs. sale: the court first determines whether the land can be fairly partitioned in kind among all co-tenants. If partition in kind is inequitable or impracticable, the court may order a sale of the land and division of proceeds. T.C.A. § 29-27-106.","A court having jurisdiction to sell lands may divest and vest title directly by decree, or empower the clerk to make title. T.C.A. § 16-1-108."],"next_steps":["CH-PRO-002"],"decision_point":false,"notes":"[CONFLICT: CH-PRO-CONF-001] [CONFLICT: CH-PRO-CONF-002] Proceeds to CH-PRO-002 (filing and lis pendens)."},{"step_id":"CH-PRO-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Plaintiff / Attorney","action":"File petition with Clerk and Master, register lis pendens in county register of deeds office, and pay filing fee","citations":["T.C.A. § 29-27-106","T.C.A. § 25-5-107","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["Petition must identify: the property by legal description; all persons having or claiming any interest in the property; the nature of each adverse claim (quiet title) or the nature of each co-tenancy interest and share (partition); and the relief sought.","Lis pendens: the title to real estate in counties other than the county where the bill in equity is filed is not affected, as to third parties without actual notice, until an abstract or memorandum of the proceeding certified by the clerk is filed for record in the register's office of the county where the land lies. T.C.A. § 25-5-107.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["CH-PRO-003"],"decision_point":false,"notes":"[GAP: CH-PRO-GAP-001] [LOCAL RULE CHECK: CH-PRO-LRC-001] Proceeds to CH-PRO-003 (service of process)."},{"step_id":"CH-PRO-003","phase":"Service of Process","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Plaintiff / Attorney","action":"Effect service of process on all known defendants and seek constructive service by publication for unknown claimants","citations":["Tenn. R. Civ. P. 4.04","Tenn. R. Civ. P. 4.05","T.C.A. § 21-1-203","T.C.A. § 21-1-204","T.C.A. § 21-1-205"],"conditions":["All persons having or claiming any interest in the property must be made parties. Unknown claimants may be served by constructive service under T.C.A. § 21-1-203 through § 21-1-205 upon affidavit establishing that the defendant's name or residence is unknown and cannot be ascertained by diligent inquiry. Publication is for four consecutive weeks in a designated newspaper. Clerk and Master must mail a copy to the last known address by certified mail.","A decree against a defendant without personal service who does not appear is not absolute for three years from the decree, unless a copy of the decree is served upon the defendant. T.C.A. § 21-1-402.","The original defendant, or the defendant's heir or assignee claiming under the defendant by virtue of any act done before commencement of the suit, may within six months after service of a copy of the decree, or within three years after the decree, be admitted to answer the bill upon petition showing merits. T.C.A. § 21-1-404."],"next_steps":["CH-PRO-004"],"decision_point":false,"notes":"Proceeds to CH-PRO-004 (answer)."},{"step_id":"CH-PRO-004","phase":"Pleadings","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Defendant / Attorney","action":"File answer and assert any counterclaims to title or partition shares within 30 days after service","citations":["Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 8.01"],"conditions":["Defendants who fail to answer may be defaulted; default in a quiet title or partition action does not prevent the court from proceeding to determine the rights of appearing parties.","A defendant who claims an interest superior to or inconsistent with the plaintiff's title may assert that claim by way of answer and counterclaim."],"next_steps":["CH-PRO-005"],"decision_point":false,"notes":"Proceeds to CH-PRO-005 (scheduling and discovery)."},{"step_id":"CH-PRO-005","phase":"Discovery","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Judge","action":"Enter scheduling order and conduct discovery on title chain, co-tenancy interests, and property valuation","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 34"],"conditions":["Discovery in quiet title cases encompasses chain of title documents, deeds, surveys, adverse possession evidence, and any recorded instruments affecting title.","Discovery in partition cases encompasses deeds establishing co-tenancy, evidence of each party's proportionate share, property valuation, and evidence of improvements made by any co-tenant.","Requests for production of recorded instruments, surveys, and title abstracts are common."],"next_steps":["CH-PRO-006"],"decision_point":false,"notes":"Proceeds to CH-PRO-006 (pre-trial motions and summary judgment)."},{"step_id":"CH-PRO-006","phase":"Motions Practice","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Plaintiff / Attorney","action":"File pre-trial motions including motions for summary judgment on undisputed title issues","citations":["Tenn. R. Civ. P. 56","Tenn. R. Civ. P. 6.04"],"conditions":["If all material title issues and partition shares are undisputed, the court may determine the matter on summary judgment or by consent decree without a full hearing."],"next_steps":["CH-PRO-007"],"decision_point":false,"notes":"Proceeds to CH-PRO-007 (final hearing)."},{"step_id":"CH-PRO-007","phase":"Trial","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Judge","action":"Conduct final hearing on contested title or partition issues","citations":["T.C.A. § 21-1-103","Tenn. R. Civ. P. 52.01","Tenn. R. Evid. 101"],"conditions":["Either party is entitled upon application to a jury to try any material disputed fact, except in accounting matters. T.C.A. § 21-1-103.","For quiet title: court determines the state of title as against each adverse claimant and adjudicates each claim.","For partition: court determines each co-tenant's proportionate share and whether partition in kind is practicable and equitable, or whether a sale and division of proceeds is required.","Findings of fact and conclusions of law are required. Tenn. R. Civ. P. 52.01."],"next_steps":["CH-PRO-008"],"decision_point":false,"notes":"Proceeds to CH-PRO-008 (decree and assessment of partition method)."},{"step_id":"CH-PRO-008","phase":"Judgment","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Judge","action":"Enter decree adjudicating title or directing partition; assess whether partition in kind or sale is appropriate","citations":["T.C.A. § 16-1-108","T.C.A. § 16-1-109","T.C.A. § 29-27-106","Tenn. R. Civ. P. 58","Tenn. R. Civ. P. 70"],"conditions":["Quiet title decree: vests title in the prevailing party by decree; operates as a conveyance and must be registered in the register of deeds office of the county where the land lies. T.C.A. § 16-1-108, § 16-1-109. A specific performance decree operates as a deed if so ordered. Tenn. R. Civ. P. 70.","Partition in kind: if land can be fairly partitioned, court appoints commissioners to divide the land and set off each party's share. Proceed to CH-PRO-009.","Partition by sale: if partition in kind is impracticable or inequitable, court orders a sale of the property and division of proceeds in proportion to each party's share. Proceed to CH-PRO-011.","The court may decree a sale of lands lying in any part of the state in proceedings to partition. T.C.A. § 16-1-107."],"next_steps":["CH-PRO-009","CH-PRO-011","CH-PRO-012"],"decision_point":true,"notes":"Decision point: quiet title with no sale proceeds to CH-PRO-012 (registration and post-judgment); partition in kind proceeds to CH-PRO-009; partition by sale proceeds to CH-PRO-011."},{"step_id":"CH-PRO-009","phase":"Judgment","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Judge","action":"Partition in kind path: appoint commissioners to divide the land and set off each party's proportionate share","citations":["T.C.A. § 29-27-106"],"conditions":["The court appoints commissioners who are sworn to faithfully and impartially divide and apportion the land according to the decree.","Commissioners survey the land, consider improvements made by any co-tenant, and divide the land into shares proportionate to each party's interest.","The commissioners file a report of the division with the Clerk and Master. Any party may file exceptions to the report. The court then adopts, modifies, or rejects the report."],"next_steps":["CH-PRO-010"],"decision_point":false,"notes":"[GAP: CH-PRO-GAP-002] [LOCAL RULE CHECK: CH-PRO-LRC-002] Proceeds to CH-PRO-010 (confirmation of partition in kind)."},{"step_id":"CH-PRO-010","phase":"Judgment","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Judge","action":"Confirm commissioners' report of partition in kind and enter final decree vesting title to each share in the respective party","citations":["T.C.A. § 16-1-108","T.C.A. § 16-1-109","T.C.A. § 16-1-110","Tenn. R. Civ. P. 58"],"conditions":["Upon confirmation of the commissioners' report, the court enters a decree vesting title to each party's specific parcel or share.","The decree or clerk's deed has the same force and effect as a conveyance by the parties and shall be registered in the register of deeds. T.C.A. § 16-1-108, § 16-1-109.","In cases where the sale is made at the voluntary instance of parties, the decree or deed shall imply a covenant of seisin and warranty unless otherwise provided in the decree. T.C.A. § 16-1-110."],"next_steps":["CH-PRO-012"],"decision_point":false,"notes":"Proceeds to CH-PRO-012 (registration and post-judgment)."},{"step_id":"CH-PRO-011","phase":"Judgment","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Clerk and Master","action":"Partition by sale path: conduct judicial sale of the property; file report of sale with court","citations":["T.C.A. § 21-1-803","T.C.A. § 18-2-106","T.C.A. § 18-2-107"],"conditions":["Sale terms: the court may order the property sold on credit of not less than six months nor more than two years; when the sale is made, reported, and confirmed, no right of redemption shall exist in any party and the purchaser's title shall be absolute. T.C.A. § 21-1-803.","The Clerk and Master reports the sale at each term of court; any person interested may except to the report. The court's action on the report is embodied in a decree entered on the minutes. T.C.A. § 18-2-106, § 18-2-107.","Surplus proceeds over and above the complainant's claim are paid to the parties in proportion to their respective shares."],"next_steps":["CH-PRO-012"],"decision_point":false,"notes":"[GAP: CH-PRO-GAP-003] [LOCAL RULE CHECK: CH-PRO-LRC-003] Proceeds to CH-PRO-012 (registration and post-judgment)."},{"step_id":"CH-PRO-012","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Plaintiff / Attorney","action":"Register final decree or clerk's deed in county register of deeds office and file post-judgment motions if applicable","citations":["T.C.A. § 16-1-109","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02"],"conditions":["The decree or clerk's deed must be registered in the register's office of the county where the land lies. T.C.A. § 16-1-109.","All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Chancery courts may enforce decrees by process against the person or against the person's property. T.C.A. § 21-1-804."],"next_steps":["CH-PRO-013"],"decision_point":false,"notes":"Proceeds to CH-PRO-013 (appeal)."},{"step_id":"CH-PRO-013","phase":"Appeal","court_type":"Chancery Court","case_type":"Property Disputes (Quiet Title and Partition)","actor":"Plaintiff / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of final decree","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court property dispute decrees go to the Court of Appeals. The Court of Appeals independently considers all material facts in the record. T.C.A. § 27-1-113.","Timely post-trial motion extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-PRO-Flowchart.html"},{"flow_id":"CH-TRU","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[],"conflicts":[{"conflict_id":"CH-TRU-CONF-001","affected_steps":["CH-TRU-001"],"description":"T.C.A. § 35-15-203 confirms that Chancery Courts and other courts of record having probate jurisdiction have exclusive concurrent jurisdiction over proceedings brought by a trustee or beneficiary concerning the administration of a trust. No other courts have jurisdiction over such proceedings. Chancery Court and probate courts with jurisdiction are the only permissible forums for trust administration and dispute matters. The choice between Chancery Court and a separate probate court (where one exists) is a local practice determination. Venue is in the county where the trust's principal place of administration is located; if the trust is created by will and the estate is not yet closed, venue may also be in the county where the decedent's estate is being administered. T.C.A. § 35-15-204."},{"conflict_id":"CH-TRU-CONF-002","affected_steps":["CH-TRU-008"],"description":"T.C.A. § 35-15-704 is the primary statute governing successor trustee vacancies and appointment under the Tennessee Uniform Trust Code. A vacancy in a trusteeship must be filled if the trust has no remaining trustee. T.C.A. § 35-15-704(b). A vacancy must be filled by: (1) a person designated in the trust instrument; (2) a person appointed by unanimous action of qualified beneficiaries; or (3) court appointment. T.C.A. § 35-15-704(c). T.C.A. § 30-1-404(b) provides that if a trustee vacancy exists and no beneficiary petitions for appointment within three months, the court may appoint the public trustee. Under the source hierarchy, T.C.A. § 35-15-704 as the more specific UTC provision governs the succession mechanism; T.C.A. § 30-1-404(b) applies as the fallback when all UTC mechanisms have been exhausted. No genuine conflict; flagged to ensure practitioners exhaust UTC succession procedures before resorting to the public trustee."}],"local_rule_checks":[{"check_id":"CH-TRU-LRC-001","affected_steps":["CH-TRU-001"],"description":"Verify by judicial district whether trust administration and dispute matters are routinely heard in Chancery Court or whether a separate probate court with concurrent jurisdiction is the preferred forum in that county. Where a probate court exists and has administered a testamentary trust, the probate court may have priority of jurisdiction."},{"check_id":"CH-TRU-LRC-002","affected_steps":["CH-TRU-002"],"description":"Verify local rules for any cover sheet, trust information sheet, or identification of beneficiaries form required at the time of filing a trust petition in Chancery Court. Some districts require a list of qualified beneficiaries to be filed with the petition."},{"check_id":"CH-TRU-LRC-003","affected_steps":["CH-TRU-007"],"description":"Verify local rules for reference to the Clerk and Master in trust accounting matters. Local chancery courts vary significantly in whether trust accounting references are made to the Clerk and Master or heard directly by the chancellor."},{"check_id":"CH-TRU-LRC-004","affected_steps":["CH-TRU-009"],"description":"Verify local rules for the procedure by which nonjudicial settlement agreements are filed with and acknowledged by the court without requiring a full hearing. Some local Chancery Courts require a motion and order confirming receipt of a nonjudicial settlement agreement."}],"steps":[{"step_id":"CH-TRU-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Petitioner / Attorney","action":"Determine the type of trust proceeding and confirm Chancery Court jurisdiction","citations":["T.C.A. § 35-15-201","T.C.A. § 35-15-202","T.C.A. § 35-15-203","T.C.A. § 35-15-204"],"conditions":["Chancery Courts and other courts of record having probate jurisdiction have exclusive concurrent jurisdiction over proceedings brought by a trustee or beneficiary concerning the administration of a trust; no other courts have jurisdiction over such proceedings. T.C.A. § 35-15-203(1).","The court may intervene in the administration of a trust to the extent its jurisdiction is invoked by an interested person or as provided by law. A trust is not subject to continuing judicial supervision unless ordered by the court. T.C.A. § 35-15-201.","A trustee who accepts trusteeship of a trust with its principal place of administration in Tennessee submits personally to the jurisdiction of Tennessee courts regarding any matter involving the trust. T.C.A. § 35-15-202.","Venue: county where the trust's principal place of administration is or will be located; if a trust is created by will and the estate is not yet closed, also in the county where the decedent's estate is being administered. If the trust has no trustee, venue may be in any county where a beneficiary resides or where trust property is located. T.C.A. § 35-15-204.","Types of trust proceedings include: trustee accounting; trustee removal (T.C.A. § 35-15-706); successor trustee appointment (T.C.A. § 35-15-704); trust construction or reformation; modification or termination (T.C.A. §§ 35-15-410 through 35-15-414); trustee surcharge for breach (T.C.A. § 35-15-1001); and creditor and beneficiary disputes."],"next_steps":["CH-TRU-002"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-TRU-LRC-001]"},{"step_id":"CH-TRU-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Petitioner / Attorney","action":"File petition with Clerk and Master identifying the trust, the parties, the relief sought, and paying filing fee","citations":["T.C.A. § 35-15-103","T.C.A. § 35-15-201(c)","T.C.A. § 35-15-204","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["The petition must identify the trust by name and date; the current trustee; all qualified beneficiaries as defined in T.C.A. § 35-15-103; the county constituting the principal place of administration; and the relief sought.","A judicial proceeding involving a trust may relate to any matter involving the trust's administration, including a request for instructions and an action to declare rights. T.C.A. § 35-15-201(c).","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["CH-TRU-003"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-TRU-LRC-002] Proceeds to CH-TRU-003 (notice)."},{"step_id":"CH-TRU-003","phase":"Service of Process","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Clerk and Master","action":"Issue summons and notice to all qualified beneficiaries and other interested parties","citations":["T.C.A. § 35-15-109","T.C.A. § 35-15-110","T.C.A. § 35-15-301","T.C.A. § 35-15-304","T.C.A. § 35-15-305","Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.04"],"conditions":["Notice must be given to all qualified beneficiaries as defined by T.C.A. § 35-15-103. Notice to a person who may represent and bind another person has the same effect as if given directly to that person. T.C.A. § 35-15-301.","Representation of minors, incapacitated persons, and unborn beneficiaries: a person with a substantially identical interest may represent and bind a minor, incapacitated, or unborn individual, or a person whose identity or location is unknown, to the extent there is no material conflict of interest between the representative and the person represented. T.C.A. § 35-15-304.","If an interest is not represented or available representation may be inadequate, the court may appoint a representative to receive notice, give consent, and otherwise act on behalf of the unrepresented person. T.C.A. § 35-15-305."],"next_steps":["CH-TRU-004"],"decision_point":false,"notes":"Proceeds to CH-TRU-004 (answer and contested determination)."},{"step_id":"CH-TRU-004","phase":"Pleadings","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Respondent / Attorney","action":"File answer or response within 30 days after service; assess whether matter is contested or may proceed by agreement","citations":["Tenn. R. Civ. P. 12.01"],"conditions":["If all interested parties agree to the relief sought, the matter may proceed by nonjudicial settlement agreement under T.C.A. § 35-15-111 without a full hearing; see CH-TRU-009.","If the trustee seeks instructions or construction of the trust instrument and no adversarial issues are raised, the court may proceed on the petition without a contested hearing.","If any party contests the relief sought, the matter proceeds as a contested equity proceeding."],"next_steps":["CH-TRU-005","CH-TRU-009"],"decision_point":true,"notes":"Decision point: uncontested or nonjudicial settlement path proceeds to CH-TRU-009; contested path proceeds to CH-TRU-005."},{"step_id":"CH-TRU-005","phase":"Discovery","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Judge","action":"Enter scheduling order and conduct discovery on trust administration facts, trustee conduct, and any breach of fiduciary duty claims","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 30","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34"],"conditions":["Discovery in trust disputes encompasses trust accountings, trustee investment decisions, communications with beneficiaries, trustee compensation, conflicts of interest, and any conduct alleged to constitute breach of fiduciary duty.","The Clerk and Master may be directed by the court to examine trust accountings and report findings to the chancellor. Tenn. R. Civ. P. 53.01, 53.04."],"next_steps":["CH-TRU-006"],"decision_point":false,"notes":"[GAP: CH-TRU-GAP-003] Proceeds to CH-TRU-006 (motions and reference to Clerk and Master)."},{"step_id":"CH-TRU-006","phase":"Motions Practice","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Judge","action":"Rule on pre-trial motions; enter order of reference to Clerk and Master if accounting is at issue","citations":["Tenn. R. Civ. P. 53.01","Tenn. R. Civ. P. 53.03","Tenn. R. Civ. P. 53.04","T.C.A. § 21-1-104"],"conditions":["Reference to Clerk and Master: the court may refer trust accounting matters and other specified issues to the Clerk and Master. Tenn. R. Civ. P. 53.01.","Any party may file written objections to the Clerk and Master's report within 10 days after notice of filing. The court may adopt, modify, or reject the report, receive further evidence, or recommit with instructions. Tenn. R. Civ. P. 53.04(2).","Chancellors may appoint referees or commissioners to take accounts where the Clerk and Master is interested or unable to attend. T.C.A. § 21-1-104."],"next_steps":["CH-TRU-007"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-TRU-LRC-003] Proceeds to CH-TRU-007 (pre-trial conference and trial)."},{"step_id":"CH-TRU-007","phase":"Trial","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Judge","action":"Conduct final hearing on contested trust issues","citations":["T.C.A. § 21-1-103","Tenn. R. Civ. P. 52.01","Tenn. R. Evid. 101"],"conditions":["Either party is entitled, upon application, to a jury to try and determine any material fact in dispute, except in cases involving complicated accounting and those elsewhere excepted by law. T.C.A. § 21-1-103.","The court hears evidence on contested issues including trustee conduct, accounting accuracy, trust construction, and beneficiary rights.","Findings of fact and conclusions of law are required. Tenn. R. Civ. P. 52.01."],"next_steps":["CH-TRU-008"],"decision_point":false,"notes":"Proceeds to CH-TRU-008 (entry of final decree)."},{"step_id":"CH-TRU-008","phase":"Judgment","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Judge","action":"Enter final decree resolving trust dispute, ordering accounting, removing or surcharging trustee, appointing successor trustee, or modifying or terminating trust as authorized","citations":["T.C.A. § 35-15-205","T.C.A. § 35-15-704","T.C.A. § 35-15-706","T.C.A. § 35-15-1001","T.C.A. § 35-15-1002","T.C.A. § 35-15-1004","T.C.A. § 35-15-1005","T.C.A. § 30-1-404(b)","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["Trustee removal: the court may remove a trustee upon request of the settlor, a cotrustee, or a qualified beneficiary, or on its own initiative, on grounds including: serious breach of trust; lack of cotrustee cooperation substantially impairing administration; unfitness, unwillingness, or persistent failure to administer effectively; or substantial change of circumstances where removal serves the beneficiaries' interests. T.C.A. § 35-15-706(b).","Successor trustee appointment: a vacancy must be filled if the trust has no remaining trustee. The successor is: (1) the person designated in the trust; (2) a person appointed by unanimous agreement of qualified beneficiaries; or (3) a person appointed by the court. T.C.A. § 35-15-704(b)-(c). If all UTC mechanisms are exhausted, the court may appoint the public trustee as the fallback. T.C.A. § 30-1-404(b).","Final accounting: upon trustee resignation or removal or full or partial termination of the trust, a qualified beneficiary or successor trustee may petition the court to require the transferring trustee to appear for a final accounting. T.C.A. § 35-15-205.","Breach of trust remedies: the court may compel performance, enjoin breach, compel redress by payment of money or restoration of property, order an accounting, appoint a special fiduciary, suspend or remove the trustee, reduce or deny compensation, or impose any other appropriate equitable remedy. T.C.A. § 35-15-1001(b).","Damages for breach: trustee is liable for the greater of the amount required to restore the value of trust property and distributions to what they would have been absent the breach, or the profit the trustee made by reason of the breach. T.C.A. § 35-15-1002(a).","Attorney fees and costs: the court, as justice and equity may require, may award costs and expenses including reasonable attorney fees to any party, to be paid by another party or from the trust. T.C.A. § 35-15-1004(a).","Statute of limitations: a beneficiary or trustee shall not commence a proceeding for breach of trust more than one year after the date the claimant or a representative was sent information adequately disclosing facts indicating the existence of a potential claim. T.C.A. § 35-15-1005(a)(1)."],"next_steps":["CH-TRU-010"],"decision_point":false,"notes":"Proceeds to CH-TRU-010 (post-judgment)."},{"step_id":"CH-TRU-009","phase":"Judgment","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Petitioner / Attorney","action":"Nonjudicial settlement agreement path: all interested parties execute and file nonjudicial settlement agreement resolving trust matter; any party may petition court to approve the agreement","citations":["T.C.A. § 35-15-111","T.C.A. § 35-15-301","T.C.A. § 35-15-304","T.C.A. § 35-15-410"],"conditions":["The trustee and the qualified beneficiaries may enter into a binding nonjudicial settlement agreement with respect to any matter involving a trust. T.C.A. § 35-15-111(a).","A nonjudicial settlement agreement is valid only to the extent it does not violate a material purpose of the trust and includes terms and conditions that could be properly approved by the court. T.C.A. § 35-15-111(b).","Matters that may be resolved include: interpretation or construction of trust terms; trustee liability for actions related to trust administration; approval of investment decisions, delegation, policies, or programs; appointment of a successor trustee in the event of a vacancy; change of principal place of administration; change of governing law; and trustee, advisor, and protector fee approval. T.C.A. § 35-15-111(c).","The consent of a person who may represent and bind another under T.C.A. §§ 35-15-301 through 35-15-305 is binding on the person represented, including minors, incapacitated persons, and unborn beneficiaries, unless the person represented objects before the consent becomes effective. T.C.A. § 35-15-301(b).","A proceeding to approve or disapprove a proposed modification or termination may be commenced by a trustee or beneficiary under T.C.A. § 35-15-410(b)."],"next_steps":["CH-TRU-010"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-TRU-LRC-004] Proceeds to CH-TRU-010 (post-judgment)."},{"step_id":"CH-TRU-010","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Plaintiff / Attorney","action":"File post-judgment motion within 30 days or enforce final decree through contempt or sequestration","citations":["Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02","T.C.A. § 21-1-801","T.C.A. § 21-1-804"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Chancery courts may enforce rules, orders, or decrees by process against the person in default or by process against that person's property. T.C.A. § 21-1-804.","If the delinquent cannot be found upon attachment, a writ of sequestration may issue against the estate of the delinquent. T.C.A. § 21-1-801."],"next_steps":["CH-TRU-011"],"decision_point":false,"notes":"Proceeds to CH-TRU-011 (appeal)."},{"step_id":"CH-TRU-011","phase":"Appeal","court_type":"Chancery Court","case_type":"Trust Administration and Disputes","actor":"Plaintiff / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of final decree","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court trust orders go to the Court of Appeals. The Court of Appeals independently considers all material facts in the record. T.C.A. § 27-1-113.","Timely post-trial motion extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-TRU-Flowchart.html"},{"flow_id":"CR-APP","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[],"conflicts":[{"conflict_id":"CR-APP-CONF-001","affected_steps":["CR-APP-001"],"description":"T.C.A. § 27-3-131 requires that the demand for a jury trial in a criminal appeal from General Sessions Court must be made at the time of filing the notice of appeal. Tenn. R. Crim. P. 23 governs jury trial waiver in courts of record. In State v. Jarnigan, 958 S.W.2d 135 (Tenn. 1998), the Tennessee Supreme Court held that where a defendant waives the right to jury trial before the magistrate in General Sessions Court, that waiver carries over into the de novo appeal in circuit or criminal court and attaches to the de novo trial unless the defendant demands a jury as part of the appeal notice under T.C.A. § 27-3-131. Under the source hierarchy, T.C.A. § 27-3-131 is the specific statutory provision controlling the jury demand timing in criminal appeals from General Sessions Court; it controls over any general jury waiver provision. Failure to demand a jury at the time of filing the notice of appeal is a complete waiver of the jury trial right on de novo appeal. Flagged as the most critical procedural requirement in this flow."}],"local_rule_checks":[{"check_id":"CR-APP-LRC-001","affected_steps":["CR-APP-001"],"description":"Verify local rules for the de novo appeal docket in the local Criminal Court, including whether de novo appeals from General Sessions are placed on a separate appeal docket, the local scheduling procedure for de novo trial settings, and whether the local Criminal Court accepts the General Sessions Court record or requires fresh filing of all documents."}],"steps":[{"step_id":"CR-APP-001","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","actor":"Defendant / Attorney","action":"File notice of appeal from General Sessions Court criminal conviction within 10 days of judgment; demand jury trial at time of filing if jury is desired","citations":["T.C.A. § 27-5-108(a)(1)","T.C.A. § 27-3-131","T.C.A. § 27-5-103(a)"],"conditions":["ENTRY POINT: This flow receives cases from GS-CRM (General Sessions Court -- Criminal) upon a defendant's or state's dissatisfaction with the General Sessions Court judgment. The originating proceeding is described in GS-CRM.","Any party dissatisfied with the General Sessions Court judgment may appeal to Circuit or Criminal Court within 10 days of the judgment. T.C.A. § 27-5-108(a)(1).","CRITICAL: In criminal misdemeanor cases, the demand for a jury trial must be made at the time of filing the notice of appeal or the right to a jury trial is waived. T.C.A. § 27-3-131. A waiver before the General Sessions magistrate carries over to the de novo appeal unless the defendant demands a jury as part of the appeal notice. State v. Jarnigan, 958 S.W.2d 135 (Tenn. 1998).","Before the appeal is granted, the appellant must give bond with good security for the costs of the appeal, or take the oath for poor persons. T.C.A. § 27-5-103(a).","The General Sessions Court Clerk must transmit all papers to the Criminal Court Clerk at least five days before the meeting of the Criminal Court; if appeal is perfected within five days before the meeting, papers must be filed by or on the first day of the term. T.C.A. § 27-5-105."],"next_steps":["CR-APP-002"],"decision_point":false,"notes":"[CONFLICT: CR-APP-CONF-001] [LOCAL RULE CHECK: CR-APP-LRC-001]"},{"step_id":"CR-APP-002","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","actor":"Criminal Court Clerk","action":"Receive papers from General Sessions Court Clerk; docket case for de novo trial; appoint counsel if defendant is indigent","citations":["T.C.A. § 27-5-105","T.C.A. § 40-14-102","T.C.A. § 40-14-103"],"conditions":["The de novo trial in Criminal Court is a new trial on the merits; the General Sessions Court judgment has no evidentiary effect in the de novo proceeding.","The defendant is entitled to counsel in all matters necessary for the defense. If unable to employ counsel, the defendant is entitled to appointed counsel. T.C.A. § 40-14-102, § 40-14-103(a).","The appeal does not dismiss the original charge; the case is tried de novo on the same charge(s) as were pending in General Sessions Court."],"next_steps":["CR-APP-003"],"decision_point":false,"notes":"Proceeds to CR-APP-003 (arraignment and plea in Criminal Court)."},{"step_id":"CR-APP-003","phase":"Pleadings","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","actor":"Judge","action":"Arraign defendant on de novo appeal; defendant enters plea; conduct any pretrial proceedings","citations":["Tenn. R. Crim. P. 10","Tenn. R. Crim. P. 11","Tenn. R. Crim. P. 12(b)"],"conditions":["Arraignment in Criminal Court follows the same procedure as CR-MIS-002. The defendant receives a copy of the charging instrument, the charge is read or stated, and the defendant enters a plea.","Plea: defendant may enter a guilty plea in Criminal Court on the de novo appeal and receive the benefit of any negotiated plea agreement.","Pretrial motions that must be raised before trial include motions to suppress, defect in the charging instrument, and discovery requests. These must be raised before the court's deadline. Tenn. R. Crim. P. 12(b)(2).","The defendant is entitled to 14 full days (Sundays and legal holidays excluded) after return of the charging instrument before being tried. T.C.A. § 40-14-105."],"next_steps":["CR-APP-004"],"decision_point":false,"notes":"Proceeds to CR-APP-004 (de novo trial or guilty plea)."},{"step_id":"CR-APP-004","phase":"Trial","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","actor":"Judge","action":"Conduct de novo misdemeanor trial (jury or bench depending on whether jury was timely demanded at time of appeal filing); enter verdict","citations":["T.C.A. § 27-3-131","T.C.A. § 40-20-104","Tenn. R. Evid. 101"],"conditions":["Jury trial: available only if the defendant demanded a jury trial at the time of filing the notice of appeal under T.C.A. § 27-3-131. If jury was demanded, the trial proceeds as a misdemeanor jury trial in Criminal Court.","Bench trial: if no jury was demanded at the time of filing, the trial is before the judge alone.","Standard of proof: beyond a reasonable doubt.","The de novo trial is a fresh proceeding; the General Sessions judgment, testimony, and record are not admitted as evidence.","If the defendant is convicted, sentencing proceeds under CR-MIS-006 (misdemeanor sentencing). If acquitted, the state may not appeal from a judgment of acquittal."],"next_steps":["CR-APP-005"],"decision_point":false,"notes":"Proceeds to CR-APP-005 (judgment and sentencing or acquittal)."},{"step_id":"CR-APP-005","phase":"Judgment","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","actor":"Judge","action":"Enter judgment of conviction or acquittal; impose sentence if convicted","citations":["T.C.A. § 40-35-302","T.C.A. § 40-35-111(e)","T.C.A. § 27-5-108"],"conditions":["Conviction: the court (or jury upon timely demand) imposes sentence. Sentencing follows the same procedure as CR-MIS-006. See that step for the full sentencing conditions.","Acquittal: the state may not appeal from a judgment of acquittal on the de novo trial. Tenn. R. Crim. P. 5(c)(2)(C) (parallel provision for GS level); the same principle applies at the de novo level.","If conviction results, the defendant may further appeal to the Court of Criminal Appeals on the de novo trial conviction."],"next_steps":["CR-APP-006"],"decision_point":false,"notes":"Proceeds to CR-APP-006 (further appeal to Court of Criminal Appeals)."},{"step_id":"CR-APP-006","phase":"Appeal","court_type":"Criminal Court","case_type":"Appeals from General Sessions Criminal (De Novo Trial)","actor":"Defendant / Attorney","action":"File notice of appeal to Court of Criminal Appeals from de novo trial conviction within 30 days","citations":["Tenn. R. App. P. 3(b)","Tenn. R. App. P. 4(a)","T.C.A. § 40-35-401"],"conditions":["An appeal as of right lies to the Court of Criminal Appeals from a final judgment of conviction in the de novo appeal proceeding. Tenn. R. App. P. 3(b).","Notice of appeal must be filed within 30 days after entry of the judgment of conviction. Tenn. R. App. P. 4(a).","Motion for new trial: defendant may move for a new trial within 30 days after verdict; filing a timely motion extends the appeal period. Tenn. R. Crim. P. 33(b); Tenn. R. App. P. 4(b).","EXIT POINT: Upon filing of the notice of appeal, the case exits this flow and proceeds in the Court of Criminal Appeals under the standard criminal appellate procedure."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CR-APP-Flowchart.html"},{"flow_id":"CR-FEL","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"CR-FEL-GAP-001","affected_steps":["CR-FEL-001"],"description":"The filing fee or court cost structure applicable to Criminal Court felony proceedings under T.C.A. § 8-21-401 and the AOC fee schedule is not confirmed from the corpus fee schedule text. The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies. Additionally, the defendant, if provided court-appointed counsel, is assessed a nonrefundable $50.00 administrative fee at the time of appointment. T.C.A. § 40-14-103(b)(1). The full cost schedule applicable to felony proceedings should be confirmed against Standard Fees (AOC)."},{"gap_id":"CR-FEL-GAP-002","affected_steps":["CR-FEL-CAP-001"],"description":"Capital sentencing procedure in Tennessee is governed by T.C.A. § 39-13-204 and Title 39, Chapter 13. The corpus contains Title 39 but the full text of § 39-13-204 (capital sentencing -- death penalty procedure, aggravating and mitigating circumstances, jury sentencing in capital cases) is confirmed in chapter structure but not fully read in the research phase for this flow. The capital branch steps in this flow are built from confirmed corpus references (§§ 40-35-201, 40-18-118, 40-14-106) and general constitutional doctrine (Ring v. Arizona; Tenn. Const. art. I, § 9). The full text of T.C.A. § 39-13-204 should be confirmed before the capital branch is treated as authoritative."}],"conflicts":[{"conflict_id":"CR-FEL-CONF-001","affected_steps":["CR-FEL-007"],"description":"The issue of guilt and sentencing in all contested criminal cases must be tried separately. T.C.A. § 40-35-201(a). However, where the defendant pleads guilty or the sentence is agreed upon by the parties, the court may impose the agreed sentence without a separate sentencing hearing, subject to the court's acceptance of the plea agreement. T.C.A. § 40-35-203(b). These provisions operate consistently but are flagged because the bifurcation requirement under § 40-35-201 is mandatory in contested trials and practitioners sometimes attempt to collapse the guilt and sentencing phases in agreed plea situations that fall outside the § 40-35-203(b) exception."},{"conflict_id":"CR-FEL-CONF-002","affected_steps":["CR-FEL-008"],"description":"T.C.A. § 40-35-203(a) provides that sentences in felony cases shall be imposed by the court. T.C.A. § 40-20-104(a) provides that when a person indicted in a court of record for a misdemeanor pleads not guilty and is tried by a jury, upon timely demand of the defendant, the trial jury shall assess the punishment as part of its verdict. For felonies, the jury fixes the minimum and maximum term under T.C.A. § 40-20-107(a), subject to the sentencing ranges in T.C.A. § 40-35-112, but the court imposes the sentence. The allocation of sentencing authority between judge and jury in felony cases requires careful attention: the jury's role is to find facts related to enhancement and fix the range; the court then imposes the specific sentence within that range. Flagged for reviewer awareness."}],"local_rule_checks":[{"check_id":"CR-FEL-LRC-001","affected_steps":["CR-FEL-002"],"description":"Verify local rules for arraignment scheduling, including whether the local Criminal Court conducts arraignments on a rolling docket or on designated arraignment days, and the local procedure for setting bond at arraignment in Criminal Court when bond was previously set in General Sessions Court."},{"check_id":"CR-FEL-LRC-002","affected_steps":["CR-FEL-003"],"description":"Verify local rules for pretrial diversion eligibility and the local DA's office policy on diversion applications. T.C.A. § 40-15-105 governs pretrial diversion; local practice on DA review and denial periods varies significantly."},{"check_id":"CR-FEL-LRC-003","affected_steps":["CR-FEL-005"],"description":"Verify local rules for the motion deadline schedule, including whether the local Criminal Court sets a standing motions deadline at arraignment, uses a standard scheduling order form, and has specific local rules for suppression hearing scheduling and continuance policy."}],"steps":[{"step_id":"CR-FEL-001","phase":"Case Initiation","court_type":"Criminal Court","case_type":"Felony (Indictment Through Trial and Sentencing)","actor":"Criminal Court Clerk","action":"Receive indictment or presentment from grand jury foreman; enter in minutes; issue capias if defendant not already in custody","citations":["T.C.A. § 40-13-101","T.C.A. § 40-13-105","T.C.A. § 40-13-108","T.C.A. § 40-13-109","T.C.A. § 40-13-301"],"conditions":["An indictment is an accusation in writing presented by the grand jury charging a person with an indictable offense. All felonies are indictable offenses. T.C.A. § 40-13-101, § 40-13-102.","An indictment cannot be found without the concurrence of at least 12 grand jurors; when found, it shall be endorsed 'true b
