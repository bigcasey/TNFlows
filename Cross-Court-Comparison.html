<style>
:root {
  --paper: #f6f1e7;
  --paper-2: #efe8d8;
  --paper-3: #e8dfc8;
  --ink: #1a1814;
  --ink-2: #4a463d;
  --ink-3: #7a7468;
  --rule: #d4c9ac;
  --rule-2: #c2b48f;
  --accent: #6b1f1f;
  --decision-bg: #fbeec3;
  --decision-border: #c79b3b;
  --decision-ink: #6b4b00;
  --shadow: 0 1px 2px rgba(40,30,10,.06), 0 2px 6px rgba(40,30,10,.05);
  --shadow-hover: 0 2px 4px rgba(40,30,10,.08), 0 8px 18px rgba(40,30,10,.10);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  height: 100%;
  overflow: hidden;
}
body { display: flex; flex-direction: column; }

/* ─── Header ───────────────────────────── */
header.appbar {
  flex: 0 0 auto;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  padding: 14px 24px 12px;
  display: flex; align-items: flex-end; gap: 24px;
  z-index: 10;
  flex-wrap: wrap;
}
.brand { display: flex; flex-direction: column; gap: 2px; }
.brand .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-3);
}
.brand h1 {
  font-family: 'Newsreader', serif;
  font-weight: 500; font-size: 24px;
  margin: 0; letter-spacing: -.01em; line-height: 1.1;
  white-space: nowrap;
}
.brand h1 em { font-style: italic; color: var(--accent); font-weight: 500; white-space: nowrap; }
.meta {
  display: flex; gap: 18px;
  font-size: 12px; color: var(--ink-2);
  padding-bottom: 3px;
}
.meta .kv { display: flex; flex-direction: column; gap: 1px; }
.meta .kv span:first-child {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: .12em;
  color: var(--ink-3); text-transform: uppercase;
}
.meta .kv span:last-child { font-weight: 500; color: var(--ink); }

/* ─── Mode toggle (segmented) ──────────── */
.mode-toggle {
  display: inline-flex;
  background: var(--paper-2);
  border: 1px solid var(--rule-2);
  border-radius: 999px;
  padding: 3px;
  margin-left: auto;
}
.mode-toggle button {
  border: none; background: transparent;
  padding: 5px 14px;
  border-radius: 999px;
  cursor: pointer;
  font: 600 12px/1 'Inter', sans-serif;
  color: var(--ink-2);
  letter-spacing: .01em;
  transition: all .15s;
  white-space: nowrap;
}
.mode-toggle button.active {
  background: var(--ink);
  color: var(--paper);
  box-shadow: var(--shadow);
}
.mode-toggle button:hover:not(.active) { color: var(--ink); }

/* ─── Toolbar ─────────────────────────── */
.toolbar {
  flex: 0 0 auto;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-2);
  padding: 8px 24px;
  display: flex; align-items: center; gap: 10px;
  overflow-x: auto;
  z-index: 9;
}
.toolbar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-3);
  padding-right: 4px;
  white-space: nowrap;
}
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--rule-2);
  background: var(--paper);
  color: var(--ink-2);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.chip:hover { background: #fff; border-color: var(--ink-3); }
.chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}
.divider-v { width: 1px; background: var(--rule); align-self: stretch; margin: 0 8px; }

.search {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border: 1px solid var(--rule-2);
  background: var(--paper);
  border-radius: 999px;
  min-width: 220px;
}
.search input {
  border: none; outline: none; background: transparent;
  font: inherit; flex: 1;
  color: var(--ink);
}
.search input::placeholder { color: var(--ink-3); }
.search svg { color: var(--ink-3); flex: 0 0 auto; }

/* ─── Main layout ─────────────────────── */
.main {
  flex: 1; display: flex;
  min-height: 0;
  position: relative;
}
.viewport {
  flex: 1;
  overflow: auto;
  position: relative;
  background:
    radial-gradient(circle at 20% 0%, rgba(107,31,31,.025), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(76,29,149,.025), transparent 50%),
    var(--paper);
}

/* ─── Matrix view ──────────────────────── */
.matrix {
  display: grid;
  min-width: 100%;
  width: max-content;
  position: relative;
}
.matrix .cell-corner,
.matrix .cell-court,
.matrix .cell-flow,
.matrix .cell-phase,
.matrix .cell-body {
  background: var(--paper);
  position: relative;
}
.matrix .cell-corner {
  position: sticky; left: 0; top: 0;
  z-index: 6;
  background: var(--paper);
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 10px 12px;
  min-width: 200px;
}
.matrix .cell-corner .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-3);
}
.matrix .cell-corner .sub {
  font-family: 'Newsreader', serif; font-style: italic;
  font-size: 13px; color: var(--ink-2);
  margin-top: 4px;
}
.matrix .cell-court {
  position: sticky; top: 0;
  z-index: 4;
  padding: 6px 12px 4px;
  border-bottom: 1px dashed var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--court-ink, var(--ink-2));
  background: var(--paper);
  border-right: 1px solid transparent;
}
.matrix .cell-court::before {
  content: ""; position: absolute;
  left: 0; right: 0; top: 0; bottom: 0;
  background: var(--court-tint, transparent);
  pointer-events: none;
}
.matrix .cell-court .count {
  font-size: 9px; color: var(--ink-3);
  margin-left: 6px;
  letter-spacing: .05em;
}
.matrix .cell-flow {
  position: sticky; top: 24px;
  z-index: 4;
  padding: 8px 10px 8px;
  border-bottom: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  background: var(--paper);
  min-width: 200px; max-width: 200px;
  cursor: pointer;
  transition: background .12s;
}
.matrix .cell-flow:hover { background: #fff; }
.matrix .cell-flow::before {
  content: ""; position: absolute;
  left: 0; right: 0; top: 0; bottom: 0;
  background: var(--court-tint, transparent);
  pointer-events: none;
}
.matrix .cell-flow .flow-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 600;
  color: var(--court-ink, var(--ink));
  letter-spacing: .02em;
  position: relative;
}
.matrix .cell-flow .flow-case {
  font-family: 'Newsreader', serif;
  font-size: 12.5px;
  color: var(--ink);
  line-height: 1.25;
  margin-top: 2px;
  text-wrap: pretty;
  position: relative;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.matrix .cell-flow .flow-steps {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--ink-3);
  margin-top: 4px;
  letter-spacing: .04em;
  position: relative;
}
.matrix .cell-phase {
  position: sticky; left: 0;
  z-index: 3;
  background: var(--paper);
  padding: 14px 12px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  min-width: 200px;
  display: flex; flex-direction: column;
  justify-content: flex-start;
}
.matrix .cell-phase .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .14em;
  color: var(--ink-3);
}
.matrix .cell-phase .name {
  font-family: 'Newsreader', serif;
  font-weight: 500; font-style: italic;
  font-size: 20px;
  color: var(--ink);
  line-height: 1.15;
  margin-top: 2px;
  letter-spacing: -.005em;
}
.matrix .cell-phase .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  margin-top: 6px;
  letter-spacing: .03em;
}
.matrix .cell-body {
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 8px 8px;
  background: var(--paper);
  min-width: 200px; max-width: 200px;
  position: relative;
  display: flex; flex-direction: column; gap: 4px;
}
.matrix .cell-body::before {
  content: ""; position: absolute;
  left: 0; right: 0; top: 0; bottom: 0;
  background: var(--court-tint, transparent);
  pointer-events: none;
}
.matrix .cell-body.empty {
  background: repeating-linear-gradient(
    -45deg,
    var(--paper),
    var(--paper) 6px,
    var(--paper-2) 6px,
    var(--paper-2) 7px
  );
}
.matrix .cell-body.empty::after {
  content: "skipped";
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .12em;
  color: var(--ink-3); text-transform: uppercase;
  align-self: center;
  margin: auto;
  opacity: .6;
}

.step-card {
  background: #fdfbf5;
  border: 1px solid var(--rule-2);
  border-radius: 3px;
  padding: 5px 6px 6px 9px;
  font-size: 11.5px;
  line-height: 1.3;
  color: var(--ink);
  cursor: pointer;
  transition: all .12s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.step-card::before {
  content: ""; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--actor-color, var(--ink-3));
}
.step-card:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--ink-3);
  transform: translateY(-1px);
}
.step-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(107,31,31,.18), var(--shadow);
}
.step-card.decision {
  background: var(--decision-bg);
  border-color: var(--decision-border);
}
.step-card.terminal {
  border-style: double; border-width: 2px;
  background: #f0eada;
}
.step-card .id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .03em;
  color: var(--ink-3);
  display: flex; align-items: center; gap: 4px;
}
.step-card .id .flag {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  font: 700 7px/10px 'JetBrains Mono', monospace;
  text-align: center;
  color: #fff;
}
.step-card .id .flag.g { background: #b91c1c; }
.step-card .id .flag.l { background: #b45309; }
.step-card .action {
  margin-top: 2px;
  text-wrap: pretty;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-weight: 500;
}
.step-card.dim { opacity: .25; filter: saturate(.4); }
.step-card .decision-mark {
  position: absolute; top: 4px; right: 5px;
  color: var(--decision-border);
  font-size: 11px;
}

/* ─── Focus view ──────────────────────── */
.focus {
  padding: 20px 24px 40px;
}
.focus-head {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.focus-head h2 {
  font-family: 'Newsreader', serif;
  font-weight: 500; font-style: italic;
  font-size: 32px;
  margin: 0;
  letter-spacing: -.01em;
  color: var(--accent);
  flex-basis: 100%;
  line-height: 1.05;
}
.focus-head .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: .15em;
  color: var(--ink-3);
  padding: 3px 9px;
  border: 1px solid var(--rule-2);
  border-radius: 3px;
  text-transform: uppercase;
}
.focus-head .summary {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: .02em;
}
.focus-lede {
  font-size: 13.5px;
  color: var(--ink-2);
  line-height: 1.5;
  max-width: 720px;
  margin: 0 0 24px;
  text-wrap: pretty;
}
.focus-phase-tabs {
  display: flex; flex-wrap: wrap;
  gap: 4px;
  margin: 12px 0 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}
.focus-phase-tabs .ptab {
  padding: 6px 12px;
  border: 1px solid var(--rule-2);
  background: var(--paper);
  border-radius: 3px;
  cursor: pointer;
  font: 500 12.5px 'Inter', sans-serif;
  color: var(--ink-2);
  transition: all .12s;
  display: flex; align-items: center; gap: 8px;
}
.focus-phase-tabs .ptab:hover { border-color: var(--ink-3); color: var(--ink); }
.focus-phase-tabs .ptab.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.focus-phase-tabs .ptab .pn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  letter-spacing: .05em;
}
.focus-phase-tabs .ptab.active .pn { color: rgba(246,241,231,.6); }
.focus-phase-tabs .ptab .pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  background: var(--paper-2);
  padding: 1px 5px;
  border-radius: 2px;
  color: var(--ink-3);
}
.focus-phase-tabs .ptab.active .pct {
  background: rgba(246,241,231,.15);
  color: var(--paper);
}

.court-section {
  margin-bottom: 32px;
}
.court-section-head {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}
.court-section-head .court-name {
  font-family: 'Newsreader', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--court-ink, var(--ink));
  letter-spacing: -.005em;
}
.court-section-head .court-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.court-section-head .court-empty {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  font-style: italic;
}

.flow-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.flow-cmp {
  background: #fdfbf5;
  border: 1px solid var(--rule-2);
  border-radius: 4px;
  box-shadow: var(--shadow);
  padding: 14px 14px 12px;
  position: relative;
  display: flex; flex-direction: column;
  border-top: 3px solid var(--court-ink, var(--ink-3));
}
.flow-cmp.skipped {
  border-top-color: var(--rule-2);
  opacity: .55;
  background: var(--paper);
}
.flow-cmp-head { margin-bottom: 8px; }
.flow-cmp-head .flow-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .03em;
  color: var(--court-ink, var(--ink-2));
}
.flow-cmp-head .case-name {
  font-family: 'Newsreader', serif;
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.2;
  margin-top: 2px;
  text-wrap: pretty;
}
.flow-cmp-steps {
  display: flex; flex-direction: column;
  gap: 6px;
  margin-top: 2px;
}
.flow-cmp .skipped-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  margin-top: 8px;
  font-style: italic;
}
.flow-cmp .open-link {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .08em;
  color: var(--ink-3);
  text-decoration: none;
  text-transform: uppercase;
  padding-top: 8px;
  border-top: 1px dashed var(--rule);
  transition: color .12s;
}
.flow-cmp .open-link:hover { color: var(--accent); }
.flow-cmp .open-link svg { width: 10px; height: 10px; }

/* ─── Detail panel ────────────────────── */
aside.detail {
  flex: 0 0 440px;
  border-left: 1px solid var(--rule);
  background: var(--paper);
  overflow-y: auto;
  transition: flex-basis .25s ease;
  position: relative;
}
aside.detail.empty {
  flex-basis: 0;
  border-left: none;
  overflow: hidden;
}
.detail-inner { padding: 24px 24px 60px; }
.detail .crumbs {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 12px;
}
.detail .crumbs .sep { color: var(--rule-2); }
.detail .crumbs .id { color: var(--ink); font-weight: 600; }
.detail h2 {
  font-family: 'Newsreader', serif;
  font-weight: 500;
  font-size: 22px;
  margin: 0 0 14px;
  line-height: 1.2;
  text-wrap: pretty;
  letter-spacing: -.005em;
}
.detail .badges {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 18px;
}
.detail .badge {
  font-size: 10.5px; font-weight: 600;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1px solid;
  letter-spacing: .02em;
}
.detail .badge.actor {
  color: var(--actor-color, var(--ink));
  border-color: currentColor;
  background: color-mix(in oklch, var(--actor-color, #000) 6%, transparent);
}
.detail .badge.decision {
  color: var(--decision-ink);
  background: var(--decision-bg);
  border-color: var(--decision-border);
}
.detail .badge.terminal {
  color: var(--ink); background: var(--paper-3);
  border-color: var(--rule-2);
}
.detail .badge.court {
  color: var(--court-ink, var(--ink));
  background: var(--court-tint, var(--paper-2));
  border-color: currentColor;
}
.detail h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 22px 0 10px;
  font-weight: 500;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 6px;
}
.detail .citations {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.detail .cite {
  font: 500 11.5px 'JetBrains Mono', monospace;
  padding: 3px 7px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  color: var(--ink-2);
}
.detail .conditions {
  font-size: 13.5px; line-height: 1.55;
  color: var(--ink); text-wrap: pretty;
}
.detail .conditions ol {
  padding-left: 0; margin: 0;
  counter-reset: cond;
  list-style: none;
}
.detail .conditions li {
  counter-increment: cond;
  padding: 10px 0 10px 32px;
  border-bottom: 1px dashed var(--rule);
  position: relative;
}
.detail .conditions li::before {
  content: counter(cond, decimal-leading-zero);
  position: absolute; left: 0; top: 11px;
  font: 500 10.5px 'JetBrains Mono', monospace;
  color: var(--ink-3);
  letter-spacing: .05em;
}
.detail .conditions li:last-child { border-bottom: none; }
.detail .notes {
  padding: 12px 14px;
  background: var(--paper-2);
  border-left: 3px solid var(--ink-3);
  border-radius: 0 4px 4px 0;
  font-style: italic;
  color: var(--ink-2);
  font-size: 12.5px;
}
.detail .flag-card {
  padding: 10px 12px;
  border: 1px solid;
  border-radius: 3px;
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 8px;
}
.detail .flag-card.gap { border-color: #b91c1c; background: #fef2f2; }
.detail .flag-card.lrc { border-color: #b45309; background: #fffaeb; }
.detail .flag-card .tag {
  font: 700 10px 'JetBrains Mono', monospace;
  letter-spacing: .1em;
  margin-right: 6px;
}
.detail .flag-card.gap .tag { color: #b91c1c; }
.detail .flag-card.lrc .tag { color: #b45309; }
.detail .open-flow-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 3px;
  font: 600 11px 'JetBrains Mono', monospace;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s;
  margin-top: 4px;
}
.detail .open-flow-btn:hover { background: var(--accent); }
.detail .close {
  position: absolute; top: 18px; right: 18px;
  border: none; background: transparent;
  cursor: pointer;
  width: 30px; height: 30px;
  border-radius: 50%;
  color: var(--ink-3);
  display: flex; align-items: center; justify-content: center;
}
.detail .close:hover { background: var(--paper-2); color: var(--ink); }

/* ─── Overview (empty selection) ──────── */
.overview { padding: 28px 24px 40px; }
.overview h2 {
  font-family: 'Newsreader', serif; font-weight: 500;
  font-size: 22px; margin: 0 0 6px;
  letter-spacing: -.005em;
}
.overview .lede {
  color: var(--ink-2); font-size: 13.5px; line-height: 1.5;
  margin: 0 0 18px; text-wrap: pretty;
}
.overview .stat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 18px;
}
.overview .stat {
  padding: 10px 12px;
  border: 1px solid var(--rule);
  background: var(--paper-2);
  border-radius: 3px;
}
.overview .stat .num {
  font-family: 'Newsreader', serif;
  font-size: 26px; font-weight: 500;
  color: var(--ink); line-height: 1;
}
.overview .stat .lbl {
  font: 500 10.5px 'JetBrains Mono', monospace;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-3); margin-top: 4px;
}
.overview h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 18px 0 8px;
  font-weight: 500;
}
.overview .court-line {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: 3px;
  font-size: 12.5px;
  background: var(--court-tint);
  border: 1px solid var(--rule);
  margin-bottom: 4px;
}
.overview .court-line .name { flex: 1; color: var(--court-ink, var(--ink)); font-weight: 500; }
.overview .court-line .ct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-3);
}
.overview .tip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  padding: 10px 12px;
  border: 1px dashed var(--rule);
  border-radius: 3px;
  margin-top: 16px;
  line-height: 1.5;
}
.overview .tip kbd {
  font-family: 'JetBrains Mono', monospace;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10.5px;
}

@media (max-width: 1100px) {
  aside.detail { flex-basis: 360px; }
  .meta { display: none; }
}
@media (max-width: 800px) {
  aside.detail { display: none; }
}

<script id="cross-court-data" type="application/json">[{"flow_id":"CC-APP","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CC-APP-GAP-001","description":"T.C.A. § 27-5-108 establishes a uniform 10-day period in which to perfect an appeal from General Sessions Court to Circuit Court. T.C.A. § 16-15-727(b) provides that a timely filed Tenn. R. Civ. P. 60.02 motion in General Sessions Court tolls the 10-day period until the motion is determined, and the 10-day appeal period runs from the General Sessions Court's ruling on the motion. The corpus does not contain a statute or rule specifying how the 10-day period is computed -- specifically whether it is computed under Tenn. R. Civ. P. 6.01 (which would exclude intermediate Sundays and holidays when the period is less than 11 days) or by reference to the plain text of T.C.A. § 27-5-108 which expressly states '10 entire days, Sundays exclusive' in T.C.A. § 27-5-101 (the municipal officer appeal section) but does not include the 'Sundays exclusive' language in T.C.A. § 27-5-108. The computation method should be confirmed and this distinction flagged for reviewer resolution.","affected_steps":["CC-APP-001"]},{"gap_id":"CC-APP-GAP-002","description":"T.C.A. § 27-5-105 requires the General Sessions Court clerk to file the papers in the Circuit Court clerk's office at least five days before the meeting of the Circuit Court. The corpus does not contain a statute or rule specifying what happens procedurally if the General Sessions clerk fails to timely transmit the papers but does transmit them during the term. T.C.A. § 27-5-105(b) provides that a failing clerk shall have no fees or costs allowed, but does not specify whether the case is dismissed, continued, or otherwise affected. T.C.A. § 27-5-106 addresses the consequence of the appellant's failure to appear, not the clerk's failure to transmit. The procedural consequence of late transmission should be confirmed.","affected_steps":["CC-APP-003"]},{"gap_id":"CC-APP-GAP-003","description":"The corpus does not contain a statute or rule specifying whether the Circuit Court clerk must issue a new summons to the appellee upon receipt of the General Sessions papers, or whether the original General Sessions summons and the filing of the appeal bond are sufficient to maintain the court's jurisdiction over the appellee. The procedure for notifying the appellee of the Circuit Court docket date should be confirmed against local rules and AOC guidance.","affected_steps":["CC-APP-006"]},{"gap_id":"CC-APP-GAP-004","description":"T.C.A. § 16-15-729 provides that no civil case originating in General Sessions and carried to a higher court shall be dismissed for any informality, but shall be tried on its merits with all necessary amendments allowed. The corpus does not contain a statute or rule specifying the deadline for filing any amended pleading in the Circuit Court after a General Sessions appeal is docketed. Whether a formal amended complaint must be filed and the deadline for doing so should be confirmed against local rules and practice.","affected_steps":["CC-APP-009"]}],"conflicts":[{"conflict_id":"CC-APP-CONF-001","description":"T.C.A. § 27-5-108(c) provides that any appeal from General Sessions Court shall be heard de novo in Circuit Court. T.C.A. § 16-15-729 provides that no civil case originating in General Sessions shall be dismissed for any informality but shall be tried on its merits, with the trial being de novo including damages. The Tenn. R. Civ. P. 5A.02(4)(a) specifically prohibits filing an appeal from General Sessions Court to Circuit Court by facsimile transmission. No conflict exists between these provisions as they address different aspects of the de novo proceeding. Flagged because practitioners sometimes attempt to limit the scope of de novo review to only the issues raised in General Sessions, which is inconsistent with the full de novo standard. The full de novo standard means the Circuit Court proceeds as if the case originated there; the General Sessions judgment has no preclusive effect and does not limit the issues or evidence at trial.","affected_steps":["CC-APP-008"]},{"conflict_id":"CC-APP-CONF-002","description":"T.C.A. § 27-5-103(a) requires that before the appeal is granted, the appellant must give bond with good security for the costs of the appeal, or take the oath for poor persons. T.C.A. § 16-15-719 provides that an appeal bond returned with other papers to the Circuit Court is a conclusive presumption that an appeal was taken. In criminal misdemeanor appeals under T.C.A. § 27-3-131, the demand for a jury trial must be made at the time of filing the appeal under T.C.A. § 27-5-108; if not made at that time, the right to a jury trial is waived. This creates a structural difference between civil appeals (no timing requirement for jury demand beyond the general circuit court rules) and criminal misdemeanor appeals (jury demand must be made at time of filing). This flow covers civil appeals only; criminal misdemeanor appeals should be addressed in a separate flow. Flagged to ensure the distinction is clear to reviewers.","affected_steps":["CC-APP-002"]}],"local_rule_checks":[{"check_id":"CC-APP-LRC-001","description":"Verify local rules for any additional filing requirements when the General Sessions papers are docketed in Circuit Court, including whether the Circuit Court clerk requires the appellant to pay a docketing fee or filing fee separate from the General Sessions costs bond.","affected_steps":["CC-APP-003"]},{"check_id":"CC-APP-LRC-002","description":"Verify local rules for scheduling of de novo trials in General Sessions appeal cases. Several judicial districts place General Sessions appeals on a separate civil appeals docket with different scheduling timelines from original Circuit Court civil cases. Verify whether the local district has a standing order governing the scheduling of General Sessions appeal trials.","affected_steps":["CC-APP-006"]},{"check_id":"CC-APP-LRC-003","description":"Verify local rules for any requirement that the appellant file an amended complaint or petition in Circuit Court after the General Sessions papers are docketed. T.C.A. § 16-15-729 authorizes amendments necessary to reach the merits, but local practice varies as to whether a formal amended pleading is required or whether the General Sessions warrant serves as the operative pleading.","affected_steps":["CC-APP-009"]},{"check_id":"CC-APP-LRC-004","description":"Verify local rules for the pauper's oath procedure as a substitute for the appeal bond. T.C.A. § 27-5-103(a) permits a litigant to take the oath for poor persons in lieu of bond. Local rules may specify the form of the oath and the procedure for filing it with the General Sessions clerk.","affected_steps":["CC-APP-004"]}],"steps":[{"step_id":"CC-APP-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"Determine right of appeal and confirm 10-day deadline has not expired","citations":["T.C.A. § 27-5-108(a)(1)","T.C.A. § 27-5-108(b)","T.C.A. § 27-5-108(d)","T.C.A. § 16-15-727(b)"],"conditions":["Any party may appeal from a decision of General Sessions Court to Circuit Court within 10 days. T.C.A. § 27-5-108(a)(1). Period is uniform statewide; no private act may reduce it. T.C.A. § 27-5-108(b).","In civil cases, if any party perfects an appeal, cross appeals and separate appeals by other parties are not required; issues may be raised by any party upon any party's timely filing. T.C.A. § 27-5-108(a)(2).","A timely Tenn. R. Civ. P. 60.02 motion in General Sessions Court tolls the 10-day period until the General Sessions Court's ruling on the motion. T.C.A. § 16-15-727(b).","If no appeal is perfected within 10 days, the General Sessions judgment is final and execution may issue; for a writ of possession, execution shall issue by operation of law. T.C.A. § 27-5-108(d).","This flow covers civil appeals only. Criminal misdemeanor appeals proceed under T.C.A. § 27-3-131, which requires a jury demand at the time of filing the appeal."],"next_steps":["CC-APP-002"],"decision_point":false,"notes":"[GAP: CC-APP-GAP-001] [CONFLICT: CC-APP-CONF-002] Proceeds to CC-APP-002 (perfecting the appeal)."},{"step_id":"CC-APP-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"Perfect appeal by filing notice and giving appeal bond or pauper's oath with General Sessions Clerk","citations":["T.C.A. § 27-5-103(a)","T.C.A. § 27-5-103(b)","T.C.A. § 16-15-719","Tenn. R. Civ. P. 5A.02(4)(a)"],"conditions":["Before the appeal is granted, appellant must give bond with good security sufficient to secure the cost of the appeal, or take the oath for poor persons. T.C.A. § 27-5-103(a). An appeal bond is sufficient if it secures the cost of the cause on appeal. T.C.A. § 27-5-103(b).","An appeal bond returned with other papers to the Circuit Court is a conclusive presumption that an appeal was taken. T.C.A. § 16-15-719.","An appeal from General Sessions Court to Circuit Court may not be filed by facsimile transmission. Tenn. R. Civ. P. 5A.02(4)(a).","The original plaintiff may be ruled to security for costs in the appellate court. T.C.A. § 27-5-104."],"next_steps":["CC-APP-003"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-APP-LRC-004] Proceeds to CC-APP-003 (transmission of papers by General Sessions clerk)."},{"step_id":"CC-APP-003","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"General Sessions Court Clerk","action":"Transmit all case papers to Circuit Court Clerk at least five days before the court term","citations":["T.C.A. § 27-5-105(a)(1)-(2)","T.C.A. § 27-5-105(b)","T.C.A. § 16-15-303(a)(2)-(3)"],"conditions":["Papers must be filed in the Circuit Court clerk's office at least five days before the meeting of the Circuit Court; if appeal is perfected within five days before the meeting, papers must be filed by or on the first day of the term. T.C.A. § 27-5-105(a)(1)-(2), T.C.A. § 16-15-303(a)(2).","Copies of papers must be transmitted in the same manner where only a portion of the parties have appealed. T.C.A. § 16-15-303(a)(3).","A General Sessions clerk failing to comply with the transmission deadline shall have no fees or costs allowed in the case. T.C.A. § 27-5-105(b)."],"next_steps":["CC-APP-004"],"decision_point":false,"notes":"[GAP: CC-APP-GAP-002] Proceeds to CC-APP-004 (docketing)."},{"step_id":"CC-APP-004","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Circuit Court Clerk","action":"Receive and docket General Sessions papers and assign Circuit Court docket number","citations":["T.C.A. § 27-5-108(c)","T.C.A. § 16-15-729"],"conditions":["The case is docketed as a de novo appeal and will be tried as if it originated in Circuit Court. T.C.A. § 27-5-108(c), T.C.A. § 16-15-729."],"next_steps":["CC-APP-005"],"decision_point":false,"notes":"[GAP: CC-APP-GAP-003] [LOCAL RULE CHECK: CC-APP-LRC-001] Proceeds to CC-APP-005 (appearance assessment)."},{"step_id":"CC-APP-005","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"Assess whether appellant has appeared and is prosecuting the appeal or has defaulted","citations":["T.C.A. § 27-5-106(a)-(b)","T.C.A. § 27-5-107"],"conditions":["If appellant is the original defendant and fails to appear and prosecute the appeal, plaintiff is entitled to a final judgment by default for the General Sessions judgment amount against appellant and appellant's sureties for costs. T.C.A. § 27-5-106(a).","If appellant is the original plaintiff and fails to appear within the term, the suit shall be dismissed and judgment entered against plaintiff and plaintiff's sureties for costs. T.C.A. § 27-5-106(b).","If papers are properly returned and appellant fails to appear or the appeal is dismissed for any cause, appellee is entitled to affirmance of the General Sessions judgment with costs. T.C.A. § 27-5-107."],"next_steps":["CC-APP-006","CC-APP-013"],"decision_point":true,"notes":"Decision point: appellant has appeared proceeds to CC-APP-006; appellant has defaulted proceeds to CC-APP-013."},{"step_id":"CC-APP-006","phase":"Pleadings","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Judge","action":"Schedule case for de novo trial and allow all amendments necessary to reach the merits","citations":["T.C.A. § 27-5-108(c)","T.C.A. § 16-15-729"],"conditions":["No civil case originating in General Sessions and carried to Circuit Court shall be dismissed for any informality; it must be tried on its merits. The court shall allow all amendments in the form of action, the parties, or the statement of the cause of action necessary to reach the merits. T.C.A. § 16-15-729.","The trial is de novo including damages; the General Sessions judgment has no preclusive effect on issues, evidence, or amounts. T.C.A. § 27-5-108(c), T.C.A. § 16-15-729."],"next_steps":["CC-APP-007"],"decision_point":false,"notes":"[GAP: CC-APP-GAP-004] [CONFLICT: CC-APP-CONF-001] [LOCAL RULE CHECK: CC-APP-LRC-002] Proceeds to CC-APP-007 (amended pleadings)."},{"step_id":"CC-APP-007","phase":"Pleadings","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"File amended pleadings to conform the action to Circuit Court standards","citations":["T.C.A. § 16-15-729","Tenn. R. Civ. P. 8.01","Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 15.01"],"conditions":["Either party may assert new claims, counterclaims, or defenses not raised in General Sessions Court. T.C.A. § 16-15-729, Tenn. R. Civ. P. 15.01."],"next_steps":["CC-APP-008"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CC-APP-LRC-003] Proceeds to CC-APP-008 (pre-trial proceedings)."},{"step_id":"CC-APP-008","phase":"Discovery","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Judge","action":"Conduct pre-trial proceedings including discovery and scheduling","citations":["T.C.A. § 27-5-108(c)","Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26"],"conditions":["Because the case is tried de novo, the full range of discovery tools available in Circuit Court civil cases is available to both parties. Tenn. R. Civ. P. 26 through 36.","Court may enter a scheduling order under Tenn. R. Civ. P. 16."],"next_steps":["CC-APP-009"],"decision_point":false,"notes":"Proceeds to CC-APP-009 (pre-trial motions)."},{"step_id":"CC-APP-009","phase":"Motions Practice","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"File pre-trial motions including motions to dismiss and motions in limine","citations":["Tenn. R. Civ. P. 12","Tenn. R. Civ. P. 56","Tenn. R. Civ. P. 6.04"],"conditions":["Full range of Circuit Court pre-trial motions is available, including motions to dismiss, for summary judgment, and in limine. Tenn. R. Civ. P. 12, 56."],"next_steps":["CC-APP-010"],"decision_point":false,"notes":"Proceeds to CC-APP-010 (de novo trial)."},{"step_id":"CC-APP-010","phase":"Trial","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Judge","action":"Conduct de novo trial on the merits with full evidence presented fresh","citations":["T.C.A. § 27-5-108(c)","T.C.A. § 16-15-729","Tenn. R. Civ. P. 38","Tenn. R. Evid. 101"],"conditions":["The General Sessions judgment is not introduced as evidence and has no persuasive or preclusive effect; all evidence is presented fresh.","Case is tried to the bench unless a jury is timely demanded. Civil jury demand is governed by Tenn. R. Civ. P. 38; demand must be served no later than 30 days after service of the last pleading directed to the issue. Tenn. R. Civ. P. 38.02.","The Circuit Court is not limited to the General Sessions judgment amount; the trial is de novo including damages. T.C.A. § 16-15-729."],"next_steps":["CC-APP-011"],"decision_point":false,"notes":"Proceeds to CC-APP-011 (entry of Circuit Court judgment)."},{"step_id":"CC-APP-011","phase":"Judgment","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Judge","action":"Enter Circuit Court judgment on de novo trial superseding General Sessions judgment","citations":["T.C.A. § 27-5-108(c)","T.C.A. § 16-15-729","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["The Circuit Court's judgment is the operative judgment and supersedes the General Sessions judgment. The judgment may be for an amount greater or lesser than the General Sessions judgment, in favor of a different party, or on different grounds. T.C.A. § 27-5-108(c), T.C.A. § 16-15-729."],"next_steps":["CC-APP-012"],"decision_point":false,"notes":"Proceeds to CC-APP-012 (clerk entry)."},{"step_id":"CC-APP-012","phase":"Judgment","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Circuit Court Clerk","action":"Enter judgment in minute book, notify parties, assess costs, and issue execution","citations":["Tenn. R. Civ. P. 58","T.C.A. § 27-5-108(d)"],"conditions":["Notice of entry must be mailed or delivered to all parties or their attorneys. Tenn. R. Civ. P. 58."],"next_steps":["CC-APP-014"],"decision_point":false,"notes":"Proceeds to CC-APP-014 (post-judgment motions)."},{"step_id":"CC-APP-013","phase":"Judgment","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Judge","action":"Enter default judgment or affirmance of General Sessions judgment upon appellant's failure to appear","citations":["T.C.A. § 27-5-106(a)-(b)","T.C.A. § 27-5-107"],"conditions":["If appellant is the original defendant and fails to appear: final default judgment for the General Sessions judgment amount against appellant and sureties. T.C.A. § 27-5-106(a).","If appellant is the original plaintiff and fails to appear: suit dismissed, judgment against plaintiff and sureties for costs. T.C.A. § 27-5-106(b).","If appeal dismissed for any other cause: appellee entitled to affirmance with costs. T.C.A. § 27-5-107."],"next_steps":["CC-APP-012"],"decision_point":false,"notes":"Proceeds to CC-APP-012 (clerk entry of judgment)."},{"step_id":"CC-APP-014","phase":"Post-Judgment","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"File post-judgment motion to alter, amend, or seek new trial within 30 days of entry","citations":["Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02."],"next_steps":["CC-APP-015"],"decision_point":false,"notes":"Proceeds to CC-APP-015 (appeal to Court of Appeals)."},{"step_id":"CC-APP-015","phase":"Appeal","court_type":"Circuit Court","case_type":"Appeals from General Sessions Court (De Novo)","actor":"Plaintiff / Attorney","action":"File notice of appeal to Court of Appeals within 30 days of entry of Circuit Court judgment","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["The Circuit Court's de novo judgment is the trial court judgment for purposes of further appeal. Notice of appeal to the Court of Appeals must be filed within 30 days after entry of the Circuit Court judgment. Tenn. R. App. P. 4(a).","Timely post-trial motion extends the period; it runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b).","The Court of Appeals reviews the Circuit Court de novo judgment under the standard applicable to any Circuit Court civil judgment; the original General Sessions proceeding is irrelevant at the appellate level."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CC-APP-Flowchart.html"},{"flow_id":"CC-CIV","court_type":"Circuit Court","case_type":"Civil","version":"1.1","produced_date":"2026-05-09","status":"Draft - Pending Review","gaps":[{"gap_id":"GAP-001","description":"T.C.A. § 8-21-401(b) establishes that clerks of circuit and chancery courts shall charge a standard filing fee 'as set forth below,' but the actual fee amounts are embedded in a linked form that did not survive JSON conversion from the source. The statute text is present and the procedural rules surrounding fee collection are fully citable, but the specific dollar amounts for Circuit Court civil filings cannot be confirmed from the present corpus. The current AOC fee schedule or the clerk's published schedule must be consulted to confirm the applicable amounts. Note: the continuance fee ($10.00 per T.C.A. § 8-21-401(i)(2)), registry fund cost ($50.00 per T.C.A. § 8-21-401(i)(3)), and technology surcharge ($7.00 per filing per T.C.A. § 8-21-401(j)) are confirmed in the statute text; only the base standard filing fee amount is unconfirmed.","affected_steps":["CC-CIV-001","CC-CIV-PJ-001"]},{"gap_id":"GAP-002","description":"The Servicemembers Civil Relief Act, 50 U.S.C. § 3931, requires that before a default judgment may be entered against a defendant the plaintiff must file an affidavit stating whether or not the defendant is in military service. This is a federal statutory requirement that applies in state court proceedings and is not addressed in the Tennessee Rules of Civil Procedure corpus. Human reviewers should confirm whether this requirement should be explicitly noted as a condition on the default judgment step and whether any Tennessee implementing rule or AOC guidance exists.","affected_steps":["CC-CIV-DFT-001"]}],"conflicts":[],"local_rule_checks":[{"check_id":"LRC-001","description":"Many counties impose local litigation taxes in addition to the statewide fee schedule under T.C.A. § 8-21-401. Verify whether any applicable local litigation tax applies in each county and whether local clerk practice imposes any additional administrative requirements at the time of filing.","affected_steps":["CC-CIV-001"]},{"check_id":"LRC-002","description":"Verify local rules for any county-specific cover sheet requirements, e-filing platform requirements, or administrative filing procedures that supplement Tenn. R. Civ. P. 5.06. Verify electronic filing transaction fee amounts and subscription fee structures authorized by local court rule under T.C.A. § 8-21-401(n).","affected_steps":["CC-CIV-001"]},{"check_id":"LRC-003","description":"Default judgment procedure: verify local rules for any required affidavits of non-military service (Servicemembers Civil Relief Act, 50 U.S.C. § 3931) and local practices for damages prove-up hearings on unliquidated claims.","affected_steps":["CC-CIV-DFT-001"]},{"check_id":"LRC-004","description":"Many circuit court divisions operate under standing orders that effectively make scheduling orders mandatory and prescribe standard discovery and motion deadlines. Verify applicable divisional standing orders for each county before representing the scheduling order step as purely discretionary.","affected_steps":["CC-CIV-PT-001"]},{"check_id":"LRC-005","description":"Verify Tenn. Ct. App. R. 1 et seq. for any procedural requirements specific to the Court of Appeals not captured in the Rules of Appellate Procedure, including any local rules governing oral argument scheduling, page limits, or electronic filing.","affected_steps":["CC-CIV-AP-004"]}],"steps":[{"step_id":"CC-CIV-001","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"File complaint with Circuit Court Clerk and tender filing fees or authorized alternative","citations":["T.C.A. § 16-10-101","Tenn. R. Civ. P. 2","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 5.06","Tenn. R. Civ. P. 8.01","T.C.A. § 8-21-401","T.C.A. § 20-12-125","T.C.A. § 20-12-127","Tenn. Sup. Ct. R. 29"],"conditions":["Venue must be established by the plaintiff before filing. In transitory actions, venue lies in the county where the cause of action arose or where the individual defendant resides; if both parties reside in the same county, the action must be brought in that county or where the cause arose. T.C.A. § 20-4-101. Additional venue rules apply based on the nature of the action and type of defendant. T.C.A. §§ 20-4-102 through 20-4-104; T.C.A. § 16-10-113. Venue is a plaintiff determination made before filing; the clerk does not verify venue at filing.","Complaint may not be filed by facsimile transmission. Tenn. R. Civ. P. 5A.02(4)(a).","Three alternative paths for payment at the time of filing: (1) direct payment of standard filing fee per T.C.A. § 8-21-401(b) [see GAP-001 for specific amount]; (2) attorney cost bond in lieu of payment -- clerk may not refuse a filing where the attorney opts for a cost bond, T.C.A. § 8-21-401(a); or (3) pauper's oath with Uniform Civil Affidavit of Indigency per T.C.A. § 20-12-127 and Tenn. Sup. Ct. R. 29. Filing fees do not include officer's fees under T.C.A. § 8-21-901 or state and local litigation taxes. T.C.A. § 8-21-401(a). Filing on pauper's oath suspends but does not extinguish the obligation to pay costs if later taxed by the court. T.C.A. § 20-12-127(b). If payment of fees would create a substantial hardship, the court is encouraged to find indigency even where the party does not meet Legal Services Corporation poverty guidelines. T.C.A. § 8-21-401(a).","Action is commenced within the meaning of any statute of limitations upon filing, whether or not process is issued or served. Tenn. R. Civ. P. 3.","The clerk endorses the filing date and hour upon the complaint and all papers filed. Tenn. R. Civ. P. 5.06.","The pauper's oath path introduces a downstream judicial decision point: the court may determine nonindigency and dismiss the action if the allegation of poverty is probably untrue or the cause is frivolous or malicious. T.C.A. § 20-12-132."],"next_steps":["CC-CIV-002"],"decision_point":false,"notes":"GAP-001 applies to this step regarding the base standard filing fee amount. LRC-001 and LRC-002 apply to this step. Third-party complaints, counter-complaints, and cross-complaints filed later in the action are charged the same standard filing fee as was charged at initiation. T.C.A. § 8-21-401(i)(6)."},{"step_id":"CC-CIV-002","phase":"Case Initiation","court_type":"Circuit Court","case_type":"Civil","actor":"Circuit Court Clerk","action":"Issue summons promptly upon filing of complaint","citations":["Tenn. R. Civ. P. 4.01(1)","Tenn. R. Civ. P. 4.01(3)","Tenn. R. Civ. P. 4.02"],"conditions":["Summons must be issued promptly -- contemporaneously with or soon after filing. The clerk may not delay issuance at the request of plaintiff or plaintiff's counsel. Tenn. R. Civ. P. 4.01(1).","Summons must be issued in the name of the State of Tennessee; dated and signed by the clerk; contain the name of the court, county, title of the action, and file number; be directed to the defendant; state the time within which the defendant must appear and defend; notify the defendant that a default judgment will be entered for failure to do so; and state the name and address of plaintiff's attorney, or plaintiff's address if no attorney. Tenn. R. Civ. P. 4.02.","Separate or additional summonses may be issued against any defendant upon request of the plaintiff. Tenn. R. Civ. P. 4.01(1).","If plaintiff or plaintiff's counsel intentionally causes delay of prompt issuance, the filing of the complaint will not toll any applicable statutes of limitation or repose. Tenn. R. Civ. P. 4.01(3).","A summons may not be filed by facsimile transmission. Tenn. R. Civ. P. 5A.02(4)(b)."],"next_steps":["CC-CIV-003"],"decision_point":false,"notes":"Issuance of summons is a ministerial act upon filing. The clerk delivers the summons with necessary copies of the complaint for service to any person authorized to serve process. Tenn. R. Civ. P. 4.01(1)."},{"step_id":"CC-CIV-003","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Select method of service","citations":["Tenn. R. Civ. P. 4.04","Tenn. R. Civ. P. 4.05","Tenn. R. Civ. P. 4.07","Tenn. R. Civ. P. 4.08","Tenn. R. Civ. P. 4A"],"conditions":["Waiver of service: plaintiff sends written notice and request for waiver to defendant by first-class mail or other reliable means; if defendant returns a signed waiver, service is complete without a process server and defendant receives 60 days from the date the waiver request was sent to answer. Tenn. R. Civ. P. 4.07. Proceed to CC-CIV-004.","Personal service within the state: service effected by a person not a party and at least 18 years of age using methods authorized by Tenn. R. Civ. P. 4.04 based on the category of defendant. Tenn. R. Civ. P. 4.04. Proceed to CC-CIV-005.","Service outside the state or in a foreign country: authorized where state law permits long-arm jurisdiction; methods include those authorized within the state, methods prescribed by the law of the state where service is effected, or methods directed by the court. Tenn. R. Civ. P. 4.05; Tenn. R. Civ. P. 4A. Proceed to CC-CIV-006.","Constructive service by publication: permissible only where authorized by Tennessee statute and only upon an affidavit establishing statutory grounds for dispensing with personal service; Tenn. R. Civ. P. 4.08 defers entirely to the enabling statutes. T.C.A. § 21-1-203; Tenn. R. Civ. P. 4.08. Proceed to CC-CIV-007."],"next_steps":["CC-CIV-004","CC-CIV-005","CC-CIV-006","CC-CIV-007"],"decision_point":true,"notes":"Decision point -- four service method paths available. Selection is made by plaintiff based on defendant's location, type, and willingness to waive."},{"step_id":"CC-CIV-004","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Request waiver of service by notice to defendant","citations":["Tenn. R. Civ. P. 4.07"],"conditions":["Notice and waiver request must be in writing; addressed directly to the defendant if an individual or to an officer or managing agent if an entity; dispatched by first-class mail or other reliable means; accompanied by a copy of the complaint; identify the court; inform the defendant of the consequences of compliance and noncompliance; set forth the date sent; allow the defendant at least 30 days to return the waiver; and provide the defendant with an extra copy and a prepaid means of compliance. Tenn. R. Civ. P. 4.07(2).","A defendant who returns a timely waiver has 60 days from the date the waiver request was sent to serve an answer. Tenn. R. Civ. P. 4.07(3).","A defendant who waives service does not waive any objection to venue or to the court's personal jurisdiction. Tenn. R. Civ. P. 4.07(1).","A defendant who fails to comply without good cause is subject to cost-shifting for costs incurred in effecting service, including reasonable attorney's fees. Tenn. R. Civ. P. 4.07(2), (5).","When the plaintiff files the signed waiver with the court, the action proceeds as if a summons and complaint had been served at the time of filing the waiver; no proof of service is required. Tenn. R. Civ. P. 4.07(4)."],"next_steps":["CC-CIV-009"],"decision_point":false,"notes":"If the defendant returns a signed waiver, the plaintiff files it with the clerk and proceeds to CC-CIV-009. If the defendant fails to return the waiver, the plaintiff must effect personal or other authorized service and is entitled to cost-shifting upon motion."},{"step_id":"CC-CIV-005","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Effect personal service within the state","citations":["Tenn. R. Civ. P. 4.01(2)","Tenn. R. Civ. P. 4.04"],"conditions":["Service may be made by any person who is not a party and is not less than 18 years of age; process server must be identified by name and address on the return. Tenn. R. Civ. P. 4.01(2). Service by a sheriff or deputy is an available alternative.","Method of service varies by category of defendant: (a) Individual (not an infant or incompetent): personal delivery; or if the defendant evades or attempts to evade, by leaving copies at the individual's dwelling house or usual place of abode with a person of suitable age and discretion residing there (name to appear on proof of service); or delivery to an authorized agent. Tenn. R. Civ. P. 4.04(1). (b) Unmarried infant or incompetent: service follows a hierarchy -- residence guardian or conservator; parent having custody within the state; person within the state having control; or court-appointed attorney as guardian ad litem if none of the foregoing exist. Tenn. R. Civ. P. 4.04(2). (c) Partnership or unincorporated association: upon a partner or managing agent, or officer or managing agent, or authorized agent. Tenn. R. Civ. P. 4.04(3). (d) Corporation (domestic or foreign doing business in the state): upon any officer, managing agent, chief agent in the county, or any other agent authorized by appointment or law to receive service. Tenn. R. Civ. P. 4.04(4). (e) Nonresident individual transacting business through an in-state office: upon the person in charge of that office or agency, in any action arising out of that office's or agency's business. Tenn. R. Civ. P. 4.04(5). (f) County: chief executive officer; if absent, county attorney; if no county attorney, county court clerk. Tenn. R. Civ. P. 4.04(7). (g) Municipality: chief executive officer or city attorney. Tenn. R. Civ. P. 4.04(8). (h) Other governmental or quasi-governmental entity: any officer or managing agent. Tenn. R. Civ. P. 4.04(9). (i) Service by certified or registered mail within the state: permitted; complete upon actual acceptance by defendant or designated person; refusal deemed acceptance. Tenn. R. Civ. P. 4.04(10), (11). Service by mail is not a basis for default judgment unless the record contains a return receipt showing personal acceptance or documenting refusal, with additional evidentiary requirements for registered entities. Tenn. R. Civ. P. 4.04(10) (as amended 2019).","The plaintiff must furnish the process server with sufficient copies of the summons and complaint. Tenn. R. Civ. P. 4.04."],"next_steps":["CC-CIV-008"],"decision_point":false,"notes":"Proceeds to CC-CIV-008 (90-day service window determination)."},{"step_id":"CC-CIV-006","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Effect service outside the state or in a foreign country","citations":["Tenn. R. Civ. P. 4.05","Tenn. R. Civ. P. 4A","T.C.A. § 20-2-214","T.C.A. § 20-2-215"],"conditions":["Out-of-state service, when state law authorizes it, may be made by: any form of service authorized within the state under Tenn. R. Civ. P. 4.04; in any manner prescribed by the law of the state where service is effected for actions in courts of general jurisdiction; or as directed by the court. Service must be reasonably calculated to give actual notice. Tenn. R. Civ. P. 4.05(1).","Service by mail on an out-of-state defendant is not a basis for default judgment unless the record contains a return receipt showing personal acceptance or documenting refusal, with additional evidentiary requirements for registered entities. Tenn. R. Civ. P. 4.05(6).","Non-resident defendants transacting business in Tennessee may be served through the Secretary of State: plaintiff lodges original summons and a clerk-certified copy with the Secretary of State with a $20.00 fee; the Secretary of State forwards by registered or certified mail. T.C.A. § 20-2-215(a). Refusal of delivery is deemed the equivalent of delivery. T.C.A. § 20-2-215(d).","Service in a foreign country is governed by Tenn. R. Civ. P. 4A, which authorizes internationally agreed means (including the Hague Convention), foreign country procedures, court direction, or personal delivery or signed-receipt mail dispatched by the clerk of the court."],"next_steps":["CC-CIV-008"],"decision_point":false,"notes":"Proceeds to CC-CIV-008 (90-day service window determination)."},{"step_id":"CC-CIV-007","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Effect constructive service where authorized by statute","citations":["Tenn. R. Civ. P. 4.08"],"conditions":["Personal service is dispensed with, and constructive service by publication is authorized, in the following circumstances: (1) defendant is a nonresident of the state; (2) upon inquiry at defendant's usual place of abode, defendant cannot be found and there is just ground to believe defendant has left the state; (3) sheriff's return states defendant is not to be found; (4) defendant's name is unknown and cannot be ascertained upon diligent inquiry; (5) defendant's residence is unknown and cannot be ascertained upon diligent inquiry; (6) judicial or other attachment will lie against defendant's property; or (7) a domestic corporation has ceased to do business and has no known officers or representatives available for personal service. Facts must be stated under oath in the bill, by separate affidavit, or appear by the return. T.C.A. § 21-1-203.","Publication procedure: the clerk enters an order on the rule docket requiring defendant to appear on a named rule day and defend, or the bill will be taken as confessed. The clerk causes a copy of the order to be published for four consecutive weeks in the newspaper designated in the order or by the general rules of the court. The order must contain the names of the parties, the style of the court, and the location of the court without a brief or abstract of facts unless directed by the court. Proof of publication is by affidavit of the printer or actual production of the newspaper in court. T.C.A. § 21-1-204.","Notice to nonresident defendant: where publication is made for a nonresident defendant, the clerk must mail a copy of the complaint or, after the first publication, a copy of the newspaper clipping to the nonresident defendant's last known address by return receipt certified or registered mail, and must make an entry on the docket. A return receipt signed by the defendant or defendant's agent, or returned marked refused, constitutes evidence of personal notice. If the return receipt does not establish notice, the court may require new publication or other action. T.C.A. § 21-1-205."],"next_steps":["CC-CIV-008"],"decision_point":false,"notes":"Proceeds to CC-CIV-008 (90-day service window determination)."},{"step_id":"CC-CIV-008","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Determine whether service was effected within 90 days of summons issuance","citations":["Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 4.03(1)"],"conditions":["A summons not served within 90 days after issuance must be returned unserved, with reasons stated. Tenn. R. Civ. P. 4.03(1).","If process is not served within 90 days from issuance, the plaintiff cannot rely on the original filing date to toll the running of a statute of limitations unless new process is obtained within one year from issuance of the previous process or, if no process was issued, within one year of the filing of the complaint. Tenn. R. Civ. P. 3.","The plaintiff may obtain new summonses from time to time under Tenn. R. Civ. P. 3 if any prior summons was returned unserved or was not served within 90 days of issuance. Tenn. R. Civ. P. 4.03(1)."],"next_steps":["CC-CIV-009","CC-CIV-002"],"decision_point":true,"notes":"If service was effected within 90 days: proceed to CC-CIV-009 (return and filing of proof of service). If service was not effected within 90 days: the clerk returns the summons unserved with reasons stated, and the plaintiff may obtain new process by looping back to CC-CIV-002 (issuance of new summons). The one-year window within which new process must issue to preserve the tolling effect of the original filing date applies to the loop. Failure to obtain new process within that window results in loss of the tolling benefit of the original filing date."},{"step_id":"CC-CIV-009","phase":"Service of Process","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"File proof of service or waiver of service with Circuit Court Clerk","citations":["Tenn. R. Civ. P. 4.01(1)","Tenn. R. Civ. P. 4.03(1)","Tenn. R. Civ. P. 4.03(2)","Tenn. R. Civ. P. 4.03(3)","Tenn. R. Civ. P. 4.07(4)","Tenn. R. Civ. P. 4.09"],"conditions":["The process server must promptly make proof of service to the court, identifying the person served and describing the manner of service. Tenn. R. Civ. P. 4.03(1). The return endorsed on the summons constitutes proof of the time and manner of service. Tenn. R. Civ. P. 4.01(1).","For service by mail: the original summons (endorsed with date of mailing and date of receipt of return receipt), an affidavit of the person making service, and the return receipt must be filed by the clerk. Tenn. R. Civ. P. 4.03(2).","Failure to promptly file proof of service does not affect the validity of service. Tenn. R. Civ. P. 4.03(3).","For waiver of service: when the plaintiff files the signed waiver with the court, the action proceeds as if a summons and complaint had been served at the time of filing the waiver; no proof of service is required. Tenn. R. Civ. P. 4.07(4).","The court may allow amendment of process or proof of service at any time in its discretion, upon such terms as it deems just, unless material prejudice to the substantial rights of the party against whom process issued is clearly apparent. Tenn. R. Civ. P. 4.09."],"next_steps":["CC-CIV-010"],"decision_point":false,"notes":"This step completes the Service of Process phase. Proceeds to Pleadings phase."},{"step_id":"CC-CIV-010","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Defendant / Attorney","action":"Serve answer or pre-answer motion in response to complaint","citations":["Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 12.02","Tenn. R. Civ. P. 4.07(3)"],"conditions":["Defendant must serve an answer within 30 days after service of the summons and complaint. Tenn. R. Civ. P. 12.01. If the defendant served a waiver of service under Rule 4.07, the defendant has 60 days from the date the waiver request was sent to answer. Tenn. R. Civ. P. 4.07(3).","At the defendant's option, the following defenses may be raised by pre-answer written motion rather than in the answer: (1) lack of jurisdiction over the subject matter; (2) lack of jurisdiction over the person; (3) improper venue; (4) insufficiency of process; (5) insufficiency of service of process; (6) failure to state a claim upon which relief can be granted; (7) failure to join a party under Rule 19; and (8) specific negative averments under Rule 9.01. A motion making any of these defenses must be made before pleading if a further pleading is permitted. Tenn. R. Civ. P. 12.02.","If the court denies a Rule 12.02 motion or postpones its disposition until trial on the merits, the responsive pleading shall be served within 15 days after notice of the court's action. If the court grants a motion for more definite statement, the responsive pleading shall be served within 15 days after service of the more definite statement. Tenn. R. Civ. P. 12.01.","Defenses not raised by motion or answer are generally waived, except that lack of subject matter jurisdiction, failure to state a claim upon which relief can be granted, and failure to join an indispensable party may be raised at any time. Tenn. R. Civ. P. 12.08."],"next_steps":["CC-CIV-011","CC-CIV-DFT-001"],"decision_point":true,"notes":"Decision point: defendant answers or files a pre-answer motion (proceed to CC-CIV-011), or defendant fails to plead or otherwise defend (proceed to default judgment branch CC-CIV-DFT-001)."},{"step_id":"CC-CIV-011","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Defendant / Attorney","action":"File answer containing admissions, denials, and affirmative defenses","citations":["Tenn. R. Civ. P. 8.02","Tenn. R. Civ. P. 8.03","Tenn. R. Civ. P. 8.04"],"conditions":["The answer must state in short and plain terms the defendant's defenses to each claim and must admit or deny the averments upon which the plaintiff relies. Tenn. R. Civ. P. 8.02. Averments not denied are admitted, subject to enumerated exceptions for persons under disability, executors and administrators, divorce and annulment actions, unknown parties whose property has not been attached, and termination of parental rights actions. Tenn. R. Civ. P. 8.04.","Affirmative defenses must be affirmatively pleaded, including: accord and satisfaction, arbitration and award, express assumption of risk, comparative fault (with identity or description of alleged tortfeasors), discharge in bankruptcy, duress, estoppel, failure of consideration, fraud, illegality, laches, license, payment, release, res judicata, statute of frauds, statute of limitations, statute of repose, waiver, workers' compensation immunity, and any other matter constituting an affirmative defense. Tenn. R. Civ. P. 8.03."],"next_steps":["CC-CIV-012"],"decision_point":false,"notes":"Proceeds to CC-CIV-012 to determine whether defendant asserts counterclaim, cross-claim, or third-party claim."},{"step_id":"CC-CIV-012","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Defendant / Attorney","action":"Determine whether to assert counterclaim, cross-claim, or third-party claim","citations":["Tenn. R. Civ. P. 7.01","Tenn. R. Civ. P. 7.03","Tenn. R. Civ. P. 13.01","Tenn. R. Civ. P. 13.02","Tenn. R. Civ. P. 13.07","Tenn. R. Civ. P. 14.01"],"conditions":["Allowable pleadings are: complaint; answer; reply to counterclaim; answer to cross-claim; third-party complaint; and third-party answer. No other pleading is allowed except by court order. Tenn. R. Civ. P. 7.01. Demurrers, pleas, and exceptions for insufficiency are abolished. Tenn. R. Civ. P. 7.03.","A compulsory counterclaim -- any claim other than a tort claim arising out of the same transaction or occurrence as the opposing party's claim -- must be pleaded or it is waived. Tenn. R. Civ. P. 13.01. Permissive counterclaims may be pleaded regardless of the transaction or occurrence. Tenn. R. Civ. P. 13.02.","Cross-claims against co-parties arising out of the same transaction or occurrence are permissible. Tenn. R. Civ. P. 13.07.","A defendant may bring in a third party who is or may be liable for all or part of the plaintiff's claim without leave of court if the third-party complaint is filed within 10 days after service of the original answer; otherwise leave of court is required on motion with notice to all parties. Tenn. R. Civ. P. 14.01.","Third-party complaint filing fee is the same as the standard filing fee charged at initiation of the original proceeding. T.C.A. § 8-21-401(i)(6)."],"next_steps":["CC-CIV-013","CC-CIV-014"],"decision_point":true,"notes":"If no counterclaim, cross-claim, or third-party claim: proceed to CC-CIV-014 (amendment of pleadings determination). If counterclaim, cross-claim, or third-party claim asserted: proceed to CC-CIV-013 (plaintiff's reply and responsive pleadings), then CC-CIV-014."},{"step_id":"CC-CIV-013","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Serve reply to counterclaim or other required responsive pleading","citations":["Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 13.01","Tenn. R. Civ. P. 14.01"],"conditions":["If the answer contains a counterclaim, the plaintiff must serve a reply within 30 days after service of the answer. Tenn. R. Civ. P. 12.01.","If a cross-claim is asserted, the party against whom it is directed must serve an answer within 30 days after service of the cross-claim. Tenn. R. Civ. P. 12.01.","The third-party defendant must make defenses to the third-party plaintiff's claim as provided in Rule 12 and may assert counterclaims against the third-party plaintiff and cross-claims against other third-party defendants as provided in Rule 13. Tenn. R. Civ. P. 14.01."],"next_steps":["CC-CIV-014"],"decision_point":false,"notes":"Proceeds to CC-CIV-014 (amendment of pleadings determination)."},{"step_id":"CC-CIV-014","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Determine whether to amend pleadings","citations":["Tenn. R. Civ. P. 15.01","Tenn. R. Civ. P. 15.04","T.C.A. § 20-1-119"],"conditions":["A party may amend as a matter of course once at any time before a responsive pleading is served, or if no responsive pleading is permitted and the action has not been set for trial, within 15 days after the pleading is served. Otherwise amendment requires written consent of the adverse party or leave of court; leave shall be freely given when justice so requires. Tenn. R. Civ. P. 15.01.","For amendments adding defendants under T.C.A. § 20-1-119 (comparative fault tortfeasors named in the answer), written consent or leave of court is not required. Tenn. R. Civ. P. 15.01.","A party responding to an amended pleading has the time remaining for the original response or 15 days after service of the amended pleading, whichever is longer. Tenn. R. Civ. P. 15.01.","Supplemental pleadings setting forth transactions or occurrences that happened after the original pleading date may be served upon motion and court order. Tenn. R. Civ. P. 15.04."],"next_steps":["CC-CIV-D-001"],"decision_point":false,"notes":"Amendment is a recurring option throughout the pleadings phase and does not represent a single discrete event. It is modeled here as a phase-level notation. If amendment is sought after the as-of-right period, it requires leave of court. Proceeds to Discovery phase."},{"step_id":"CC-CIV-DFT-001","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Apply to court for entry of default judgment","citations":["Tenn. R. Civ. P. 55.01","Tenn. R. Civ. P. 55.02","Tenn. R. Civ. P. 55.04","Tenn. R. Civ. P. 60.02"],"conditions":["When a party against whom judgment is sought has failed to plead or otherwise defend and that fact is made to appear by affidavit or otherwise, the party entitled to judgment shall apply to the court. Tenn. R. Civ. P. 55.01.","Except for cases where service was properly made by publication, all parties against whom a default judgment is sought must be served with written notice of the application at least five days before the hearing on the application, regardless of whether the party has made an appearance. A party served by publication is entitled to notice only if that party has appeared in the action. Tenn. R. Civ. P. 55.01.","No default judgment may be entered against an infant or incompetent person unless represented in the action by a general guardian, committee, conservator, or other representative who has appeared. Tenn. R. Civ. P. 55.01.","No default judgment may be entered against the State of Tennessee or any officer or agency thereof unless the claimant establishes the claim by evidence satisfactory to the court. Tenn. R. Civ. P. 55.04.","Service by mail is not a basis for default judgment unless the record contains a return receipt showing personal acceptance or documenting refusal, with additional evidentiary requirements for registered entities. Tenn. R. Civ. P. 4.04(10); 4.05(6).","If necessary to determine damages or establish the truth of any averment, the court may conduct hearings or order references, and must accord a right of trial by jury where required by statute. Tenn. R. Civ. P. 55.01.","GAP-003 applies: the Servicemembers Civil Relief Act, 50 U.S.C. § 3931, requires an affidavit of non-military service before entry of default judgment. Human reviewers must confirm this federal requirement is addressed."],"next_steps":["CC-CIV-DFT-002"],"decision_point":false,"notes":"GAP-002 and LRC-003 apply to this step. This is a terminal branch off the main pleadings track. If the default is entered and later set aside under Rule 60.02 for good cause shown, the case re-enters the main pleadings track at CC-CIV-010."},{"step_id":"CC-CIV-DFT-002","phase":"Pleadings","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Enter or deny default judgment","citations":["Tenn. R. Civ. P. 55.01","Tenn. R. Civ. P. 55.02","Tenn. R. Civ. P. 60.02","Tenn. R. Civ. P. 58"],"conditions":["If the court enters default judgment, entry is effective when the judgment is marked as filed for entry by the clerk in accordance with Rule 58. Tenn. R. Civ. P. 58.","A default judgment may be set aside for good cause shown in accordance with Rule 60.02. Tenn. R. Civ. P. 55.02. If set aside, the case re-enters the main pleadings track at CC-CIV-010.","The court must state legal grounds for granting or denying summary judgment where applicable. Tenn. R. Civ. P. 56.04. For default judgments specifically, the court may conduct hearings to establish damages or truth of averments as needed. Tenn. R. Civ. P. 55.01."],"next_steps":["CC-CIV-J-001","CC-CIV-010"],"decision_point":true,"notes":"If default judgment is entered: the case proceeds to the Judgment phase at CC-CIV-J-001. If default judgment is denied or set aside under Rule 60.02: the case re-enters the main pleadings track at CC-CIV-010. This is the terminal decision point for the default branch."},{"step_id":"CC-CIV-D-001","phase":"Discovery","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Establish scope of discovery (ongoing obligation throughout discovery phase)","citations":["Tenn. R. Civ. P. 26.02(1)","Tenn. R. Civ. P. 26.07"],"conditions":["Discovery may be obtained regarding any matter, not privileged, that is relevant to the subject matter of the pending action, including electronically stored information and the identity and location of persons with knowledge of discoverable matter. Information need not be admissible at trial to be discoverable if reasonably calculated to lead to the discovery of admissible evidence. Tenn. R. Civ. P. 26.02(1).","A party need not provide discovery of electronically stored information from sources not reasonably accessible because of undue burden or cost; the burden to show inaccessibility is on the party from whom discovery is sought. Tenn. R. Civ. P. 26.02(1).","Every discovery request, response, or objection by a represented party must be signed by at least one attorney of record. Tenn. R. Civ. P. 26.07."],"next_steps":["CC-CIV-D-002"],"decision_point":false,"notes":"ONGOING OBLIGATION: This step defines the scope within which all discovery in the action must operate. It is not a single event but an ongoing governing constraint that applies throughout the discovery phase and is subject to court modification at any time. Court may limit discovery if it determines the discovery sought is unreasonably cumulative, the requesting party had ample prior opportunity to obtain the information, or the burden or expense outweighs the likely benefit. Tenn. R. Civ. P. 26.02(1)."},{"step_id":"CC-CIV-D-002","phase":"Discovery","court_type":"Circuit Court","case_type":"Civil","actor":"Plaintiff / Attorney","action":"Conduct discovery using available methods","citations":["Tenn. R. Civ. P. 26.01","Tenn. R. Civ. P. 29","Tenn. R. Civ. P. 30.01","Tenn. R. Civ. P. 33.01","Tenn. R. Civ. P. 34","Tenn. R. Civ. P. 35","Tenn. R. Civ. P. 36"],"conditions":["Available discovery methods: depositions upon oral examination (Tenn. R. Civ. P. 30); depositions upon written questions (Tenn. R. Civ. P. 31); written interrogatories (Tenn. R. Civ. P. 33); requests for production of documents, things, or permission to enter property (Tenn. R. Civ. P. 34); physical and mental examinations (Tenn. R. Civ. P. 35); and requests for admission (Tenn. R. Civ. P. 36). Tenn. R. Civ. P. 26.01.","Depositions upon oral examination may be taken after commencement of the action; leave of court is required only if the plaintiff seeks to depose before 30 days after service of the summons and complaint upon any defendant, subject to exceptions. Tenn. R. Civ. P. 30.01.","Interrogatories may be served upon the plaintiff after commencement of the action and upon any other party with or after service of the summons and complaint. Answers or objections must be served within 30 days after service; a defendant may respond within 45 days after service of the summons and complaint. Tenn. R. Civ. P. 33.01. Objections must be stated with specificity; vague or boilerplate objections are improper. Tenn. R. Civ. P. 33.01 (Advisory Commission Comment [2020]).","Parties may by written stipulation modify discovery procedures, including time periods, without court approval unless the court specifically orders otherwise. Tenn. R. Civ. P. 29."],"next_steps":["CC-CIV-D-003","CC-CIV-D-004","CC-CIV-D-005"],"decision_point":false,"notes":"Both parties may conduct discovery simultaneously. This step represents the active exercise of discovery methods. Proceeds concurrently to D-003 (disputes and court intervention, as needed), D-004 (supplementation obligation, ongoing), and D-005 (discovery conference, if ordered or requested)."},{"step_id":"CC-CIV-D-003","phase":"Discovery","court_type":"Circuit Court","case_type":"Civil","actor":"Judge","action":"Resolve discovery disputes on motion","citations":["Tenn. R. Civ. P. 26.02(1)","Tenn. R. Civ. P. 26.03","Tenn. R. Civ. P. 37.01","
