1-139","Tenn. R. Juv. P. 211","Tenn. R. Juv. P. 212"],"conditions":["The court may modify or terminate any order of disposition upon a finding that the child's or family's circumstances have changed and that modification or termination serves the child's best interest and the interests of the state. T.C.A. § 37-1-139.","Motion to modify: filed where relief is sought due to changed circumstances; a petition to modify is required for material changes of circumstances. Tenn. R. Juv. P. 211.","Probation or home placement supervision violation: proceedings are conducted in the same manner as proceedings on petitions alleging delinquent conduct. Tenn. R. Juv. P. 212.","If the child was committed to DCS custody, the court conducts permanency plan ratification, periodic progress reviews, and permanency hearings; see the JV-DEP flow for the post-dispositional permanency process applicable to children in DCS custody."],"next_steps":["JV-DEL-011"],"decision_point":false,"notes":"Proceeds to JV-DEL-011 (appeal)."},{"step_id":"JV-DEL-011","phase":"Appeal","court_type":"Juvenile Court","case_type":"Delinquency and Unruly Child (Combined Flow)","actor":"Petitioner / Attorney","action":"File notice of appeal from juvenile court adjudication or disposition to Circuit or Criminal Court","citations":["T.C.A. § 37-1-159","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["An appeal from a final order of the juvenile court may be taken to the circuit court or criminal court having jurisdiction in the county where the juvenile court is located. T.C.A. § 37-1-159(a). The de novo hearing on appeal shall be held within 45 days of receipt of the juvenile court findings and reports. T.C.A. § 37-1-159(c).","An appeal does not suspend the order of the juvenile court, nor does it release the child from custody. Pending the hearing, the criminal or circuit court may make the same temporary disposition as is vested in the juvenile court. T.C.A. § 37-1-159(b).","There is no civil or interlocutory appeal from a juvenile court disposition under T.C.A. § 37-1-134 (transfer order); if a nonlawyer judge presided at the transfer hearing, the child has 10 days to move for de novo review in criminal court. T.C.A. § 37-1-159(d)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-DEL-Flowchart.html"},{"flow_id":"JV-DEP","court_type":"Juvenile Court","case_type":"Dependency and Neglect","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-DEP-GAP-001","affected_steps":["JV-DEP-002"],"description":"The filing fee, if any, for a dependency and neglect petition filed by a private party in Juvenile Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. DCS-filed petitions are not subject to a filing fee. Private party filing fees should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) may apply."},{"gap_id":"JV-DEP-GAP-002","affected_steps":["JV-DEP-009"],"description":"The corpus confirms that permanency plan ratification must occur within 60 days of the date the child is placed in foster care and must be updated annually, with subsequent plans ratified within 12 months of the prior plan. T.C.A. § 37-2-403. The full text of T.C.A. § 37-2-403 and § 37-2-404 governing permanency plan content requirements, the mandatory findings, and the periodic review schedule is referenced in the Rules of Juvenile Procedure but the specific statutory text should be confirmed against the full corpus of Title 37, Chapter 2."}],"conflicts":[{"conflict_id":"JV-DEP-CONF-001","affected_steps":["JV-DEP-007"],"description":"Upon a finding that a child is dependent and neglected, the court must make an additional written finding of whether the child is a victim of severe child abuse and whether each parent, guardian, relative, or caregiver who provided care knowingly or with gross negligence committed severe child abuse, failed to protect the child, or cannot be excluded as a perpetrator. T.C.A. § 37-1-129(a)(2). This severe child abuse finding has direct consequences for the timeline to termination of parental rights -- if severe child abuse is found, the presumption favoring reunification is affected and the TPR petition may be filed on a shorter timeline. The interplay between the dependency adjudication findings and the T.C.A. § 36-1-113 termination grounds is flagged for reviewer awareness as it controls the permanency trajectory for the case."}],"local_rule_checks":[{"check_id":"JV-DEP-LRC-001","affected_steps":["JV-DEP-001"],"description":"Verify local rules for the DCS investigation referral procedure and the interface between the protective custody order issued by the magistrate and the filing of the dependency and neglect petition within 48 hours under T.C.A. § 37-1-117. Tenn. R. Juv. P. 302(a) requires a written protective custody order upon emergency removal."},{"check_id":"JV-DEP-LRC-002","affected_steps":["JV-DEP-003"],"description":"Verify local rules for the preliminary hearing (shelter care hearing) scheduling and procedure, including whether the local court uses a magistrate for preliminary hearings and the local protocol for emergency removal before a petition is filed."},{"check_id":"JV-DEP-LRC-003","affected_steps":["JV-DEP-009"],"description":"Verify local rules for the use of foster care review boards versus periodic progress reviews (judicial reviews) in the local judicial district. Both are authorized under the Rules of Juvenile Procedure; the choice between them is a local administrative decision. Either a foster care review board or a periodic progress review must be held within 90 days of the date of custody and no less often than every 6 months thereafter. Tenn. R. Juv. P. 402 Advisory Commission Comments."}],"steps":[{"step_id":"JV-DEP-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Department of Children's Services","action":"Receive report, investigate, and determine whether child has been removed from home or may be left in home pending court action","citations":["T.C.A. § 37-1-113(a)(3)","T.C.A. § 37-1-114(a)(2)","Tenn. R. Juv. P. 302(a)"],"conditions":["Emergency removal without a court order: a law enforcement officer, DCS social worker, or duly authorized officer of the court may take a child into custody without a court order if there are reasonable grounds to believe the conditions for shelter care under T.C.A. § 37-1-114(a)(2) exist -- i.e., the child is a neglected, dependent, or abused child and detention or shelter care is required because of an immediate threat to health or safety and there is no less drastic alternative. T.C.A. § 37-1-113(a)(3).","Upon emergency removal without a court order, a written protective custody order containing the probable cause determination must issue from a magistrate as defined by T.C.A. § 37-1-107. Tenn. R. Juv. P. 302(a).","A dependency and neglect petition must be filed within 48 hours, excluding nonjudicial days, of any bench order exercising emergency authority over a child under the court's jurisdiction. Tenn. R. Juv. P. 301 Advisory Commission Comments.","When a petitioner is not DCS, the court must promptly refer the case to DCS for investigation. Tenn. R. Juv. P. 301."],"next_steps":["JV-DEP-002"],"decision_point":false,"notes":"[LOCAL RULE CHECK: JV-DEP-LRC-001] Proceeds to JV-DEP-002 (filing of petition)."},{"step_id":"JV-DEP-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Department of Children's Services","action":"File dependency and neglect petition with Juvenile Court Clerk","citations":["T.C.A. § 37-1-119","T.C.A. § 37-1-120","Tenn. R. Juv. P. 301"],"conditions":["Dependency and neglect cases commence by the filing of a petition. The former practice of informally adjusting dependency and neglect cases has been eliminated. Tenn. R. Juv. P. 301 Advisory Commission Comments.","A private party is permitted to file a dependency and neglect petition regardless of whether the intake officer assisted in its preparation. Tenn. R. Juv. P. 301 Advisory Commission Comments.","Petition must be verified and must set forth in ordinary and concise language the facts supporting the dependency, neglect, or abuse allegation, and the child's name, age, and address. T.C.A. § 37-1-120.","DCS-filed petitions: no filing fee. Private party petitions: confirm filing fee against Standard Fees (AOC). [GAP: JV-DEP-GAP-001]"],"next_steps":["JV-DEP-003"],"decision_point":false,"notes":"[GAP: JV-DEP-GAP-001] Proceeds to JV-DEP-003 (preliminary hearing)."},{"step_id":"JV-DEP-003","phase":"Service of Process","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Juvenile Court Clerk","action":"Issue summons to parents, guardians, or custodians; conduct preliminary hearing (shelter care hearing) if child has been removed from home","citations":["T.C.A. § 37-1-117(b)-(c)","T.C.A. § 37-1-121","Tenn. R. Juv. P. 303"],"conditions":["If a child alleged to be dependent and neglected has been removed from the home, a preliminary hearing (shelter care hearing) must be held as early as practicable, and the parents, guardian, or custodian must be present or have been given reasonable notice and an opportunity to be heard. T.C.A. § 37-1-117(b).","At the preliminary hearing, the court determines: whether probable cause exists that the child is dependent and neglected; whether continued removal from the home is necessary; whether reasonable efforts have been made to prevent the need for removal; and what temporary placement is in the child's best interest.","Right to counsel: parents, guardians, and custodians have the right to be represented by counsel. If unable to afford counsel, counsel must be appointed. T.C.A. § 37-1-126(a). A guardian ad litem must be appointed for the child in any proceeding involving dependency and neglect. T.C.A. § 37-1-149."],"next_steps":["JV-DEP-004"],"decision_point":false,"notes":"[LOCAL RULE CHECK: JV-DEP-LRC-002] Proceeds to JV-DEP-004 (scheduling and adjudicatory hearing)."},{"step_id":"JV-DEP-004","phase":"Discovery","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Judge","action":"Enter scheduling order for adjudicatory hearing; complete discovery on dependency and neglect allegations","citations":["Tenn. R. Juv. P. 105","T.C.A. § 37-1-127"],"conditions":["The parties have the right to introduce evidence, to be heard in their own behalf, and to cross-examine adverse witnesses. T.C.A. § 37-1-127(a). Evidence shall be admitted in accordance with the Tennessee Rules of Evidence. Tenn. R. Juv. P. 303(c)(5).","In dependency and neglect proceedings, the Rules of Evidence apply at the adjudicatory hearing. The hearing addresses whether the child is dependent and neglected -- it is not a proceeding to determine guilt or apportion blame between parties."],"next_steps":["JV-DEP-005"],"decision_point":false,"notes":"Proceeds to JV-DEP-005 (adjudicatory hearing)."},{"step_id":"JV-DEP-005","phase":"Trial","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Judge","action":"Conduct adjudicatory hearing on dependency and neglect allegations","citations":["T.C.A. § 37-1-129(a)","Tenn. R. Juv. P. 303(c)"],"conditions":["Standard of proof: clear and convincing evidence that the child is dependent and neglected as defined in T.C.A. § 37-1-102(b)(12).","Evidence shall be admitted in accordance with the Rules of Evidence. Evidence illegally seized shall not be admitted over objection. Tenn. R. Juv. P. 303(c).","If the court finds the child is NOT dependent and neglected, the petition must be dismissed and the child discharged from any restriction. T.C.A. § 37-1-129(a)(1)."],"next_steps":["JV-DEP-006","JV-DEP-007"],"decision_point":true,"notes":"Decision point: dependency and neglect not found proceeds to JV-DEP-006 (dismissal); dependency and neglect found proceeds to JV-DEP-007 (findings and dispositional hearing)."},{"step_id":"JV-DEP-006","phase":"Judgment","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Judge","action":"Enter order dismissing petition and discharging child from any restriction","citations":["T.C.A. § 37-1-129(a)(1)"],"conditions":[],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Dismissal ends the case lifecycle for purposes of this flow."},{"step_id":"JV-DEP-007","phase":"Judgment","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Judge","action":"Make written findings on severe child abuse and enter adjudicatory order; hold dispositional hearing","citations":["T.C.A. § 37-1-129(a)(2)(A)-(B)","Tenn. R. Juv. P. 303(d)-(e)"],"conditions":["The court must determine and file written findings of fact within 30 days after the close of the hearing on: (1) whether the child is a victim of severe child abuse, regardless of whether a perpetrator can be identified; and (2) whether each parent, guardian, relative, or caregiver who provided care knowingly or with gross negligence committed severe child abuse, failed to protect the child, or cannot be excluded as a perpetrator. T.C.A. § 37-1-129(a)(2)(A)-(B).","Following the adjudicatory finding, the court holds a dispositional hearing. In scheduling the hearing, the court shall prioritize proceedings where the child has been removed from home before an order of disposition has been made. T.C.A. § 37-1-129(a)(2)(B).","Prior to committing or retaining a child in DCS custody, the court must find that reasonable efforts have been made to prevent removal or to make return home possible, and DCS must file a written affidavit addressing the basis for removal and services provided. T.C.A. § 37-1-166."],"next_steps":["JV-DEP-008"],"decision_point":false,"notes":"[CONFLICT: JV-DEP-CONF-001] Proceeds to JV-DEP-008 (entry of disposition order)."},{"step_id":"JV-DEP-008","phase":"Judgment","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Judge","action":"Enter disposition order establishing custody, services, and initial permanency goal","citations":["T.C.A. § 37-1-130","T.C.A. § 37-1-140","T.C.A. § 37-1-166"],"conditions":["Disposition options include: permit child to remain with parents under supervision; transfer legal custody to a relative, another person, or DCS; require parents to participate in services; impose conditions on custody; or any other disposition in the child's best interest. T.C.A. § 37-1-130.","A custodian to whom legal custody has been given by the court has the right to physical custody and to determine the nature of care and treatment, subject to the court's order and the remaining rights of the parents or guardian. T.C.A. § 37-1-140.","Reasonable efforts finding is required before committing a child to or retaining a child in DCS custody. T.C.A. § 37-1-166. DCS must file a written affidavit at each proceeding where placement is at issue."],"next_steps":["JV-DEP-009"],"decision_point":false,"notes":"If child is placed in DCS custody (foster care), proceed to JV-DEP-009 for ongoing permanency process. If child is returned home under supervision, the court retains jurisdiction for review proceedings."},{"step_id":"JV-DEP-009","phase":"Post-Judgment","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Judge","action":"Conduct permanency plan ratification, periodic progress reviews, foster care review board hearings, and permanency hearings on a continuous basis for children in DCS custody","citations":["T.C.A. § 37-2-403","T.C.A. § 37-2-404","Tenn. R. Juv. P. 401","Tenn. R. Juv. P. 402","Tenn. R. Juv. P. 403","Tenn. R. Juv. P. 404"],"conditions":["Permanency plan ratification: the initial permanency plan must be ratified within 60 days of the date the child is placed in foster care. A subsequent plan must be ratified within 12 months of the prior plan if the child remains in foster care. T.C.A. § 37-2-403; Tenn. R. Juv. P. 401. The court must make fact-specific findings and enter an order within 30 days of the hearing.","Periodic progress review or foster care review board: must occur within 90 days of the date of custody and no less often than every 6 months thereafter. The court reviews plan compliance, placement appropriateness, and continued reasonable efforts. Tenn. R. Juv. P. 402, 403.","Permanency hearing: separate from the ratification and periodic progress review; determines the final permanency outcome for the child. The court must identify a specific permanency goal (return home, adoption, guardianship, permanent legal custody, or planned permanent living arrangement) and establish a timetable. Tenn. R. Juv. P. 404.","At each ratification hearing, the court must explain on the record the law relating to abandonment and the possible consequences of termination of parental rights. Tenn. R. Juv. P. 401(g).","If the court determines that the permanency goal is adoption or another goal that requires termination of parental rights, a TPR petition must be filed. See JV-TER flow."],"next_steps":["JV-DEP-010"],"decision_point":false,"notes":"[GAP: JV-DEP-GAP-002] [LOCAL RULE CHECK: JV-DEP-LRC-003] This step is an ongoing, recurring obligation. The court retains jurisdiction until the child is returned home, reaches the age of majority, or achieves an alternate permanency outcome. Proceeds to JV-DEP-010 (appeal)."},{"step_id":"JV-DEP-010","phase":"Appeal","court_type":"Juvenile Court","case_type":"Dependency and Neglect","actor":"Petitioner / Attorney","action":"File notice of appeal from juvenile court dependency and neglect adjudication or disposition","citations":["T.C.A. § 37-1-159","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from final orders in dependency and neglect cases go to the circuit or criminal court with jurisdiction, or directly to the Court of Appeals in some circumstances. T.C.A. § 37-1-159(a).","When an appeal involves removal of a child from the custody of natural or legal parents or DCS, the hearing must be held within 45 days of receipt of the juvenile court findings and reports. T.C.A. § 37-1-159(c).","An appeal does not suspend the order of the juvenile court; the child remains subject to the court's custody orders pending the appeal. T.C.A. § 37-1-159(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-DEP-Flowchart.html"},{"flow_id":"JV-MNH","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-MNH-GAP-001","affected_steps":["JV-MNH-001"],"description":"T.C.A. § 33-8-101 et seq. (Title 33, Chapter 8 -- Special Provisions for Children) governs commitment of minors. The corpus contains the chapter heading but the full text of the specific commitment procedures for children, including the criteria distinguishing voluntary admission from judicial commitment for minors, the role of parents or guardians in the admission decision, and the age thresholds applicable, is not confirmed from the loaded corpus sections. The full text of Title 33, Chapter 8 should be reviewed before this flow is treated as authoritative."},{"gap_id":"JV-MNH-GAP-002","affected_steps":["JV-MNH-004"],"description":"T.C.A. § 33-3-603(b)(3) grants juvenile courts jurisdiction over commitment proceedings when presided over by judges who are lawyers or by referees. The corpus confirms this grant but does not confirm the specific procedure by which a Juvenile Court referee conducts a commitment hearing, how the referee's findings are reviewed by the juvenile judge, or how the NICS reporting obligation under T.C.A. § 16-15-302(b) applies to Juvenile Court commitment orders specifically. These should be confirmed against the full corpus and AOC guidance."}],"conflicts":[{"conflict_id":"JV-MNH-CONF-001","affected_steps":["JV-MNH-001"],"description":"Juvenile Court has jurisdiction over commitment proceedings when presided over by judges who are lawyers or by referees. T.C.A. § 33-3-603(b)(3). Chancery and Circuit Courts have general statewide jurisdiction over commitment proceedings. T.C.A. § 33-3-603(b)(1)-(2). In practice, Juvenile Court exercises commitment jurisdiction over minors most commonly when a delinquency, unruly, or dependency proceeding is already pending before the Juvenile Court and a mental health evaluation leads to a commitment referral. The allocation of juvenile mental health commitment proceedings between Juvenile Court and Chancery or Circuit Court is a local practice determination. This flow applies to the Juvenile Court path only; see CH-MNH for the Chancery Court commitment flow which contains the confirmed Title 33 procedural detail."}],"local_rule_checks":[{"check_id":"JV-MNH-LRC-001","affected_steps":["JV-MNH-001"],"description":"Verify by judicial district whether juvenile mental health commitment proceedings are heard in Juvenile Court or are transferred to Chancery or Circuit Court. In many districts, commitment proceedings for minors are conducted by Chancery or Circuit Court even where a delinquency or dependency proceeding is pending in Juvenile Court."},{"check_id":"JV-MNH-LRC-002","affected_steps":["JV-MNH-006"],"description":"Verify local rules for the NICS reporting obligation for Juvenile Court commitment orders under T.C.A. § 16-15-302. The obligation applies to courts where commitments are ordered under Title 33, Chapters 6 or 7. Confirm whether the Juvenile Court clerk in the local district has a standing and continuing order addressing NICS reporting for juvenile commitment orders."}],"steps":[{"step_id":"JV-MNH-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Petitioner / Attorney","action":"Determine that Juvenile Court has jurisdiction over the juvenile commitment proceeding and confirm the applicable commitment track","citations":["T.C.A. § 33-3-603(b)(3)","T.C.A. § 33-8-101","T.C.A. § 33-6-401"],"conditions":["JURISDICTIONAL NOTICE: Juvenile Court jurisdiction over commitment proceedings exists only when presided over by a judge who is a lawyer or by a referee. T.C.A. § 33-3-603(b)(3). This flow applies only in those courts and districts. In all other circumstances, the commitment proceeding must be conducted in Chancery or Circuit Court; see CH-MNH.","Juvenile commitment proceedings are governed by Title 33, Chapter 8 (Special Provisions for Children) in addition to the general commitment provisions of Title 33, Chapter 6. [GAP: JV-MNH-GAP-001]","The emergency detention, certificate of need, and probable cause hearing procedures for juvenile commitment proceedings mirror those in CH-MNH steps CH-MNH-002 through CH-MNH-006 and are incorporated by reference. The same substantive standards apply: the child must pose a substantial likelihood of serious harm as defined in T.C.A. § 33-6-501 and must meet all four prerequisites of T.C.A. § 33-6-502."],"next_steps":["JV-MNH-002"],"decision_point":false,"notes":"[GAP: JV-MNH-GAP-001] [CONFLICT: JV-MNH-CONF-001] [LOCAL RULE CHECK: JV-MNH-LRC-001]"},{"step_id":"JV-MNH-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Petitioner / Attorney","action":"File commitment petition or complaint with Juvenile Court Clerk; confirm emergency detention if applicable","citations":["T.C.A. § 33-3-602","T.C.A. § 33-6-401","T.C.A. § 33-6-402"],"conditions":["The commitment petition or complaint must be sworn and must show the child is subject to involuntary care and treatment under T.C.A. § 33-6-502, accompanied by certificates of need from two licensed physicians (or one physician and one qualified psychologist). T.C.A. § 33-3-602.","Emergency detention of a minor follows the same standards as adult emergency detention under T.C.A. §§ 33-6-401 through 33-6-404, with any additional protections applicable to minors under Title 33, Chapter 8.","Notice of admission must be given to the general sessions court of the county where the hospital or treatment resource is located. T.C.A. § 33-6-413. In juvenile proceedings, notice is given to the Juvenile Court."],"next_steps":["JV-MNH-003"],"decision_point":false,"notes":"[GAP: JV-MNH-GAP-001] Proceeds to JV-MNH-003 (notice and counsel)."},{"step_id":"JV-MNH-003","phase":"Service of Process","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Juvenile Court Clerk","action":"Issue notice of hearing to child, parents or guardians, and attorney; appoint counsel if child is unrepresented","citations":["T.C.A. § 33-3-605","T.C.A. § 33-3-608","T.C.A. § 37-1-126"],"conditions":["Notice must be served on the child and sent by mail to the child's attorney, the chief officer of any facility holding the child, and the child's legal guardian, conservator, spouse (if applicable), parent, or adult next of kin. T.C.A. § 33-3-605.","Counsel must be appointed not less than 5 days in advance of the hearing. An attorney representing the child shall not serve as guardian ad litem. T.C.A. § 33-3-608.","In juvenile commitment proceedings, parents or guardians must also be notified and are entitled to participate in the proceeding. T.C.A. § 37-1-126."],"next_steps":["JV-MNH-004"],"decision_point":false,"notes":"Proceeds to JV-MNH-004 (probable cause hearing)."},{"step_id":"JV-MNH-004","phase":"Trial","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Judge","action":"Conduct probable cause hearing; if probable cause found, child may be held up to 15 days for full commitment hearing","citations":["T.C.A. § 33-6-418","T.C.A. § 33-6-422","T.C.A. § 33-6-423","T.C.A. § 33-3-610"],"conditions":["Probable cause proceedings are conducted in conformity with T.C.A. §§ 33-3-610 through 33-3-615. Hearing must be in an appropriate setting -- not in a jail or criminal custodial facility. T.C.A. § 33-3-610.","If probable cause is found that the child meets the standards of T.C.A. § 33-6-502 and that without continued treatment the child's condition is likely to deteriorate rapidly to the point of re-admissibility, the court may hold the child for up to 15 days pending the full commitment hearing. T.C.A. § 33-6-422.","If probable cause is not found, the child must be released. T.C.A. § 33-6-423.","Either party may demand a jury trial on the issues at the full commitment hearing. T.C.A. § 33-3-609."],"next_steps":["JV-MNH-005"],"decision_point":true,"notes":"[GAP: JV-MNH-GAP-002] Decision point: probable cause found proceeds to JV-MNH-005 (full commitment hearing); probable cause not found, child released, case ends."},{"step_id":"JV-MNH-005","phase":"Trial","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Judge","action":"Conduct full commitment hearing within 20 days of filing of complaint; make findings and enter commitment order or dismiss","citations":["T.C.A. § 33-3-606","T.C.A. § 33-6-502(a)","T.C.A. § 33-6-505","Tenn. R. Civ. P. 52.01"],"conditions":["Full commitment hearing must be held within 20 days of the filing of the complaint; court may continue up to 10 days for good cause. T.C.A. § 33-3-606.","Court must find all four elements of T.C.A. § 33-6-502(a): (1) mental illness or serious emotional disturbance; (2) substantial likelihood of serious harm as defined in T.C.A. § 33-6-501; (3) need for care, training, or treatment; and (4) all less drastic alternatives are unsuitable.","If criteria are met, court enters commitment order specifying the treatment facility, which must have available suitable accommodations. T.C.A. § 33-6-505, § 33-6-509.","The child has all rights set forth in T.C.A. § 33-3-612: right to be present, testify, present evidence, and cross-examine witnesses. Written findings of fact required. Tenn. R. Civ. P. 52.01."],"next_steps":["JV-MNH-006"],"decision_point":false,"notes":"[GAP: JV-MNH-GAP-001] Proceeds to JV-MNH-006 (NICS reporting and ongoing review)."},{"step_id":"JV-MNH-006","phase":"Judgment","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Juvenile Court Clerk","action":"Report commitment to FBI-NICS index and Tennessee Department of Safety within three business days; conduct periodic review","citations":["T.C.A. § 16-15-302(b)-(d)","T.C.A. § 33-6-701","T.C.A. § 33-6-702"],"conditions":["Courts where commitments are ordered under T.C.A. Title 33, Chapters 6 or 7 must report to the FBI-NICS index and Tennessee Department of Safety no later than the third business day following entry of the commitment order. T.C.A. § 16-15-302(b).","Hospital must review committed person no less than every six months for eligibility for discharge. T.C.A. § 33-6-701. Defendant or counsel may request examination after 90 days. T.C.A. § 33-6-702.","Discharge procedures mirror those in CH-MNH-012: discharge when the child no longer meets the admission criteria or when voluntary outpatient treatment is a suitable less restrictive alternative. T.C.A. § 33-6-705, § 33-6-706."],"next_steps":["JV-MNH-007"],"decision_point":false,"notes":"[GAP: JV-MNH-GAP-002] [LOCAL RULE CHECK: JV-MNH-LRC-002] Proceeds to JV-MNH-007 (appeal)."},{"step_id":"JV-MNH-007","phase":"Appeal","court_type":"Juvenile Court","case_type":"Mental Health (Juvenile Commitment)","actor":"Petitioner / Attorney","action":"File notice of appeal from Juvenile Court commitment order to Circuit or Criminal Court","citations":["T.C.A. § 37-1-159","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from Juvenile Court commitment orders go to the circuit or criminal court with jurisdiction. T.C.A. § 37-1-159(a).","An appeal does not automatically stay the commitment order; the child remains subject to the commitment pending the appeal absent a specific court order."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-MNH-Flowchart.html"},{"flow_id":"JV-SUP","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-SUP-GAP-001","affected_steps":["JV-SUP-002"],"description":"The filing fee for a standalone child support petition filed in Juvenile Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. DCS-filed Title IV-D petitions are exempt from filing fees under T.C.A. § 36-5-2313(a). Private party filing fees should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies to non-exempt filings."}],"conflicts":[{"conflict_id":"JV-SUP-CONF-001","affected_steps":["JV-SUP-001"],"description":"Juvenile Court jurisdiction over child support is concurrent with Circuit and Chancery Courts. T.C.A. § 37-1-103(a) grants Juvenile Court exclusive original jurisdiction over matters specified in that section, but child support as a standalone matter is not expressly listed as exclusive to Juvenile Court. In practice, Juvenile Court exercises child support jurisdiction most commonly in Title IV-D cases administered by DCS, in cases ancillary to a pending delinquency or dependency proceeding, and in cases involving paternity establishment. For standalone child support matters not connected to a pending juvenile proceeding, Circuit Court is the primary forum. This flow applies to the Juvenile Court path only. See CC-SUP for the Circuit Court child support flow."}],"local_rule_checks":[{"check_id":"JV-SUP-LRC-001","affected_steps":["JV-SUP-001"],"description":"Verify by judicial district whether the local Juvenile Court accepts standalone child support petitions not arising from a pending delinquency, unruly, dependency, or paternity proceeding, and whether DCS Title IV-D child support cases are administered through Juvenile Court or Circuit Court in the local district."},{"check_id":"JV-SUP-LRC-002","affected_steps":["JV-SUP-006"],"description":"Verify local rules for the use of a magistrate in child support hearings in Juvenile Court. Several judicial districts route initial child support hearings through a magistrate under T.C.A. § 37-1-107, whose order is subject to de novo review by the juvenile court judge on timely objection."}],"steps":[{"step_id":"JV-SUP-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"Determine basis for Juvenile Court child support jurisdiction and assess whether case is Title IV-D","citations":["T.C.A. § 37-1-103(a)","T.C.A. § 36-5-101(a)","T.C.A. § 71-3-124"],"conditions":["Juvenile Court child support jurisdiction is most commonly exercised in: Title IV-D cases administered by DCS; cases ancillary to a pending delinquency, unruly, or dependency proceeding; and cases involving paternity establishment where the Juvenile Court has jurisdiction over the parentage matter.","Title IV-D assessment: a case becomes Title IV-D when DCS provides child support services pursuant to an assignment of support rights or an application for services under T.C.A. § 71-3-124. Filing fees are waived in Title IV-D cases. T.C.A. § 36-5-2313(a).","The procedures for Title IV-D administrative modification and the administrative track for IV-D cases mirror those described in CC-SUP; see CC-SUP-IVD-001 through CC-SUP-IVD-002 for the IV-D administrative track."],"next_steps":["JV-SUP-002"],"decision_point":false,"notes":"[CONFLICT: JV-SUP-CONF-001] [LOCAL RULE CHECK: JV-SUP-LRC-001] Proceeds to JV-SUP-002 (filing)."},{"step_id":"JV-SUP-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"File petition for child support with Juvenile Court Clerk and pay filing fee","citations":["T.C.A. § 36-5-2311(a)-(b)","T.C.A. § 36-5-101(a)","Tenn. R. Civ. P. 3"],"conditions":["Petition must include: names, residential addresses, and Social Security numbers of obligor and obligee; names, sex, residential addresses, Social Security numbers, and dates of birth of each child; a copy of any existing support order from another tribunal; and the relief sought. T.C.A. § 36-5-2311(a)-(b).","DCS Title IV-D petitions: no filing fee. Private party petitions: filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["JV-SUP-003"],"decision_point":false,"notes":"[GAP: JV-SUP-GAP-001] Proceeds to JV-SUP-003 (service and answer)."},{"step_id":"JV-SUP-003","phase":"Service of Process","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Juvenile Court Clerk","action":"Issue summons; effect service of process on respondent","citations":["Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.04"],"conditions":[],"next_steps":["JV-SUP-004"],"decision_point":false,"notes":"Proceeds to JV-SUP-004 (answer)."},{"step_id":"JV-SUP-004","phase":"Pleadings","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Respondent / Attorney","action":"File answer within 30 days after service; contest parentage if disputed","citations":["Tenn. R. Civ. P. 12.01","T.C.A. § 36-2-305(a)"],"conditions":["If parentage is contested, the court must resolve parentage before establishing support. See JV-CUS-PAT steps or CC-CUS-PAT-001 through CC-CUS-PAT-003 for the parentage sub-branch procedure.","If defendant fails to answer, plaintiff may seek a default under Tenn. R. Civ. P. 55; however, the court must still apply the guidelines."],"next_steps":["JV-SUP-005"],"decision_point":false,"notes":"Proceeds to JV-SUP-005 (financial disclosure and scheduling)."},{"step_id":"JV-SUP-005","phase":"Discovery","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Judge","action":"Order exchange of financial information and schedule support hearing","citations":["T.C.A. § 36-5-101(e)","Tenn. R. Civ. P. 26"],"conditions":["Each party must disclose income, assets, and expenses relevant to the child support guidelines calculation."],"next_steps":["JV-SUP-006"],"decision_point":false,"notes":"[LOCAL RULE CHECK: JV-SUP-LRC-002] Proceeds to JV-SUP-006 (support hearing)."},{"step_id":"JV-SUP-006","phase":"Trial","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Judge","action":"Conduct support hearing and determine amount under child support guidelines as rebuttable presumption","citations":["T.C.A. § 36-5-101(e)(1)(A)-(B)","T.C.A. § 36-5-101(h)","Tenn. R. Civ. P. 52.01"],"conditions":["Child support guidelines are a rebuttable presumption. Deviation requires written findings that the guidelines amount would be unjust or inappropriate and the justification for deviation. T.C.A. § 36-5-101(e)(1)(A).","If obligor's net income exceeds $10,000 per month, custodial parent must prove by a preponderance that support in excess of the guidelines amount is reasonably necessary. T.C.A. § 36-5-101(e)(1)(B).","Health insurance must be ordered if accessible and available at a reasonable cost. T.C.A. § 36-5-101(h).","In Title IV-D cases, support orders must be bifurcated from any parenting plan. T.C.A. § 36-6-405(c)."],"next_steps":["JV-SUP-007"],"decision_point":false,"notes":"Proceeds to JV-SUP-007 (entry of support order)."},{"step_id":"JV-SUP-007","phase":"Judgment","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Judge","action":"Enter final child support order with income assignment and health insurance provisions; Juvenile Court Clerk issues income assignment to employer","citations":["T.C.A. § 36-5-101(c)(1)-(2)","T.C.A. § 36-5-116","T.C.A. § 36-5-501(a)(1)-(b)(1)(A)","Tenn. R. Civ. P. 58"],"conditions":["Income assignment is mandatory; all payments based on income assignment must be paid through the central collection and disbursement unit. T.C.A. § 36-5-501(a)(1), (b)(1)(A).","Clerk must send notice to the obligor within two business days of issuing the income assignment to the employer. Obligor has 15 days to request a hearing to contest the assignment. T.C.A. § 36-5-501(b)(2)-(3)."],"next_steps":["JV-SUP-008"],"decision_point":false,"notes":"Proceeds to JV-SUP-008 (appeal)."},{"step_id":"JV-SUP-008","phase":"Appeal","court_type":"Juvenile Court","case_type":"Child Support (Juvenile Court Jurisdiction)","actor":"Petitioner / Attorney","action":"File notice of appeal to Circuit or Criminal Court within 30 days after entry of support order","citations":["T.C.A. § 37-1-159","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from Juvenile Court child support orders go to the circuit or criminal court with jurisdiction. T.C.A. § 37-1-159(a).","In Title IV-D cases involving administrative orders, appeal is to the court having jurisdiction under T.C.A. § 36-5-1003."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-SUP-Flowchart.html"},{"flow_id":"JV-TER","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-TER-GAP-001","affected_steps":["JV-TER-001"],"description":"T.C.A. § 36-1-113(g) enumerates the grounds for termination of parental rights. The corpus contains extensive text of T.C.A. § 36-1-113 including multiple grounds. The full enumeration of all grounds, including the specific factual prerequisites for each ground and the timeframes (e.g., the 15-of-22 months out-of-home placement threshold applicable to certain grounds), should be confirmed against the complete text of T.C.A. § 36-1-113(g)(1) through (g)(14). The corpus confirms grounds include: abandonment; substantial noncompliance with a permanency plan; persistent conditions; severe child abuse; parental criminal convictions; intellectual disability grounds; and others."},{"gap_id":"JV-TER-GAP-002","affected_steps":["JV-TER-003"],"description":"T.C.A. § 36-1-113(d)(3)(A) requires that the petition to terminate parental rights state that the Tennessee putative father registry has been consulted prior to filing or will be consulted within 10 working days thereafter. The corpus confirms this requirement but the full text of the putative father registry procedures under T.C.A. §§ 36-2-318 et seq. is not confirmed from the corpus. The putative father registry consultation and notification procedure should be confirmed from the full corpus before the petition step is treated as authoritative."}],"conflicts":[{"conflict_id":"JV-TER-CONF-001","affected_steps":["JV-TER-001"],"description":"Juvenile Court has jurisdiction over termination of parental rights in a separate, independent proceeding under T.C.A. § 36-1-113(g)(8)(A). Chancery and Circuit Courts also have jurisdiction over termination of parental rights in adoption proceedings and in separate proceedings prior to an adoption. T.C.A. § 36-1-113(g)(8)(A). All three courts are at the same jurisdictional level under TCA statute. The choice of court is typically driven by whether a dependency and neglect proceeding is already pending in Juvenile Court (in which case Juvenile Court is the preferred forum) or whether the termination is being sought in connection with an adoption (in which case the adoption court -- typically Chancery or Circuit -- is the preferred forum). This flow applies to the Juvenile Court path only."},{"conflict_id":"JV-TER-CONF-002","affected_steps":["JV-TER-006"],"description":"The standard of proof for termination of parental rights is clear and convincing evidence on the grounds, with a separate best interest determination. T.C.A. § 36-1-113(c)(1)-(2); Santosky v. Kramer, 455 U.S. 745 (1982). The best interest analysis is also required even after grounds are established -- termination is not automatic upon a finding that grounds exist. Flagged because some practitioners conflate the grounds finding with the best interest finding; both are required and both must be supported by written findings of fact. T.C.A. § 36-1-113(k) requires the court to ensure the hearing occurs within six months of petition filing and the court to provide a ruling within 30 days and enter an order within 30 days of the ruling."}],"local_rule_checks":[{"check_id":"JV-TER-LRC-001","affected_steps":["JV-TER-002"],"description":"Verify local rules for the appointment and compensation of counsel for indigent parents in termination proceedings under T.C.A. § 36-1-113(f)(1)(B)(iii). Tenn. Sup. Ct. R. 13 governs compensation of appointed counsel in termination cases; the maximum is $1,500 per case unless the court certifies the case as complex or extended."},{"check_id":"JV-TER-LRC-002","affected_steps":["JV-TER-003"],"description":"Verify local rules for the guardian ad litem appointment in termination proceedings. T.C.A. § 37-1-149 and Tenn. Sup. Ct. R. 40 govern GAL appointment and compensation. The maximum GAL compensation in a termination case is $1,500 unless the case is certified as complex or extended."}],"steps":[{"step_id":"JV-TER-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Petitioner / Attorney","action":"Determine grounds for termination and confirm Juvenile Court jurisdiction","citations":["T.C.A. § 36-1-113(a)-(b)","T.C.A. § 36-1-113(g)","T.C.A. § 36-1-113(c)"],"conditions":["Persons with standing to file a TPR petition include: DCS; a licensed child-placing agency; a prospective adoptive parent (with or without an adoption petition); the other parent (in cases involving conviction of certain crimes); and the child's legal guardian or guardian ad litem in specific circumstances. T.C.A. § 36-1-113(b).","Grounds for termination (T.C.A. § 36-1-113(g)) include but are not limited to: abandonment; substantial noncompliance with a permanency plan; persistent conditions making return to the child's home unsafe in the near future; severe child abuse; parental incarceration under a sentence of more than 10 years (child under 8); parental conviction of first or second degree murder of the child's other parent; and mental incompetence to parent. [GAP: JV-TER-GAP-001]","Standard of proof: termination requires (1) a finding by clear and convincing evidence that at least one ground for termination is established, AND (2) a finding that termination is in the best interest of the child, applying the statutory factors in T.C.A. § 36-1-113(i). Both findings are required; neither alone is sufficient. T.C.A. § 36-1-113(c)(1)-(2).","Constitutional notice: due process requires that parents receive actual notice of termination proceedings. If a parent is incarcerated, the parent has the right to participate in person, by teleconference, or by other means; the right to claim indigency for appointed counsel; and the right to offer testimony and other evidence. T.C.A. § 36-1-113(f)(1)(B).","Juvenile Court has jurisdiction over TPR in a separate, independent proceeding conducted prior to an adoption proceeding. T.C.A. § 36-1-113(g)(8)(A)."],"next_steps":["JV-TER-002"],"decision_point":false,"notes":"[GAP: JV-TER-GAP-001] [CONFLICT: JV-TER-CONF-001] Proceeds to JV-TER-002 (filing of petition)."},{"step_id":"JV-TER-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Petitioner / Attorney","action":"File verified petition for termination of parental rights with Juvenile Court Clerk","citations":["T.C.A. § 36-1-113(d)","Tenn. R. Civ. P. 3"],"conditions":["The petition must state: the child's birth name, age or date of birth, current residence or county of residence or that the child is in DCS or agency custody; the facts establishing grounds for termination; the ground(s) on which termination is sought; that the Tennessee putative father registry has been consulted or will be consulted within 10 working days. T.C.A. § 36-1-113(d)(2)-(3).","The medical and social history of the child and the child's biological family must be completed on the form promulgated by DCS to the extent possible; absence of this information is not a barrier to the termination proceeding. T.C.A. § 36-1-113(d)(2)(A)(vi).","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). DCS-filed petitions may be exempt."],"next_steps":["JV-TER-003"],"decision_point":false,"notes":"[GAP: JV-TER-GAP-002] [LOCAL RULE CHECK: JV-TER-LRC-001] Proceeds to JV-TER-003 (service of process and counsel)."},{"step_id":"JV-TER-003","phase":"Service of Process","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Juvenile Court Clerk","action":"Effect service of process on all parents or guardians; appoint counsel for indigent parents; appoint guardian ad litem for the child","citations":["T.C.A. § 36-1-113(f)","T.C.A. § 36-1-117(m)(1)","T.C.A. § 37-1-149"],"conditions":["Service of process in juvenile court TPR proceedings is made pursuant to the Tennessee Rules of Civil Procedure and the statutes governing substituted service. T.C.A. § 36-1-117(m)(1).","A parent who is incarcerated must receive notice that includes: the date, time, and place of the hearing; the nature of the hearing; the right to participate (in person, by teleconference, or other means); the right to claim indigency for appointed counsel; the right to offer testimony and other evidence; and the continuing obligation to update contact information. T.C.A. § 36-1-113(f)(1)(B).","If a parent does not employ an attorney, the parent is entitled to court-appointed counsel if the parent claims indigency. The right to appointed counsel may be waived by the parent's voluntary written or verbal statement, or by inaction including failure to timely claim indigency. T.C.A. § 36-1-113(f)(1)(B)(iii), (f)(1)(C).","A guardian ad litem or appointed counsel for the child shall be appointed. Tenn. Sup. Ct. R. 40; T.C.A. § 37-1-149."],"next_steps":["JV-TER-004"],"decision_point":false,"notes":"[GAP: JV-TER-GAP-002] [LOCAL RULE CHECK: JV-TER-LRC-002] Proceeds to JV-TER-004 (answer and pretrial)."},{"step_id":"JV-TER-004","phase":"Pleadings","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Respondent / Attorney","action":"File answer to termination petition; conduct discovery and pretrial proceedings","citations":["Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 26"],"conditions":["TPR proceedings in Juvenile Court are governed by the Tennessee Rules of Civil Procedure to the extent not inconsistent with Title 37. T.C.A. § 37-1-124(b).","Discovery proceeds under the Tennessee Rules of Civil Procedure. Key discovery areas include: compliance with the permanency plan; services provided by DCS; efforts at reunification; and the factual basis for each ground alleged.","If a parent fails to file an answer, the court may determine that the parent has waived the rights specified in T.C.A. § 36-1-113(f)(1)(B) and may hear and decide the petition without the parent's participation. T.C.A. § 36-1-113(f)(1)(C)."],"next_steps":["JV-TER-005"],"decision_point":false,"notes":"Proceeds to JV-TER-005 (hearing on the petition)."},{"step_id":"JV-TER-005","phase":"Trial","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Judge","action":"Conduct hearing on termination petition within six months of petition filing date","citations":["T.C.A. § 36-1-113(j)-(k)","Tenn. R. App. P. 26A"],"conditions":["The court must ensure the hearing takes place within six months of the date the petition is filed, unless the court determines an extension is in the best interest of the child. T.C.A. § 36-1-113(k).","Evidence is admitted pursuant to the Tennessee Rules of Evidence with the exemptions to privileges provided by T.C.A. §§ 37-1-411 and 37-1-614 recognized. T.C.A. § 36-1-113(j).","A termination of parental rights and a finalization of an adoption may be heard and decided in the same hearing if the court determines it is in the best interest of the child. T.C.A. § 36-1-113(k).","CONSTITUTIONAL DUE PROCESS: parents have a fundamental liberty interest in the care and custody of their children (Santosky v. Kramer, 455 U.S. 745 (1982)). The clear and convincing evidence standard reflects this constitutional protection. The court must ensure procedural due process is satisfied including meaningful notice, opportunity to be heard, and the right to present and cross-examine evidence.","Appellate review: appeals from TPR proceedings are governed by Tenn. R. App. P. 26A which provides for expedited briefing and a disfavored extension of time standard."],"next_steps":["JV-TER-006"],"decision_point":false,"notes":"[CONFLICT: JV-TER-CONF-002] Proceeds to JV-TER-006 (findings, ruling, and order)."},{"step_id":"JV-TER-006","phase":"Judgment","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Judge","action":"Issue ruling within 30 days of the conclusion of the hearing; enter written order with specific findings of fact and conclusions of law within 30 days of the ruling","citations":["T.C.A. § 36-1-113(c)","T.C.A. § 36-1-113(i)","T.C.A. § 36-1-113(k)","T.C.A. § 36-1-113(l)"],"conditions":["The court must rule within 30 days of the conclusion of the hearing and enter a written order containing specific findings of fact and conclusions of law within 30 days of the ruling. If the order has not been entered within 30 days from the ruling, either party may request the Court of Appeals to grant an order expediting entry. T.C.A. § 36-1-113(k).","Two-step determination required: (1) clear and convincing evidence that at least one ground for termination is established; (2) termination is in the best interest of the child, with all applicable best interest factors in T.C.A. § 36-1-113(i)(1)(A)-(T) identified and supported by specific findings of fact. T.C.A. § 36-1-113(c), (i)(3).","Effect of termination order: severs forever all legal rights and obligations of the parent or guardian and of the child to that parent or guardian. The parent has no further right to notice of adoption proceedings and no right to object to or thereafter have any relationship, legal or otherwise, with the child. T.C.A. § 36-1-113(l)(1).","Expert testimony is not required to prove or disprove any best interest factor by any party. T.C.A. § 36-1-113(i)(4)."],"next_steps":["JV-TER-007"],"decision_point":false,"notes":"[CONFLICT: JV-TER-CONF-002] Proceeds to JV-TER-007 (appeal)."},{"step_id":"JV-TER-007","phase":"Appeal","court_type":"Juvenile Court","case_type":"Termination of Parental Rights","actor":"Petitioner / Attorney","action":"File notice of appeal to Court of Appeals within 30 days after entry of the termination order","citations":["Tenn. R. App. P. 26A","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","Tenn. R. App. P. 11"],"conditions":["Appeals from termination of parental rights orders go directly to the Court of Appeals under Tenn. R. App. P. 26A; notice of appeal must be filed within 30 days after entry of the order.","Briefing under Tenn. R. App. P. 26A is expedited: appellant's brief is due 30 days after the record is filed; appellee's brief is due 20 days after appellant's brief; reply brief is due 14 days after the appellee's brief. Extensions of time are disfavored and granted only on a particularized showing of good cause. Tenn. R. App. P. 26A(h).","Review by the Supreme Court is governed by Tenn. R. App. P. 11. Tenn. R. App. P. 26A(h).","The termination order is not stayed pending appeal absent a specific court order."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-TER-Flowchart.html"},{"flow_id":"JV-TRF","court_type":"Juvenile Court","case_type":"Traffic (Juvenile)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"JV-TRF-GAP-001","affected_steps":["JV-TRF-001"],"description":"The Juvenile Offender Act (Drug Free Youth Act, T.C.A. § 55-10-701 et seq.) requires the adjudicatory court to send to the Department of Safety an order of denial of driving privileges when a child is 'convicted of the offense.' The Juvenile Procedure Rules note that a conviction does not necessarily lead to an adjudication of delinquency because of the separate treatment and rehabilitation finding requirement. The specific reporting obligation and the form of the order to be sent to the Department of Safety in traffic cases should be confirmed against T.C.A. § 55-10-701 et seq., which is not fully loaded in the corpus."}],"conflicts":[],"local_rule_checks":[{"check_id":"JV-TRF-LRC-001","affected_steps":["JV-TRF-001"],"description":"Verify local rules for the handling of juvenile traffic matters, including whether the local juvenile court uses a separate traffic docket, a magistrate for traffic hearings, and whether informal adjustment (without a petition) is used for minor traffic violations."}],"steps":[{"step_id":"JV-TRF-001","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Traffic (Juvenile)","actor":"Law Enforcement","action":"Issue citation or file traffic complaint in Juvenile Court for minor under 18 charged with a traffic offense","citations":["T.C.A. § 37-1-103(a)","T.C.A. § 55-10-701"],"conditions":["Juvenile Court has jurisdiction over traffic offenses committed by persons under 18 years of age.","Driving record consequences: upon finding a juvenile guilty of a traffic offense, the court must send an order to the Department of Safety for denial, suspension, or revocation of driving privileges as required by statute. T.C.A. § 55-10-701 et seq. [GAP: JV-TRF-GAP-001]","Minor traffic violations may be resolved by informal adjustment by the intake officer without a petition if the child and parents or custodian consent. T.C.A. § 37-1-110."],"next_steps":["JV-TRF-002"],"decision_point":false,"notes":"[GAP: JV-TRF-GAP-001] [LOCAL RULE CHECK: JV-TRF-LRC-001]"},{"step_id":"JV-TRF-002","phase":"Case Initiation","court_type":"Juvenile Court","case_type":"Traffic (Juvenile)","actor":"Juvenile Court Clerk","action":"Docket traffic matter; issue summons to child and parents or custodian","citations":["T.C.A. § 37-1-121","T.C.A. § 37-1-126"],"conditions":["Right to counsel applies in juvenile traffic proceedings. If the offense could result in a significant consequence (license revocation, commitment), counsel should be appointed if the child is unable to afford one. T.C.A. § 37-1-126(a)."],"next_steps":["JV-TRF-003"],"decision_point":false,"notes":""},{"step_id":"JV-TRF-003","phase":"Trial","court_type":"Juvenile Court","case_type":"Traffic (Juvenile)","actor":"Judge","action":"Conduct traffic hearing; child may admit, deny, or enter no contest to the traffic charge","citations":["T.C.A. § 37-1-129","Tenn. R. Juv. P. 202(c)"],"conditions":["Standard of proof for delinquency (traffic offense that would be a crime if committed by an adult): beyond a reasonable doubt.","If the traffic offense is a civil violation only, the standard of proof is preponderance of the evidence.","An adjudication of guilt in a traffic matter in juvenile court is not a criminal conviction. T.C.A. § 37-1-133(a)."],"next_steps":["JV-TRF-004"],"decision_point":false,"notes":""},{"step_id":"JV-TRF-004","phase":"Judgment","court_type":"Juvenile Court","case_type":"Traffic (Juvenile)","actor":"Judge","action":"Enter disposition order; report to Department of Safety if required; assess fines or costs as authorized","citations":["T.C.A. § 55-10-701","T.C.A. § 37-1-131"],"conditions":["Disposition options include: fine, costs, or restitution; driver education requirement; suspension or revocation of driving privileges; community service; probation; or other authorized disposition. Secure detention is generally not available as a traffic disposition absent other delinquency grounds.","Court must report to the Department of Safety as required by T.C.A. § 55-10-701 et seq. for driving privilege consequences."],"next_steps":["JV-TRF-005"],"decision_point":false,"notes":"[GAP: JV-TRF-GAP-001]"},{"step_id":"JV-TRF-005","phase":"Appeal","court_type":"Juvenile Court","case_type":"Traffic (Juvenile)","actor":"Petitioner / Attorney","action":"File notice of appeal to Circuit or Criminal Court if juvenile or parents contest the traffic adjudication or disposition","citations":["T.C.A. § 37-1-159"],"conditions":["Appeals from juvenile traffic orders go to the circuit or criminal court with jurisdiction. T.C.A. § 37-1-159(a). The hearing on appeal is de novo."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"JV-TRF-Flowchart.html"},{"flow_id":"PR-CON","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"PR-CON-GAP-001","affected_steps":["PR-CON-001"],"description":"The filing fee for a conservatorship petition in Probate Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies. T.C.A. § 34-1-114(c) provides that the petitioner is responsible for court costs necessary for initiating proceedings including filing fees."}],"conflicts":[{"conflict_id":"PR-CON-CONF-001","affected_steps":["PR-CON-001"],"description":"Conservatorship jurisdiction is concurrent among multiple courts. T.C.A. § 34-3-101(a) provides that actions for appointment of a conservator may be brought in a court exercising probate jurisdiction or any other court of record in the county of venue. T.C.A. § 16-11-108 grants Chancery Court concurrent jurisdiction with the county court over persons adjudicated incompetent and their estates. The allocation of conservatorship cases between Probate Court (where established), Chancery Court, and other courts of record varies significantly by county and is a local practice determination. This flow applies only in counties where Probate Court has accepted or been allocated conservatorship jurisdiction. In all other counties, the applicable flow is CH-CGD (Chancery Court -- Conservatorship and Adult Guardianship). LOCAL RULES PHASE REVIEW IS REQUIRED FOR THIS ENTIRE FLOW."}],"local_rule_checks":[{"check_id":"PR-CON-LRC-001","affected_steps":["PR-CON-001"],"description":"CRITICAL -- ENTIRE FLOW IS SUBJECT TO LOCAL RULES PHASE REVIEW. Verify by county whether Probate Court (or the court exercising probate jurisdiction in that county) accepts conservatorship petitions and what the local allocation of conservatorship cases between Probate Court, Chancery Court, and other courts of record is. The division of conservatorship jurisdiction between Chancery and Probate varies by county and this flow applies only in counties where Probate Court exercises this jurisdiction."},{"check_id":"PR-CON-LRC-002","affected_steps":["PR-CON-007"],"description":"Verify local rules for the annual accounting deadline, the format required by the local probate clerk, and the procedure for exceptions to the clerk's report. T.C.A. § 34-1-131 requires the clerk to examine the annual accounting and make a report to the judge."}],"steps":[{"step_id":"PR-CON-001","phase":"Case Initiation","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Petitioner / Attorney","action":"Confirm Probate Court exercises conservatorship jurisdiction in the applicable county; determine conservatorship basis","citations":["T.C.A. § 34-3-101(a)-(b)","T.C.A. § 34-1-101(7)"],"conditions":["JURISDICTIONAL NOTICE: Conservatorship jurisdiction is concurrent among Probate Court (where established), Chancery Court, and other courts of record. This flow applies ONLY in counties where Probate Court exercises conservatorship jurisdiction. In all other counties, see CH-CGD. LOCAL RULES PHASE REVIEW IS REQUIRED.","Conservatorship applies to a person with a disability -- an adult who, due to a physical or mental condition, is substantially unable to provide for their own food, clothing, shelter, or care, or to manage their financial resources. T.C.A. § 34-1-101(7).","Venue: county of residence of the alleged person with a disability. T.C.A. § 34-3-101(b)."],"next_steps":["PR-CON-002"],"decision_point":false,"notes":"[GAP: PR-CON-GAP-001] [CONFLICT: PR-CON-CONF-001] [LOCAL RULE CHECK: PR-CON-LRC-001] This flow is procedurally identical to CH-CGD (Chancery Court -- Conservatorship and Adult Guardianship) except for the court type and clerk designation. The steps below follow the same structure as CH-CGD; all statutory citations are the same. Reviewers should cross-reference CH-CGD for the complete statutory analysis underlying each step."},{"step_id":"PR-CON-002","phase":"Case Initiation","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Petitioner / Attorney","action":"File sworn petition for appointment of conservator with Probate Court Clerk; assess whether emergency appointment is required","citations":["T.C.A. § 34-3-102","T.C.A. § 34-3-104","T.C.A. § 34-1-114(c)","T.C.A. § 34-1-132"],"conditions":["Petition requirements mirror those in CH-CGD-002: sworn petition containing all information required by T.C.A. § 34-3-104 including respondent's information, petitioner's information, proposed fiduciary information (including background checks), names and addresses of closest relatives, examination report or statement of refusal, and the rights proposed to be removed. T.C.A. § 34-3-104.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j). Petitioner is responsible for court costs. T.C.A. § 34-1-114(c).","Emergency conservator: if compliance with standard procedures will likely result in substantial harm to respondent's health, safety, or welfare, the court may appoint an emergency conservator whose authority does not exceed 60 days. An attorney ad litem must be appointed immediately. T.C.A. § 34-1-132."],"next_steps":["PR-CON-003"],"decision_point":false,"notes":"For the full step-level detail on each subsequent step, cross-reference CH-CGD steps CH-CGD-004 through CH-CGD-015. The procedure is identical; the court type and clerk designation differ only."},{"step_id":"PR-CON-003","phase":"Service of Process","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Probate Court Clerk","action":"Issue notice of hearing to all required persons and effect service on respondent","citations":["T.C.A. § 34-3-105(a)(1)-(8)","T.C.A. § 34-1-128"],"conditions":["Notice requirements, including personal service on the respondent and mailed notice to all interested parties, are identical to those in CH-CGD-004. T.C.A. § 34-3-105(a)."],"next_steps":["PR-CON-004"],"decision_point":false,"notes":"Cross-reference CH-CGD-004 for full conditions."},{"step_id":"PR-CON-004","phase":"Trial","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Judge","action":"Appoint attorney ad litem and guardian ad litem for respondent; conduct hearing on petition; enter order of appointment","citations":["T.C.A. § 34-3-106","T.C.A. § 34-3-107(a)","Tenn. R. Civ. P. 52.01"],"conditions":["Appointment of counsel, guardian ad litem, conduct of hearing, burden of proof, least restrictive intervention standard, and written findings requirements are all identical to those in CH-CGD-007 through CH-CGD-009.","Standard: clear and convincing evidence that the respondent is a person with a disability as defined in T.C.A. § 34-1-101(7) and that the respondent's needs cannot be met by less restrictive alternatives. T.C.A. § 34-3-107(a)."],"next_steps":["PR-CON-005"],"decision_point":false,"notes":"Cross-reference CH-CGD-007 through CH-CGD-009 for full conditions."},{"step_id":"PR-CON-005","phase":"Judgment","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Probate Court Clerk","action":"Issue letters of conservatorship upon entry of appointment order and submission of bond; file inventory within 60 days","citations":["T.C.A. § 34-1-108","T.C.A. § 34-1-129","T.C.A. § 34-1-110(a)","T.C.A. § 34-1-115"],"conditions":["Letters, bond, oath, inventory, and property management plan requirements are identical to those in CH-CGD-010 through CH-CGD-011.","Inventory of respondent's property must be filed within 60 days of appointment. T.C.A. § 34-1-110(a). Property management plan must be filed within 60 days of appointment. T.C.A. § 34-1-115."],"next_steps":["PR-CON-006"],"decision_point":false,"notes":"Cross-reference CH-CGD-010 through CH-CGD-011 for full conditions."},{"step_id":"PR-CON-006","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Petitioner / Attorney","action":"File annual status report and annual accounting each year; petition for modification or termination upon material change","citations":["T.C.A. § 34-1-110(b)","T.C.A. § 34-1-111","T.C.A. § 34-1-131","T.C.A. § 34-3-108"],"conditions":["Annual reporting and accounting requirements, modification or termination petition procedure, and final accounting requirements are identical to those in CH-CGD-012 through CH-CGD-014.","Upon termination, preliminary final accounting must be filed within 120 days. T.C.A. § 34-3-108(e)."],"next_steps":["PR-CON-007"],"decision_point":false,"notes":"[LOCAL RULE CHECK: PR-CON-LRC-002] Cross-reference CH-CGD-012 through CH-CGD-014 for full conditions. Annual reporting is an ongoing obligation."},{"step_id":"PR-CON-007","phase":"Appeal","court_type":"Probate Court","case_type":"Conservatorship (Probate Court Jurisdiction Where Applicable)","actor":"Petitioner / Attorney","action":"File appeal from probate court conservatorship order to appropriate appellate court","citations":["T.C.A. § 30-2-609","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)"],"conditions":["Appeals from probate court orders go to the Court of Appeals in counties where chancery court exercises probate jurisdiction. T.C.A. § 16-16-201(c). In counties with a separate probate court, confirm the appeal path from the applicable private act.","Notice of appeal must be filed within 30 days after entry of the order. Tenn. R. App. P. 4(a)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"PR-CON-Flowchart.html"},{"flow_id":"PR-GRD","court_type":"Probate Court","case_type":"Guardianship of Minors","version":"1.0","produced_date":"2026-05-15","status":"Draft - Pending Review","gaps":[{"gap_id":"PR-GRD-GAP-001","affected_steps":["PR-GRD-001"],"description":"The specific statutes governing appointment of guardians of the person of a minor (as distinct from guardians of the estate) are in Title 34, Chapters 1 and 2. The corpus confirms T.C.A. § 34-2-101 et seq. for adult guardianship and T.C.A. § 34-1-101 et seq. for general guardianship provisions. The specific provisions governing minor guardianship including the petition requirements for guardianship of the person of a minor, the court's authority to appoint a guardian of the person versus the estate, and the rights of the minor's parents relative to guardianship are confirmed in general terms but the full text of T.C.A. §§ 34-2-101 through 34-2-106 governing minor guardianship specifically should be confirmed from the full corpus."},{"gap_id":"PR-GRD-GAP-002","affected_steps":["PR-GRD-002"],"description":"The filing fee for a minor guardianship petition in Probate Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies."}],"conflicts":[{"conflict_id":"PR-GRD-CONF-001","affected_steps":["PR-GRD-001"],"description":"T.C.A. § 16-11-109 grants Chancery Court concurrent jurisdiction with the county court over the persons and estates of infants and the appointment and removal of guardians. T.C.A. § 16-16-201(a) transfers probate jurisdiction (including guardianship) to chancery court in counties not otherwise provided by private act. T.C.A. § 37-1-103(a) grants Juvenile Court exclusive original jurisdiction over dependent and neglected children. The result is that minor guardianship petitions may be filed in: the probate court (where established by private act); chancery court (where probate jurisdiction has been transferred); the county court (where it retains jurisdiction); or, if the minor is already subject to a delinquency or dependency proceeding, Juvenile Court. The choice of forum depends on the county and the circumstances of the guardianship. This flow applies to the probate court path only."}],"local_rule_checks":[{"check_id":"PR-GRD-LRC-001","affected_steps":["PR-GRD-001"],"description":"Verify by county which court exercises minor guardianship jurisdiction and whether minor guardianship petitions are filed in probate court, chancery court, county court, or another court. This is a local rules phase item."},{"check_id":"PR-GRD-LRC-002","affected_steps":["PR-GRD-008"],"description":"Verify local rules for the annual accounting deadline, the format of the accounting required by the clerk, the procedure for exceptions to the clerk's report on the accounting, and whether the local court has a standard guardian's report form."}],"steps":[{"step_id":"PR-GRD-001","phase":"Case Initiation","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Petitioner / Attorney","action":"Determine appropriate court and basis for minor guardianship; confirm that both parents are unable or unavailable to serve as natural guardians","citations":["T.C.A. § 34-1-101","T.C.A. § 34-2-101","T.C.A. § 16-11-109"],"conditions":["JURISDICTIONAL NOTICE: Minor guardianship jurisdiction is concurrent across multiple courts; confirm the applicable court in each county. [LOCAL RULE CHECK: PR-GRD-LRC-001]","Guardianship of the person: governs the care, custody, and upbringing of the minor. Guardianship of the estate: governs the management of the minor's property. Both may be sought in the same petition.","Natural guardianship: parents are the natural guardians of their minor children. A court-appointed guardian is appropriate when both parents are deceased, have had parental rights terminated, are unable to serve, or when the minor has an estate requiring management.","If a minor is disabled, upon reaching age 18 the guardian automatically continues as conservator. T.C.A. § 34-2-106(c).","A person entitled to administration of an estate or to the guardianship of a minor who fails or neglects to apply within 6 months of the minor's right arising may be passed over. T.C.A. § 30-1-404(a)."],"next_steps":["PR-GRD-002"],"decision_point":false,"notes":"[GAP: PR-GRD-GAP-001] [CONFLICT: PR-GRD-CONF-001] [LOCAL RULE CHECK: PR-GRD-LRC-001]"},{"step_id":"PR-GRD-002","phase":"Case Initiation","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Petitioner / Attorney","action":"File sworn petition for appointment of guardian of minor with Probate Court Clerk","citations":["T.C.A. § 34-1-107","T.C.A. § 34-1-108"],"conditions":["Petition must be sworn and must identify: the minor's name, age, and residence; the proposed guardian's name, age, address, relationship to the minor, and any felony or misdemeanor convictions; the identity and location of the minor's parents (if living) or a statement of their deaths; and the nature and estimated value of the minor's estate if guardianship of the estate is sought.","A copy of the petition must be served on the minor, or it must be shown that the minor has actual notice of the filing of the petition. T.C.A. § 34-2-106(a)(3) (minor's rights during continuation proceedings -- general notice principle applies at initial petition).","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j).","Bond: upon appointment, the guardian must post bond in an amount set by the court, unless waived for good cause. T.C.A. § 34-1-107."],"next_steps":["PR-GRD-003"],"decision_point":false,"notes":"[GAP: PR-GRD-GAP-002]"},{"step_id":"PR-GRD-003","phase":"Service of Process","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Probate Court Clerk","action":"Issue notice of guardianship hearing to the minor, living parents or other relatives, and any person having care and custody of the minor","citations":["T.C.A. § 34-1-107","T.C.A. § 34-1-108"],"conditions":["Notice must be provided to all interested parties including any living parent whose parental rights have not been terminated, the minor (if of sufficient age to understand), and any person having current care and custody of the minor.","If the minor is a VA beneficiary, notice must be given to the Veterans Administration as well. T.C.A. § 34-5-109."],"next_steps":["PR-GRD-004"],"decision_point":false,"notes":"Proceeds to PR-GRD-004 (hearing on petition)."},{"step_id":"PR-GRD-004","phase":"Trial","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Judge","action":"Conduct hearing on petition for appointment of guardian and enter order of appointment","citations":["T.C.A. § 34-1-107","T.C.A. § 34-1-108"],"conditions":["The court considers: whether guardianship is necessary; who among the persons willing to serve is best qualified to serve the minor's interests; and whether the minor, if of sufficient age and maturity, has expressed a preference.","The court must impose only the least restrictive form of intervention consistent with the minor's needs.","Order of appointment must specify: the powers conferred on the guardian; whether the guardianship is of the person, the estate, or both; the bond requirement and amount; and any specific terms or conditions of the guardianship."],"next_steps":["PR-GRD-005"],"decision_point":false,"notes":"Proceeds to PR-GRD-005 (letters of guardianship)."},{"step_id":"PR-GRD-005","phase":"Judgment","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Probate Court Clerk","action":"Issue letters of guardianship upon entry of appointment order and submission of bond","citations":["T.C.A. § 34-1-108","T.C.A. § 34-1-129"],"conditions":["Letters of guardianship are issued upon the guardian's execution of the required oath and posting of bond. T.C.A. § 34-1-108.","If the guardian has been granted less than full authority, the clerk shall mark the letters prominently with the term 'LIMITED.' T.C.A. § 34-1-129.","The clerk maintains a tickler to track the annual reporting deadlines. T.C.A. § 34-1-128."],"next_steps":["PR-GRD-006"],"decision_point":false,"notes":"Proceeds to PR-GRD-006 (inventory)."},{"step_id":"PR-GRD-006","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Petitioner / Attorney","action":"File inventory of minor's estate within 60 days of appointment if guardianship of the estate is included","citations":["T.C.A. § 34-1-110(a)"],"conditions":["If the guardianship includes the minor's estate, the guardian must file a complete and accurate inventory within 60 days after qualification. T.C.A. § 34-1-110(a).","If guardianship is of the person only and the minor has no estate to be managed, no inventory is required."],"next_steps":["PR-GRD-007"],"decision_point":false,"notes":"Proceeds to PR-GRD-007 (annual reporting)."},{"step_id":"PR-GRD-007","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Petitioner / Attorney","action":"File annual status report (guardianship of the person) and annual accounting (guardianship of the estate) each year","citations":["T.C.A. § 34-1-110(b)","T.C.A. § 34-1-111","T.C.A. § 34-1-131"],"conditions":["Guardianship of the person: annual status report describing the minor's current physical and social condition and the services being provided. T.C.A. § 34-1-111.","Guardianship of the estate: annual accounting of all receipts and disbursements. T.C.A. § 34-1-110(b). The clerk examines the annual accounting and makes a report to the judge. T.C.A. § 34-1-131.","The clerk issues notices and summons to any delinquent guardian who fails to file required reports by the deadline shown on the clerk's tickler. T.C.A. § 34-1-128.","Single expenditures exceeding $1,000 require express court permission unless included in an approved property management plan. T.C.A. § 34-1-108(b)(4)(7)."],"next_steps":["PR-GRD-008"],"decision_point":false,"notes":"[LOCAL RULE CHECK: PR-GRD-LRC-002] Annual reporting is an ongoing obligation; this step repeats annually until the guardianship terminates. Proceeds to PR-GRD-008 (termination)."},{"step_id":"PR-GRD-008","phase":"Post-Judgment","court_type":"Probate Court","case_type":"Guardianship of Minors","actor":"Petitioner / Attorney","action":"Petition for termination of guardianship upon minor reaching age 18; file preliminary final accounting within 60 days of termination","citations":["T.C.A. § 34-2-106(a)-(b)","T.C.A.
