_steps":["CH-CGD-009"],"decision_point":false,"notes":"Proceeds to CH-CGD-009 (entry of order of appointment)."},{"step_id":"CH-CGD-009","phase":"Judgment","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Judge","action":"Enter order of appointment specifying the powers removed from respondent and transferred to fiduciary","citations":["T.C.A. § 34-3-107(a)(2)","T.C.A. § 34-1-107","T.C.A. § 34-1-129","Tenn. R. Civ. P. 58"],"conditions":["Order must specify the powers removed from the respondent and transferred to the fiduciary; any powers not expressly removed remain with the respondent. T.C.A. § 34-3-107(a)(2)(A).","If fiduciary is granted less than full authority, the letters of conservatorship or guardianship must be marked 'LIMITED.' T.C.A. § 34-1-129.","Court must order fiduciary to post bond unless waived by the court for good cause; bond amount is set by the court. T.C.A. § 34-1-107.","Court must include in the order the fiduciary's oath and the rights retained by the respondent. T.C.A. § 34-1-108."],"next_steps":["CH-CGD-010"],"decision_point":false,"notes":"Proceeds to CH-CGD-010 (letters of conservatorship or guardianship)."},{"step_id":"CH-CGD-010","phase":"Judgment","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Clerk and Master","action":"Issue letters of conservatorship or guardianship upon entry of appointment order and submission of bond","citations":["T.C.A. § 34-1-108","T.C.A. § 34-1-129","T.C.A. § 34-1-128"],"conditions":["Letters shall either recite the specific powers removed from the respondent and transferred to the fiduciary, or have attached to them the order specifying those powers. T.C.A. § 34-1-129.","If fiduciary has been granted less than full authority, the clerk shall mark the letters prominently with the term 'LIMITED.' T.C.A. § 34-1-129.","The fiduciary must execute the oath specified in T.C.A. § 34-1-108 before receiving letters. The oath includes specific enumerated promises to the respondent.","Clerk maintains an index or tickler to track reporting deadlines for annual inventories, status reports, and accountings. T.C.A. § 34-1-128."],"next_steps":["CH-CGD-011"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-CGD-LRC-004] Proceeds to CH-CGD-011 (inventory filing)."},{"step_id":"CH-CGD-011","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"File inventory of respondent's property and property management plan with Clerk and Master within 60 days of appointment","citations":["T.C.A. § 34-1-110(a)","T.C.A. § 34-1-115"],"conditions":["The conservator or guardian of the estate must file a complete and accurate inventory of the respondent's property within 60 days after qualification. T.C.A. § 34-1-110(a).","The conservator must file a property management plan with the court within 60 days of appointment describing how the estate will be managed. T.C.A. § 34-1-115.","The clerk may prescribe forms or instructions for the inventory, receipts, and expenditures. T.C.A. § 34-1-130.","Clerk and Master may invest funds belonging to persons with disabilities without prior specific court order if the funds will be idle for more than 30 days. T.C.A. § 18-5-105."],"next_steps":["CH-CGD-012"],"decision_point":false,"notes":"Proceeds to CH-CGD-012 (ongoing annual reporting obligations)."},{"step_id":"CH-CGD-012","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"File annual status report and annual accounting with Clerk and Master each year after appointment","citations":["T.C.A. § 34-1-110(b)","T.C.A. § 34-1-111","T.C.A. § 34-1-131"],"conditions":["Conservator or guardian of the person must file a status report annually describing the respondent's current mental, physical, and social condition and the services being provided. T.C.A. § 34-1-111.","Conservator or guardian of the estate must file an annual accounting of all receipts and disbursements. T.C.A. § 34-1-110(b).","Clerk and Master shall examine the annual accounting and make a report to the judge. T.C.A. § 34-1-131.","Clerk shall issue notices and summons to each delinquent fiduciary who fails to file required reports by the deadline shown on the clerk's tickler. T.C.A. § 34-1-128.","Single expenditures exceeding $1,000 require express court permission granted in a property management plan or separate court order. T.C.A. § 34-1-108(b)(4)(7)."],"next_steps":["CH-CGD-013"],"decision_point":false,"notes":"[GAP: CH-CGD-GAP-004] [LOCAL RULE CHECK: CH-CGD-LRC-005] Annual reporting is an ongoing obligation; this step repeats annually for the duration of the conservatorship or guardianship."},{"step_id":"CH-CGD-013","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"Petition for modification or termination of conservatorship or guardianship upon material change in respondent's condition","citations":["T.C.A. § 34-3-108(a)-(f)"],"conditions":["The respondent or any interested person may petition the court at any time for termination or modification. A petition by the respondent may be communicated by any means including oral communication or informal letter. T.C.A. § 34-3-108(a)-(b).","Upon receipt of a termination or modification petition, the court must conduct a hearing at which the respondent has all the rights set out in T.C.A. § 34-3-106. T.C.A. § 34-3-108(c).","Upon conclusion of the hearing, the court may: dismiss the petition; remove the fiduciary and dissolve the original order; remove the fiduciary and appoint a successor; modify the original order; or grant any other appropriate relief. T.C.A. § 34-3-108(d).","When the respondent dies or the court determines a fiduciary is no longer needed, the conservatorship or guardianship terminates. The fiduciary must file a preliminary final accounting within 120 days after termination. T.C.A. § 34-3-108(e)."],"next_steps":["CH-CGD-014"],"decision_point":false,"notes":"Proceeds to CH-CGD-014 (final accounting and closure) upon termination, or continues at CH-CGD-012 if modification only."},{"step_id":"CH-CGD-014","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"File preliminary final accounting within 120 days after termination of conservatorship or guardianship","citations":["T.C.A. § 34-3-108(e)"],"conditions":["The preliminary final accounting must account for all assets, receipts, and disbursements from the date of the last accounting until the date the conservatorship terminates, and shall detail the amount of the final distribution to close the conservatorship. T.C.A. § 34-3-108(e).","If no objections to the clerk's report are filed within 30 days from the date the clerk's report is filed, the fiduciary shall distribute the remaining assets. T.C.A. § 34-3-108(e).","Receipts and final cancelled checks evidencing the final distribution must be filed with the court by the fiduciary. T.C.A. § 34-3-108(e).","Upon order of the court, the conservatorship or guardianship proceeding is closed. T.C.A. § 34-3-108(e).","The fiduciary shall be allowed credits for all reasonable expenses of the respondent's funeral. If the estate has assets less than $5,000, the fiduciary may utilize the entire amount for funeral expenses. T.C.A. § 34-1-113."],"next_steps":["CH-CGD-015"],"decision_point":false,"notes":"Proceeds to CH-CGD-015 (appeal)."},{"step_id":"CH-CGD-015","phase":"Appeal","court_type":"Chancery Court","case_type":"Conservatorship and Adult Guardianship","actor":"Petitioner / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of order","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court orders in conservatorship and guardianship proceedings go to the Court of Appeals.","Timely post-trial motion extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b)."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-CGD-Flowchart.html"},{"flow_id":"CH-DOM","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CH-DOM-GAP-001","affected_steps":["CH-DOM-001"],"description":"Chancery Court domestic relations jurisdiction is concurrent with Circuit Court under T.C.A. § 16-11-110 and T.C.A. § 36-4-105. The specific counties where Chancery Court actively exercises domestic relations jurisdiction versus those where Circuit Court is the exclusive or primary venue for divorce and legal separation are not determinable from statewide statutes alone. This determination is a local rules phase item. This flow applies only in counties where Chancery Court exercises domestic relations jurisdiction by local practice and assignment."},{"gap_id":"CH-DOM-GAP-002","affected_steps":["CH-DOM-002"],"description":"The filing fee for a domestic relations complaint filed in Chancery Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount is not available in the corpus fee schedule text. The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies in addition to the base filing fee."},{"gap_id":"CH-DOM-GAP-003","affected_steps":["CH-DOM-009"],"description":"T.C.A. § 36-6-408 requires parent educational seminar attendance in any action where a permanent parenting plan will be entered. The corpus does not contain a rule specifying the completion deadline relative to the hearing date or whether the Clerk and Master's office or the chancellor's office administers seminar compliance tracking in Chancery Court. Verify against local rules in each judicial district where Chancery Court exercises domestic relations jurisdiction."}],"conflicts":[{"conflict_id":"CH-DOM-CONF-001","affected_steps":["CH-DOM-001"],"description":"T.C.A. § 16-11-110 grants Chancery Court concurrent jurisdiction with Circuit Court over all proceedings for divorce and adoption. T.C.A. § 36-4-105 provides that the bill or petition may be filed in 'the chancery or circuit court or other court having divorce jurisdiction.' T.C.A. § 16-10-108 grants Circuit Court concurrent jurisdiction with Chancery Court to grant divorces. Both are TCA provisions at the same level; no conflict exists as to the legal authority -- both courts have concurrent jurisdiction. The practical allocation of domestic relations cases between Circuit and Chancery Courts in a given county is determined by local administrative order and local rules. Flagged because this flow applies only where Chancery Court exercises domestic relations jurisdiction; Circuit Court flows CC-DIV and CC-SEP apply in all other counties."}],"local_rule_checks":[{"check_id":"CH-DOM-LRC-001","affected_steps":["CH-DOM-001"],"description":"Verify by judicial district whether Chancery Court exercises domestic relations jurisdiction in that district. In many districts, domestic relations cases are assigned exclusively to Circuit Court by local administrative order even where both courts have concurrent statutory authority. This flow is inapplicable in districts where Chancery Court does not hear domestic relations cases."},{"check_id":"CH-DOM-LRC-002","affected_steps":["CH-DOM-002"],"description":"Verify local rules for any cover sheet, domestic relations information sheet, or UCCJEA affidavit form required at the time of filing in Chancery Court, beyond the requirements of T.C.A. § 36-4-106."},{"check_id":"CH-DOM-LRC-003","affected_steps":["CH-DOM-009"],"description":"Verify local rules for parent educational seminar completion deadline and proof-of-completion filing requirements in Chancery Court domestic relations cases. T.C.A. § 36-6-408 applies but local practice in Chancery Court may differ from Circuit Court practice."},{"check_id":"CH-DOM-LRC-004","affected_steps":["CH-DOM-018"],"description":"Verify local rules for scheduling of MDA approval hearings in uncontested irreconcilable differences cases in Chancery Court, including whether the Clerk and Master schedules the hearing or whether it is set directly by the chancellor, and whether the parties must both appear."},{"check_id":"CH-DOM-LRC-005","affected_steps":["CH-DOM-023"],"description":"Verify local rules for the form and procedure for entry of final decrees in domestic relations cases in Chancery Court, including whether a standard form approved under Tenn. Sup. Ct. R. 52 is required and whether the Clerk and Master prepares the decree or whether it is submitted by counsel."}],"steps":[{"step_id":"CH-DOM-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Confirm Chancery Court exercises domestic relations jurisdiction in the applicable judicial district and determine grounds and applicable path","citations":["T.C.A. § 16-11-110","T.C.A. § 36-4-105","T.C.A. § 36-4-101","T.C.A. § 36-4-102"],"conditions":["JURISDICTIONAL NOTICE: Chancery Court domestic relations jurisdiction is concurrent with Circuit Court and varies by county. This flow applies only in counties where Chancery Court exercises domestic relations jurisdiction by local practice or administrative order. In all other counties, see CC-DIV (Circuit Court -- Divorce) and CC-SEP (Circuit Court -- Legal Separation).","Chancery Court has jurisdiction concurrent with Circuit Court over all proceedings for divorce. T.C.A. § 16-11-110. Venue: county where parties resided at separation; county where defendant resides if a Tennessee resident; county where plaintiff resides if defendant is nonresident or convict. T.C.A. § 36-4-105.","Divorce path: grounds are those enumerated in T.C.A. § 36-4-101, including irreconcilable differences. Mandatory waiting period: 60 days if no unmarried child under 18; 90 days if a minor child exists. T.C.A. § 36-4-101(b).","Legal separation path: filed under T.C.A. § 36-4-102 as an alternative to divorce. Legal separation does not dissolve the bonds of matrimony but permits cessation of cohabitation. The court may convert a legal separation to an absolute divorce after two years, or earlier if grounds are established, upon petition of either party. T.C.A. § 36-4-102(b).","Residency requirement: plaintiff or defendant must have resided in Tennessee six months next preceding the filing of the complaint, or the acts complained of must have been committed while plaintiff was a bona fide Tennessee resident. T.C.A. § 36-4-104."],"next_steps":["CH-DOM-002"],"decision_point":false,"notes":"[GAP: CH-DOM-GAP-001] [CONFLICT: CH-DOM-CONF-001] [LOCAL RULE CHECK: CH-DOM-LRC-001]"},{"step_id":"CH-DOM-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"File complaint for divorce or legal separation with Clerk and Master and pay filing fee","citations":["T.C.A. § 36-4-106(a)(1)-(2)","T.C.A. § 36-4-106(b)","T.C.A. § 36-4-105","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["Complaint must set forth grounds in substantially the language of T.C.A. § 36-4-101 (divorce) or T.C.A. § 36-4-102 (legal separation) and include Social Security numbers and dates of birth of parties and minor children, or a statement of why such information could not be obtained. T.C.A. § 36-4-106(b).","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j).","The Clerk and Master serves as the clerk for domestic relations matters in Chancery Court. Actor label 'Clerk and Master' replaces 'Circuit Court Clerk' throughout this flow."],"next_steps":["CH-DOM-003"],"decision_point":false,"notes":"[GAP: CH-DOM-GAP-002] [LOCAL RULE CHECK: CH-DOM-LRC-002]"},{"step_id":"CH-DOM-003","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Clerk and Master","action":"Issue summons with automatic temporary injunction text attached and deliver for service on defendant","citations":["T.C.A. § 36-4-106(d)(1)","Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.02"],"conditions":["Written notice that automatic temporary injunctions take effect upon service must be attached to the summons and served with the complaint. Injunctions are self-executing upon service; no court order is required. T.C.A. § 36-4-106(d)(1)."],"next_steps":["CH-DOM-004"],"decision_point":false,"notes":"Proceeds to CH-DOM-004 (service of process path determination)."},{"step_id":"CH-DOM-004","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Determine whether case proceeds by MDA waiver of service or formal service of process","citations":["T.C.A. § 36-4-101(a)(14)","T.C.A. § 36-4-103(a)(2)"],"conditions":["Irreconcilable differences with MDA waiver: defendant may execute a written notarized MDA in lieu of service, referencing the pending case or stating awareness one will be filed; waiver is valid for 180 days from date last party signs. T.C.A. § 36-4-103(a)(2).","All fault grounds cases and irreconcilable differences cases where defendant will not execute MDA in lieu of service require formal service of process."],"next_steps":["CH-DOM-005A","CH-DOM-005B"],"decision_point":true,"notes":"Decision point: MDA waiver path proceeds to CH-DOM-005A; service of process path proceeds to CH-DOM-005B."},{"step_id":"CH-DOM-005A","phase":"Service of Process","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Execute and file notarized marital dissolution agreement in lieu of service of process","citations":["T.C.A. § 36-4-103(a)(2)"],"conditions":["Execution of the notarized MDA constitutes a general appearance, constitutes an answer, gives the court personal jurisdiction over defendant, and constitutes a default judgment for purposes of granting divorce on irreconcilable differences grounds. Waiver is valid for 180 days from date last party signs. T.C.A. § 36-4-103(a)(2)."],"next_steps":["CH-DOM-007"],"decision_point":false,"notes":"Proceed to CH-DOM-007; automatic temporary injunctions take effect upon filing of MDA as substitute for service."},{"step_id":"CH-DOM-005B","phase":"Service of Process","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Effect service of process on defendant and file return of service with Clerk and Master","citations":["Tenn. R. Civ. P. 4.03","Tenn. R. Civ. P. 4.04","Tenn. R. Civ. P. 4.05","T.C.A. § 36-4-103(a)(1)","T.C.A. § 20-2-215","T.C.A. § 21-1-203","T.C.A. § 21-1-204","T.C.A. § 21-1-205"],"conditions":["Service may be made by personal service, mail with return receipt signed by defendant personally, or for nonresidents in irreconcilable differences cases, upon the Secretary of State under T.C.A. § 20-2-215.","Constructive service by publication is available in chancery proceedings upon an affidavit establishing one of the seven statutory grounds under T.C.A. § 21-1-203. Publication for four consecutive weeks required; Clerk and Master must mail copy of complaint or clipping to defendant's last known address by certified mail. T.C.A. §§ 21-1-204, 21-1-205."],"next_steps":["CH-DOM-006"],"decision_point":false,"notes":"Proceeds to CH-DOM-006 (answer)."},{"step_id":"CH-DOM-006","phase":"Service of Process","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Defendant / Attorney","action":"File answer within 30 days after service of process and, if applicable, counter-complaint","citations":["Tenn. R. Civ. P. 12.01","T.C.A. § 36-4-103(e)"],"conditions":["If defendant answers and denies irreconcilable differences, that ground is eliminated; plaintiff may proceed only on fault grounds pleaded in the alternative. T.C.A. § 36-4-103(e).","If defendant fails to answer, plaintiff may seek default under Tenn. R. Civ. P. 55."],"next_steps":["CH-DOM-007"],"decision_point":false,"notes":"Proceeds to CH-DOM-007 (automatic temporary injunctions)."},{"step_id":"CH-DOM-007","phase":"Pleadings","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Clerk and Master","action":"Confirm automatic temporary injunctions are in effect against both parties","citations":["T.C.A. § 36-4-106(d)(1)(A)-(E)"],"conditions":["Upon personal service or filing of the notarized MDA waiving service, the following injunctions are in effect against both parties until final decree, dismissal, agreement, or court modification: (1) no transfer, concealment, or dissipation of marital property; (2) no cancellation or lapse of insurance covering either party or children; (3) no harassment, threats, or abuse of the other party; (4) no disparaging remarks to or in the presence of minor children or to either party's employer; (5) no relocation of minor children outside Tennessee or more than 50 miles from the other parent without consent or court order. T.C.A. § 36-4-106(d)(1)(A)-(E).","Injunctions are self-executing upon service; no court order is required."],"next_steps":["CH-DOM-008"],"decision_point":false,"notes":"Proceeds to CH-DOM-008 (collaborative law or standard litigation assessment)."},{"step_id":"CH-DOM-008","phase":"Pleadings","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Determine whether parties will pursue collaborative family law or standard litigation","citations":["Tenn. Sup. Ct. R. 53, Sections 1-4"],"conditions":["Participation in collaborative family law is voluntary; the court may not order a party to participate over that party's objection. Tenn. Sup. Ct. R. 53, Section 5(b).","Collaborative process is available at any point before entry of the final decree."],"next_steps":["CH-DOM-COL-001","CH-DOM-009"],"decision_point":true,"notes":"Decision point: collaborative family law path proceeds to CH-DOM-COL-001; standard litigation path proceeds to CH-DOM-009. The collaborative law steps mirror those in CC-DIV-COL-001 through CC-DIV-COL-007 with the Clerk and Master substituted for Circuit Court Clerk as the filing recipient."},{"step_id":"CH-DOM-COL-001","phase":"Pleadings","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Conduct collaborative law pre-agreement assessment and execute collaborative family law participation agreement; file notice with Clerk and Master","citations":["Tenn. Sup. Ct. R. 53, Section 4","Tenn. Sup. Ct. R. 53, Section 6(a)","Tenn. Sup. Ct. R. 53, Section 14"],"conditions":["Agreement must include mandatory withdrawal provision -- both collaborative lawyers must withdraw if a party terminates the process; this provision may not be waived. Tenn. Sup. Ct. R. 53, Section 4(b)(3).","Filing the notice of the agreement operates as an application for a stay of the court proceeding. Tenn. Sup. Ct. R. 53, Section 6(a)."],"next_steps":["CH-DOM-COL-002"],"decision_point":false,"notes":"Proceeds to CH-DOM-COL-002 (court stay and collaborative negotiations)."},{"step_id":"CH-DOM-COL-002","phase":"Pre-Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Stay proceedings upon filing of collaborative law notice; parties conduct collaborative negotiations with full informal disclosure","citations":["Tenn. Sup. Ct. R. 53, Section 6(a)-(e)","Tenn. Sup. Ct. R. 53, Section 12"],"conditions":["Status reports may contain only information on whether the process is ongoing or concluded. Court shall provide notice and opportunity to be heard before dismissing a stayed proceeding. Tenn. Sup. Ct. R. 53, Section 6(c), (e).","Each party must make full candid disclosure without formal discovery and execute a joint sworn statement of assets and liabilities. Tenn. Sup. Ct. R. 53, Section 12(a)-(c)."],"next_steps":["CH-DOM-COL-003"],"decision_point":false,"notes":"Decision point follows at CH-DOM-COL-003."},{"step_id":"CH-DOM-COL-003","phase":"Pre-Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Assess collaborative process outcome; if successful execute settlement agreement and file notice of concluded process; if terminated file notice and return to contested litigation","citations":["Tenn. Sup. Ct. R. 53, Section 5(c)-(d)","Tenn. Sup. Ct. R. 53, Section 6(b)","Tenn. Sup. Ct. R. 53, Section 9(a)-(b)"],"conditions":["If successful: proceed to CH-DOM-018 for MDA approval and entry of final decree.","If terminated: both collaborative lawyers are disqualified from subsequent litigation. Parties must retain new litigation counsel. Filing of notice lifts the stay. Collaborative law communications remain privileged subject to enumerated exceptions. Tenn. Sup. Ct. R. 53, Section 9(a)-(b), Section 19(a)."],"next_steps":["CH-DOM-018","CH-DOM-012"],"decision_point":true,"notes":"Decision point: success proceeds to CH-DOM-018; termination proceeds to CH-DOM-012 (scheduling order and discovery)."},{"step_id":"CH-DOM-009","phase":"Pleadings","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"If minor children exist, attend parent educational seminar as soon as possible after filing","citations":["T.C.A. § 36-6-408"],"conditions":["Applies only when a permanent parenting plan will be entered -- i.e., when minor children of the parties exist. Seminar must be not less than four hours in the aggregate. No court shall deny a divorce solely for failure to attend; court may waive for good cause. T.C.A. § 36-6-408(c)."],"next_steps":["CH-DOM-010"],"decision_point":false,"notes":"[GAP: CH-DOM-GAP-003] [LOCAL RULE CHECK: CH-DOM-LRC-003]"},{"step_id":"CH-DOM-010","phase":"Pleadings","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"File motion for temporary orders including temporary support, temporary alimony, temporary parenting plan, and temporary use of marital residence if needed","citations":["T.C.A. § 36-5-121(b)","T.C.A. § 36-6-403","Tenn. R. Civ. P. 6.04"],"conditions":["If parties agree to a temporary parenting plan, no written temporary plan need be entered. T.C.A. § 36-6-403(1). If parties cannot agree, each must submit a proposed plan and verified statement of income and good faith. T.C.A. § 36-6-403(2).","Step is triggered only if plaintiff seeks temporary relief; not required in every case."],"next_steps":["CH-DOM-011"],"decision_point":false,"notes":"Proceeds to CH-DOM-011 (hearing on temporary orders)."},{"step_id":"CH-DOM-011","phase":"Pleadings","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Hear and rule on motion for temporary orders; assess whether case is uncontested irreconcilable differences or contested","citations":["T.C.A. § 36-4-103(b)-(d)","T.C.A. § 36-5-121(b)","T.C.A. § 36-6-403"],"conditions":["Uncontested irreconcilable differences with MDA executed and filed: proceed to CH-DOM-018 (waiting period and MDA approval).","Contested (fault grounds or irreconcilable differences in dispute): proceed to CH-DOM-012 (scheduling order).","Legal separation path: if this is a legal separation complaint, the court may grant legal separation at this stage if grounds are established, even over the objection of the defendant. T.C.A. § 36-4-102(b)."],"next_steps":["CH-DOM-012","CH-DOM-018"],"decision_point":true,"notes":"Decision point."},{"step_id":"CH-DOM-012","phase":"Discovery","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Enter scheduling order establishing discovery and trial deadlines","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26.01"],"conditions":[],"next_steps":["CH-DOM-013"],"decision_point":false,"notes":"Proceeds to CH-DOM-013 (discovery)."},{"step_id":"CH-DOM-013","phase":"Discovery","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Conduct discovery on financial, fault, and custody-related issues","citations":["Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 30","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34","Tenn. R. Civ. P. 36"],"conditions":[],"next_steps":["CH-DOM-014"],"decision_point":false,"notes":"Proceeds to CH-DOM-014 (pre-trial motions and mediation)."},{"step_id":"CH-DOM-014","phase":"Motions Practice","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Rule on pre-trial motions and order or encourage mediation of contested issues","citations":["T.C.A. § 36-4-130","T.C.A. § 36-6-413","Tenn. Sup. Ct. R. 38","Tenn. R. Civ. P. 56"],"conditions":["If all issues resolved by settlement, parties may execute MDA and proceed to CH-DOM-018.","Mediation communications are confidential; mediator shall not divulge information disclosed during mediation. T.C.A. § 36-4-130. Mediation may not be ordered if domestic violence restrictions apply. T.C.A. § 36-6-406(a).","If a properly executed MDA and parenting plan are filed, any mediation requirement is removed. T.C.A. § 36-4-103(g)."],"next_steps":["CH-DOM-015","CH-DOM-018"],"decision_point":true,"notes":"Decision point: settlement achieved proceeds to CH-DOM-018; contested issues remain proceeds to CH-DOM-015 (pre-trial conference)."},{"step_id":"CH-DOM-015","phase":"Pre-Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Hold pre-trial conference and identify remaining contested issues for trial","citations":["Tenn. R. Civ. P. 16"],"conditions":[],"next_steps":["CH-DOM-016"],"decision_point":false,"notes":"Proceeds to CH-DOM-016 (trial)."},{"step_id":"CH-DOM-016","phase":"Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Conduct bench trial on contested grounds, property division, alimony, and parenting issues","citations":["T.C.A. § 36-4-107","T.C.A. § 36-4-114","T.C.A. § 36-4-129(a)-(b)","Tenn. R. Civ. P. 6.03(2)","Tenn. R. Evid. 101"],"conditions":["Contested domestic relations cases are tried to the bench (non-jury). Hearing must be conducted in open court unless both parties consent to chambers. Tenn. R. Civ. P. 6.03(2).","Fault grounds require corroborative proof. T.C.A. § 36-4-107, § 36-4-114. Parties may stipulate as to grounds and defenses. T.C.A. § 36-4-129(a).","Legal separation path: court determines whether grounds for legal separation are established and enters an order of legal separation. The order does not dissolve the marriage. T.C.A. § 36-4-102(a)-(b)."],"next_steps":["CH-DOM-017"],"decision_point":false,"notes":"Proceeds to CH-DOM-017 (property, alimony, and parenting determinations)."},{"step_id":"CH-DOM-017","phase":"Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Determine equitable division of marital property, marital debt allocation, alimony, and permanent parenting plan and child support if minor children exist","citations":["T.C.A. § 36-4-121(a)(1)","T.C.A. § 36-4-121(b)-(c)","T.C.A. § 36-5-121(a)-(i)","T.C.A. § 36-6-404(a)(1)-(6)","T.C.A. § 36-6-410","Tenn. R. Civ. P. 52.01"],"conditions":["Property division must precede any determination of spousal support. T.C.A. § 36-4-121(a)(1). Property is divided equitably without regard to marital fault based on statutory factors.","Legal separation property: the court may make a final distribution of marital property at time of the legal separation decree; property acquired after the date of the decree is separate property. T.C.A. § 36-4-121(a)(1).","Alimony types available: rehabilitative, alimony in futuro, transitional, alimony in solido, or a combination. T.C.A. § 36-5-121(a)-(i).","Permanent parenting plan must be incorporated when minor children exist. T.C.A. § 36-6-404(a). Child support must be consistent with guidelines."],"next_steps":["CH-DOM-023"],"decision_point":false,"notes":"Proceeds to CH-DOM-023 (entry of final decree or legal separation order)."},{"step_id":"CH-DOM-018","phase":"Pre-Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"Confirm mandatory waiting period has elapsed and schedule MDA approval hearing","citations":["T.C.A. § 36-4-103(c)(1)","T.C.A. § 36-4-101(b)"],"conditions":["For irreconcilable differences: complaint must have been on file at least 60 days (no minor child) or at least 90 days (minor child present) before the hearing. T.C.A. § 36-4-103(c)(1).","For fault grounds: same 60-day / 90-day waiting periods apply. T.C.A. § 36-4-101(b).","Waiting period commences on the date the original complaint was filed."],"next_steps":["CH-DOM-019"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-DOM-LRC-004] Proceeds to CH-DOM-019 (MDA approval hearing)."},{"step_id":"CH-DOM-019","phase":"Pre-Trial","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Hold MDA approval hearing and make statutory findings regarding adequacy of the agreement","citations":["T.C.A. § 36-4-103(b)","T.C.A. § 36-4-103(d)"],"conditions":["Court must affirmatively find that the MDA makes adequate and sufficient provision for custody and maintenance of any children and for equitable settlement of property rights. T.C.A. § 36-4-103(b).","If court does not find the agreement sufficient, the cause is continued for further disposition. If both parties are present, they may ratify any amendments required by the court. T.C.A. § 36-4-103(b).","An irreconcilable differences divorce taken as confessed does not require corroborative proof. T.C.A. § 36-4-103(d)(1). Approval of the MDA satisfies Tenn. R. Civ. P. 52.01; separate written findings are not required. T.C.A. § 36-4-103(b).","If defendant contested irreconcilable differences at any point, that ground is eliminated. T.C.A. § 36-4-103(e).","Filing of a properly executed MDA and parenting plan removes any mediation requirement. T.C.A. § 36-4-103(g)."],"next_steps":["CH-DOM-023"],"decision_point":false,"notes":"Proceeds to CH-DOM-023 (entry of final decree)."},{"step_id":"CH-DOM-023","phase":"Judgment","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Judge","action":"Enter final decree of absolute divorce or order of legal separation addressing all required elements","citations":["T.C.A. § 36-4-121(a)","T.C.A. § 36-4-122","T.C.A. § 36-4-124","T.C.A. § 36-4-102(b)-(c)","T.C.A. § 36-5-121","T.C.A. § 36-6-404(a)","Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58"],"conditions":["Divorce decree must address: dissolution of the marriage; equitable division of marital property and allocation of marital debt; alimony if awarded; permanent parenting plan and child support if minor children exist; and costs. T.C.A. § 36-4-122.","Legal separation order: does not dissolve the marriage but permits cessation of cohabitation; may address property, support, and custody. T.C.A. § 36-4-102(c). Either party may petition for conversion to absolute divorce after two years, or earlier if grounds are established. T.C.A. § 36-4-102(b).","If divorce granted on irreconcilable differences grounds, MDA is incorporated in or by reference into the decree.","Parties are at liberty to remarry upon entry of final divorce decree. T.C.A. § 36-4-124."],"next_steps":["CH-DOM-024"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-DOM-LRC-005] Proceeds to CH-DOM-024 (clerk entry)."},{"step_id":"CH-DOM-024","phase":"Judgment","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Clerk and Master","action":"Enter decree or order in the minute book, notify parties, assess costs, and issue income assignment if child support is ordered","citations":["T.C.A. § 36-4-122","T.C.A. § 36-5-501","Tenn. R. Civ. P. 58"],"conditions":["If child support is ordered, income assignment is mandatory; no additional court order is required. T.C.A. § 36-5-501(b)(1)(A).","Notice of entry must be mailed or delivered to all parties or their attorneys. Tenn. R. Civ. P. 58."],"next_steps":["CH-DOM-025"],"decision_point":false,"notes":"Proceeds to CH-DOM-025 (post-judgment)."},{"step_id":"CH-DOM-025","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"File post-judgment motion within 30 days, or petition for modification of alimony, child support, or permanent parenting plan upon showing of material change","citations":["T.C.A. § 36-4-102(b)","T.C.A. § 36-5-121(a)","T.C.A. § 36-6-101(a)(2)(B)-(C)","Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Legal separation to divorce conversion: either party may petition the court for absolute divorce after legal separation of more than two years upon a petition setting forth the original order and that the parties have not reconciled. Court makes final adjudication of support and property rights at that time. T.C.A. § 36-4-102(b).","Modification of alimony requires substantial and material change; alimony in solido is not modifiable. T.C.A. § 36-5-121. Modification of custody requires material change of circumstance. T.C.A. § 36-6-101(a)(2)(B). Modification of residential schedule requires material change affecting child's best interest. T.C.A. § 36-6-101(a)(2)(C)."],"next_steps":["CH-DOM-026"],"decision_point":false,"notes":"Proceeds to CH-DOM-026 (appeal)."},{"step_id":"CH-DOM-026","phase":"Appeal","court_type":"Chancery Court","case_type":"Domestic Relations - Divorce and Legal Separation (Chancery Jurisdiction)","actor":"Plaintiff / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of final decree","citations":["T.C.A. § 36-4-123","Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court domestic relations decrees go to the Court of Appeals. The Court of Appeals independently considers all material facts in the record; either party may assign error on any failure of the chancellor to find a material fact. T.C.A. § 27-1-113.","Timely post-trial motion extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b).","Voluntary appellate mediation is available. Tenn. R. App. P. 34."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-DOM-Flowchart.html"},{"flow_id":"CH-EQU","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CH-EQU-GAP-001","affected_steps":["CH-EQU-001"],"description":"T.C.A. § 16-11-103 grants Chancery Court exclusive original jurisdiction of all cases of an equitable nature where the debt or demand exceeds fifty dollars. The $50.00 minimum jurisdictional threshold has not been updated by statute. The practical effect of this threshold in modern practice and whether it has been superseded by general subject matter jurisdiction provisions should be confirmed by reviewers. No TCA title in the corpus resolves this question."},{"gap_id":"CH-EQU-GAP-002","affected_steps":["CH-EQU-002"],"description":"The filing fee for a general equity complaint in Chancery Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount is not available in the corpus fee schedule text (which contains broken links). The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies in addition to the base filing fee."},{"gap_id":"CH-EQU-GAP-003","affected_steps":["CH-EQU-007"],"description":"The corpus does not contain a statute or rule specifying the procedural mechanism by which a Receiver appointed by the Chancery Court receives and posts a bond, takes possession of property, and makes initial reports to the court. T.C.A. § 21-1-801 and § 21-1-804 authorize sequestration and enforcement by process against property but do not set out the Receiver's procedural obligations in detail. The specific bond amount and reporting requirements for court-appointed Receivers should be confirmed against local rules and AOC guidance."},{"gap_id":"CH-EQU-GAP-004","affected_steps":["CH-EQU-014"],"description":"T.C.A. § 21-1-803 governs foreclosure sales in Chancery Court and requires a credit of not less than six months nor more than two years when specified in the decree. The statute does not specify the publication requirements for a general equity judicial sale not involving a mortgage or deed of trust. The notice and publication requirements for a general equity sale ordered by Chancery Court should be confirmed against local rules and any applicable AOC guidance."}],"conflicts":[{"conflict_id":"CH-EQU-CONF-001","affected_steps":["CH-EQU-001"],"description":"T.C.A. § 16-11-102(a) grants Chancery Court concurrent jurisdiction with Circuit Court over all civil causes of action triable in Circuit Court, except unliquidated damages for injuries to person or character and unliquidated damages for injuries to property not resulting from breach of contract. T.C.A. § 16-11-103 grants Chancery Court exclusive original jurisdiction of all cases of an equitable nature. Where a complaint seeks both equitable relief and legal damages, T.C.A. § 16-11-102(b) provides that the Chancery Court may transfer the case to Circuit Court, or may hear and determine the matter on principles of a court of law if no objection has been taken by plea to jurisdiction. Under the source hierarchy, both provisions are TCA statutes at the same level. The specific provision governing equitable cases (§ 16-11-103) controls over the general concurrent jurisdiction provision (§ 16-11-102) for purely equitable claims. Mixed claims require a jurisdictional analysis at filing. Flagged for reviewer awareness."},{"conflict_id":"CH-EQU-CONF-002","affected_steps":["CH-EQU-006"],"description":"Tenn. R. Civ. P. 65.03 and 65.04 govern restraining orders and injunctions generally. T.C.A. § 29-1-101 et seq. governs injunctions as a specific equitable remedy. The Rules of Civil Procedure supersede the earlier chancery practice forms (demurrers, pleas, and exceptions are abolished by Tenn. R. Civ. P. 7.03) but T.C.A. § 21-1-101 provides that Title 21 (Proceedings in Chancery) applies to all equitable proceedings in any court. Under the source hierarchy, the Supreme Court Rules and Rules of Civil Procedure control procedural mechanics; Title 21 controls substantive equity practice where not displaced by the Rules. No genuine conflict exists on the merits; flagged to ensure practitioners apply the procedural rules (notice, bond, hearing) from Tenn. R. Civ. P. 65 and not prior chancery practice."}],"local_rule_checks":[{"check_id":"CH-EQU-LRC-001","affected_steps":["CH-EQU-002"],"description":"Verify local rules for any cover sheet, equity case designation form, or lis pendens filing requirement at the time of filing a general equity complaint. Several chancery courts require a separate lis pendens affidavit to be filed and registered with the county register of deeds at the time of filing a complaint affecting real property."},{"check_id":"CH-EQU-LRC-002","affected_steps":["CH-EQU-006"],"description":"Verify local rules for the ex parte temporary restraining order practice in chancery court, including whether the chancellor requires personal contact before issuing a TRO without notice, whether a TRO bond amount is set by local standing order, and whether the local court has a specific TRO docket or duty-chancellor procedure."},{"check_id":"CH-EQU-LRC-003","affected_steps":["CH-EQU-007"],"description":"Verify local rules for Receiver appointment and management, including whether the local chancery court has a standard Receiver bond amount, a standing list of approved Receivers, and any local reporting schedule for Receiver accountings."},{"check_id":"CH-EQU-LRC-004","affected_steps":["CH-EQU-010"],"description":"Verify local rules for reference to the Clerk and Master in accounting cases. T.C.A. § 21-1-701 grants the Clerk and Master specified powers in accounting matters. Local chancery courts vary significantly in whether accounting references are made to the Clerk and Master or heard directly by the chancellor, and in the scheduling of accounting exceptions hearings."},{"check_id":"CH-EQU-LRC-005","affected_steps":["CH-EQU-014"],"description":"Verify local rules for judicial sales conducted by the Clerk and Master, including publication requirements, the minimum bid procedure, the upset bid period, and the confirmation hearing schedule. Local practice in judicial sales varies significantly across chancery court districts."}],"steps":[{"step_id":"CH-EQU-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"Determine equitable basis for Chancery Court jurisdiction and confirm the claim is of an equitable nature exceeding the jurisdictional minimum","citations":["T.C.A. § 16-11-101","T.C.A. § 16-11-102","T.C.A. § 16-11-103","T.C.A. § 21-1-101"],"conditions":["Chancery Court has all powers, privileges, and jurisdiction properly and rightfully incident to a court of equity. T.C.A. § 16-11-101.","Chancery Court has exclusive original jurisdiction of all cases of an equitable nature where the debt or demand exceeds fifty dollars, unless otherwise provided by code. T.C.A. § 16-11-103.","Chancery Court has concurrent jurisdiction with Circuit Court over all civil causes triable in Circuit Court, except unliquidated damages for injuries to person or character and unliquidated damages for injuries to property not resulting from breach of contract. T.C.A. § 16-11-102(a).","If a mixed legal and equitable claim is filed and no objection is taken by plea to jurisdiction, the Chancery Court may hear and determine the matter on principles of a court of law or may transfer to Circuit Court. T.C.A. § 16-11-102(b).","Either party in a chancery suit is entitled, upon application, to a jury to try and determine any material fact in dispute, except in cases involving complicated accounting and those elsewhere excepted by law. T.C.A. § 21-1-103."],"next_steps":["CH-EQU-002"],"decision_point":false,"notes":"[GAP: CH-EQU-GAP-001] [CONFLICT: CH-EQU-CONF-001] Note non-standard actor: Receiver may be involved at CH-EQU-007."},{"step_id":"CH-EQU-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"File complaint (bill of complaint) with Clerk and Master and pay filing fee","citations":["T.C.A. § 21-1-102","T.C.A. § 21-1-101","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["All civil actions including equity proceedings are commenced by filing a complaint with the clerk of the court. Tenn. R. Civ. P. 3. Prior chancery practice terminology ('bill of complaint' or 'bill in chancery') is subsumed under the unified 'complaint' designation of the Rules of Civil Procedure but the substantive content requirements of Title 21 remain applicable. T.C.A. § 21-1-101.","Bills required to be under oath may be sworn to before any judge, clerk of a court, general sessions judge, or notary public within the state. T.C.A. § 21-1-102.","Filing fee per Standard Fees (AOC); $7.00 technology earmark applies per T.C.A. § 8-21-401(j). If complaint affects real property, register a lis pendens in the register of deeds office of the county where the property lies. T.C.A. § 25-5-107.","Constructive service by publication is available where statutory grounds exist. T.C.A. §§ 21-1-203 through 21-1-205 apply to all equitable proceedings by operation of T.C.A. § 21-1-101."],"next_steps":["CH-EQU-003"],"decision_point":false,"notes":"[GAP: CH-EQU-GAP-002] [LOCAL RULE CHECK: CH-EQU-LRC-001]"},{"step_id":"CH-EQU-003","phase":"Case Initiation","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Clerk and Master","action":"Issue summons and deliver to plaintiff or plaintiff's attorney for service on defendant","citations":["Tenn. R. Civ. P. 4.01","Tenn. R. Civ. P. 4.02"],"conditions":[],"next_steps":["CH-EQU-004"],"decision_point":false,"notes":"Proceeds to CH-EQU-004 (service of process)."},{"step_id":"CH-EQU-004","phase":"Service of Process","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"Effect service of process on defendant by an authorized method and file return of service with Clerk and Master","citations":["Tenn. R. Civ. P. 4.03","Tenn. R. Civ. P. 4.04","Tenn. R. Civ. P. 4.05","T.C.A. § 21-1-203","T.C.A. § 21-1-204","T.C.A. § 21-1-205"],"conditions":["Standard methods of service: personal service, mail with return receipt signed by defendant personally, or other methods authorized by Tenn. R. Civ. P. 4.04.","Constructive service by publication is available in equity proceedings upon an affidavit establishing one of the seven statutory grounds for dispensing with personal service. Publication is for four consecutive weeks in a designated newspaper. Clerk and Master must mail a copy of the complaint or newspaper clipping to nonresident defendant's last known address by certified mail. T.C.A. §§ 21-1-203 through 21-1-205.","A decree against a defendant without personal service who does not appear is not absolute for three years from the decree, unless a copy of the decree is served upon the defendant, in which case it becomes absolute if defendant fails to appear and make defense within six months after service. T.C.A. § 21-1-402."],"next_steps":["CH-EQU-005"],"decision_point":false,"notes":"Proceeds to CH-EQU-005 (answer)."},{"step_id":"CH-EQU-005","phase":"Pleadings","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Defendant / Attorney","action":"File answer within 30 days after service of process","citations":["Tenn. R. Civ. P. 12.01","T.C.A. § 21-1-601","T.C.A. § 21-1-602"],"conditions":["Demurrers, pleas, and exceptions for insufficiency of a pleading are abolished. Tenn. R. Civ. P. 7.03. Defenses formerly raised by demurrer are raised by motion under Tenn. R. Civ. P. 12.","When an answer is required to be sworn to, the oath may be administered as in case of the bill of complainant. T.C.A. § 21-1-601. A sworn answer in chancery where the oath is not waived has no more weight than the deposition of the defendant filing it. T.C.A. § 21-1-602."],"next_steps":["CH-EQU-006"],"decision_point":false,"notes":"Proceeds to CH-EQU-006 (injunctive relief assessment)."},{"step_id":"CH-EQU-006","phase":"Pleadings","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"File motion for temporary restraining order or preliminary injunction if immediate equitable relief is required","citations":["Tenn. R. Civ. P. 65.01","Tenn. R. Civ. P. 65.03","Tenn. R. Civ. P. 65.04","Tenn. R. Civ. P. 65.05"],"conditions":["Temporary restraining order without notice: may be granted only if it clearly appears from specific facts shown by affidavit or verified complaint that immediate and irreparable injury, loss, or damage will result before the adverse party can be heard. Tenn. R. Civ. P. 65.03(1). TRO without notice expires in 10 days unless extended by the court for good cause or by consent. Tenn. R. Civ. P. 65.03(2).","Preliminary injunction: requires notice to adverse party. Tenn. R. Civ. P. 65.04(1). May be issued only after hearing and upon finding that the complainant would suffer immediate and irreparable harm, there is no adequate remedy at law, complainant has a substantial likelihood of success on the merits, and the balance of equities favors injunctive relief.","Bond: unless the court finds it would be inequitable to require a bond, no restraining order or preliminary injunction shall issue except upon the giving of security by the applicant in such sum as the court deems proper. Tenn. R. Civ. P. 65.05."],"next_steps":["CH-EQU-007","CH-EQU-008"],"decision_point":true,"notes":"[CONFLICT: CH-EQU-CONF-002] [LOCAL RULE CHECK: CH-EQU-LRC-002] Decision point: if injunctive relief is sought, chancellor rules on TRO/preliminary injunction before case proceeds to discovery. If no injunctive relief is sought, proceed directly to CH-EQU-008."},{"step_id":"CH-EQU-007","phase":"Pleadings","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Judge","action":"Rule on motion for temporary restraining order or preliminary injunction; appoint Receiver if equitable circumstances require","citations":["Tenn. R. Civ. P. 65.03","Tenn. R. Civ. P. 65.04","T.C.A. § 21-1-104","T.C.A. § 21-1-801","T.C.A. § 21-1-804"],"conditions":["If the court finds the requirements for injunctive relief are met, it issues a TRO or preliminary injunction and specifies the bond amount. The bond may be waived in the court's discretion. Tenn. R. Civ. P. 65.05.","Receiver (non-standard actor): if the court finds that receivership is necessary to preserve property or the subject matter of the litigation pending final decree, the court may appoint a Receiver. The Receiver takes possession of property as directed by the court, posts bond in an amount set by the court, and makes periodic reports to the Clerk and Master. T.C.A. § 21-1-804.","Sequestration: if a delinquent cannot be found upon attachment, a writ of sequestration may issue against the estate of the delinquent to compel obedience to the decree. T.C.A. § 21-1-801.","Chancellors may appoint referees or commissioners to take accounts where the Clerk and Master is interested or unable to attend, or in other cases where expedient. T.C.A. § 21-1-104."],"next_steps":["CH-EQU-008"],"decision_point":false,"notes":"[GAP: CH-EQU-GAP-003] [LOCAL RULE CHECK: CH-EQU-LRC-003] Proceeds to CH-EQU-008 (scheduling order)."},{"step_id":"CH-EQU-008","phase":"Discovery","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Judge","action":"Enter scheduling order establishing discovery and hearing deadlines","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26.01"],"conditions":[],"next_steps":["CH-EQU-009"],"decision_point":false,"notes":"Proceeds to CH-EQU-009 (discovery)."},{"step_id":"CH-EQU-009","phase":"Discovery","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"Conduct discovery on equitable claims including interrogatories, depositions, requests for production, and requests for admission","citations":["Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 30","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34","Tenn. R. Civ. P. 36"],"conditions":["In accounting cases, the Clerk and Master may prescribe the form in which accounts shall be submitted; may require receipt of a certified public accountant's statement as evidence; and may direct oral examination of accounting parties or written interrogatories. Tenn. R. Civ. P. 53.03(3).","The master or parties may procure attendance of witnesses by subpoena under Tenn. R. Civ. P. 45."],"next_steps":["CH-EQU-010"],"decision_point":false,"notes":"Proceeds to CH-EQU-010 (reference to Clerk and Master if accounting is at issue)."},{"step_id":"CH-EQU-010","phase":"Motions Practice","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Judge","action":"Enter order of reference to Clerk and Master if accounting or other master's reference is required; otherwise rule on pre-trial motions","citations":["Tenn. R. Civ. P. 53.01","Tenn. R. Civ. P. 53.03","T.C.A. § 21-1-701"],"conditions":["Reference to Clerk and Master: the court may refer accounting matters and other specified issues to the Clerk and Master by order of reference. Tenn. R. Civ. P. 53.01. The Clerk and Master prepares a report upon the matters submitted containing findings of fact and conclusions of law if required. Tenn. R. Civ. P. 53.04(1).","Any party may file written objections to the Clerk and Master's report within 10 days after notice of filing. Application to the court for action upon the report and objections is by motion. Tenn. R. Civ. P. 53.04(2).","The court may adopt, modify, or reject the Clerk and Master's report in whole or in part, receive further evidence, or recommit with instructions. Tenn. R. Civ. P. 53.04(2)."],"next_steps":["CH-EQU-011"],"decision_point":false,"notes":"[LOCAL RULE CHECK: CH-EQU-LRC-004] Proceeds to CH-EQU-011 (pre-trial conference)."},{"step_id":"CH-EQU-011","phase":"Pre-Trial","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Judge","action":"Hold pre-trial conference and identify remaining contested issues for final hearing","citations":["Tenn. R. Civ. P. 16"],"conditions":[],"next_steps":["CH-EQU-012"],"decision_point":false,"notes":"Proceeds to CH-EQU-012 (final hearing)."},{"step_id":"CH-EQU-012","phase":"Trial","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Judge","action":"Conduct final hearing on the merits of the equitable claim","citations":["T.C.A. § 21-1-103","Tenn. R. Civ. P. 38","Tenn. R. Evid. 101"],"conditions":["Either party in a chancery suit is entitled, upon application, to a jury to try and determine any material fact in dispute, except in cases involving complicated accounting and those elsewhere excepted by law. T.C.A. § 21-1-103.","Jury demand in chancery: governed by Tenn. R. Civ. P. 38. The court is tried to the bench on equitable issues and the jury determines disputed factual issues.","Findings of fact and conclusions of law are required in all actions tried without a jury. Tenn. R. Civ. P. 52.01."],"next_steps":["CH-EQU-013"],"decision_point":false,"notes":"Proceeds to CH-EQU-013 (entry of decree)."},{"step_id":"CH-EQU-013","phase":"Judgment","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Judge","action":"Enter final decree granting or denying equitable relief","citations":["Tenn. R. Civ. P. 52.01","Tenn. R. Civ. P. 58","Tenn. R. Civ. P. 70","T.C.A. § 16-1-108","T.C.A. § 16-1-109"],"conditions":["Specific performance decree: operates as a deed to convey land if so ordered by the court; a copy of the decree certified by the clerk shall be recorded in the register's office of the county where the land lies and stands in place of a deed. Tenn. R. Civ. P. 70. The court may also appoint a commissioner to execute a conveyance if the party fails to comply. Tenn. R. Civ. P. 70.","Courts having jurisdiction to sell lands may divest and vest title directly by decree, or empower the clerk to make title. The decree or clerk's deed has the same force and effect as a conveyance by the party and shall be registered. T.C.A. § 16-1-108, § 16-1-109.","Permanent injunction: the court issues the final injunction as part of the decree. Compliance is enforceable by contempt. T.C.A. § 21-1-804.","Accounting decree: incorporates the Clerk and Master's approved report or the chancellor's findings of account, orders payment of amounts found due, and directs distribution of any surplus."],"next_steps":["CH-EQU-014"],"decision_point":false,"notes":"Proceeds to CH-EQU-014 (execution of decree and judicial sale if ordered)."},{"step_id":"CH-EQU-014","phase":"Judgment","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Clerk and Master","action":"Execute final decree; conduct judicial sale if ordered; file report of sale with court","citations":["T.C.A. § 21-1-803","T.C.A. § 21-1-802","T.C.A. § 18-2-106","T.C.A. § 18-2-107"],"conditions":["Judicial sale: where land is to be sold under the decree, the court may order sale on credit of not less than six months nor more than two years; upon sale being made, reported, and confirmed, no right of redemption exists in the debtor or the debtor's creditors, and the purchaser's title shall be absolute. T.C.A. § 21-1-803.","The Clerk and Master reports the sale to the court at each term. Any person interested may except to the report. The court's action on the report is embodied in a decree entered on the minutes. T.C.A. § 18-2-106, § 18-2-107.","All writs for collection of money or to obtain possession of property available in common law courts may be adapted to execution of decrees in chancery. T.C.A. § 21-1-802."],"next_steps":["CH-EQU-015"],"decision_point":false,"notes":"[GAP: CH-EQU-GAP-004] [LOCAL RULE CHECK: CH-EQU-LRC-005] Proceeds to CH-EQU-015 (post-judgment)."},{"step_id":"CH-EQU-015","phase":"Post-Judgment","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"File post-judgment motion to alter or amend within 30 days, or seek enforcement by contempt or sequestration","citations":["Tenn. R. Civ. P. 59.04","Tenn. R. Civ. P. 60.02","T.C.A. § 21-1-801","T.C.A. § 21-1-804"],"conditions":["All post-trial motions must be filed within 30 days after entry of judgment. Tenn. R. Civ. P. 59.02.","Chancery courts may enforce rules, orders, or decrees by process against the person in default or by process against that person's property. T.C.A. § 21-1-804.","If the delinquent cannot be found upon attachment, a writ of sequestration may issue against the estate of the delinquent to compel obedience to the decree. T.C.A. § 21-1-801.","A decree against a defendant who appeared and was heard may be enforced by contempt proceedings. T.C.A. § 21-1-804."],"next_steps":["CH-EQU-016"],"decision_point":false,"notes":"Proceeds to CH-EQU-016 (appeal)."},{"step_id":"CH-EQU-016","phase":"Appeal","court_type":"Chancery Court","case_type":"General Equity (Injunctions, Specific Performance, Accounting)","actor":"Plaintiff / Attorney","action":"File notice of appeal with Clerk and Master within 30 days after entry of final decree","citations":["Tenn. R. App. P. 3","Tenn. R. App. P. 4(a)","T.C.A. § 27-1-113"],"conditions":["Appeals from Chancery Court go to the Court of Appeals. The Court of Appeals shall not be limited to facts found or requested in the lower court but shall independently consider all material facts in the record; either party may assign error on any failure of the chancellor to find a material fact, without regard to whether the fact was found or requested below. This provision does not apply to cases tried on oral testimony. T.C.A. § 27-1-113.","Timely post-trial motion under Tenn. R. Civ. P. 59 extends the appeal period; the 30-day period runs from entry of the order disposing of the last pending motion. Tenn. R. App. P. 4(b).","Chancellor must file findings of fact within 30 days after appeal; clerk gives notice to parties who have five days to petition for different or additional findings. T.C.A. § 27-1-114."],"next_steps":[],"decision_point":false,"notes":"TERMINAL STEP. Final disposition of the appeal ends the case lifecycle for purposes of this flow."}],"source_file":"CH-EQU-Flowchart.html"},{"flow_id":"CH-FOR","court_type":"Chancery Court","case_type":"Judicial Foreclosure","version":"1.0","produced_date":"2026-05-14","status":"Draft - Pending Review","gaps":[{"gap_id":"CH-FOR-GAP-001","affected_steps":["CH-FOR-002"],"description":"The filing fee for a judicial foreclosure complaint in Chancery Court is governed by T.C.A. § 8-21-401 and the AOC fee schedule. The specific fee amount is not available in the corpus fee schedule text. The applicable fee should be confirmed against Standard Fees (AOC). The $7.00 technology earmark under T.C.A. § 8-21-401(j) applies. A lis pendens abstract must also be registered in the county register of deeds office; the register's recording fee should be confirmed."},{"gap_id":"CH-FOR-GAP-002","affected_steps":["CH-FOR-008"],"description":"T.C.A. § 21-1-803 governs credit terms for Chancery Court foreclosure sales. The statute requires a credit of not less than six months nor more than two years when specified in the decree but does not specify the notice and publication requirements for the foreclosure sale itself. The publication requirements for a Chancery Court judicial foreclosure sale -- including the number of weeks of publication, the newspaper designation, and any required personal notice to the borrower -- are not fully specified in the corpus. These should be confirmed from local rules and any applicable AOC guidance."},{"gap_id":"CH-FOR-GAP-003","affected_steps":["CH-FOR-010"],"description":"The corpus confirms that upon a Chancery Court foreclosure sale being made, reported, and confirmed, no right of redemption or repurchase shall exist in the debtor or the debtor's creditors per T.C.A. § 21-1-803. However, the corpus does not contain a statute confirming the treatment of the surplus proceeds distribution where there are multiple junior lienholders and the surplus is insufficient to satisfy all junior liens. The priority and distribution of surplus proceeds among competing lienholders after a judicial foreclosure sale should be confirmed from the full corpus or from applicable case law."}],"conflicts":[{"conflict_id":"CH-FOR-CONF-001","affected_steps":["CH-FOR-001"],"description":"Judicial foreclosure through Chancery Court is the less common method of foreclosure in Tennessee. The primary method is non-judicial foreclosure by advertisement under a deed of trust pursuant to T.C.A. §§ 35-5-101 et seq. Non-judicial foreclosure does not require court involvement except for injunctive relief. This flow covers judicial foreclosure only. If the lender holds a deed of trust and elects non-judicial foreclosure by advertisement, this flow does not apply. Judicial foreclosure is required when: (1) the security instrument is a mortgage (not a deed of trust); (2) the non-judicial sale power has been extinguished or waived; (3) the property cannot be identified or described with sufficient certainty for a trustee's sale; or (4) the borrower has filed a legal challenge requiring court resolution. Flagged for reviewer confirmation that judicial foreclosure, not non-judicial foreclosure, is the appropriate proceeding in each case."},{"conflict_id":"CH-FOR-CONF-002","affected_steps":["CH-FOR-010"],"description":"T.C.A. § 21-1-803 provides that upon confirmation of a judicial foreclosure sale, no right of redemption or repurchase shall exist in the debtor or the debtor's creditors. T.C.A. § 35-5-118 provides a right of redemption in certain non-judicial foreclosure sales. The absence of a redemption right after a confirmed judicial foreclosure sale is specific to the judicial path and controlled by T.C.A. § 21-1-803. Under the source hierarchy, T.C.A. § 21-1-803 is the specific provision applicable to judicial foreclosure sales and controls over any general redemption right provisions. No conflict exists but flagged to ensure practitioners do not apply the non-judicial redemption provisions to confirmed judicial sales."}],"local_rule_checks":[{"check_id":"CH-FOR-LRC-001","affected_steps":["CH-FOR-002"],"description":"Verify local rules for any required lis pendens form, civil cover sheet, or foreclosure case designation form at the time of filing a judicial foreclosure complaint in Chancery Court."},{"check_id":"CH-FOR-LRC-002","affected_steps":["CH-FOR-008"],"description":"Verify local rules for publication notice requirements for judicial foreclosure sales conducted by the Clerk and Master, including the number of weeks of required publication, the newspaper, and any required personal notice to the borrower or junior lienholders before the sale date."},{"check_id":"CH-FOR-LRC-003","affected_steps":["CH-FOR-010"],"description":"Verify local rules for the upset bid procedure following the initial foreclosure sale, including the time period within which an upset bid may be submitted and the increment requirements. Some local chancery courts have standing orders governing upset bid procedures after judicial foreclosure sales."},{"check_id":"CH-FOR-LRC-004","affected_steps":["CH-FOR-011"],"description":"Verify local rules for the form of the Clerk and Master's deed issued after confirmation of a judicial foreclosure sale, and whether the deed must be reviewed and approved by the chancellor before execution and delivery."}],"steps":[{"step_id":"CH-FOR-001","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Plaintiff / Attorney","action":"Confirm judicial foreclosure is the appropriate remedy and determine the basis for Chancery Court jurisdiction","citations":["T.C.A. § 16-11-103","T.C.A. § 21-1-803"],"conditions":["Judicial foreclosure is an equitable proceeding in Chancery Court. T.C.A. § 16-11-103. It is appropriate when: the security instrument is a mortgage rather than a deed of trust; the power of sale in a deed of trust has been extinguished or otherwise is not available; or the lender elects judicial rather than non-judicial foreclosure.","Non-judicial foreclosure by advertisement under a deed of trust (T.C.A. §§ 35-5-101 et seq.) is the primary foreclosure method in Tennessee and does not require court action. This flow does not apply to non-judicial foreclosure.","Venue: county where the land or any part of it lies. T.C.A. § 16-1-107.","A court of record may decree a sale of lands lying in any part of the state in a foreclosure proceeding. T.C.A. § 16-1-107."],"next_steps":["CH-FOR-002"],"decision_point":false,"notes":"[CONFLICT: CH-FOR-CONF-001] Proceeds to CH-FOR-002 (complaint and lis pendens)."},{"step_id":"CH-FOR-002","phase":"Case Initiation","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Plaintiff / Attorney","action":"File complaint for judicial foreclosure with Clerk and Master, register lis pendens in county register of deeds office, and pay filing fee","citations":["T.C.A. § 25-5-107","T.C.A. § 25-5-108","Tenn. R. Civ. P. 3","Tenn. R. Civ. P. 8.01"],"conditions":["Complaint must identify: the security instrument (mortgage or deed of trust); the property by legal description; the amount of the debt and the default; all parties claiming an interest in the property including junior lienholders and tenants with recorded leases; and the relief sought (decree of foreclosure and order of sale).","Lis pendens abstract must be filed and recorded in the register of deeds office of each county where the land lies to affect the rights of bona fide purchasers and encumbrancers without actual notice. T.C.A. § 25-5-107. Abstract must identify the court, parties, and description of the realty. T.C.A. § 25-5-108.","Filing fee per Standard Fees (AOC); $7.00 technology earmark per T.C.A. § 8-21-401(j)."],"next_steps":["CH-FOR-003"],"decision_point":false,"notes":"[GAP: CH-FOR-GAP-001] [LOCAL RULE CHECK: CH-FOR-LRC-001] Proceeds to CH-FOR-003 (service of process)."},{"step_id":"CH-FOR-003","phase":"Service of Process","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Plaintiff / Attorney","action":"Effect service of process on all defendants including borrower, guarantors, and all junior lienholders of record","citations":["Tenn. R. Civ. P. 4.04","Tenn. R. Civ. P. 4.05","T.C.A. § 21-1-203","T.C.A. § 21-1-204","T.C.A. § 21-1-205"],"conditions":["All persons having a recorded interest in the property must be made parties; failure to join a junior lienholder does not invalidate the foreclosure but may not extinguish that lienholder's interest.","Constructive service by publication is available for defendants whose residence is unknown and cannot be ascertained by diligent inquiry, upon affidavit establishing the applicable statutory grounds. T.C.A. § 21-1-203 through § 21-1-205.","A decree against a defendant without personal service who does not appear is not absolute for three years from the decree unless a copy is served upon the defendant. T.C.A. § 21-1-402."],"next_steps":["CH-FOR-004"],"decision_point":false,"notes":"Proceeds to CH-FOR-004 (answer and defenses)."},{"step_id":"CH-FOR-004","phase":"Pleadings","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Defendant / Attorney","action":"File answer and assert any defenses to the foreclosure including payment, usury, defective notice, or priority disputes","citations":["Tenn. R. Civ. P. 12.01","Tenn. R. Civ. P. 8.02"],"conditions":["Common defenses in judicial foreclosure include: payment or satisfaction of the debt; statute of limitations; defects in the security instrument; failure of consideration; and fraud in the inducement.","Junior lienholders who appear may assert their lien priority claims in the proceeding.","If no defendant answers, plaintiff may seek a default; however, the court must still enter a decree of foreclosure and order of sale, and the sale proceeds must be distributed according to the priority of liens."],"next_steps":["CH-FOR-005"],"decision_point":false,"notes":"Proceeds to CH-FOR-005 (scheduling and discovery if contested; motion for summary judgment if uncontested)."},{"step_id":"CH-FOR-005","phase":"Discovery","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Judge","action":"Conduct discovery on debt amount, default, validity of security instrument, and lien priority if contested","citations":["Tenn. R. Civ. P. 16","Tenn. R. Civ. P. 26","Tenn. R. Civ. P. 33","Tenn. R. Civ. P. 34"],"conditions":["In uncontested cases, the plaintiff may proceed by motion for summary judgment after the answer period expires if no triable issue of fact exists.","Discovery in contested cases focuses on the loan documents, payment history, notice of default, and any alleged defenses."],"next_steps":["CH-FOR-006"],"decision_point":false,"notes":"Proceeds to CH-FOR-006 (pre-trial motions and summary judgment)."},{"step_id":"CH-FOR-006","phase":"Motions Practice","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Plaintiff / Attorney","action":"File motion for summary judgment or motion for decree of foreclosure if no genuine issue of material fact exists","citations":["Tenn. R. Civ. P. 56"],"conditions":["In uncontested or undisputed cases, the court may enter a decree of foreclosure on summary judgment or on motion supported by affidavit.","If contested issues of fact remain as to the debt, default, or validity of the security instrument, the matter proceeds to a final hearing."],"next_steps":["CH-FOR-007"],"decision_point":false,"notes":"Proceeds to CH-FOR-007 (final hearing or entry of decree)."},{"step_id":"CH-FOR-007","phase":"Trial","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Judge","action":"Conduct final hearing on contested foreclosure issues and enter decree of foreclosure and order of sale","citations":["T.C.A. § 21-1-803","Tenn. R. Civ. P. 52.01","Tenn. R. Evid. 101"],"conditions":["Either party is entitled upon application to a jury to try any material disputed fact. T.C.A. § 21-1-103.","Findings of fact and conclusions of law are required. Tenn. R. Civ. P. 52.01.","The decree of foreclosure must: state the amount of the debt, interest, and costs; order the property sold to satisfy the judgment; specify the terms of sale including credit period; direct the Clerk and Master to conduct the sale; and address the distribution of proceeds among lienholders in priority order."],"next_steps":["CH-FOR-008"],"decision_point":false,"notes":"Proceeds to CH-FOR-008 (sale by Clerk and Master)."},{"step_id":"CH-FOR-008","phase":"Judgment","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Clerk and Master","action":"Advertise and conduct judicial foreclosure sale of the property pursuant to the decree","citations":["T.C.A. § 21-1-803","T.C.A. § 21-1-802","T.C.A. § 18-2-106"],"conditions":["Sale terms: property may be sold on a credit of not less than six months nor more than two years as specified in the decree. T.C.A. § 21-1-803.","The Clerk and Master publishes notice of the sale in the designated newspaper and gives any personal notice required by the decree or local rules.","The Clerk and Master conducts the sale as a public auction. The plaintiff may credit bid up to the amount of the debt, interest, and costs.","Surplus proceeds over and above the amount necessary to pay the plaintiff's debt are paid to the debtor or to the debtor's other creditors entitled to payment in priority order. T.C.A. § 21-1-803."],"next_steps":["CH-FOR-009"],"decision_point":false,"notes":"[GAP: CH-FOR-GAP-002] [LOCAL RULE CHECK: CH-FOR-LRC-002] Proceeds to CH-FOR-009 (report of sale)."},{"step_id":"CH-FOR-009","phase":"Judgment","court_type":"Chancery Court","case_type":"Judicial Foreclosure","actor":"Clerk and Master","action":"File report of sale with the court; parties may file exceptions to the report within the time set by the court","citations":["T.C.A. § 18-2-106","T.C.A. § 18-2-107"],"conditions":["The Clerk and Master submits a report to the court showing the property sold, the amount of the sale, and the proposed distribution of proceeds. T.C.A. § 18-2-106.","Any person interested in the report may file exceptions to the report. The court's action on the report and the exceptions thereto shall be embodied in a decree entered on the minutes of the court. T.C.A. § 18-2-107.","The Clerk and Master is entitled to no fees or allowances other than those specified and fixed by the decree of the court. T.C.A. § 18-2-107(a)."],"next_steps":["CH-FOR-010"],"decision_point":false,"notes":"Proceeds to
